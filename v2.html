<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<title>Jogos Internos Escolares</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2236;--bg4:#243049;--bd:#2d3a52;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --pr:#22d3ee;--pr2:#06b6d4;--prG:rgba(34,211,238,.15);
  --gn:#34d399;--gnG:rgba(52,211,153,.15);
  --am:#fbbf24;--amG:rgba(251,191,36,.12);
  --rd:#f87171;--rdG:rgba(248,113,113,.12);
  --pu:#a78bfa;--puG:rgba(167,139,250,.12);
  --r:8px;--rL:16px;--t:.2s ease;
  --g1:#fbbf24;--g2:#f59e0b;--s1:#94a3b8;--s2:#64748b;
  --b1:#fb923c;--b2:#ea580c;--rt:#000;--ov:rgba(0,0,0,.6);
}
.light {
  --bg:#f0f2f5;--bg2:#fff;--bg3:#f5f6f8;--bg4:#e8ecf1;--bd:#d8dde6;
  --tx:#1a1f2e;--tx2:#4a5568;--tx3:#7a8599;
  --pr:#0891b2;--pr2:#0e7490;--prG:rgba(8,145,178,.1);
  --gn:#059669;--gnG:rgba(5,150,105,.1);
  --am:#d97706;--amG:rgba(217,119,6,.08);
  --rd:#dc2626;--rdG:rgba(220,38,38,.08);
  --pu:#7c3aed;--puG:rgba(124,58,237,.08);
  --g1:#f59e0b;--g2:#d97706;--s1:#6b7280;--s2:#4b5563;
  --b1:#ea580c;--b2:#c2410c;--rt:#fff;--ov:rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.app{display:flex;min-height:100vh}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--bd);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;transition:transform .25s,background .3s}
.main{margin-left:250px;flex:1;min-height:100vh}
.sb-head{padding:18px 14px;border-bottom:1px solid var(--bd)}
.sb-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;background:linear-gradient(135deg,var(--pr),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-roles{display:flex;margin-top:12px;background:var(--bg3);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd)}
.sb-role{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:none;background:transparent;color:var(--tx3);cursor:pointer;transition:all var(--t)}
.sb-role.active{background:var(--pr);color:var(--bg)}
.sb-nav{padding:12px 8px;flex:1;overflow-y:auto}
.sb-section{margin-bottom:14px}
.sb-stitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);padding:0 8px;margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all var(--t)}
.sb-item:hover{background:var(--bg3);color:var(--tx)}
.sb-item.active{background:var(--prG);color:var(--pr)}
.sb-footer{padding:10px;border-top:1px solid var(--bd);font-size:9px;color:var(--tx3);text-align:center;font-family:'Space Mono',monospace}
.topbar{padding:12px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:50;transition:background .3s}
.topbar-l{display:flex;align-items:center;gap:10px}
.page-title{font-size:17px;font-weight:700}
.topbar-r{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all var(--t)}
.icon-btn:hover{border-color:var(--pr);transform:scale(1.1)}
.menu-btn{display:none;width:34px;height:34px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg3);color:var(--tx);align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.content{padding:20px 24px}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.bc{background:var(--prG);color:var(--pr)}.bg{background:var(--gnG);color:var(--gn)}.ba{background:var(--amG);color:var(--am)}.br{background:var(--rdG);color:var(--rd)}.bp{background:var(--puG);color:var(--pu)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{padding:6px 12px;min-height:36px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all var(--t);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--bg4)}
.btn-p{background:var(--pr);color:var(--bg);border-color:var(--pr)}.btn-p:hover{background:var(--pr2)}
.btn-g{background:var(--gn);color:var(--bg);border-color:var(--gn)}
.btn-r{background:var(--rd);color:var(--bg);border-color:var(--rd)}
.btn-s{padding:3px 7px;font-size:11px}
.btn-d{background:linear-gradient(135deg,var(--pr),var(--pu));color:#fff;border:none;font-size:13px;padding:9px 18px;font-weight:700;border-radius:var(--r);box-shadow:0 3px 16px rgba(34,211,238,.25);cursor:pointer}
.btn-d:hover{transform:translateY(-1px)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rL);overflow:hidden;transition:background .3s}
.card-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.card-t{font-size:14px;font-weight:700}
.card-b{padding:16px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rL);padding:16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.cy::before{background:var(--pr)}.sc.gn::before{background:var(--gn)}.sc.am::before{background:var(--am)}.sc.pu::before{background:var(--pu)}
.sc-l{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sc-v{font-size:26px;font-weight:800;margin-top:2px;font-family:'Space Mono',monospace}
.sc.cy .sc-v{color:var(--pr)}.sc.gn .sc-v{color:var(--gn)}.sc.am .sc-v{color:var(--am)}.sc.pu .sc-v{color:var(--pu)}
.fg{margin-bottom:12px}.fl{display:block;font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fi,.fs{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-size:16px;outline:none;transition:border-color var(--t);text-transform:uppercase}
.fi:focus,.fs:focus{border-color:var(--pr)}.fs option{background:var(--bg2);color:var(--tx)}@media(min-width:769px){.fi,.fs{font-size:13px}}
.fr{display:flex;gap:8px}.fr>*{flex:1}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bd)}
td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--bd)}
tr:last-child td{border-bottom:0}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg3);border-radius:var(--r);padding:3px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--tx3);cursor:pointer;transition:all var(--t)}
.tab.active{background:var(--pr);color:var(--bg)}
.bw{overflow-x:auto;padding:12px 0}.brs{display:flex;gap:18px;align-items:stretch}
.brd{display:inline-flex;flex-direction:column;justify-content:center;gap:12px;min-width:220px}
.brt{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px;font-family:'Space Mono',monospace}
.brm{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.bte{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;font-size:12px;font-weight:500}
.bte+.bte{border-top:1px solid var(--bd)}.bte.win{background:var(--gnG);color:var(--gn);font-weight:700}.bte.bye{color:var(--tx3);font-style:italic}.bte.wo{background:var(--rdG);color:var(--rd);font-weight:700;text-decoration:line-through}
.bsc{font-family:'Space Mono',monospace;font-weight:700;font-size:13px}
.rr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bd)}.rr:last-child{border-bottom:0}
.rp{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;font-family:'Space Mono',monospace;flex-shrink:0}
.r1{background:linear-gradient(135deg,var(--g1),var(--g2));color:var(--rt)}.r2{background:linear-gradient(135deg,var(--s1),var(--s2));color:var(--rt)}.r3{background:linear-gradient(135deg,var(--b1),var(--b2));color:var(--rt)}.ro{background:var(--bg4);color:var(--tx2)}
.rn{flex:1;font-weight:600;font-size:13px}.rs{font-size:10px;color:var(--tx3)}.rv{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--pr)}
.ov{position:fixed;inset:0;background:var(--ov);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:5vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.md{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rL);width:100%;max-width:460px;max-height:none;overflow-y:visible;margin-bottom:40vh}
.md-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.md-t{font-size:15px;font-weight:700}.md-b{padding:16px}
.md-f{padding:8px 16px;border-top:1px solid var(--bd);display:flex;gap:6px;justify-content:flex-end}
.em{text-align:center;padding:36px 14px;color:var(--tx3);font-size:13px}
.banner{background:linear-gradient(135deg,var(--prG),var(--puG));border:1px solid rgba(128,128,128,.12);border-radius:var(--rL);padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.banner h3{font-size:14px;font-weight:700;margin-bottom:3px;background:linear-gradient(135deg,var(--pr),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.banner p{font-size:12px;color:var(--tx2)}
.dz{border:2px dashed var(--bd);border-radius:var(--rL);padding:28px 20px;text-align:center;cursor:pointer;position:relative;transition:all var(--t)}
.dz:hover,.dz.drag{border-color:var(--pr);background:var(--prG)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.iok{margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.6;background:var(--gnG);color:var(--gn);border:1px solid var(--gn)}
.ier{margin-top:10px;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.6;background:var(--rdG);color:var(--rd);border:1px solid var(--rd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.fb{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.fw{display:flex;gap:6px;flex-wrap:wrap}

/* ── MOBILE BOTTOM NAV ──────────────────────────────────────────── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:var(--bg2);border-top:1px solid var(--bd);
  padding:0 0 env(safe-area-inset-bottom,0);
  box-shadow:0 -4px 24px rgba(0,0,0,.25)}
.bnav-inner{display:flex;align-items:stretch;justify-content:space-around;
  scrollbar-width:none;gap:0}
.bnav-inner::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.1);border-radius:8px}
::-webkit-scrollbar-thumb{background:rgba(100,116,139,.5);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:rgba(100,116,139,.75)}
/* Hide scrollbar on bottom nav */
.bnav ::-webkit-scrollbar{display:none}
/* Thin scrollbar for filter panels */
.sb-filter-box::-webkit-scrollbar{width:3px}
.sb-filter-box::-webkit-scrollbar-thumb{background:rgba(100,116,139,.2)}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:6px 4px 8px;flex:1;min-width:0;
  border:none;background:transparent;color:var(--tx3);cursor:pointer;
  font-family:inherit;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bnav-item.active{color:var(--pr)}
.bnav-item .bi{font-size:18px;line-height:1}
.bnav-item .bl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
/* ── OVERLAY for sidebar on mobile ─────────────────────────────── */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;
  backdrop-filter:blur(2px)}

/* ── TABLET (481-768px) ────────────────────────────────────────── */
@media(min-width:481px) and (max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding-bottom:64px}
  .md{max-width:520px;border-radius:20px 20px 0 0;max-height:88vh}
  .g3{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr 1fr}
  .content{padding:16px 18px}
}
/* ── MOBILE (≤480px) ───────────────────────────────────────────── */
@media(max-width:480px){
  .md{max-width:100%;max-height:92vh;border-radius:20px 20px 0 0;border-bottom:none;align-self:flex-end}
  .g2,.g3{grid-template-columns:1fr}
  .sgrid{grid-template-columns:1fr 1fr}
  .content{padding:10px 10px}
  .fr{flex-direction:column;gap:0}
  .brd{min-width:155px}
  .bte{padding:5px 7px;font-size:11px}
  .sc-v{font-size:20px}
  .sc-l{font-size:9px}
  .sc{padding:10px}
  .rr{padding:7px 10px}
  .card-h{padding:9px 12px}
  .card-b{padding:10px}
  .card-t{font-size:13px}
  .banner{padding:12px}
  .banner h3{font-size:13px}
  .banner .btn-d{font-size:10px;padding:7px 10px}
  .topbar{padding:8px 10px;padding-top:max(8px,env(safe-area-inset-top,8px))}
  .tp-l .page-title{font-size:13px}
  .menu-btn{width:30px;height:30px;font-size:16px}
}
/* ── ALL MOBILE (≤768px) ───────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);z-index:100;box-shadow:8px 0 32px rgba(0,0,0,.4)}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.show{display:block}
  .main{margin-left:0;width:100%;padding-bottom:68px}
  .topbar{padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top,10px));gap:6px}
  .tp-l .page-title{font-size:14px}
  .topbar-r .badge{display:none}
  .topbar-r .sync-indicator{font-size:9px!important;padding:3px 6px!important}
  .topbar-r .btn{padding:4px 8px;font-size:10px}
  .menu-btn{display:flex!important}
  .bnav{display:block}
  .banner{flex-direction:column;align-items:flex-start;gap:10px;padding:14px}
  .banner .btn-d{font-size:11px;padding:8px 12px}
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .tabs::-webkit-scrollbar{display:none}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  td,th{padding:7px 8px;font-size:12px}
  .btn-d{font-size:12px;padding:9px 14px}
  .rr{padding:8px 10px}
  .topbar-r .icon-btn{width:30px;height:30px;font-size:13px}
  .content{padding:14px 12px}
  .sgrid{gap:8px}
  .sc{padding:12px}
  .sc-v{font-size:22px}
  /* Bracket scroll indicator */
  .bw{position:relative}
  .bw::after{content:'→';position:absolute;right:0;top:50%;transform:translateY(-50%);
    background:linear-gradient(to right,transparent,var(--bg2));
    padding:4px 8px;color:var(--tx3);font-size:12px;pointer-events:none}
  /* Conflict page: stack columns */
  .conflict-grid{grid-template-columns:1fr!important}
  /* Podium: scroll horizontal */
  .podium-row{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important}
  .podium-card{min-width:120px}
  /* Touch score inputs: bigger */
  .score-input{font-size:32px!important;height:64px!important}
  /* FAB */
  .fab{display:flex!important}
  /* Supabase status in topbar */
  .sb-sync-dot{display:inline-block!important}
  /* Modal bottom sheet for all */
  .ov{align-items:flex-end;padding:0}
  .md-b{padding:14px}
}
@media(max-width:400px){
  .g3{grid-template-columns:1fr}
  .bnav-item{min-width:48px;padding:8px 8px 10px}
  .bnav-item .bl{font-size:8px}
}
@media(min-width:769px){
  /* Desktop: hide bottom nav */
  .bnav{display:none!important}
  .sb-overlay{display:none!important}
}
/* Mobile card-style tables for enrollment */
@media(max-width:600px){
  .mob-cards thead{display:none}
  .mob-cards tr{display:block;background:var(--bg2);border:1px solid var(--bd);
    border-radius:var(--r);margin-bottom:8px;padding:10px 12px}
  .mob-cards td{display:flex;justify-content:space-between;align-items:center;
    padding:4px 0;border:none;font-size:12px}
  .mob-cards td::before{content:attr(data-label);font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);flex-shrink:0;margin-right:8px}
  .mob-cards td:last-child{margin-top:6px;padding-top:8px;border-top:1px solid var(--bd);justify-content:flex-end}
  .mob-cards td:empty{display:none}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
try {
  window.onerror = function(msg, src, line) {
    var d = document.getElementById('app') || document.body;
    var div = document.createElement('div');
    div.style.cssText = 'padding:24px;font-family:sans-serif;min-height:100vh;background:#0a0e1a;color:#f1f5f9';
    var h = document.createElement('h2');
    h.style.color = '#22d3ee';
    h.textContent = 'Erro ao carregar';
    var p = document.createElement('p');
    p.style.cssText = 'color:#94a3b8;margin-top:8px';
    p.textContent = msg + ' (linha ' + line + ')';
    var p2 = document.createElement('p');
    p2.style.cssText = 'color:#94a3b8;margin-top:12px';
    p2.textContent = 'Abra no Safari ou Chrome atualizado.';
    div.appendChild(h); div.appendChild(p); div.appendChild(p2);
    d.innerHTML = ''; d.appendChild(div);
    return true;
  };
} catch(e) {}
// Minimal async XLSX reader using browser's DecompressionStream (no external deps)
var XLSXMini = null;
try {
var XLSXMini = {
  read: async function(arrayBuffer) {
    var files = await this._unzip(arrayBuffer);
    if (!files) return null;
    return this._parseXlsx(files);
  },

  _unzip: async function(buf) {
    var u8 = new Uint8Array(buf);
    var files = {};
    // Find end of central directory
    var eocd = -1;
    for (var i = u8.length - 22; i >= Math.max(0, u8.length - 65558); i--) {
      if (u8[i]===0x50&&u8[i+1]===0x4B&&u8[i+2]===0x05&&u8[i+3]===0x06) { eocd = i; break; }
    }
    if (eocd < 0) return null;
    var cdOff = this._u32(u8, eocd+16);

// -- XLSX Bracket Parser
function parseJimXlsx(wb){
  // The app's XLSX parser reads raw XML. This function now handles both
  // sharedStrings and inlineStr cell formats.
  if(!wb)return null;
  // wb is the SheetJS workbook object  
  var sN=Object.keys(wb.Sheets||{});
  var ts=wb.Sheets['TABELA COMPLETA']||wb.Sheets['TABELA']||wb.Sheets[sN[0]];
  if(!ts)return null;
  // Helper: read cell value by column letter + row number
  function cv(col,row){
    var cell=ts[col+row];
    if(!cell)return'';
    // inlineStr format (xlsx with inline strings, no sharedStrings)
    if(cell.v!=null)return(''+cell.v).trim();
    if(cell.w)return cell.w.trim();
    // SheetJS may not parse inlineStr — try raw value
    if(cell.r){var m=cell.r.match(/<t[^>]*>([^<]*)<\/t>/);if(m)return m[1].trim();}
    return'';
  }
  // For column-header reading (pass cell directly)
  function cvCell(cell){
    if(!cell)return'';
    if(cell.v!=null)return(''+cell.v).trim();
    if(cell.w)return cell.w.trim();
    if(cell.r){var m=cell.r.match(/<t[^>]*>([^<]*)<\/t>/);if(m)return m[1].trim();}
    return'';
  }
  var range=ts['!ref'];if(!range)return null;
  var parts=range.split(':');var endRow=600;
  if(parts[1]){var m2=parts[1].match(/(\d+)/);if(m2)endRow=parseInt(m2[1])}
  var headers={};
  'ABCDEFGHIJK'.split('').forEach(function(col){var cell=ts[col+'1'];if(cell){headers[col]=cvCell(cell).toUpperCase().replace(/[^A-Z0-9 ]/g,'').trim()}});
  var cm={hora:'D',local:'E',serie:'F',modal:'G',fase:'H',e1:'I',e2:'K'};
  Object.entries(headers).forEach(function(e){var c=e[0],h2=e[1];
    if(h2.indexOf('HOR')>=0)cm.hora=c;
    if(h2.indexOf('LOCAL')>=0)cm.local=c;
    if(h2.indexOf('MODAL')>=0)cm.modal=c;
    if(h2.indexOf('SERIE')>=0||h2.indexOf('TURMA')>=0)cm.serie=c;
    if(h2.indexOf('FASE')>=0)cm.fase=c;
    if(h2.indexOf('EQUIPE')>=0&&!cm._e1s){cm.e1=c;cm._e1s=true}
    else if(h2.indexOf('EQUIPE')>=0){cm.e2=c}
  });
  function cv(col,row){var c=ts[col+row];return c?(c.v||'').toString().trim():''}
  var rows=[];
  for(var r=2;r<=endRow;r++){var modal=cv(cm.modal,r);if(!modal)continue;var e1=cv(cm.e1,r),e2=cv(cm.e2,r);rows.push({hora:cv(cm.hora,r),local:cv(cm.local,r),modal:modal,fase:cv(cm.fase,r),e1:e1,e2:e2,serie:cv(cm.serie,r)})}
  if(!rows.length)return null;
  return _buildJimRows(rows);
}
function parseJimHtmlForBrackets(htmlText){
  var rawMatch=htmlText.match(/const RAW\s*=\s*(\[[\s\S]*?\]);/);
  if(!rawMatch)return null;var raw;try{raw=JSON.parse(rawMatch[1])}catch(e){return null}
  if(!Array.isArray(raw)||!raw.length)return null;
  return _buildJimRows(raw.map(function(r){return{hora:r[2],local:r[3],modal:r[4],fase:r[5],e1:r[7],e2:r[8],serie:r[10]||''}}));
}
function _buildJimRows(rows){
  function u(){return Math.random().toString(36).slice(2,9)}
  function nrm(s){return(s||'').replace(/[\u00b0\u00ba]/g,'\u00ba').trim().toUpperCase()}
  function isPH(e){
    if(!e)return true;
    var up=nrm(e);
    if(['VENC.','PERD.','A DEFINIR','BYE','LUGAR','W_','L_'].some(function(p){return up.indexOf(p)>=0}))return true;
    if(/^\d+[\u00ba\u00b0o]?\s*ANO\s*$/.test(up))return true;
    if(/^\d+[\u00ba\u00b0o]?\s*SERIE?\s*$/.test(up))return true;
    return false;
  }
  function normModal(m){
    var s=nrm(m);
    var g='Misto';
    if(/\bMASC\b/.test(s))g='Masculino';
    else if(/\bFEM\b/.test(s))g='Feminino';
    var base=s.replace(/\s*(MASC|FEM|MISTO|MASCULINO|FEMININO)\b/gi,'').trim();
    return{base:base,gender:g};
  }

  var sptSet={},locsSet={},turmasSet={};
  rows.forEach(function(r){
    if(r.local)locsSet[r.local.trim()]=true;
    var nm=normModal(r.modal);
    var spKey=nm.base+'|'+nm.gender;
    if(!sptSet[spKey])sptSet[spKey]={base:nm.base,gender:nm.gender,id:u()};
    [r.e1,r.e2].forEach(function(e){
      if(e&&!isPH(e)){
        var ek=nrm(e);
        if(!turmasSet[ek])turmasSet[ek]={nm:e.trim(),id:u()};
      }
    });
  });

  // ── Group matches by bracket key AND sub-group ───────────────────────
  // fase strings: '', 'RODIZIO', 'GRUPO A', 'GRUPO B', 'SEMIFINAL', 'FINAL Xº ANO',
  //               '3º LUGAR Xº ANO', 'FINAL ENS. MEDIO'
  var brkGroups={};
  rows.forEach(function(r){
    var nm=normModal(r.modal);
    var spKey=nm.base+'|'+nm.gender;
    var sp=sptSet[spKey]; if(!sp)return;
    var serie=nrm(r.serie||'')||'GERAL';
    var bKey=sp.id+'|'+serie+'|'+nm.gender;
    if(!brkGroups[bKey])brkGroups[bKey]={sp:sp,gender:nm.gender,serie:serie,
      classify:[],semiMatches:[],finalMatches:[],thirdMatches:[],groupMatches:{}};
    var grp=brkGroups[bKey];
    var fase=nrm(r.fase||'');
    var is3rd=(fase.indexOf('3')>=0&&(fase.indexOf('LUGAR')>=0||fase.indexOf('DISPUTA')>=0));
    // SEMIFINAL detection MUST come before FINAL because 'FINAL' is substring of 'SEMIFINAL'
    var isSemi=(fase.indexOf('SEMI')>=0);
    var isFinal=(fase.indexOf('FINAL')>=0)&&!is3rd&&!isSemi;
    var isGroupA=(fase==='GRUPO A');
    var isGroupB=(fase==='GRUPO B');

    var match={hora:r.hora,local:r.local,e1:(r.e1||'').trim(),e2:(r.e2||'').trim(),fase:fase};

    if(is3rd){grp.thirdMatches.push(match);}
    else if(isSemi){grp.semiMatches.push(match);}
    else if(isFinal){grp.finalMatches.push(match);}
    else if(isGroupA){
      if(!grp.groupMatches['A'])grp.groupMatches['A']=[];
      grp.groupMatches['A'].push(match);
    } else if(isGroupB){
      if(!grp.groupMatches['B'])grp.groupMatches['B']=[];
      grp.groupMatches['B'].push(match);
    } else {
      grp.classify.push(match);
    }
  });

  // ── Build brackets with proper W_ links ─────────────────────────────
  var brackets={};
  Object.entries(brkGroups).forEach(function(e){
    var bKey=e[0],grp=e[1];
    var rounds=[];

    var hasGroups=Object.keys(grp.groupMatches).length>0;
    var hasSemis=grp.semiMatches.length>0;
    var hasFinal=grp.finalMatches.length>0;
    var hasThird=grp.thirdMatches.length>0;
    var hasClassify=grp.classify.length>0;

    function buildMatch(m,t1id,t2id,is3rd){
      var match={id:u(),r:0,t1:t1id,t2:t2id,s1:null,s2:null,w:null,dt:'',
        lc:m.local||'',is3rd:is3rd||false,_hora:m.hora||''};
      // Store original slot codes for GW_/W_/L_ for re-computation
      if(t1id&&(t1id.indexOf('GW_')===0||t1id.indexOf('W_')===0||t1id.indexOf('L_')===0))match._slot1=t1id;
      if(t2id&&(t2id.indexOf('GW_')===0||t2id.indexOf('W_')===0||t2id.indexOf('L_')===0))match._slot2=t2id;
      return match;
    }
    function tId(e){
      if(isPH(e))return null;
      var t=turmasSet[nrm(e)];
      return t?t.id:null;
    }

    if(hasGroups){
      // ENS. MEDIO: Grupo A round + Grupo B round + ONE final round
      var groupKeys=Object.keys(grp.groupMatches).sort();
      groupKeys.forEach(function(gk){
        var gMatches=grp.groupMatches[gk];
        var rnd={r:rounds.length+1,label:'Grupo '+gk,m:[]};
        gMatches.forEach(function(m){
          var t1=tId(m.e1)||('PH_'+u());
          var t2=tId(m.e2)||('PH_'+u());
          rnd.m.push(buildMatch(m,t1,t2,false));
        });
        rounds.push(rnd);
      });
      // Single final round containing all final + 3rd matches
      if(hasFinal||hasThird){
        var finalRnd={r:rounds.length+1,label:'Final',m:[]};
        grp.finalMatches.forEach(function(fm){
          finalRnd.m.push(buildMatch(fm,'GW_A_'+bKey,'GW_B_'+bKey,false));
        });
        grp.thirdMatches.forEach(function(tm){
          finalRnd.m.push(buildMatch(tm,'GW_A2_'+bKey,'GW_B2_'+bKey,true));
        });
        rounds.push(finalRnd);
      }
    } else if(hasSemis){
      // Classic semi → final (→ 3rd)
      var semiRnd={r:1,label:'Semifinal',m:[]};
      grp.semiMatches.forEach(function(m){
        var t1=tId(m.e1)||('PH_'+u());
        var t2=tId(m.e2)||('PH_'+u());
        semiRnd.m.push(buildMatch(m,t1,t2,false));
      });
      rounds.push(semiRnd);

      if(hasFinal||hasThird){
        var finalRnd={r:2,label:'Final',m:[]};
        grp.finalMatches.forEach(function(fm,fi){
          // Link W_ from semis
          var src1=semiRnd.m[fi*2]||semiRnd.m[0];
          var src2=semiRnd.m[fi*2+1]||semiRnd.m[1]||semiRnd.m[0];
          finalRnd.m.push(buildMatch(fm,
            'W_'+src1.id,
            src2&&src2!==src1?'W_'+src2.id:('PH_'+u()),
            false));
        });
        if(hasThird){
          grp.thirdMatches.forEach(function(tm){
            var src1=semiRnd.m[0];
            var src2=semiRnd.m[1]||semiRnd.m[0];
            finalRnd.m.push(buildMatch(tm,'L_'+src1.id,'L_'+src2.id,true));
          });
        }
        rounds.push(finalRnd);
      }
    } else if(hasClassify){
      // Rodizio / all-play-all + optional final
      var classRnd={r:1,label:'Rodizio',m:[]};
      grp.classify.forEach(function(m){
        var t1=tId(m.e1)||('PH_'+u());
        var t2=tId(m.e2)||('PH_'+u());
        classRnd.m.push(buildMatch(m,t1,t2,false));
      });
      rounds.push(classRnd);

      if(hasFinal){
        // Final after rodizio: winners are determined by standings
        // Use special slot GW_ (group winner from rodizio)
        var finalRnd={r:2,label:'Final',m:[]};
        grp.finalMatches.forEach(function(fm){
          finalRnd.m.push(buildMatch(fm,'GW_1_'+bKey,'GW_2_'+bKey,false));
        });
        if(hasThird){
          grp.thirdMatches.forEach(function(tm){
            finalRnd.m.push(buildMatch(tm,'GW_3_'+bKey,'GW_4_'+bKey,true));
          });
        }
        rounds.push(finalRnd);
      }
    } else if(hasFinal||hasThird){
      // FALLBACK: Orphan finals/thirds without prior rounds.
      // This happens when the dashboard records final/3rd matches but no
      // earlier classify/semi/group rows. Treat them as resolved direct matches.
      var directRnd={r:1,label:'Final',m:[]};
      grp.finalMatches.forEach(function(fm){
        var t1=tId(fm.e1)||('PH_'+u());
        var t2=tId(fm.e2)||('PH_'+u());
        directRnd.m.push(buildMatch(fm,t1,t2,false));
      });
      grp.thirdMatches.forEach(function(tm){
        var t1=tId(tm.e1)||('PH_'+u());
        var t2=tId(tm.e2)||('PH_'+u());
        directRnd.m.push(buildMatch(tm,t1,t2,true));
      });
      rounds.push(directRnd);
    }

    // Assign round numbers
    rounds.forEach(function(rd,i){rd.r=i+1});

    brackets[bKey]={sp:grp.sp,gender:grp.gender,serie:grp.serie,rounds:rounds,
      hasGroups:hasGroups,hasFinal:hasFinal};
  });

  return{turmas:Object.values(turmasSet),spt:Object.values(sptSet),
    locs:Object.keys(locsSet).map(function(l){return{id:u(),nm:l}}),
    brackets:brackets,totalJogos:rows.length};
}


// ══════════════════════════════════════════════════════════════════════════
// ARENA DOCX PARSER (JOGAR 2026 / Colégio Arena format)
// Reads bracket tables from Word documents in this layout:
//   Date heading  → "11/05/2026 - SEGUNDA - FEIRA"
//   Sport+Series+Gender heading → "BASQUETE - 8º ANO MASCULINO (QUADRA 01)"
//     OR location heading separate ("CAMPO 01" / "QUADRA 02" / "PÁTIO" / "SALA")
//   Then a table with columns: HORÁRIO | JOGO | ETAPA | GÊNERO | TURMA | x | TURMA
//     Phases: CLASSIFICATÓRIO (8 teams → 4 games), SEMIFINAL (2), FINAL (1).
//     "Vencedor do Jogo NN" cells reference earlier games in the SAME table.
//
// Returns the same shape as parseJimHtmlForBrackets:
//   {turmas, spt, locs, brackets, totalJogos}
// so the rest of the pipeline (jimBracketDataToSchoolState → applyImport)
// works unchanged.
//
// `ambiente` is a label like "COLÉGIO" or "GOIÁS" that prefixes location names
// (so "QUADRA 01" of Colégio doesn't collide with "QUADRA 01" of Goiás).
function parseArenaDocxHtml(html,ambiente){
  function u(){return Math.random().toString(36).slice(2,9)}
  function nrm(s){return(s||'').replace(/[\u00b0\u00ba]/g,'\u00ba').replace(/\s+/g,' ').trim().toUpperCase()}
  function cleanText(s){
    if(!s)return'';
    // Strip HTML tags, decode common entities, collapse whitespace
    var t=String(s).replace(/<[^>]+>/g,' ')
      .replace(/&nbsp;/g,' ').replace(/&amp;/g,'&')
      .replace(/&lt;/g,'<').replace(/&gt;/g,'>').replace(/&quot;/g,'"')
      .replace(/\s+/g,' ').trim();
    return t;
  }
  // Known sport keywords (extend if other Arena schools introduce new ones)
  var SPORTS=['FUT 7','FUTSAL','FUTEBOL','BASQUETE','HANDEBOL','HANDBALL','VOLEI','VÔLEI','VOLEIBOL','QUEIMADA','BANDEIRINHA','XADREZ','PEBOLIM','FUTMESA','TENIS DE MESA','TÊNIS DE MESA','PING PONG','ATLETISMO','NATACAO','NATAÇÃO'];
  function detectSport(text){
    if(!text)return null;
    var up=nrm(text);
    for(var i=0;i<SPORTS.length;i++){
      var sp=nrm(SPORTS[i]);
      if(up.indexOf(sp)>=0)return SPORTS[i];
    }
    return null;
  }
  function detectSeries(text){
    if(!text)return null;
    var up=nrm(text);
    // 6º ANO, 7º ANO, 8º ANO, 9º ANO, 1º ANO, etc.
    var mAno=up.match(/(\d+)\u00ba\s*ANO/);
    if(mAno)return mAno[1]+'\u00ba ANO';
    // 1ª SÉRIE, 2ª SÉRIE...
    var mSer=up.match(/(\d+)[\u00baª]\s*S[ÉE]RIE/);
    if(mSer)return mSer[1]+'\u00aa S\u00c9RIE';
    if(/ENS\.?\s*M[EÉ]DIO/.test(up))return 'ENS. M\u00c9DIO';
    return null;
  }
  function detectGender(text){
    if(!text)return null;
    var up=nrm(text);
    // "MASCULINO E FEMININO" → MISTO
    if(up.indexOf('MASCULINO')>=0&&up.indexOf('FEMININO')>=0)return 'Misto';
    if(up.indexOf('MASCULINO')>=0||/\bMASC\b/.test(up))return 'Masculino';
    if(up.indexOf('FEMININO')>=0||/\bFEM\b/.test(up))return 'Feminino';
    return null;
  }
  // Extract location from a heading. May be in parentheses: "(QUADRA 01)" or "(PÁTIO)",
  // or as a separate line ("CAMPO 01", "QUADRA 02", "SALA").
  function detectLocation(text){
    if(!text)return null;
    var up=nrm(text);
    var m=up.match(/\(([^)]+)\)/);
    if(m)return m[1].replace(/\s+/g,' ').trim();
    if(/^(CAMPO|QUADRA|PÁTIO|PATIO|SALA|GIN[ÁA]SIO|PISCINA|PISTA)\b/.test(up))return up;
    return null;
  }
  // Detect a date row "11/05/2026 - SEGUNDA-FEIRA"
  function detectDate(text){
    if(!text)return null;
    var m=(text||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(!m)return null;
    return m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0')+'/'+m[3];
  }
  // Convert BR time string ("7h 40min", "11h", "8h") to HH:MM
  function parseTime(text){
    if(!text)return '';
    var t=nrm(text);
    var m=t.match(/(\d{1,2})\s*H(?:\s*(\d{1,2})\s*MIN)?/);
    if(!m)return '';
    var h=m[1].padStart(2,'0');
    var mn=(m[2]||'00').padStart(2,'0');
    return h+':'+mn;
  }
  // "Vencedor do Jogo 03" or "Vencedor do jogo 5" → 3 / 5 (number) | null otherwise
  function detectWinnerRef(text){
    if(!text)return null;
    var m=(text||'').match(/VENCEDOR\s+DO\s+JOGO\s*(\d+)/i);
    return m?parseInt(m[1]):null;
  }

  // Build a DOM from the HTML so we can walk it
  var div=document.createElement('div');
  div.innerHTML=html;
  // Walk children of body / div in document order, tracking context
  var nodes=[];
  function flatten(n){
    for(var i=0;i<n.childNodes.length;i++){
      var c=n.childNodes[i];
      if(c.nodeType!==1)continue;
      var tag=(c.tagName||'').toLowerCase();
      if(tag==='table'){nodes.push({type:'table',el:c});}
      else if(tag==='p'||tag==='h1'||tag==='h2'||tag==='h3'||tag==='div'){
        var tx=cleanText(c.textContent||'');
        if(tx)nodes.push({type:'text',text:tx});
        // Don't recurse — paragraph text is enough at this level
      }
    }
  }
  flatten(div);

  // Walk: maintain currentDate, currentSport, currentSeries, currentGender, currentLocation
  var ctx={date:'',sport:'',series:'',gender:'',location:''};
  var brackets={}; // key: sport|series|gender → {sp,gender,serie,rounds:[]}
  var sptSet={};   // base name + gender → {base, gender, id}
  var locsSet={};  // location name (with ambiente prefix) → true
  var turmasSet={};// upper-name → {nm, id}
  var totalJogos=0;
  var parseErrors=[];

  // Apply ambient prefix to location
  function fullLoc(loc){
    if(!loc)return '';
    if(!ambiente)return loc.trim();
    // If already prefixed, keep as is
    if(loc.toUpperCase().indexOf(ambiente.toUpperCase()+' -')===0)return loc.trim();
    return ambiente.toUpperCase()+' - '+loc.trim();
  }

  function applyHeading(text){
    var d=detectDate(text); if(d)ctx.date=d;
    var sp=detectSport(text); if(sp)ctx.sport=sp;
    var se=detectSeries(text); if(se)ctx.series=se;
    var gn=detectGender(text); if(gn)ctx.gender=gn;
    var lc=detectLocation(text); if(lc)ctx.location=fullLoc(lc);
  }

  // Process each node
  nodes.forEach(function(n){
    if(n.type==='text'){
      applyHeading(n.text);
      return;
    }
    // It's a table — process rows
    if(!ctx.sport||!ctx.series||!ctx.gender){
      // Header info missing — try to extract from caption or first row
      // Skip silently: many tables in Word have decorative wrappers
      // We'll re-check after first body row
    }
    var rows=n.el.querySelectorAll('tr');
    if(!rows.length)return;
    // Build column map from header row(s). The first row whose first cell looks like "HORÁRIO" is the header.
    var headerIdx=-1;
    var colMap={time:0,jogo:1,etapa:2,gen:3,t1:4,t2:6};
    for(var r=0;r<rows.length;r++){
      var cells=rows[r].querySelectorAll('th,td');
      if(!cells.length)continue;
      var firstTxt=cleanText(cells[0].textContent||'').toUpperCase();
      if(/HOR[ÁA]RIO/.test(firstTxt)){headerIdx=r;
        // Map columns dynamically (defensive against extra columns/blank "x" col)
        var mapped={};
        for(var ci=0;ci<cells.length;ci++){
          var cTxt=cleanText(cells[ci].textContent||'').toUpperCase();
          if(/HOR[ÁA]RIO/.test(cTxt))mapped.time=ci;
          else if(/^JOGO\b/.test(cTxt))mapped.jogo=ci;
          else if(/ETAPA/.test(cTxt))mapped.etapa=ci;
          else if(/G[ÊE]NERO/.test(cTxt))mapped.gen=ci;
          else if(/TURMA/.test(cTxt)){
            if(mapped.t1==null)mapped.t1=ci;
            else if(mapped.t2==null)mapped.t2=ci;
          }
        }
        if(mapped.time!=null)colMap.time=mapped.time;
        if(mapped.jogo!=null)colMap.jogo=mapped.jogo;
        if(mapped.etapa!=null)colMap.etapa=mapped.etapa;
        if(mapped.gen!=null)colMap.gen=mapped.gen;
        if(mapped.t1!=null)colMap.t1=mapped.t1;
        if(mapped.t2!=null)colMap.t2=mapped.t2;
        break;
      }
    }
    if(headerIdx<0){
      // Some tables are sub-captions ("8h - PRÉVIA ENTRE AS EQUIPES") with no header row.
      // Treat their text as a heading and continue.
      var txt=cleanText(n.el.textContent||'');
      applyHeading(txt);
      return;
    }
    if(!ctx.sport||!ctx.series||!ctx.gender){
      parseErrors.push('Tabela sem contexto (esporte/série/gênero) — pulada');
      return;
    }

    // Build a per-table jogo-number → matchId map (for "Vencedor do Jogo NN" resolution)
    var jogoIdMap={};
    var pendingMatches=[]; // {row obj} to fill in second pass
    var tableRows=[];
    for(var r2=headerIdx+1;r2<rows.length;r2++){
      var c2=rows[r2].querySelectorAll('th,td');
      if(!c2.length)continue;
      var time=cleanText(c2[colMap.time]?c2[colMap.time].textContent:'');
      var jogoStr=cleanText(c2[colMap.jogo]?c2[colMap.jogo].textContent:'');
      var etapa=cleanText(c2[colMap.etapa]?c2[colMap.etapa].textContent:'');
      var gen=cleanText(c2[colMap.gen]?c2[colMap.gen].textContent:'');
      var t1Txt=cleanText(c2[colMap.t1]?c2[colMap.t1].textContent:'');
      var t2Txt=cleanText(c2[colMap.t2]?c2[colMap.t2].textContent:'');
      // Skip empty / structural rows
      if(!time&&!jogoStr&&!etapa&&!t1Txt&&!t2Txt)continue;
      // Detect jogo number
      var mJg=jogoStr.match(/(\d+)/);
      var jogoNum=mJg?parseInt(mJg[1]):0;
      if(!jogoNum)continue;
      tableRows.push({jogoNum:jogoNum,time:time,etapa:etapa,gen:gen,t1:t1Txt,t2:t2Txt});
    }
    if(!tableRows.length)return;

    // Resolve sport entry
    var sportName=ctx.sport;
    var sportKey=sportName+'|'+ctx.gender;
    if(!sptSet[sportKey])sptSet[sportKey]={base:sportName,gender:ctx.gender,id:u()};
    var sp=sptSet[sportKey];

    // Series stays as e.g. "6º ANO"
    var serieKey=ctx.series;

    // Bracket key (used internally — same shape as parseJimHtmlForBrackets)
    var bKey=sp.id+'|'+serieKey+'|'+ctx.gender;
    if(!brackets[bKey]){
      brackets[bKey]={sp:sp,gender:ctx.gender,serie:serieKey,rounds:[],_jogoMap:{}};
    }
    var brk=brackets[bKey];

    // Register turmas (only real ones — "Vencedor do Jogo XX" doesn't count)
    function registerTurma(t){
      if(!t)return null;
      if(detectWinnerRef(t)!=null)return null;
      var key=nrm(t);
      if(!key)return null;
      if(!turmasSet[key])turmasSet[key]={nm:t.trim(),id:u()};
      return turmasSet[key].id;
    }

    // Register location
    if(ctx.location)locsSet[ctx.location]=true;

    // Build matches and assign IDs
    // First pass: assign id to every jogo
    tableRows.forEach(function(row){
      var matchId=u();
      brk._jogoMap[row.jogoNum]=matchId;
      row._id=matchId;
    });
    // Second pass: build match objects with t1/t2 resolved
    function resolveTeam(t){
      if(!t)return 'PH_'+u();
      var w=detectWinnerRef(t);
      if(w!=null){
        var srcId=brk._jogoMap[w];
        if(srcId)return 'W_'+srcId;
        return 'PH_'+u();
      }
      var tid=registerTurma(t);
      return tid||('PH_'+u());
    }
    // Group rows into rounds by phase
    var classifRound={r:0,label:'Classificatorio',m:[]};
    var semiRound={r:0,label:'Semifinal',m:[]};
    var finalRound={r:0,label:'Final',m:[]};
    tableRows.forEach(function(row){
      var t1id=resolveTeam(row.t1);
      var t2id=resolveTeam(row.t2);
      var hora=parseTime(row.time);
      var match={
        id:row._id,r:0,t1:t1id,t2:t2id,
        s1:null,s2:null,w:null,dt:'',
        lc:ctx.location||'',is3rd:false,
        _hora:hora
      };
      // Persist W_ slot metadata (so renderer knows it's a future-resolved slot)
      if(t1id.indexOf('W_')===0)match._slot1=t1id;
      if(t2id.indexOf('W_')===0)match._slot2=t2id;
      var et=nrm(row.etapa);
      if(et.indexOf('SEMI')>=0)semiRound.m.push(match);
      else if(et.indexOf('FINAL')>=0)finalRound.m.push(match);
      else classifRound.m.push(match);
      totalJogos++;
    });
    // Append rounds in order, skipping empty ones
    if(classifRound.m.length){classifRound.r=brk.rounds.length+1;brk.rounds.push(classifRound)}
    if(semiRound.m.length){semiRound.r=brk.rounds.length+1;semiRound.r=brk.rounds.length+1;brk.rounds.push(semiRound)}
    if(finalRound.m.length){finalRound.r=brk.rounds.length+1;brk.rounds.push(finalRound)}
  });

  // Strip helper field _jogoMap before returning (not part of the shape)
  Object.values(brackets).forEach(function(b){delete b._jogoMap});

  return{
    turmas:Object.values(turmasSet),
    spt:Object.values(sptSet),
    locs:Object.keys(locsSet).map(function(l){return{id:u(),nm:l}}),
    brackets:brackets,
    totalJogos:totalJogos,
    _parseErrors:parseErrors
  };
}

// ══════════════════════════════════════════════════════════════════════════
// ARENA PDF PARSER (JOGAR 2026 / Colégio Arena format) — PDF version
// ══════════════════════════════════════════════════════════════════════════
// Parses bracket tables from PDF files in the same JOGAR/Arena layout used
// for DOCX. Uses PDF.js (lazy-loaded from CDN) to extract text items with
// their (x, y) positions, then rebuilds tabular structure by grouping items
// into visual rows and resolving columns by x-distance.
//
// IMPORTANT design decisions (per project owner):
//   • Each bracket carries the date of the page where it appeared
//   • Section header gender ("PEBOLIM 9º ANO FEMININO") prevails over the
//     in-table GÊNERO column when they conflict (PDF data entry errors)
//   • "Sequencial" timing → empty hour
//   • Pages with only "TODAS AS TURMAS" register the sport but no matches
//     (so the activity exists in the system; events go to individuais)
//   • Tolerates typos like "7 50min" (missing 'h')
//   • "MASC. e FEM." → Misto category
//
// Returns the same shape as parseArenaDocxHtml.
// ══════════════════════════════════════════════════════════════════════════
function parseArenaPdfPages(pages,ambiente){
  function u(){return Math.random().toString(36).slice(2,9)}
  function nrm(s){return(s||'').replace(/[\u00b0\u00ba]/g,'\u00ba').replace(/\s+/g,' ').trim().toUpperCase()}
  function cleanText(s){return String(s||'').replace(/\s+/g,' ').trim()}

  var SPORTS=['FUT 7','FUTSAL','FUTEBOL','BASQUETE','HANDEBOL','HANDBALL','VOLEI','VÔLEI','VOLEIBOL','QUEIMADA','BANDEIRINHA','XADREZ','PEBOLIM','FUTMESA','TENIS DE MESA','TÊNIS DE MESA','PING PONG','ATLETISMO','NATACAO','NATAÇÃO','CONHECIMENTOS GERAIS','CALCULO MATEMATICO','CÁLCULO MATEMÁTICO','SOLETRANDO INGLES','SOLETRANDO INGLÊS','SOLETRANDO PORTUGUES','SOLETRANDO PORTUGUÊS','MINECRAFT','ARTES ARGILA'];
  function detectSport(text){
    if(!text)return null;
    var up=nrm(text);
    for(var i=0;i<SPORTS.length;i++){
      var sp=nrm(SPORTS[i]);
      if(up.indexOf(sp)>=0)return SPORTS[i];
    }
    return null;
  }
  function detectSeries(text){
    if(!text)return null;
    var up=nrm(text);
    var mAno=up.match(/(\d+)\u00ba\s*ANO/);
    if(mAno)return mAno[1]+'\u00ba ANO';
    var mSer=up.match(/(\d+)[\u00baª]\s*S[ÉE]RIE/);
    if(mSer)return mSer[1]+'\u00aa S\u00c9RIE';
    if(/ENS\.?\s*M[EÉ]DIO/.test(up))return 'ENS. M\u00c9DIO';
    return null;
  }
  function detectGender(text){
    if(!text)return null;
    var up=nrm(text);
    // "MASC. e FEM." → DUPLICATE marker (will generate 2 brackets: one
    // Masculino + one Feminino with identical matchups). This applies to
    // sports like XADREZ where the same draw is played by both genders.
    if(/MASC\.?\s*E\s*FEM\.?/.test(up))return '__DUPLICATE__';
    if(up.indexOf('MASCULINO')>=0&&up.indexOf('FEMININO')>=0)return '__DUPLICATE__';
    if(up.indexOf('MASCULINO')>=0||/\bMASC\b/.test(up))return 'Masculino';
    if(up.indexOf('FEMININO')>=0||/\bFEM\b/.test(up))return 'Feminino';
    return null;
  }
  function detectLocation(text){
    if(!text)return null;
    var up=nrm(text);
    var m=up.match(/\(([^)]+)\)/);
    if(m){
      var inner=m[1].replace(/\s+/g,' ').trim();
      // Skip "(LIVRE)", "(F)", "(M)" — these aren't locations
      if(/^(LIVRE|F|M|X)$/.test(inner))return null;
      return inner;
    }
    if(/^(CAMPO|QUADRA|PÁTIO|PATIO|SALA|GIN[ÁA]SIO|PISCINA|PISTA)\b/.test(up))return up;
    return null;
  }
  function detectDate(text){
    if(!text)return null;
    var m=(text||'').match(/(\d{1,2})\/(\d{1,2})\/(\d{4})/);
    if(!m)return null;
    return m[1].padStart(2,'0')+'/'+m[2].padStart(2,'0')+'/'+m[3];
  }
  // Parse BR time. Tolerates: "7h20min", "7h", "8h", "7 50min" (missing h),
  // "10h05min", "9 50min", "Sequencial" (returns '').
  function parseTime(text){
    if(!text)return '';
    var t=nrm(text);
    if(/SEQUENCIAL/.test(t))return '';
    // Standard: 7h20min, 11h
    var m=t.match(/(\d{1,2})\s*H(?:\s*(\d{1,2})\s*MIN)?/);
    if(m){
      var h=m[1].padStart(2,'0');
      var mn=(m[2]||'00').padStart(2,'0');
      return h+':'+mn;
    }
    // Typo-tolerant: "7 50min" or "9 50MIN" — number space number+min, no 'h'
    var m2=t.match(/^(\d{1,2})\s+(\d{1,2})\s*MIN$/);
    if(m2)return m2[1].padStart(2,'0')+':'+m2[2].padStart(2,'0');
    return '';
  }
  function detectWinnerRef(text){
    if(!text)return null;
    var m=(text||'').match(/VENCEDOR(?:A)?\s+DO\s+JOGO\s*(\d+)/i);
    return m?parseInt(m[1]):null;
  }
  // Convert "DD/MM/YYYY" + "HH:MM" to "YYYY-MM-DDTHH:MM" (datetime-local format)
  function makeDt(dateStr,timeStr){
    if(!dateStr||!timeStr)return '';
    var p=dateStr.split('/');
    if(p.length!==3)return '';
    return p[2]+'-'+p[1]+'-'+p[0]+'T'+timeStr;
  }

  // ──────────────────────────────────────────────────────────────────────
  // Phase 1: Group text items into visual rows (same y-coordinate ± tol)
  // ──────────────────────────────────────────────────────────────────────
  // pages[] = array of {pageNum, items: [{str, x, y, width}]}
  // Returns flattened list of rows: [{pageNum, y, items:[{str,x,width}], text:'joined'}]
  function groupRowsAcrossPages(pages){
    var allRows=[];
    pages.forEach(function(pg){
      // Group items on this page by y (with tolerance for fonts at slightly
      // different baselines — using ±2px is usually enough for clean PDFs).
      var items=pg.items.slice().sort(function(a,b){return b.y-a.y || a.x-b.x});
      var rows=[];
      var current=null;
      var Y_TOL=3;
      items.forEach(function(it){
        if(!it.str||!it.str.trim())return;
        if(current && Math.abs(current.y-it.y)<=Y_TOL){
          current.items.push(it);
        } else {
          if(current)rows.push(current);
          current={pageNum:pg.pageNum,y:it.y,items:[it]};
        }
      });
      if(current)rows.push(current);
      // Sort items in each row by x ascending
      rows.forEach(function(r){
        r.items.sort(function(a,b){return a.x-b.x});
        r.text=cleanText(r.items.map(function(i){return i.str}).join(' '));
      });
      allRows=allRows.concat(rows);
    });
    return allRows;
  }

  // ──────────────────────────────────────────────────────────────────────
  // Phase 2: Detect column layout from the HORÁRIO header row and split
  // each data row's items into the canonical columns (time, jogo, etapa,
  // gen, t1, t2).
  // ──────────────────────────────────────────────────────────────────────
  // Given the items of a header row, returns {time, jogo, etapa, gen, t1, t2}
  // where each value is the x-center of that header column.
  function inferColumnCenters(headerRow){
    var cols={};
    headerRow.items.forEach(function(it){
      var s=nrm(it.str);
      var cx=it.x+(it.width||0)/2;
      if(s==='HORARIO'||s==='HORÁRIO')cols.time=cx;
      else if(s==='JOGO')cols.jogo=cx;
      else if(s==='ETAPA')cols.etapa=cx;
      else if(s==='GENERO'||s==='GÊNERO')cols.gen=cx;
      else if(s==='TURMA'){
        if(cols.t1==null)cols.t1=cx;
        else cols.t2=cx;
      }
    });
    return cols;
  }
  // For a data row + column centers, split items into the 6 columns by
  // closest center. "x" cell between t1 and t2 is its own item; we drop it.
  function splitRowByColumns(row,cols){
    var out={time:'',jogo:'',etapa:'',gen:'',t1:'',t2:''};
    var keys=['time','jogo','etapa','gen','t1','t2'];
    var bins={time:[],jogo:[],etapa:[],gen:[],t1:[],t2:[]};
    row.items.forEach(function(it){
      var s=cleanText(it.str);
      if(!s)return;
      // Skip the "x" / "X" separator between t1 and t2
      if(/^[xX]$/.test(s))return;
      // Find nearest column center
      var cx=it.x+(it.width||0)/2;
      var bestKey=null,bestD=Infinity;
      keys.forEach(function(k){
        if(cols[k]==null)return;
        var d=Math.abs(cx-cols[k]);
        if(d<bestD){bestD=d;bestKey=k}
      });
      if(bestKey)bins[bestKey].push(s);
    });
    keys.forEach(function(k){out[k]=bins[k].join(' ').trim()});
    return out;
  }

  // ──────────────────────────────────────────────────────────────────────
  // Phase 3: Walk rows in order, maintaining context, emitting matches.
  // ──────────────────────────────────────────────────────────────────────
  var allRows=groupRowsAcrossPages(pages);

  var turmasSet={};   // key=nrm(name) → {nm,id}
  var sptSet={};      // key=base|gender → {base,gender,id}
  var locsSet={};
  var brackets={};
  var totalJogos=0;
  var parseErrors=[];

  // Context tracked while walking
  var ctxDate='';
  var ctxSport=null;
  var ctxSeries=null;
  var ctxGender=null;
  var ctxLocation=null;
  var currentCols=null;          // column centers from latest header
  var jogoIdMap={};              // bracket key → {jogoNum:matchId}

  function ensureBracket(){
    if(!ctxSport||!ctxSeries||!ctxGender)return null;
    var sportKey=ctxSport+'|'+ctxGender;
    if(!sptSet[sportKey])sptSet[sportKey]={base:ctxSport,gender:ctxGender,id:u()};
    var sp=sptSet[sportKey];
    var bKey=sp.id+'|'+ctxSeries+'|'+ctxGender;
    if(!brackets[bKey]){
      brackets[bKey]={sp:sp,gender:ctxGender,serie:ctxSeries,rounds:[],_jogoMap:{},_byPhase:{Classificatorio:[],Semifinal:[],Final:[]}};
    }
    return {bKey:bKey,brk:brackets[bKey]};
  }
  function registerTurma(t){
    if(!t)return null;
    if(detectWinnerRef(t)!=null)return null;
    var key=nrm(t);
    if(!key)return null;
    if(!turmasSet[key])turmasSet[key]={nm:t.trim(),id:u()};
    return turmasSet[key].id;
  }

  // Detect if this row looks like a section header line
  // Possible forms:
  //   "BASQUETE - 8º ANO MASCULINO (QUADRA 01)"
  //   "PEBOLIM - 9º ANO FEMININO (PÁTIO)"
  //   "8º ANO MASCULINO E FEMININO"  (Xadrez 8º/9º — series + gender, no sport)
  //   "6º ANO FEMININO"              (Xadrez 6º — series + gender)
  // Returns null or {sport?, series, gender, location?}
  function detectHeader(text){
    var up=nrm(text);
    var sport=detectSport(up);
    var series=detectSeries(up);
    var gender=detectGender(up);
    var location=detectLocation(up);
    // Need at least series+gender (sport may be inherited from earlier header)
    if(series&&gender)return{sport:sport,series:series,gender:gender,location:location};
    return null;
  }

  // First pass: walk rows in order
  allRows.forEach(function(row){
    var t=row.text;
    if(!t)return;
    var up=nrm(t);

    // ── Date row ──────────────────────────────────────────────────
    var d=detectDate(t);
    if(d){
      ctxDate=d;
      // Some date lines are standalone (e.g. "11/05/2026 - SEGUNDA-FEIRA")
      // — keep walking; don't return because the same row might also
      // contain a section header (rare, but possible).
    }

    // ── "PRÉVIA ENTRE AS EQUIPES" — informational, skip ────────────
    if(/PR[ÉE]VIA\s+ENTRE\s+AS\s+EQUIPES/.test(up))return;

    // ── HORÁRIO / TURMA ─ table header (locks columns) ─────────────
    if(up.indexOf('HORARIO')>=0||up.indexOf('HORÁRIO')>=0){
      var cols=inferColumnCenters(row);
      // A real header has at least time + jogo + t1
      if(cols.time!=null&&cols.jogo!=null&&cols.t1!=null){
        currentCols=cols;
        return;
      }
    }
    // Standalone "TURMA" header (for Conhecimentos Gerais / TODAS AS TURMAS)
    // — this is a degenerate header with only HORÁRIO and TURMA columns.
    // We don't try to parse rows under it because they don't represent
    // matches. We still register the sport so the activity exists.
    if(up==='HORARIO TURMA'||up==='HORÁRIO TURMA'){
      // Mark currentCols as null so subsequent rows aren't parsed as matches.
      currentCols=null;
      // Register sport if we have one in context
      if(ctxSport&&ctxSeries&&ctxGender){
        var sportKey=ctxSport+'|'+ctxGender;
        if(!sptSet[sportKey])sptSet[sportKey]={base:ctxSport,gender:ctxGender,id:u()};
      }
      return;
    }

    // ── "TODAS AS TURMAS" row — register turma list, no match ──────
    if(/TODAS\s+AS\s+TURMAS/.test(up)){
      // Just ensure the sport exists in registry (no bracket, no matches).
      if(ctxSport){
        // Use current gender if known, else default 'Misto' (covers
        // "ARTES ARGILA" pages that don't list gender).
        var gen=ctxGender||'Misto';
        var sportKey2=ctxSport+'|'+gen;
        if(!sptSet[sportKey2])sptSet[sportKey2]={base:ctxSport,gender:gen,id:u()};
      }
      return;
    }

    // ── Section header (sport / series / gender / location) ───────
    var hdr=detectHeader(t);
    if(hdr){
      if(hdr.sport)ctxSport=hdr.sport;
      ctxSeries=hdr.series;
      ctxGender=hdr.gender;     // section header gender PREVAILS (per design)
      if(hdr.location){ctxLocation=hdr.location;locsSet[hdr.location]=true}
      // Reset column lock — next HORÁRIO row will define new columns
      currentCols=null;
      return;
    }
    // Series-only line (e.g. "8º ANO" without gender) — appears in
    // activity pages (Conhecimentos Gerais, Soletrando, etc) where the
    // event is collective for the whole year, no gender split. Reset
    // gender to Misto so the registered sport reflects that.
    var soloSeries=detectSeries(t);
    if(soloSeries && t.length<30 && !detectGender(t)){
      ctxSeries=soloSeries;
      ctxGender='Misto';
      currentCols=null;
      return;
    }
    // Sport-only line (e.g. "XADREZ", "CONHECIMENTOS GERAIS" alone) —
    // these appear above the section header and announce the sport for
    // the lines that follow. Update context but don't reset columns.
    var soloSport=detectSport(t);
    if(soloSport && t.length<60){
      // Make sure it's really a "sport-only" line, not a long sentence that
      // happens to contain a sport keyword. Series/gender absent confirms it.
      if(!detectSeries(t)){
        ctxSport=soloSport;
        // Also pick up location if present in parentheses
        var locSolo=detectLocation(t);
        if(locSolo){ctxLocation=locSolo;locsSet[locSolo]=true}
        return;
      }
    }
    // No-op for unrecognized lines.

    // ── Data row (only if columns are locked) ─────────────────────
    if(!currentCols)return;
    if(!ctxSport||!ctxSeries||!ctxGender)return;
    if(!ctxDate){
      // No date yet — skip this match (would be unusable). Log a warning.
      parseErrors.push('Linha ignorada (sem data): '+t.slice(0,60));
      return;
    }

    var split=splitRowByColumns(row,currentCols);
    // Must have a Jogo number to count
    var mJg=(split.jogo||'').match(/(\d+)/);
    if(!mJg)return;
    var jogoNum=parseInt(mJg[1]);
    if(!jogoNum)return;
    // Skip rows that are accidental repeats of the header row split
    if(/^JOGO$/i.test(split.jogo))return;

    var ensured=ensureBracket();
    if(!ensured)return;
    var bKey=ensured.bKey, brk=ensured.brk;

    // Build match
    var matchId=u();
    brk._jogoMap[jogoNum]=matchId;

    function resolveTeam(t){
      if(!t)return 'PH_'+u();
      var w=detectWinnerRef(t);
      if(w!=null){
        var srcId=brk._jogoMap[w];
        if(srcId)return 'W_'+srcId;
        return 'PH_'+u();
      }
      var tid=registerTurma(t);
      return tid||('PH_'+u());
    }
    var t1id=resolveTeam(split.t1);
    var t2id=resolveTeam(split.t2);
    var hora=parseTime(split.time);
    var dt=makeDt(ctxDate,hora);

    var match={
      id:matchId,r:0,t1:t1id,t2:t2id,
      s1:null,s2:null,w:null,dt:dt,
      lc:ctxLocation||'',is3rd:false,
      _hora:hora
    };
    if(t1id.indexOf('W_')===0)match._slot1=t1id;
    if(t2id.indexOf('W_')===0)match._slot2=t2id;

    var et=nrm(split.etapa);
    var phase='Classificatorio';
    if(et.indexOf('SEMI')>=0)phase='Semifinal';
    else if(et.indexOf('FINAL')>=0)phase='Final';
    brk._byPhase[phase].push(match);
    totalJogos++;
  });

  // ── PHASE 4: Expand __DUPLICATE__ brackets into Masculino + Feminino ──
  // Some sports (notably XADREZ for 8º/9º ANO) have a single draw labelled
  // "MASC. e FEM." in the PDF. Per design, this should generate two
  // identical brackets — one Masculino, one Feminino — with the same
  // matchups. We clone the bracket (deep), give all match IDs new values,
  // and remap internal W_<id> references so the winner-of references
  // remain valid within each clone.
  function _newId(){return Math.random().toString(36).slice(2,9)}
  function _cloneAndRemap(brk,newGender){
    // Build id remap for all match ids in this bracket
    var idMap={};
    Object.keys(brk._byPhase).forEach(function(ph){
      brk._byPhase[ph].forEach(function(m){idMap[m.id]=_newId()});
    });
    // Build the new sport entry (or reuse existing one)
    var newSpKey=brk.sp.base+'|'+newGender;
    if(!sptSet[newSpKey])sptSet[newSpKey]={base:brk.sp.base,gender:newGender,id:_newId()};
    var newSp=sptSet[newSpKey];
    // Build the cloned _byPhase
    var newByPhase={Classificatorio:[],Semifinal:[],Final:[]};
    Object.keys(brk._byPhase).forEach(function(ph){
      brk._byPhase[ph].forEach(function(m){
        function remapTeam(tid,slotMeta){
          if(!tid)return tid;
          // W_<id> → remap to the cloned match id; PH_xxx and turma ids stay as is
          if(tid.indexOf('W_')===0){
            var oldId=tid.slice(2);
            if(idMap[oldId])return 'W_'+idMap[oldId];
          }
          return tid;
        }
        var newM={
          id:idMap[m.id],
          r:m.r,
          t1:remapTeam(m.t1),
          t2:remapTeam(m.t2),
          s1:m.s1,s2:m.s2,w:m.w,
          dt:m.dt,lc:m.lc,is3rd:m.is3rd||false,
          _hora:m._hora
        };
        if(m._slot1)newM._slot1=remapTeam(m._slot1);
        if(m._slot2)newM._slot2=remapTeam(m._slot2);
        newByPhase[ph].push(newM);
        totalJogos++;
      });
    });
    var newBKey=newSp.id+'|'+brk.serie+'|'+newGender;
    brackets[newBKey]={sp:newSp,gender:newGender,serie:brk.serie,rounds:[],_byPhase:newByPhase};
  }
  // Find all brackets marked for duplication
  var dupKeys=Object.keys(brackets).filter(function(k){return brackets[k].gender==='__DUPLICATE__'});
  dupKeys.forEach(function(bKey){
    var brk=brackets[bKey];
    // Subtract its original matches from totalJogos (we'll re-add via the clones)
    Object.keys(brk._byPhase).forEach(function(ph){totalJogos-=brk._byPhase[ph].length});
    // Clone into Masculino + Feminino
    _cloneAndRemap(brk,'Masculino');
    _cloneAndRemap(brk,'Feminino');
    // Remove the original __DUPLICATE__ bracket
    delete brackets[bKey];
    // Also remove the __DUPLICATE__ sport entry if no other bracket uses it
    var stillUsed=Object.values(brackets).some(function(b){return b.sp===brk.sp&&b.gender==='__DUPLICATE__'});
    if(!stillUsed){
      var spKey=brk.sp.base+'|__DUPLICATE__';
      delete sptSet[spKey];
    }
  });

  // Build rounds from _byPhase (Classif → Semi → Final), skipping empty ones
  Object.keys(brackets).forEach(function(bKey){
    var brk=brackets[bKey];
    var phases=['Classificatorio','Semifinal','Final'];
    phases.forEach(function(phase){
      var arr=brk._byPhase[phase];
      if(!arr.length)return;
      brk.rounds.push({r:brk.rounds.length+1,label:phase,m:arr});
    });
    delete brk._byPhase;
    delete brk._jogoMap;
  });

  return{
    turmas:Object.values(turmasSet),
    spt:Object.values(sptSet),
    locs:Object.keys(locsSet).map(function(l){return{id:u(),nm:l}}),
    brackets:brackets,
    totalJogos:totalJogos,
    _parseErrors:parseErrors
  };
}

// Lazy-load PDF.js from CDN and extract raw text items by page.
// Calls cb(err, pages) where pages = [{pageNum, items:[{str,x,y,width}]}].
function _loadPdfJsAndExtract(arrayBuffer,cb){
  function doExtract(){
    try{
      var pdfjsLib=window.pdfjsLib;
      // Worker is required by PDF.js >= 3
      if(pdfjsLib.GlobalWorkerOptions&&!pdfjsLib.GlobalWorkerOptions.workerSrc){
        pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      var loadingTask=pdfjsLib.getDocument({data:arrayBuffer});
      loadingTask.promise.then(function(pdf){
        var nPages=pdf.numPages;
        var pages=[];
        var pending=nPages;
        function onPage(pageNum,content){
          var items=(content.items||[]).map(function(it){
            // transform = [a,b,c,d,e,f] — e=x, f=y
            var tr=it.transform||[1,0,0,1,0,0];
            return{str:it.str||'',x:tr[4],y:tr[5],width:it.width||0};
          });
          pages.push({pageNum:pageNum,items:items});
          pending--;
          if(pending===0){
            // Sort pages by pageNum
            pages.sort(function(a,b){return a.pageNum-b.pageNum});
            cb(null,pages);
          }
        }
        for(var i=1;i<=nPages;i++){
          (function(num){
            pdf.getPage(num).then(function(page){
              return page.getTextContent();
            }).then(function(content){
              onPage(num,content);
            }).catch(function(err){
              cb(err,null);
            });
          })(i);
        }
      }).catch(function(err){cb(err,null)});
    }catch(e){cb(e,null)}
  }
  if(typeof window.pdfjsLib==='undefined'){
    var sc=document.createElement('script');
    sc.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    sc.onload=doExtract;
    sc.onerror=function(){cb(new Error('Não foi possível carregar PDF.js. Verifique sua conexão.'),null)};
    document.head.appendChild(sc);
  }else{
    doExtract();
  }
}

function jimBracketDataToSchoolState(parsed,adminPass,year){
  year=year||'Jogos 2026';function u(){return Math.random().toString(36).slice(2,9)}
  var normYear=(year||'').replace(/[\u00b0\u00ba]/g,'\u00ba').replace(/\s+/g,' ').trim().toUpperCase();
  var cls=parsed.turmas.map(function(t){return{id:t.id,nm:t.nm,yr:normYear,clr:''}}).sort(function(a,b){return a.nm.localeCompare(b.nm,'pt')});
  var spt=parsed.spt.map(function(sp){var cat=sp.gender&&sp.gender!=='Misto'?sp.gender:'Masculino';return{id:sp.id,nm:sp.base,gender:sp.gender,ct:[cat],mn:5,mx:15,dur:14,pts:{w:3,d:1,l:0,wo:0},tiebreaker:['gd','yc','rc','w'],tiebreakers:['goalDiff','yellowCards','redCards'],scoring:{}}});
  // ARCHITECTURE NOTE: bracket import does NOT create enrollments anymore.
  // Brackets use turma ids directly in m.t1/m.t2 (tName() falls back to S.cls
  // when no enrollment is found). Enrollments are created exclusively by
  // ficha imports (XLSX/DOCX) — they represent the list of athletes per
  // (turma, sport, category) trio. This separation keeps responsibilities clean:
  //   - Bracket = competition structure (who plays whom, when, where)
  //   - Enrollment = roster (who are the athletes in each team)
  var brk={};
  Object.values(parsed.brackets).forEach(function(b){
    var bk=normYear+'__'+b.sp.id+'__'+(b.serie||'GERAL');
    if(!brk[bk])brk[bk]={};
    brk[bk][b.gender]=b.rounds;
  });
  return{cls:cls,spt:spt,enr:[],brk:brk,locs:parsed.locs,ev:{name:'Jogos Internos 2026'},logins:[],judgeLogins:[],recursos:[],adminPass:adminPass||'admin123',thirdPlace:{},appInfo:{author:'',contact:'',version:'3.0'}};
}

    'Atual: ',h('b',{style:{color:sc.appVersion?'var(--am)':'var(--gn)'}},sc.appVersion||'Padr\u00e3o (index.html)')
  ));

  presets.forEach(function(p){
    var isCurrent=(sc.appVersion||null)===(p.v||null);
    body.appendChild(h('button',{

        padding:'12px 14px',

        marginBottom:'8px',
        width:'100%'

      onclick:function(){applyVersion(p.v)}

      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'3px'}},
        h('span',{style:{fontWeight:'700',fontSize:'13px'}},p.label),

      applyVersion(customVer.value);

  body.appendChild(h('div',{style:{marginTop:'14px',padding:'10px 12px',background:'rgba(251,191,36,.08)',border:'1px solid rgba(251,191,36,.25)',borderRadius:'8px',fontSize:'11px',color:'var(--tx2)',lineHeight:'1.5'}},

  md.appendChild(body);

}

// MASTER PANEL: Clean School Data Modal
// ══════════════════════════════════════════════════════════════════════════
function mCleanSchool(root){
  var code=MT.mod.code,name=MT.mod.name;
  var ov=h('div',{'class':'ov'});
  ov.onclick=function(e){if(e.target===ov){MT.mod=null;renderMasterPanel()}};
  var close=function(){MT.mod=null;renderMasterPanel()};

  // Apply cleanup to the school by reading current state, mutating, and writing back
  function performClean(action,label){
    if(!S.sb.url||!S.sb.key){alert('Supabase não configurado.');return}
    var statusEl=document.getElementById('clean-status');
    if(statusEl){statusEl.style.display='block';statusEl.textContent='⏳ Processando...';statusEl.style.color='var(--am)'}

    fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.escola_'+encodeURIComponent(code)+'&select=data',{
      headers:{'apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key}
    }).then(function(r){return r.json()}).then(function(rows){
      if(!rows||!rows.length||!rows[0].data){
        if(statusEl){statusEl.textContent='⚠️ Escola sem dados ou não encontrada.';statusEl.style.color='var(--rd)'}
        return;
      }
      var d;try{d=JSON.parse(rows[0].data)}catch(e){
        if(statusEl){statusEl.textContent='⚠️ Erro lendo dados.';statusEl.style.color='var(--rd)'}
        return;
      }

      // Apply the requested action
      if(action==='clearBrk'){
        // Clear bracket + schedule + scores. Preserve turmas, sports, venues, scoring rules, logins, audit, recursos.
        d.brk={};
        // Also clear individual podiums (since they tie to bracket finals)
        d.podiums=[];
        // Reset enrollment status if any (keep enrollments themselves)
      } else if(action==='clearAll'){
        // Wipe everything except the school registration meta
        d.cls=[];
        d.spt=[];
        d.locs=[];
        d.enr=[];
        d.brk={};
        d.podiums=[];
        d.recursos=[];
        // Keep: ev (event name), adminPass, logins, judgeLogins, scoring config, tiebreakers, appInfo, auditLog
      } else if(action==='clearTurmas'){
        d.cls=[];
        d.enr=[];
        d.brk={};
        d.podiums=[];
      } else if(action==='clearEsportes'){
        d.spt=[];
        d.enr=[];
        d.brk={};
        d.podiums=[];
      } else if(action==='clearLocais'){
        d.locs=[];
      } else if(action==='consolidate'){
        // Apply the same dedupe pipeline that runs on boot, but force it on
        // raw `d` (which is the school's full data fetched from Supabase).
        // Temporarily swap S.* to operate, then swap back.
        var _save={cls:S.cls,spt:S.spt,enr:S.enr,brk:S.brk,podiums:S.podiums,recursos:S.recursos};
        S.cls=d.cls||[]; S.spt=d.spt||[]; S.enr=d.enr||[];
        S.brk=d.brk||{}; S.podiums=d.podiums||[]; S.recursos=d.recursos||[];
        var report=[];
        try{
          var n1=autoFixTeamNames();          if(n1>0)report.push(n1+' nomes corrigidos');
          var n2=consolidateYears();          if(n2>0)report.push(n2+' anos consolidados');
          var n3=dedupeSports();              if(n3>0)report.push(n3+' esportes fundidos');
          var n4=dedupeTurmas();              if(n4>0)report.push(n4+' turmas fundidas');
          var n5=dedupeEnrollments();         if(n5>0)report.push(n5+' inscrições deduplicadas');
        }catch(e){console.error('Consolidate error:',e)}
        // Write back
        d.cls=S.cls; d.spt=S.spt; d.enr=S.enr; d.brk=S.brk; d.podiums=S.podiums; d.recursos=S.recursos;
        // Restore S.* (since we're in master context, not the school context)
        S.cls=_save.cls; S.spt=_save.spt; S.enr=_save.enr;
        S.brk=_save.brk; S.podiums=_save.podiums; S.recursos=_save.recursos;
        // Stash the report so the success message can show it
        window.__consolidateReport=report.length?report.join(', '):'nenhuma duplicata encontrada';
      }

      // Write back
      fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.escola_'+encodeURIComponent(code),{
        method:'PATCH',
        headers:{'Content-Type':'application/json','apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key,'Prefer':'return=minimal'},
        body:JSON.stringify({data:JSON.stringify(d),updated_at:new Date().toISOString()})
      }).then(function(r){
        if(r.ok){
          if(statusEl){
            statusEl.style.background='rgba(52,211,153,.08)';
            statusEl.style.borderColor='rgba(52,211,153,.3)';
            var extra='';
            if(action==='consolidate'&&window.__consolidateReport){
              extra='<div style="margin-top:6px;font-size:11px;color:var(--gn)">'+window.__consolidateReport+'</div>';
              window.__consolidateReport=null;
            }
            statusEl.innerHTML='✅ <b>'+label+' concluído!</b>'+extra+'<br><br>'
              +'<span style="color:var(--am);font-size:11px">⚠️ Importante: se a aba de admin desta escola estiver aberta em outra janela, FECHE-A AGORA antes de fazer qualquer ação. Caso contrário, os dados em memória serão regravados no Supabase, desfazendo a limpeza.</span>';
          }
          setTimeout(function(){MT.mod=null;renderMasterPanel()},5000);
        } else {
          if(statusEl){statusEl.textContent='⚠️ Erro ao salvar (HTTP '+r.status+').';statusEl.style.color='var(--rd)'}
        }
      }).catch(function(e){
        if(statusEl){statusEl.textContent='⚠️ Erro: '+e.message;statusEl.style.color='var(--rd)'}
      });
    }).catch(function(e){
      if(statusEl){statusEl.textContent='⚠️ Erro lendo escola: '+e.message;statusEl.style.color='var(--rd)'}
    });
  }

  function confirmAndClean(action,label,detail){
    if(confirm('⚠️ '+label+' da escola "'+name+'"?\n\n'+detail+'\n\nEsta ação NÃO pode ser desfeita.')){
      performClean(action,label);
    }
  }
