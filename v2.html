function pAudit(c){
  if(!S.auditLog)S.auditLog=[];
  var roleColors={admin:'#22d3ee',judge:'#a78bfa',student:'#34d399',Sistema:'#64748b'};
  var roleLabels={admin:'ADMIN',judge:'JUIZ',student:'ALUNO'};
  c.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}},
    h('div',{style:{fontSize:'13px',color:'var(--tx2)'}},S.auditLog.length+' registro(s) de auditoria'),
    h('div',{style:{display:'flex',gap:'6px'}},
      h('button',{'class':'btn btn-s',onclick:function(){
        var rows='Data/Hora,Usuário,Perfil,Ação,Detalhes\n';
        S.auditLog.forEach(function(a){
          var d=new Date(a.timestamp).toLocaleString('pt-BR');
          rows+='"'+d+'","'+a.user+'","'+(roleLabels[a.role]||a.role)+'","'+a.action+'","'+(a.details||'').replace(/"/g,'""')+'"\n';
        });
        var blob=new Blob(['\ufeff'+rows],{type:'text/csv;charset=utf-8'});
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='auditoria_'+new Date().toISOString().slice(0,10)+'.csv';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      }},'📊 Exportar CSV'),
      h('button',{'class':'btn btn-s btn-r',onclick:function(){
        if(confirm('Limpar TODO o histórico de auditoria? Esta ação é irreversível.')){
          S.auditLog=[];logAudit('Limpeza de auditoria','Histórico zerado');R();
        }
      }},'🗑 Limpar')
    )
  ));
  if(!S.auditLog.length){
    c.appendChild(h('div',{'class':'card'},h('div',{'class':'card-b'},h('div',{'class':'em'},'Nenhum registro de auditoria ainda.'))));
    return;
  }
  var rows=S.auditLog.map(function(a){
    var d=new Date(a.timestamp);
    var dStr=d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    var rc=roleColors[a.role]||'#64748b';
    return h('tr',{},
      h('td',{'data-label':'Data',style:{fontFamily:'monospace',fontSize:'11px',color:'var(--tx3)',whiteSpace:'nowrap'}},dStr),
      h('td',{'data-label':'Usuário',style:{fontWeight:'600'}},a.user),
      h('td',{'data-label':'Perfil'},h('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:'12px',background:rc+'22',color:rc,fontSize:'10px',fontWeight:'700',letterSpacing:'.5px'}},roleLabels[a.role]||a.role.toUpperCase())),
      h('td',{'data-label':'Ação',style:{fontWeight:'600',color:'var(--pr)',fontSize:'12px'}},a.action),
      h('td',{'data-label':'Detalhes',style:{fontSize:'11px',color:'var(--tx2)'}},a.details||'—')
    );
  });
  c.appendChild(h('div',{'class':'card'},h('div',{'class':'tw'},h('table',{'class':'mob-cards'},
    h('thead',{},h('tr',{},h('th',{},'Data/Hora'),h('th',{},'Usuário'),h('th',{},'Perfil'),h('th',{},'Ação'),h('th',{},'Detalhes'))),
    h('tbody',{},rows)
  ))));
}

function pRecursos(c){
  var stColors={pending:'var(--am)',approved:'var(--gn)',rejected:'var(--rd)'};
  var stLabels={pending:'Pendente',approved:'Deferido',rejected:'Indeferido'};

  // New resource button
  c.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},
    h('div',{style:{color:'var(--tx2)',fontSize:'13px'}},S.recursos.length+' recurso(s)'),
    h('button',{'class':'btn btn-p',onclick:function(){S.mod={tp:'addRecurso'};R()}},'+ Novo Recurso')
  ));

  // Filter by role: admin sees all, others see their own
  var filtered=S.recursos;
  if(S.role==='student'){
    filtered=S.recursos.filter(function(r){return r.authorRole==='student'&&r.authorId===(S.auth&&S.auth.login)});
  } else if(S.role==='judge'){
    filtered=S.recursos.filter(function(r){return r.authorRole==='judge'&&r.authorId===(S.auth&&S.auth.login)});
  }
  // Sort newest first
  filtered=filtered.slice().sort(function(a,b){return(b.ts||0)-(a.ts||0)});

  if(!filtered.length){
    c.appendChild(h('div',{'class':'card'},h('div',{'class':'card-b'},h('div',{'class':'em'},'Nenhum recurso registrado.'))));
  } else {
    filtered.forEach(function(rec){
      var sp=rec.sportId?S.spt.find(function(s){return s.id===rec.sportId}):null;
      var card=h('div',{'class':'card',style:{marginBottom:'12px'}});
      var header=h('div',{'class':'card-h'},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
          h('span',{'class':'badge '+(rec.authorRole==='judge'?'bp':rec.authorRole==='student'?'bc':'bg')},
            rec.authorRole==='judge'?'⚖️ Juiz':rec.authorRole==='student'?'🎓 Aluno':'👑 Admin'),
          h('span',{style:{fontWeight:'700',fontSize:'13px'}},rec.authorName||'—'),
          h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},rec.date||'')
        ),
        h('span',{'class':'badge',style:{background:stColors[rec.status||'pending']+'22',color:stColors[rec.status||'pending']}},stLabels[rec.status||'pending'])
      );
      var body=h('div',{'class':'card-b'},
        h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'10px',fontSize:'12px',color:'var(--tx2)'}},
          sp?h('span',null,'⚽ '+sp.nm):null,
          rec.category?h('span',null,'📌 '+rec.category):null,
          rec.time?h('span',null,'🕐 '+rec.time):null,
          rec.matchTeams?h('span',null,'🏟️ '+rec.matchTeams):null
        ),
        h('div',{style:{fontSize:'13px',lineHeight:'1.6',color:'var(--tx)',whiteSpace:'pre-wrap'}},rec.description||''),
        rec.involved?h('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--tx2)'}},
          h('b',null,'Envolvidos: '),rec.involved):null,
        rec.turma?h('div',{style:{marginTop:'4px',fontSize:'12px',color:'var(--tx2)'}},
          h('b',null,'Turma: '),rec.turma):null
      );
      // Admin actions
      if(S.role==='admin'&&(rec.status==='pending'||!rec.status)){
        var adminResp=h('input',{'class':'fi',placeholder:'Resposta do admin (opcional)',style:{marginTop:'10px',marginBottom:'6px'}});
        // Punishment: select turma + points
        var punishCls=h('select',{'class':'fs',style:{maxWidth:'180px'}},h('option',{value:''},'Nenhuma punição'));
        S.cls.forEach(function(cl){punishCls.appendChild(h('option',{value:cl.id},cl.nm))});
        var punishPts=h('input',{'class':'fi',type:'number',inputmode:'numeric',placeholder:'-5',style:{maxWidth:'80px'},value:rec.punishPts||''});
        body.appendChild(adminResp);
        body.appendChild(h('div',{style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'8px',flexWrap:'wrap'}},
          h('span',{style:{fontSize:'11px',color:'var(--tx3)',fontWeight:'600'}},'Punição:'),
          punishCls,
          h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},'Pontos:'),
          punishPts
        ));
        body.appendChild(h('div',{style:{display:'flex',gap:'6px',justifyContent:'flex-end'}},
          h('button',{'class':'btn btn-g btn-s',onclick:(function(rid,respInp,pCls,pPts){return function(){
            var r2=S.recursos.find(function(x){return x.id===rid});
            if(r2){r2.status='approved';r2.adminResp=respInp.value.trim();r2.resolvedAt=new Date().toLocaleString('pt-BR');
              var pTxt='';
              if(pCls.value){r2.punishClassId=pCls.value;r2.punishPts=parseInt(pPts.value)||0;
                var cn=S.cls.find(function(c){return c.id===pCls.value});
                pTxt=' · Punição: '+(cn?cn.nm:'?')+' '+(parseInt(pPts.value)||0)+' pts';
              }
              logAudit('Deferimento de recurso','Recurso de "'+(r2.author||'?')+'" deferido'+pTxt);
            }R();
          }})(rec.id,adminResp,punishCls,punishPts)},'✅ Deferir'),
          h('button',{'class':'btn btn-r btn-s',onclick:(function(rid,respInp,pCls,pPts){return function(){
            var r2=S.recursos.find(function(x){return x.id===rid});
            if(r2){r2.status='rejected';r2.adminResp=respInp.value.trim();r2.resolvedAt=new Date().toLocaleString('pt-BR');
              if(pCls.value){r2.punishClassId=pCls.value;r2.punishPts=parseInt(pPts.value)||0}
              logAudit('Indeferimento de recurso','Recurso de "'+(r2.author||'?')+'" indeferido');
            }R();
          }})(rec.id,adminResp,punishCls,punishPts)},'❌ Indeferir')
        ));
      }
      // Edit button for admin on resolved recursos
      if(S.role==='admin'&&rec.status&&rec.status!=='pending'){
        body.appendChild(h('div',{style:{marginTop:'6px',display:'flex',justifyContent:'flex-end'}},
          h('button',{'class':'btn btn-s',onclick:(function(rid){return function(){
            var r2=S.recursos.find(function(x){return x.id===rid});
            if(r2){r2.status='pending';r2.adminResp='';r2.resolvedAt='';r2.punishClassId='';r2.punishPts=0;
              logAudit('Reabertura de recurso','Recurso de "'+(r2.author||'?')+'" reaberto');
            }R();
          }})(rec.id)},'✏️ Editar / Reabrir')
        ));
      }
      // Show admin response if resolved
      if(rec.adminResp||rec.punishClassId){
        var punishCl=rec.punishClassId?S.cls.find(function(x){return x.id===rec.punishClassId}):null;
        body.appendChild(h('div',{style:{marginTop:'10px',padding:'10px 14px',borderRadius:'8px',
          background:rec.status==='approved'?'var(--gnG)':'var(--rdG)',

function getAllConflicts(){
  // Build flat list of all scheduled matches with resolved class IDs
  var scheduled=[];
  Object.entries(S.brk).forEach(function(bkE){
    var bk=bkE[0],cts=bkE[1];
    var parts=bk.split('__');
    var ano=parts.length>1?parts[0]:'';
    var siId=parts.length>1?parts[1]:parts[0];
    var sp=S.spt.find(function(s){return s.id===siId});
    var dur=(sp&&sp.dur)||14;
    Object.entries(cts).forEach(function(ctE){
      var ct=ctE[0],rds=ctE[1];
      rds.forEach(function(rd){rd.m.forEach(function(m){
        if(!m.dt||m.t1==='BYE'||m.t2==='BYE')return;
        var c1=resolveCi(m.t1), c2=resolveCi(m.t2);
        var start=new Date(m.dt);
        var end=new Date(start.getTime()+dur*60000);
        scheduled.push({
          id:m.id,bk:bk,ct:ct,ano:ano,siId:siId,spNm:sp?sp.nm:'?',
          t1:m.t1,t2:m.t2,ci1:c1,ci2:c2,
          start:start,end:end,dur:dur,dt:m.dt,lc:m.lc,
          tn1:tName(m.t1),tn2:tName(m.t2),
          rnd:m.r,tR:rds.length,is3rd:m.is3rd
        });
      })});
    });
  });

  // Find conflicts: pairs of matches that overlap AND share a turma (class)
  var conflicts=[];
  for(var i=0;i<scheduled.length;i++){
    for(var j=i+1;j<scheduled.length;j++){
      var a=scheduled[i], b=scheduled[j];
      // Time overlap?
      if(a.end<=b.start||b.end<=a.start)continue;
      // Share a turma?
      var shared=[];
      if(a.ci1&&(a.ci1===b.ci1||a.ci1===b.ci2))shared.push(a.ci1);
      if(a.ci2&&(a.ci2===b.ci1||a.ci2===b.ci2))shared.push(a.ci2);
      if(!shared.length)continue;
      var cl=S.cls.find(function(x){return x.id===shared[0]});
      conflicts.push({a:a,b:b,cls:cl?cl.nm:'?'});
    }
  }
  return {conflicts:conflicts,total:scheduled.length};
}

// Apply a new datetime to a specific match across all brackets
function applyMatchTime(bk,ct,matchId,newdt){
  if(!S.brk[bk]||!S.brk[bk][ct])return;
  S.brk[bk][ct]=S.brk[bk][ct].map(function(rd){
    return Object.assign({},rd,{m:rd.m.map(function(m){
      return m.id===matchId?Object.assign({},m,{dt:newdt}):m;
    })});
  });
}

// SUPABASE SYNC
// ═══════════════════════════════════════════════════════════════════════════
var _syncTimer=null;
function scheduleSave(){
  if(!S.sb.enabled||!S.sb.url||!S.sb.key)return;
  // SAFETY: Don't save if data hasn't been loaded from Supabase yet
  if(!MT.dataLoaded){console.log('scheduleSave blocked: data not loaded yet');return}
  // SAFETY: Don't save if state appears empty (protection against overwrite with blank)
  if(!S.cls.length&&!S.spt.length&&!S.enr.length&&!S.logins.length&&!S.judgeLogins.length&&S.adminPass==='admin123'){
    // State looks like fresh/default — check if this school has existing data
    // Only allow save if data was confirmed loaded (MT.dataLoaded=true)
    console.log('scheduleSave: state appears empty, saving anyway (dataLoaded='+MT.dataLoaded+')');
  }
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(function(){syncToSupabase(false)},2000);
}

function getDbPayload(){
  return {
    id:getSchoolDbId(),
    data:JSON.stringify({
      cls:S.cls,spt:S.spt,enr:S.enr,brk:S.brk,locs:S.locs,
      ev:S.ev,logins:S.logins,judgeLogins:S.judgeLogins,adminLogins:S.adminLogins||[],auditLog:S.auditLog||[],
      recursos:S.recursos,adminPass:S.adminPass,
      thirdPlace:S.thirdPlace,appInfo:S.appInfo,
      scoring:S.scoring,podiums:S.podiums,woLog:S.woLog,
      rankingAccess:S.rankingAccess
    }),
    updated_at:new Date().toISOString()
  };
}

function syncToSupabase(manual){
  if(!S.sb.url||!S.sb.key){
    if(manual)alert('Configure a URL e a chave do Supabase primeiro (⚙️ Configurações).');
    return;
  }
  // SAFETY: Don't save before data is loaded
  if(!MT.dataLoaded&&!manual){console.log('syncToSupabase blocked: waiting for load');return}
  S.sb.syncing=true;
  var hasFocus=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
  if(!S.mod&&!hasFocus)R();
  var payload=getDbPayload();
  // BACKUP: Save a backup copy before overwriting (only every 5 minutes max)
  var now=Date.now();
  var lastBackup=MT._lastBackup||0;
  if(now-lastBackup>300000){// 5 minutes
    MT._lastBackup=now;
    var backupId=getSchoolDbId()+'_backup';
    fetch(S.sb.url+'/rest/v1/jogos_data',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:backupId,data:payload.data,updated_at:new Date().toISOString()})
    }).catch(function(e){console.error('Backup failed:',e)});
  }
  // Main save
  fetch(S.sb.url+'/rest/v1/jogos_data',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':S.sb.key,
      'Authorization':'Bearer '+S.sb.key,
      'Prefer':'resolution=merge-duplicates'
    },
    body:JSON.stringify(payload)
  }).then(function(res){
    S.sb.syncing=false;
    if(res.ok||res.status===201||res.status===200){
      S.sb.status='ok';S.sb.lastSync=new Date().toISOString();
    } else {
      S.sb.status='error';
      res.text().then(function(t){console.error('Supabase error:',t)});
    }
    var hf2=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
    if(!S.mod&&!hf2)R();
  }).catch(function(err){
    S.sb.syncing=false;S.sb.status='error';
    console.error('Supabase sync failed:',err);
    if(!S.mod)R();
  });
}

function loadFromSupabase(onDone){
  if(!S.sb.url||!S.sb.key){if(onDone)onDone(false);return;}
  S.sb.syncing=true;R();
  var dbId=getSchoolDbId();
  fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.'+dbId+'&select=data',{
    headers:{
      'apikey':S.sb.key,
      'Authorization':'Bearer '+S.sb.key
    }
  }).then(function(res){return res.json()})
  .then(function(rows){
    S.sb.syncing=false;
    if(rows&&rows.length&&rows[0].data){
      var d=JSON.parse(rows[0].data);
      ['cls','spt','enr','brk','locs','ev','logins','judgeLogins','adminLogins','auditLog','recursos','adminPass','thirdPlace','appInfo','scoring','podiums','woLog','rankingAccess'].forEach(function(k){
        if(d[k]!==undefined)S[k]=d[k];
      });
      // If school has a specific admin pass from master, use it
      if(MT.schoolCode&&d.adminPass)S.adminPass=d.adminPass;
      // Migration: when loading from a payload saved with the old shape,
      // ensure S.rankingAccess always exists with safe defaults.
      if(!S.rankingAccess||typeof S.rankingAccess!=='object'){
        S.rankingAccess={mode:'always',from:'07:00',to:'20:00'};
      } else {
        if(!S.rankingAccess.mode)S.rankingAccess.mode='always';
        if(!S.rankingAccess.from)S.rankingAccess.from='07:00';
        if(!S.rankingAccess.to)S.rankingAccess.to='20:00';
      }
      S.sb.status='ok';R();
      if(onDone)onDone(true);
    } else {
      S.sb.status='ok';
      if(onDone)onDone(false);
      R();
    }
  }).catch(function(err){
    S.sb.syncing=false;S.sb.status='error';
    console.error('Supabase load failed:',err);R();
    if(onDone)onDone(false);
  });
}

// ── Touch swipe to close sidebar ────────────────────────────────────────
(function(){
  var tx=0,ty=0;
  document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',function(e){
    if(!S.auth)return;
    var dx=e.changedTouches[0].clientX-tx;
    var dy=Math.abs(e.changedTouches[0].clientY-ty);
    // Swipe right from left edge: open sidebar
    if(dx>60&&dy<60&&tx<30&&!S.sbo){S.sbo=true;R()}
    // Swipe left: close sidebar
    if(dx<-60&&dy<60&&S.sbo){S.sbo=false;R()}
  },{passive:true});
})();

// *** APP VERSION ***
// This file's version identifier. Used by the multi-version routing system:
// - index.html (development/current) → APP_VERSION = null (or 'main')
// - v1.html (Colégio Marista snapshot) → APP_VERSION = 'v1'
// - v2.html, v3.html, ... → respective versions
//
// Each school in master_schools may have an `appVersion` field. When a
// user accesses a school whose appVersion doesn't match this file's
// APP_VERSION, the app redirects to the correct file. This lets a school
// stay frozen on a known-good build while development continues elsewhere.
var APP_VERSION='v2';  // Colégio Arena snapshot

// Build the URL for a given version, preserving query params (except 'v')
function _versionedUrl(version,schoolCode){
  var base=window.location.pathname.replace(/\/[^\/]*$/,'/');
  var file=version?(version+'.html'):'index.html';
  return base+file+'?escola='+encodeURIComponent(schoolCode);
}

// *** Show loading screen first ***
MT.loading=!MT.isMaster&&!!SB_DEFAULT_KEY;
R();

// *** AUTO-CONNECT: Apply default Supabase credentials if not set ***
if(SB_DEFAULT_KEY){
  if(!S.sb.url)S.sb.url=SB_DEFAULT_URL;
  if(!S.sb.key)S.sb.key=SB_DEFAULT_KEY;
  S.sb.enabled=true;
}

// *** PRE-FLIGHT VERSION CHECK ***
// Before loading school data, check whether this school is locked to a
// specific app version, and redirect if needed. Avoids loading the wrong
// codebase against a frozen school's data.
function _preflightVersionCheck(callback){
  if(!MT.schoolCode||!S.sb.url||!S.sb.key){callback();return}
  // Allow opt-out via ?v=force (lets developer access any school in any version)
  var params=new URLSearchParams(window.location.search);
  if(params.get('v')==='force'){callback();return}
  fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.master_schools&select=data',{
    headers:{'apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key}
  }).then(function(r){return r.json()}).then(function(rows){
    var redirected=false;
    if(rows&&rows.length&&rows[0].data){
      try{
        var schools=JSON.parse(rows[0].data);
        var mine=schools.find(function(s){return s.code===MT.schoolCode});
        if(mine){
          var wantVer=mine.appVersion||null;  // null = main (index.html)
          if(wantVer!==APP_VERSION){
            // Redirect to the correct version file
            window.location.replace(_versionedUrl(wantVer,MT.schoolCode));
            redirected=true;
          }
        }
      }catch(e){console.warn('Version preflight failed:',e)}
    }
    if(!redirected)callback();
  }).catch(function(){callback()});
}

// *** AUTO-LOAD: Load data BEFORE allowing interaction ***
if(S.sb.url&&S.sb.key&&!MT.isMaster){
  _preflightVersionCheck(function(){
  loadFromSupabase(function(ok){
    MT.loading=false;
    MT.dataLoaded=true; // Flag: data has been loaded, safe to save
    if(ok){
      console.log('=== STATE LOADED ===');
      console.log('Loaded: '+S.cls.length+' turmas, '+S.spt.length+' sports, '+S.enr.length+' enrollments, '+Object.keys(S.brk).length+' brackets');
      console.log('Sport names:', S.spt.map(function(s){return s.nm+'/'+(s.gender||'-')}).join(' | '));
      // Normalize all data to uppercase (visual only — non-destructive)
      S.cls.forEach(function(c){c.nm=uc(c.nm);c.yr=uc(c.yr)});
      S.spt.forEach(function(s){s.nm=uc(s.nm)});
      S.enr.forEach(function(e){e.tn=uc(e.tn)});
      // Auto-cleanup intentionally DISABLED. Earlier attempts to run dedupes
      // automatically on boot caused issues in production (sports with
      // mangled names like "ATLETISMO (ULINO)" or "CUBO MÁGICO ()" plus
      // empty-gender entries confused the grouping). Cleanup now runs ONLY
      // when manually triggered via the console (window.runCleanup()).
      // The functions still exist (autoFixTeamNames, dedupeSports,
      // dedupeTurmas, dedupeEnrollments, consolidateYears) and can be
      // invoked surgically from devtools.
      window.runCleanup=function(opts){
        opts=opts||{};
        console.log('Manual cleanup run with opts:',opts);
        var report={};
        if(opts.fixNames!==false){report.fixNames=autoFixTeamNames()}
        if(opts.years){report.years=consolidateYears()}
        if(opts.sports){report.sports=dedupeSports()}
        if(opts.turmas){report.turmas=dedupeTurmas()}
        if(opts.enrollments){report.enrollments=dedupeEnrollments()}
        console.log('Report:',report);
        if(opts.save){
          console.log('Persisting...');
          try{syncToSupabase(false)}catch(e){console.error('Save failed:',e)}
        } else {
          console.log('Run with {save:true} to persist. State changed in memory only.');
        }
        return report;
      };
      // Recompute group winners for all imported brackets (propagate GW_ slots)
      try{
        Object.entries(S.brk).forEach(function(bke){
          var bk=bke[0],cts=bke[1];
          Object.keys(cts).forEach(function(ct){
            try{recomputeGroupWinners(bk,ct)}catch(e){}
          });
        });
      }catch(e){console.warn('recomputeGroupWinners on load:',e)}
    }
    if(ok){R()}else{R()} // Render either way after load attempt
    // Check if school is active
    if(MT.schoolCode){
      fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.master_schools&select=data',{
        headers:{'apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key}
      }).then(function(r){return r.json()}).then(function(rows){
        if(rows&&rows.length&&rows[0].data){
          try{
            var schools=JSON.parse(rows[0].data);
            var mine=schools.find(function(s){return s.code===MT.schoolCode});
            if(!mine||mine.status==='inactive'){MT.schoolBlocked=true;R()}
          }catch(e){}
        }
      }).catch(function(){});
    }
  });
  });  // close _preflightVersionCheck callback
} else {
  MT.loading=false;
  MT.dataLoaded=true;
}
</script>
