function nrmYr(y){return(y||'').replace(/[°º]/g,'º').replace(/\s+/g,' ').trim().toUpperCase()}
function getAnos(){var a=[];S.cls.forEach(function(c){var y=nrmYr(c.yr);if(y&&a.indexOf(y)<0)a.push(y)});a.sort();return a}
function getClsByAno(ano){return S.cls.filter(function(c){return nrmYr(c.yr)===ano})}

// Detect turma name from a ficha filename. Recognizes patterns like:
//   "Ficha_de_Inscrição_-_1º_ano_-_JIM_AMARELA_2026.xlsx" → "1º ANO AMARELA"
//   "Ficha-2-SERIE-AZUL.xlsx" → "2ª SÉRIE AZUL"
//   "Ficha 6 ano A.docx" → "6º ANO A"
// Returns null when nothing recognizable is found.
function detectTurmaFromFilename(filename){
  if(!filename)return null;
  var name=String(filename).replace(/\.(xlsx|xls|docx)$/i,'');
  name=name.replace(/[_\-]+/g,' ').replace(/\s+/g,' ');
  var up=name.toUpperCase();
  var serie=null;
  var mAno=up.match(/(\d+)\s*[ºO°]?\s*ANO/);
  var mSer=up.match(/(\d+)\s*[ªA°]?\s*S[ÉE]RIE/);
  if(mAno)serie=mAno[1]+'º ANO';
  else if(mSer)serie=mSer[1]+'ª SÉRIE';
  // Always normalize to the masculine form so it matches turmas created by
  // the bracket import (which is what the school has loaded). ROXA/AMARELA/
  // VERMELHA/PRETA/BRANCA → ROXO/AMARELO/VERMELHO/PRETO/BRANCO.
  var COLOR_MAP={
    'AMARELA':'AMARELO','AMARELO':'AMARELO',
    'VERMELHA':'VERMELHO','VERMELHO':'VERMELHO',
    'ROXA':'ROXO','ROXO':'ROXO',
    'PRETA':'PRETO','PRETO':'PRETO',
    'BRANCA':'BRANCO','BRANCO':'BRANCO',
    'AZUL':'AZUL','VERDE':'VERDE','ROSA':'ROSA','CINZA':'CINZA','LARANJA':'LARANJA'
  };
  var color=null;
  Object.keys(COLOR_MAP).forEach(function(c){
    if(!color&&up.indexOf(c)>=0)color=COLOR_MAP[c];
  });
  if(!color){
    var mLetter=up.match(/\b\d+\s*[ºO°]?\s*ANO\s+([A-H])\b/);
    if(mLetter)color=mLetter[1];
  }
  if(!serie&&!color)return null;
  if(serie&&color)return serie+' '+color;
  return serie||color;
}

// Uppercase helper for user input
function uc(s){return(s||'').trim().toUpperCase()}

// Build standardized team name from turma name + category
function buildTeamName(turmaNm,category){
  var nm=(turmaNm||'').trim();
  var numMatch=nm.match(/(\d+)/);
  var seriesNum=numMatch?numMatch[1]:'';
  // Remove "Ano" and numbers to find the class identifier (letter or color)
  var cleaned=nm.replace(/[°º]/g,'').replace(/\d+/g,'').replace(/\bano\b/gi,'').replace(/\bs[eé]rie\b/gi,'').trim();
  var words=cleaned.split(/\s+/).filter(function(w){return w.length>0});
  var classIdent='';
  // First try: a single letter word (3º A, 6º B…)
  for(var i=words.length-1;i>=0;i--){
    var w=words[i].replace(/[^A-Za-z]/g,'');
    if(w.length===1){classIdent=w.toUpperCase();break}
  }
  // Fallback: use the last meaningful word as-is (handles colors like "AMARELO",
  // "VERMELHO", "ROXO" that aren't single letters). This keeps turma names unique
  // when generating team labels — e.g. "8º AMARELO" → "8º AMARELO (F)" instead of
  // "8º (F)" colliding across all 8º color teams.
  if(!classIdent){
    for(var j=words.length-1;j>=0;j--){
      var w2=(words[j]||'').replace(/[^A-Za-zÀ-ÿ]/g,'');
      if(w2.length>1){classIdent=w2.toUpperCase();break}
    }
  }
  var catAbbr=category==='Masculino'?'(M)':category==='Feminino'?'(F)':'(X)';
  if(seriesNum&&classIdent)return seriesNum+'º '+classIdent+' '+catAbbr;
  if(seriesNum)return seriesNum+'º '+catAbbr;
  return nm.replace(/\s+/g,'').slice(0,8).toUpperCase()+' '+catAbbr;
}

// Auto-fix all team names to standard format
function autoFixTeamNames(){
  var fixed=0;
  S.enr.forEach(function(e){
    var cl=S.cls.find(function(c){return c.id===e.ci});
    if(!cl)return;
    var correctName=buildTeamName(cl.nm,e.ct);
    if(e.tn!==correctName){
      e.tn=correctName;
      fixed++;
    }
  });
  return fixed;
}

// Deduplicate enrollments: when multiple enrollments exist for the same
// (turma, sport, category) trio, keep the one with the longest player list
// and merge any unique players from the others. Returns count of removed duplicates.
// Deduplicate turmas: when multiple classes resolve to the same kex() key
// (e.g. "6º A", "6º Ano A", "6º ANO A" → all key "6A"), keep one and migrate
// all references (enrollments + brackets + podiums + recursos) to it.
// Returns count of removed duplicate turmas.
// Consolidate turma years into a single event year. After ficha imports
// some turmas may have ended up with yr="6º ANO" while others have
// yr="JOGAR 2026" or yr="JOGOS 2026" — this splits filters across virtual
// years. We pick the most-used "event year" (one containing JOGAR/JOGOS or
// matching the first bracket key) and rewrite all turmas to that.
// Returns count of turmas that had their yr rewritten.
// Deduplicate sports: when multiple S.spt entries refer to the same logical
// sport (e.g. "TENIS DE MESA" and "Tênis de mesa" with same gender, or
// duplicates created across imports), keep one and migrate all references
// (enrollments + bracket keys + podiums) to it. Returns count of merged sports.
// Canonicalize a sport name to merge known synonyms.
// Rules:
//   FUT 7, FUTEBOL          → FUT 7
//   VOLEI, VOLEIBOL, VOLLEY → VOLEI
//   TENIS DE MESA, TENIS    → TENIS DE MESA
//   SOLETRANDO ING/INGLES   → SOLETRANDO ING
// All comparisons are accent/case-insensitive.
function canonicalSportName(nm){
  function _n(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
  var n=_n(nm);
  // Specific aliases — order matters: most specific first
  if(/^fut\s*7\b/.test(n)||/^futebol\b/.test(n))return 'FUT 7';
  if(/^volei\b|^voleibol\b|^volleyball\b|^volley\b|^voleiinino\b/.test(n))return 'VOLEI';
  if(/^tenis(\s+de\s+mesa)?\b|^t[ée]nis(\s+de\s+mesa)?\b|^tenis\s*de\s*mesa\b/.test(n))return 'TENIS DE MESA';
  if(/^soletrando(\s+ing)?(les)?\b/.test(n))return 'SOLETRANDO ING';
  if(/^queimada\b/.test(n))return 'QUEIMADA';
  if(/^pebolim\b/.test(n))return 'PEBOLIM';
  if(/^handebol\b|^handball\b|^handibol\b/.test(n))return 'HANDEBOL';
  if(/^basquete\b|^basket(ball)?\b/.test(n))return 'BASQUETE';
  if(/^cesquete\b/.test(n))return 'CESQUETE';
  if(/^bandeirinha\b/.test(n))return 'BANDEIRINHA';
  if(/^xadrez\b|^chess\b/.test(n))return 'XADREZ';
  if(/^minecraft\b/.test(n))return 'MINECRAFT';
  // Default: uppercase trimmed
  return (nm||'').toUpperCase().trim();
}

function dedupeSports(){
  if(!S.spt||S.spt.length<2)return 0;
  // Group by canonical name + gender. Two sports with different surface
  // names (FUT 7 vs FUTEBOL) but same canonical form merge into one.
  var groups={};
  S.spt.forEach(function(sp){
    var key=canonicalSportName(sp.nm)+'|'+(sp.gender||'');
    if(!groups[key])groups[key]=[];
    groups[key].push(sp);
  });
  var merged=0;
  Object.values(groups).forEach(function(g){
    if(g.length<2)return;
    // Keeper preference order:
    //  1. Sport that appears in S.brk (bracket — source of truth)
    //  2. Most enrollments referencing it
    //  3. Tie-break by name length (longer wins for descriptiveness)
    g.sort(function(a,b){
      var aInBrk=Object.keys(S.brk).some(function(bk){return bk.split('__')[1]===a.id})?1:0;
      var bInBrk=Object.keys(S.brk).some(function(bk){return bk.split('__')[1]===b.id})?1:0;
      if(aInBrk!==bInBrk)return bInBrk-aInBrk;
      var ea=S.enr.filter(function(e){return e.si===a.id}).length;
      var eb=S.enr.filter(function(e){return e.si===b.id}).length;
      if(ea!==eb)return eb-ea;
      return (b.nm||'').length-(a.nm||'').length;
    });
    var keeper=g[0];
    // Force keeper.nm to the canonical form so the UI is consistent
    keeper.nm=canonicalSportName(keeper.nm);
    for(var i=1;i<g.length;i++){
      var dup=g[i];
      // Migrate enrollments
      S.enr.forEach(function(e){if(e.si===dup.id)e.si=keeper.id});
      // Migrate bracket keys: "YEAR__dupId__SERIE" → "YEAR__keeperId__SERIE"
      Object.keys(S.brk).forEach(function(bk){
        var parts=bk.split('__');
        if(parts[1]===dup.id){
          parts[1]=keeper.id;
          var newBk=parts.join('__');
          if(!S.brk[newBk]){
            S.brk[newBk]=S.brk[bk];
          } else {
            // Merge gender entries
            Object.keys(S.brk[bk]).forEach(function(g2){
              if(!S.brk[newBk][g2])S.brk[newBk][g2]=S.brk[bk][g2];
            });
          }
          delete S.brk[bk];
        }
      });
      // Migrate podiums
      (S.podiums||[]).forEach(function(p){if(p.sportId===dup.id)p.sportId=keeper.id});
      merged++;
    }
    S.spt=S.spt.filter(function(s){return s.id===keeper.id||g.indexOf(s)<0});
  });
  return merged;
}

function consolidateYears(){
  if(!S.cls||!S.cls.length)return 0;
  // Detect candidate event years: those containing JOGAR/JOGOS, or those
  // that appear as the first segment of a bracket key.
  var eventYearCounts={};
  S.cls.forEach(function(c){
    var y=(c.yr||'').toUpperCase();
    if(/JOGAR|JOGOS|EVENTO|TORNEIO|COPA|CAMPEONATO/i.test(y)){
      eventYearCounts[c.yr]=(eventYearCounts[c.yr]||0)+1;
    }
  });
  // Also consider first segments of bracket keys (very strong signal — that's
  // the year actually keying the brackets)
  Object.keys(S.brk).forEach(function(bk){
    var y=bk.split('__')[0];
    if(y)eventYearCounts[y]=(eventYearCounts[y]||0)+10; // weight bracket-derived more
  });
  var candidates=Object.entries(eventYearCounts).sort(function(a,b){return b[1]-a[1]});
  if(!candidates.length)return 0;
  var canonicalYear=candidates[0][0];
  var changed=0;
  S.cls.forEach(function(c){
    if(c.yr!==canonicalYear){c.yr=canonicalYear;changed++}
  });
  return changed;
}

function dedupeTurmas(){
  if(!S.cls||S.cls.length<2)return 0;
  // Pre-pass 1: normalize all turma names to masculine color forms.
  S.cls.forEach(function(c){
    if(c.nm)c.nm=_normColors((c.nm||'').toUpperCase());
  });
  // Pre-pass 2: drop the "ANO" word from names that include it when the
  // dominant convention in the school is short-form ("6º A" not "6º ANO A").
  // Decision rule: if at least 70% of turmas with the digit-at-start pattern
  // use the short form, rewrite outliers.
  (function(){
    var withDigit=S.cls.filter(function(c){return /^\d/.test((c.nm||'').trim())});
    if(withDigit.length<3)return;
    var shortCount=withDigit.filter(function(c){return!/\bANO\b|\bSERIE\b|\bSÉRIE\b/i.test(c.nm)}).length;
    if(shortCount/withDigit.length<0.7)return; // long form is dominant — leave alone
    // Rewrite outliers: "6º ANO A" → "6º A"
    S.cls.forEach(function(c){
      var nm=c.nm||'';
      var stripped=nm.replace(/\b(ANO|SÉRIE|SERIE)\b/gi,'').replace(/\s+/g,' ').trim();
      if(stripped&&stripped!==nm)c.nm=stripped;
    });
  })();
  // Group by kex key — but only when the key is "useful" (>= 2 chars,
  // and starts with a digit so we don't merge generic single-word names)
  var groups={};
  S.cls.forEach(function(c){
    var k=kex(c.nm);
    if(!k||k.length<2||!/^\d/.test(k))k='__solo_'+c.id;
    if(!groups[k])groups[k]=[];
    groups[k].push(c);
  });
  var removedCount=0;
  Object.values(groups).forEach(function(g){
    if(g.length<2)return;
    // Keeper preference order:
    //  1. Most enrollments referencing it (data weight)
    //  2. SHORTER name — matches the dominant convention in the school
    //     (most turmas are "6º A", "6º B"... so "6º A" wins over "6º ANO A")
    g.sort(function(a,b){
      var ea=S.enr.filter(function(e){return e.ci===a.id}).length;
      var eb=S.enr.filter(function(e){return e.ci===b.id}).length;
      if(ea!==eb)return eb-ea;
      // Shorter is better (avoids the rare "6º ANO A" winning over "6º A")
      return (a.nm||'').length-(b.nm||'').length;
    });
    var keeper=g[0];
    // Normalize keeper name to use the masculine color form (ROXO not ROXA, etc.)
    keeper.nm=_normColors((keeper.nm||'').toUpperCase());
    for(var i=1;i<g.length;i++){
      var dup=g[i];
      // Migrate all references
      S.enr.forEach(function(e){if(e.ci===dup.id)e.ci=keeper.id});
      Object.keys(S.brk).forEach(function(bk){
        Object.keys(S.brk[bk]).forEach(function(ct){
          S.brk[bk][ct]=S.brk[bk][ct].map(function(rd){
            return Object.assign({},rd,{m:rd.m.map(function(m){
              var nm=Object.assign({},m);
              if(nm.t1===dup.id)nm.t1=keeper.id;
              if(nm.t2===dup.id)nm.t2=keeper.id;
              if(nm.w===dup.id)nm.w=keeper.id;
              if(nm.wo===dup.id)nm.wo=keeper.id;
              return nm;
            })});
          });
        });
      });
      (S.podiums||[]).forEach(function(p){
        for(var j=1;j<=8;j++){if(p['p'+j]===dup.id)p['p'+j]=keeper.id}
      });
      (S.recursos||[]).forEach(function(r){if(r.punishClassId===dup.id)r.punishClassId=keeper.id});
      removedCount++;
    }
    S.cls=S.cls.filter(function(c){return c.id===keeper.id||g.indexOf(c)<0});
  });
  // Also normalize yr — if multiple yr exist for "same" turma context,
  // keep the one with most usage (already done by ordering above).
  return removedCount;
}

function dedupeEnrollments(){
  if(!S.enr||!S.enr.length)return 0;
  // First: drop enrollments whose ci doesn't exist in S.cls anymore
  // (orphans left by old imports or bracket re-imports)
  var validCi={};
  S.cls.forEach(function(c){validCi[c.id]=true});
  var beforeCount=S.enr.length;
  S.enr=S.enr.filter(function(e){return validCi[e.ci]});
  var orphansRemoved=beforeCount-S.enr.length;
  if(!S.enr.length)return orphansRemoved;
  var byKey={};
  S.enr.forEach(function(e){
    var key=(e.ci||'')+'|'+(e.si||'')+'|'+(e.ct||'');
    if(!byKey[key])byKey[key]=[];
    byKey[key].push(e);
  });
  var removed=0;
  var keepIds={};
  Object.values(byKey).forEach(function(group){
    if(group.length===1){keepIds[group[0].id]=true;return}
    // Sort by pl length desc, then approved status, then by oldest id
    group.sort(function(a,b){
      var lenDiff=(b.pl||'').length-(a.pl||'').length;
      if(lenDiff!==0)return lenDiff;
      if(a.st==='approved'&&b.st!=='approved')return -1;
      if(b.st==='approved'&&a.st!=='approved')return 1;
      return 0;
    });
    var keeper=group[0];
    keepIds[keeper.id]=true;
    // Merge unique players from duplicates
    var allPlayers=(keeper.pl||'').split(/[,;\n]/).map(function(p){return p.trim()}).filter(Boolean);
    for(var i=1;i<group.length;i++){
      var ps=(group[i].pl||'').split(/[,;\n]/).map(function(p){return p.trim()}).filter(Boolean);
      ps.forEach(function(p){
        var lower=p.toLowerCase();
        if(!allPlayers.find(function(x){return x.toLowerCase()===lower}))allPlayers.push(p);
      });
      removed++;
      // Migrate bracket references from removed enrollment id to keeper id
      var oldId=group[i].id;
      Object.keys(S.brk).forEach(function(bk){
        Object.keys(S.brk[bk]).forEach(function(ct){
          S.brk[bk][ct]=S.brk[bk][ct].map(function(rd){
            return Object.assign({},rd,{m:rd.m.map(function(m){
              var nm=Object.assign({},m);
              if(nm.t1===oldId)nm.t1=keeper.id;
              if(nm.t2===oldId)nm.t2=keeper.id;
              if(nm.w===oldId)nm.w=keeper.id;
              if(nm.wo===oldId)nm.wo=keeper.id;
              if(nm._slot1===oldId)nm._slot1=keeper.id;
              if(nm._slot2===oldId)nm._slot2=keeper.id;
              return nm;
            })});
          });
        });
      });
    }
    keeper.pl=allPlayers.join(', ');
  });
  S.enr=S.enr.filter(function(e){return keepIds[e.id]});
  return removed+orphansRemoved;
}

function genBracket(ids,has3rd){
  if(ids.length<2)return[];
  var s=[].concat(ids).sort(function(){return Math.random()-.5});
  var p=Math.pow(2,Math.ceil(Math.log2(s.length)));
  while(s.length<p)s.push('BYE');
  var rounds=[],cur=[].concat(s),rn=1;
  while(cur.length>1){
    var ms=[];
    for(var i=0;i<cur.length;i+=2)ms.push({id:uid(),r:rn,t1:cur[i],t2:cur[i+1],s1:null,s2:null,w:cur[i+1]==='BYE'?cur[i]:null,dt:'',lc:'',is3rd:false});
    rounds.push({r:rn,m:ms});
    cur=ms.map(function(x){return x.w?x.w:'W_'+x.id});
    rn++;
  }
  // Optional 3rd place: losers of semifinal
  if(has3rd&&rounds.length>=2){
    var semiRound=rounds[rounds.length-2];
    var losers=semiRound.m.map(function(m){return 'L_'+m.id});
    var m3={id:uid(),r:rounds.length,t1:losers[0],t2:losers[1]||'BYE',s1:null,s2:null,w:null,dt:'',lc:'',is3rd:true};
    rounds[rounds.length-1].m.push(m3);
  }
  return rounds;
}

function rName(r,t){var d=t-r;return d===0?'Final':d===1?'Semi':d===2?'Quartas':'Rodada '+r}

// Resolve a match team identifier to a turma (class) id.
// Brackets imported from Word/HTML/XLSX use turma ids directly in m.t1/m.t2,
// while manually-generated brackets use enrollment ids. This helper handles both.
function resolveCi(id){
  if(!id||id==='BYE'||id.indexOf('PH_')===0||id.indexOf('GW_')===0||id.indexOf('W_')===0||id.indexOf('L_')===0)return null;
  // Try enrollment first
  var e=S.enr.find(function(x){return x.id===id});
  if(e)return e.ci;
  // Try turma id directly
  var cl=S.cls.find(function(x){return x.id===id});
  if(cl)return cl.id;
  return null;
}

function tName(id){
  if(!id||id==='BYE')return'BYE';
  if(!id||id.indexOf('PH_')===0)return'A definir';
  if(id.indexOf('GW_')===0)return'A definir';  // group winner — TBD from standings
  if(id.indexOf('W_')===0)return'A definir';
  if(id.indexOf('L_')===0){
    var mid=id.slice(2);var found=null;
    Object.values(S.brk).forEach(function(sb){Object.values(sb).forEach(function(rs){rs.forEach(function(r){r.m.forEach(function(m){if(m.id===mid)found=m})})})});
    if(!found)return'A definir';
    if(found.w===null)return'Perd. Semi';
    return found.w===found.t1?tName(found.t2):tName(found.t1);
  }
  // Try enrollment id first (normal flow)
  var e=S.enr.find(function(x){return x.id===id});
  if(e&&e.tn)return e.tn;
  // Try turma id directly (imported brackets)
  var cl=S.cls.find(function(x){return x.id===id});
  if(cl)return cl.nm;
  return'—';
}

function recomputeGroupWinners(bk,ct){
  // For each bracket key, compute group/rodizio standings and update GW_ slots
  var rds=S.brk[bk]&&S.brk[bk][ct]?S.brk[bk][ct]:[];
  if(!rds.length)return;

  // Identify rounds that are classify (no GW_/W_/L_ slots) vs final rounds.
  // BUG FIX: previously only checked m.t1. When GW_A had already been resolved
  // to a real team id (e.g. ienr) but GW_B was still pending in m.t2, the round
  // was wrongly classified as a "classify/group" round, so GW_B never resolved.
  // Now we also check m.t2, plus the _slot1/_slot2 metadata which persists
  // the original GW_/W_/L_ code even after resolution — making detection robust.
  var classifyRounds=[],finalRounds=[];
  rds.forEach(function(rd){
    var hasFinalSlot=rd.m.some(function(m){
      function isFinalSlot(v){
        return v&&(v.indexOf('GW_')===0||v.indexOf('W_')===0||v.indexOf('L_')===0);
      }
      return isFinalSlot(m.t1)||isFinalSlot(m.t2)||
             isFinalSlot(m._slot1)||isFinalSlot(m._slot2)||
             m.is3rd;
    });
    if(hasFinalSlot)finalRounds.push(rd);
    else classifyRounds.push(rd);
  });

  // Compute standings per classify round (group/rodizio)
  // Each classify round = one group. Standings = win count then point diff
  var groupStandings=[];
  classifyRounds.forEach(function(rd,gi){
    var stats={};
    rd.m.forEach(function(m){
      [m.t1,m.t2].forEach(function(t){
        if(t&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0){
          if(!stats[t])stats[t]={t:t,w:0,d:0,l:0,pts:0,gd:0,gp:0};
        }
      });
      if(m.s1==null||m.s2==null)return;
      var t1=m.t1,t2=m.t2;
      if(!stats[t1]||!stats[t2])return;
      stats[t1].gp+=m.s1;stats[t2].gp+=m.s2;
      stats[t1].gd+=(m.s1-m.s2);stats[t2].gd+=(m.s2-m.s1);
      if(m.isDraw||m.s1===m.s2){stats[t1].d++;stats[t2].d++;stats[t1].pts++;stats[t2].pts++;}
      else if(m.w===t1){stats[t1].w++;stats[t1].pts+=3;stats[t2].l++;}
      else if(m.w===t2){stats[t2].w++;stats[t2].pts+=3;stats[t1].l++;}
    });
    // Apply configurable tiebreakers
    var tiebreakers=(S.tiebreakers||['pts','gd','headtohead','gp']);
    var sorted=Object.values(stats).sort(function(a,b){
      // Always start with points (wins)
      if(b.pts!==a.pts)return b.pts-a.pts;
      // Apply tiebreakers in order
      for(var i=0;i<tiebreakers.length;i++){
        var tb=tiebreakers[i];
        if(tb==='gd'&&b.gd!==a.gd)return b.gd-a.gd;
        if(tb==='gp'&&b.gp!==a.gp)return b.gp-a.gp;
        if(tb==='headtohead'){
          // Find the match between these two teams
          var hth=null;
          rd.m.forEach(function(m){
            if((m.t1===a.t&&m.t2===b.t)||(m.t1===b.t&&m.t2===a.t)){
              if(m.s1!=null&&m.s2!=null)hth=m;
            }
          });
          if(hth&&hth.w){
            if(hth.w===a.t)return -1;
            if(hth.w===b.t)return 1;
          }
        }
      }
      return 0;
    });
    groupStandings.push({groupIdx:gi,standings:sorted});
  });

  // Now propagate to GW_ slots. We support these slot patterns:
  //   GW_A_<bk> = leader of group A (classifyRounds[0])
  //   GW_B_<bk> = leader of group B (classifyRounds[1])
  //   GW_1_<bk> = leader of single rodizio (classifyRounds[0]) - 1st place
  //   GW_2_<bk> = 2nd place of single rodizio
  //   GW_3_<bk>, GW_4_<bk> = 3rd, 4th places (for 3rd place match)
  function findStandingByPos(groupIdx,pos){
    var g=groupStandings[groupIdx];
    if(!g||!g.standings[pos-1])return null;
    return g.standings[pos-1].t;
  }

  // Check if all classify games are completed (have scores)
  function isGroupComplete(groupIdx){
    var rd=classifyRounds[groupIdx];
    if(!rd)return false;
    return rd.m.every(function(mm){
      var bothPH=(!mm.t1||mm.t1.indexOf('PH_')===0)&&(!mm.t2||mm.t2.indexOf('PH_')===0);
      if(bothPH)return true; // skip placeholder matches
      return mm.s1!=null&&mm.s2!=null;
    });
  }

  // Helper: try to detect implicit slot codes when _slot metadata is missing
  // Based on bracket structure, Final's t1 = leader of Group A (or 1st of rodizio)
  // Final's t2 = leader of Group B (or 2nd of rodizio in some configs)
  function inferSlotCode(rd,matchIdx,slot){
    var hasGroups=classifyRounds.length>=2;
    if(rd.m[matchIdx].is3rd){
      // 3rd place: t1=A2 (2nd of A), t2=B2 (2nd of B) for groups
      // For semi structure: handled by L_<matchId> not GW_
      if(hasGroups)return slot==='t1'?'A2':'B2';
      // For rodizio: 3rd = position 3, 4th = position 4
      return slot==='t1'?'3':'4';
    } else {
      // Main final
      if(hasGroups)return slot==='t1'?'A':'B';
      // Single rodizio: 1st vs 2nd
      return slot==='t1'?'1':'2';
    }
  }

  // DEBUG: Log structure for diagnosis
  if(window.__DEBUG_RECOMPUTE){
    console.log('[recompute]', bk, ct, '— classifyRounds:', classifyRounds.length, 'finalRounds:', finalRounds.length);
    classifyRounds.forEach(function(rd,i){
      var n=rd.m.filter(function(m){return m.s1!=null&&m.s2!=null}).length;
      console.log('[recompute]  Group', i, '(' + (rd.label||'?') + '):', n + '/' + rd.m.length, 'matches scored');
    });
    groupStandings.forEach(function(g){
      console.log('[recompute]  Group', g.groupIdx, 'standings:', g.standings.map(function(s){return s.t.slice(0,4)+':'+s.pts+'pts'}).join(', '));
    });
  }

  finalRounds.forEach(function(rd){
    rd.m.forEach(function(m,matchIdx){
      ['t1','t2'].forEach(function(slot){
        var slotKey='_slot'+(slot==='t1'?'1':'2');
        var origCode=m[slotKey];
        var s=origCode||m[slot];

        // Determine the code (either from explicit GW_ pattern or inferred from structure)
        var code=null;
        if(s&&s.indexOf('GW_')===0){
          var matchRe=s.match(/^GW_([A-Z]?[0-9A-Z]{1,2})_/);
          if(matchRe)code=matchRe[1];
        }

        // If we don't have a code AND the slot doesn't look like a GW_ pattern,
        // BUT origCode is missing AND we don't know if this slot needs resolution,
        // try to infer from match structure (is the final from groups or rodizio?)
        if(!code&&!origCode&&classifyRounds.length>0){
          // Only infer if the FINAL slot in question hasn't been "claimed" by a real ID
          // We infer when: m[slot] is a real turma id but the standings would compute differently
          // Actually safer: only infer when m[slot] looks like a placeholder OR we're sure
          var looksUnresolved=!s||s.indexOf('PH_')===0||s.indexOf('GW_')===0||s.indexOf('W_')===0||s.indexOf('L_')===0;
          if(looksUnresolved){
            code=inferSlotCode(rd,matchIdx,slot);
          }
        }

        if(!code)return;

        // Persist the slot code for future calls
        if(!m[slotKey]){
          m[slotKey]='GW_'+code+'_'+bk;
        }

        // Determine which group this code refers to
        var groupIdx=0;
        if(code==='B'||code==='B2')groupIdx=1;

        // Resolve only if the group is complete
        var groupComplete=isGroupComplete(groupIdx);
        if(window.__DEBUG_RECOMPUTE){
          console.log('[recompute]    slot', slot, 'matchIdx', matchIdx, 'origCode:', origCode, 's:', s, 'code:', code, 'groupIdx:', groupIdx, 'complete:', groupComplete);
        }
        if(!groupComplete){
          m[slot]='GW_'+code+'_'+bk;
          return;
        }
        var newId=null;
        if(code==='A')newId=findStandingByPos(0,1);
        else if(code==='B')newId=findStandingByPos(1,1);
        else if(code==='A2')newId=findStandingByPos(0,2);
        else if(code==='B2')newId=findStandingByPos(1,2);
        else if(code==='1')newId=findStandingByPos(0,1);
        else if(code==='2')newId=findStandingByPos(0,2);
        else if(code==='3')newId=findStandingByPos(0,3);
        else if(code==='4')newId=findStandingByPos(0,4);
        if(newId)m[slot]=newId;
        else m[slot]='GW_'+code+'_'+bk;
      });
    });
  });

  scheduleSave();
}

// Compute rodizio standings from a single round (matches[]).
// Same scoring used everywhere: 3 pts win, 1 pt draw, 0 pt loss.
// Tiebreakers come from S.tiebreakers (gd → headtohead → gp by default).
// Returns sorted array of {t, w, d, l, pts, gd, gp, ga} (best first).
function _rodizioStandings(rd){
  if(!rd||!rd.m)return[];
  var stats={};
  function isReal(t){return t&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0&&t!=='BYE'}
  rd.m.forEach(function(mm){
    [mm.t1,mm.t2].forEach(function(t){
      if(isReal(t)&&!stats[t])stats[t]={t:t,w:0,d:0,l:0,pts:0,gd:0,gp:0,ga:0};
    });
    if(mm.s1==null||mm.s2==null)return;
    if(!isReal(mm.t1)||!isReal(mm.t2))return;
    var t1=mm.t1,t2=mm.t2;
    stats[t1].gp+=mm.s1;stats[t2].gp+=mm.s2;
    stats[t1].ga+=mm.s2;stats[t2].ga+=mm.s1;
    stats[t1].gd+=(mm.s1-mm.s2);stats[t2].gd+=(mm.s2-mm.s1);
    if(mm.isDraw||mm.s1===mm.s2){stats[t1].d++;stats[t2].d++;stats[t1].pts++;stats[t2].pts++;}
    else if(mm.w===t1){stats[t1].w++;stats[t1].pts+=3;stats[t2].l++;}
    else if(mm.w===t2){stats[t2].w++;stats[t2].pts+=3;stats[t1].l++;}
  });
  var tiebreakers=(S.tiebreakers||['gd','headtohead','gp']);
  return Object.values(stats).sort(function(a,b){
    if(b.pts!==a.pts)return b.pts-a.pts;
    for(var i=0;i<tiebreakers.length;i++){
      var tb=tiebreakers[i];
      if(tb==='gd'&&b.gd!==a.gd)return b.gd-a.gd;
      if(tb==='gp'&&b.gp!==a.gp)return b.gp-a.gp;
      if(tb==='headtohead'){
        var hth=null;
        rd.m.forEach(function(mm){if((mm.t1===a.t&&mm.t2===b.t)||(mm.t1===b.t&&mm.t2===a.t)){if(mm.s1!=null&&mm.s2!=null)hth=mm}});
        if(hth&&hth.w){if(hth.w===a.t)return -1;if(hth.w===b.t)return 1;}
      }
    }
    return 0;
  });
}

// Read position points consistently. Supports both new format (sc.positions[])
// and legacy format (sc.p1, sc.p2, ...). Returns 0 when undefined.
function _pospts(rank){
  var sc=S.scoring||{};
  if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;
  return sc['p'+rank]||0;
}

function calcRk(){
  var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,pWin:3,pWO:-2};
  var pts={};
  // Points from bracket wins
  Object.entries(S.brk).forEach(function(e1){
    Object.values(e1[1]).forEach(function(rs){rs.forEach(function(r){r.m.forEach(function(m){
      // Skip matches with placeholder teams
      var t1ok=m.t1&&m.t1.indexOf('PH_')!==0&&m.t1.indexOf('W_')!==0&&m.t1.indexOf('L_')!==0;
      var t2ok=m.t2&&m.t2.indexOf('PH_')!==0&&m.t2.indexOf('W_')!==0&&m.t2.indexOf('L_')!==0;
      if(!t1ok&&!t2ok)return;
      // Score recorded (has result)
      var hasResult=m.s1!=null&&m.s2!=null;
      if(hasResult){
        var isDraw=m.isDraw||m.s1===m.s2;
        if(isDraw){
          // Both teams get draw points
          if(t1ok){if(!pts[m.t1])pts[m.t1]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[m.t1].d++;pts[m.t1].draws++;pts[m.t1].p+=(sc.pDraw!=null?sc.pDraw:1);}
          if(t2ok){if(!pts[m.t2])pts[m.t2]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[m.t2].d++;pts[m.t2].draws++;pts[m.t2].p+=(sc.pDraw!=null?sc.pDraw:1);}
        } else if(m.w&&m.w!=='BYE'){
          // Winner gets win points, loser gets loss points
          var loserT=m.w===m.t1?m.t2:m.t1;
          if(!pts[m.w])pts[m.w]={w:0,d:0,l:0,p:0,wo:0,draws:0};
          pts[m.w].w++;pts[m.w].p+=(sc.pWin!=null?sc.pWin:3);
          if(loserT&&loserT.indexOf('PH_')!==0&&loserT.indexOf('W_')!==0){
            if(!pts[loserT])pts[loserT]={w:0,d:0,l:0,p:0,wo:0,draws:0};
            pts[loserT].l++;pts[loserT].p+=(sc.pLoss!=null?sc.pLoss:0);
          }
        }
      }
      // WO penalty
      if(m.wo){
        var woPenalty=m.wo;
        if(!pts[woPenalty])pts[woPenalty]={w:0,d:0,l:0,p:0,wo:0,draws:0};
        pts[woPenalty].wo++;pts[woPenalty].p+=(sc.pWO!=null?sc.pWO:-2);
      }
    })})});
  });
  // Position points: find finals and assign 1st/2nd/3rd/4th
  Object.entries(S.brk).forEach(function(e1){
    Object.entries(e1[1]).forEach(function(e2){
      var rs=e2[1];if(!rs||!rs.length)return;
      var finalRound=rs[rs.length-1];if(!finalRound||!finalRound.m)return;
      // Find the main final (not 3rd place)
      var finalMatch=finalRound.m.find(function(m){return!m.is3rd});
      var thirdMatch=finalRound.m.find(function(m){return m.is3rd});
      // For rodizio: final round = all matches, assign by standings (3pts/1pt + tiebreakers)
      var totalRnds=rs.length;
      // Rodizio = single round-robin. Threshold relaxed: 3+ teams produce 3+ matches.
      // (Old check >3 incorrectly excluded 3-team rodizios.)
      var isRodizio=totalRnds===1&&rs[0]&&rs[0].m&&rs[0].m.length>=3;
      if(isRodizio){
        // Only award position points when ALL matches in the rodizio are complete.
        // Otherwise teams would receive 1st/2nd/3rd points just by appearing in the
        // bracket, even before any game has a score.
        var allDone=rs[0].m.every(function(m){
          var isPH1=!m.t1||m.t1.indexOf('PH_')===0||m.t1.indexOf('W_')===0||m.t1.indexOf('L_')===0||m.t1.indexOf('GW_')===0;
          var isPH2=!m.t2||m.t2.indexOf('PH_')===0||m.t2.indexOf('W_')===0||m.t2.indexOf('L_')===0||m.t2.indexOf('GW_')===0;
          return (isPH1&&isPH2)||(m.s1!=null&&m.s2!=null);
        });
        if(!allDone)return;
        var sortedStandings=_rodizioStandings(rs[0]);
        var posKeys=['p1','p2','p3','p4','p5','p6','p7','p8'];
        sortedStandings.forEach(function(st,pi){
          var tid=st.t,pk=posKeys[pi];
          var pval=sc.positions&&sc.positions[pi]?sc.positions[pi].pts:(sc[pk]||0);
          if(!pts[tid])pts[tid]={w:0,d:0,l:0,p:0,wo:0,draws:0};
          pts[tid].p+=pval;
        });
        return;
      }
      if(finalMatch&&finalMatch.w){
        var first=finalMatch.w;
        var second=finalMatch.w===finalMatch.t1?finalMatch.t2:finalMatch.t1;
        // Use pospts helper to get position points (supports both old p1..p8 and new positions[])
        function pp(rank){if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;return sc['p'+rank]||0;}
        if(first&&first!=='BYE'&&first.indexOf('W_')!==0&&first.indexOf('L_')!==0&&first.indexOf('GW_')!==0&&first.indexOf('PH_')!==0){
          if(!pts[first])pts[first]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[first].p+=pp(1);
        }
        if(second&&second!=='BYE'&&second.indexOf('W_')!==0&&second.indexOf('L_')!==0&&second.indexOf('GW_')!==0&&second.indexOf('PH_')!==0){
          if(!pts[second])pts[second]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[second].p+=pp(2);
        }
      }
      if(thirdMatch&&thirdMatch.w){
        function pp3(rank){if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;return sc['p'+rank]||0;}
        var third=thirdMatch.w;
        var fourth=thirdMatch.w===thirdMatch.t1?thirdMatch.t2:thirdMatch.t1;
        if(third&&third!=='BYE'&&third.indexOf('W_')!==0&&third.indexOf('L_')!==0&&third.indexOf('GW_')!==0&&third.indexOf('PH_')!==0){
          if(!pts[third])pts[third]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[third].p+=pp3(3);
        }
        if(fourth&&fourth!=='BYE'&&fourth.indexOf('W_')!==0&&fourth.indexOf('L_')!==0&&fourth.indexOf('GW_')!==0&&fourth.indexOf('PH_')!==0){
          if(!pts[fourth])pts[fourth]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[fourth].p+=pp3(4);
        }
      }
    });
  });
  // Resolve id -> name: try enrollment first, then turma direct (imported brackets)
  return Object.entries(pts).map(function(entry){
    var id=entry[0],d=entry[1];
    // Skip placeholder ids
    if(!id||id.indexOf('PH_')===0||id.indexOf('W_')===0||id.indexOf('L_')===0)return null;
    var e=S.enr.find(function(x){return x.id===id});
    // For imported brackets: id is turma id directly
    var cl=e?S.cls.find(function(x){return x.id===e.ci}):S.cls.find(function(x){return x.id===id});
    var tn=e?e.tn:(cl?cl.nm:'—');
    var ci=e?e.ci:(cl?cl.id:'');
    // Find sport: search bracket for this id
    var spId='';
    Object.entries(S.brk).forEach(function(bke){
      var bk=bke[0],cts=bke[1];
      var parts=bk.split('__');
      var si=parts[1]||parts[0];
      Object.values(cts).forEach(function(rs){rs.forEach(function(rd){rd.m.forEach(function(m){
        if(m.t1===id||m.t2===id||m.w===id)spId=si;
      })})});
    });
    var sp=S.spt.find(function(x){return x.id===spId});
    return{id:id,tn:tn,cn:cl?cl.nm:'—',ci:ci,sn:sp?sp.nm:'—',yr:cl?cl.yr:'',w:d.w,p:d.p,wo:d.wo||0,draws:d.draws||0};
  }).filter(Boolean).sort(function(a,b){return b.p-a.p||b.w-a.w})
}
function calcCR(){
  var rk=calcRk(),pts={};
  rk.forEach(function(x){
    if(x.ci){
      if(!pts[x.ci])pts[x.ci]=0;
      pts[x.ci]+=x.p;
    }
  });
  // Add podium points (individual sports) p1-p8 — uses _pospts so it works
  // with both new sc.positions[] format and legacy sc.p1..p8.
  (S.podiums||[]).forEach(function(pod){
    for(var i=1;i<=8;i++){
      var k='p'+i;
      if(pod[k]){
        var pv=_pospts(i);
        if(pv)pts[pod[k]]=(pts[pod[k]]||0)+pv;
      }
    }
  });
  // Add recurso punishment points
  (S.recursos||[]).forEach(function(rec){
    if(rec.punishClassId&&rec.punishPts){pts[rec.punishClassId]=(pts[rec.punishClassId]||0)+rec.punishPts}
  });
  return Object.entries(pts).map(function(entry){var id=entry[0],p=entry[1];var cl=S.cls.find(function(x){return x.id===id});return{id:id,nm:cl?cl.nm:'—',yr:cl?cl.yr:'',p:p}}).sort(function(a,b){return b.p-a.p})
}

function h(tag,attrs){
  var e=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k];
      if(v===false||v===null||v===undefined)return; // skip falsy boolean attributes like disabled:false
      if(k==='class')e.className=v;
      else if(k==='html')e.innerHTML=v;
      else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
      else if(k.indexOf('on')===0&&typeof v==='function')e[k]=v;
      else if(v===true)e.setAttribute(k,''); // boolean true → attribute without value
      else e.setAttribute(k,v);
    });
  }
  function addChild(ch){
    if(ch==null||ch===false||ch===undefined)return;
    if(Array.isArray(ch)){ch.forEach(addChild);return}
    if(typeof ch==='string'||typeof ch==='number')e.appendChild(document.createTextNode(String(ch)));
    else e.appendChild(ch);
  }
  children.forEach(addChild);
  return e;
}

// Returns whether the Ranking page should be visible to students RIGHT NOW.
// Driven by S.rankingAccess = { mode, from, to } where:
//   mode='always' → always visible
//   mode='never'  → always hidden
//   mode='window' → visible only between from/to (HH:MM, recurrent every day)
// Admins and judges always see Ranking — this only affects students.
function _isRankingVisible(){
  var ra=S.rankingAccess;
  if(!ra||!ra.mode||ra.mode==='always')return true;
  if(ra.mode==='never')return false;
  if(ra.mode==='window'){
    if(!ra.from||!ra.to)return true; // misconfigured → fall back to visible
    var now=new Date();
    var nowM=now.getHours()*60+now.getMinutes();
    function _toMin(t){var p=String(t).split(':');return (parseInt(p[0],10)||0)*60+(parseInt(p[1],10)||0)}
    var fromM=_toMin(ra.from), toM=_toMin(ra.to);
    if(fromM<=toM){
      // Same-day window (07:00 → 20:00)
      return nowM>=fromM&&nowM<toM;
    } else {
      // Wrap-around window (22:00 → 06:00) — covers overnight cases
      return nowM>=fromM||nowM<toM;
    }
  }
  return true;
}

    ));
  });

  root.appendChild(sbOverlay);
  root.appendChild(sidebar);
  root.appendChild(mainDiv);
  root.appendChild(bnav);
  if(S.mod&&S.mod.tp==='settings')mSettings(root);
  if(S.mod&&S.mod.tp==='importBrk')mImportBrk(root);
  if(S.mod&&S.mod.tp==='fichasBatch')mFichasBatch(root);
  if(S.mod&&S.mod.tp==='result'){
    // Find the match object from brk using mid+bk+ct
    var _bk=S.mod.bk,_ct=S.mod.ct,_mid=S.mod.mid;

  if(!S.mod)scheduleSave();

  if(_scrollY>0)requestAnimationFrame(function(){window.scrollTo(0,_scrollY);});
  // Restore filter-box scroll positions (lateral filters in Chaveamento)
  if(_filterScrolls.length){

  function _serieRank(nm){
    var up=(nm||'').replace(/[\u00b0\u00ba]/g,'\u00ba').trim().toUpperCase();

    // Xº ANO (with explicit "ANO") OR bare "Xº COLOR" (no "ANO" word) → rank by X
    var mAno=up.match(/^(\d+)[\u00ba]?\s*ANO/)||up.match(/^(\d+)[\u00ba]\s+/);
    if(mAno)return parseInt(mAno[1])||99;

      if(e.st==='pending'){acts.appendChild(h('button',{'class':'btn btn-s btn-g',onclick:(function(en){return function(){en.st='approved';logAudit('Aprovação de inscrição','Equipe "'+en.tn+'" aprovada');R()}})(e)},'✓'));acts.appendChild(h('button',{'class':'btn btn-s btn-r',onclick:(function(en){return function(){en.st='rejected';logAudit('Rejeição de inscrição','Equipe "'+en.tn+'" rejeitada');R()}})(e)},'✕'));}
      else{acts.appendChild(h('button',{'class':'btn btn-s',style:{color:'var(--tx3)'},onclick:(function(en){return function(){en.st='pending';R()}})(e)},sl[e.st]));}
      acts.appendChild(h('button',{'class':'btn btn-s btn-r',title:'Remover',onclick:(function(en){return function(){if(confirm('Remover equipe "'+en.tn+'"?')){S.enr=S.enr.filter(function(x){return x.id!==en.id});R();}}})(e)},'🗑'));
      return h('tr',{},
        h('td',{style:{fontWeight:'600'}},e.tn),
        h('td',{},(cl&&cl.nm)||'—'),

    });

    var parts=bk.split('__');

      var hasMatch=rds.some(function(rd){return rd.m&&rd.m.length>0});

            msg+='\n\nFinalistas:';

              msg+='\n• '+tName(m.t1)+' × '+tName(m.t2);
            });
          }
          alert(msg);
          R();
        }catch(e){alert('Erro: '+e.message);console.error(e);}
      }},'🔄 Recalcular'));
    } else {
      // Subtle indicator that this bracket came from an imported file
      bar.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tx3)',display:'inline-flex',alignItems:'center',gap:'4px',padding:'4px 10px',background:'var(--bg3)',borderRadius:'12px',border:'1px solid var(--br)'}},
        '📥 Chaveamento importado'
      ));
    }
    bar.appendChild(h('button',{'class':'btn',style:{marginLeft:'auto'},onclick:function(){exportBracketByKey(bkey,S.bc)}},'Exportar'));
    if(bar.children.length)main.appendChild(bar);
  }

  // Title
  var spName=(sp2&&sp2.nm)||'Esporte';
  var serieLabel=S.bserie&&S.bserie!=='GERAL'?' - '+S.bserie:'';
  main.appendChild(h('div',{style:{fontWeight:'700',fontSize:'15px',marginBottom:'14px',color:'var(--tx)'}},
    spName+' \u2014 '+S.bc+serieLabel));

  // Bracket: show as match list (like dashboard)
  var rds=S.brk[bkey]&&S.brk[bkey][S.bc]?S.brk[bkey][S.bc]:[];
  if(!rds.length){
    main.appendChild(h('div',{'class':'card'},h('div',{'class':'card-b'},
      h('div',{'class':'em'},'Nenhum confronto para este filtro.'))));
  } else {
    // Detect if it's a round-robin (many matches in round 1, no bracket tree needed)
    var totalRounds=rds.length;
    var isRobin=rds[0]&&rds[0].m&&rds[0].m.length>4;
    // Detect group structure: has a label with 'Grupo A'/'Grupo B' or multiple classify rounds
    var hasGroups=rds.length>1&&rds[0].label&&rds[0].label.indexOf('Grupo')>=0;
    // Detect semi+final structure (use bracket tree)
    var hasSemiFinal=rds.length>1&&rds[0].label&&(rds[0].label.indexOf('Semi')>=0||rds[0].label==='Semifinal');

    if(!hasSemiFinal&&(isRobin||totalRounds===1||(totalRounds>1&&rds[0].m&&rds[0].m.length>=3)||hasGroups)){
      // ── Separate classify rounds from final/3rd rounds ──────────────────
      // Same robust detection as recomputeGroupWinners: check t1, t2, and
      // _slot1/_slot2 metadata (so the final stays a final even after one
      // of its GW_ slots was resolved to a real team id).
      var classifyRounds=[],finalRounds=[];
      rds.forEach(function(rd){
        var hasFinalSlot=rd.m.some(function(m){
          function isFinalSlot(v){
            return v&&(v.indexOf('GW_')===0||v.indexOf('W_')===0||v.indexOf('L_')===0);
          }
          return isFinalSlot(m.t1)||isFinalSlot(m.t2)||
                 isFinalSlot(m._slot1)||isFinalSlot(m._slot2)||
                 m.is3rd;
        });
        if(hasFinalSlot)finalRounds.push(rd);
        else classifyRounds.push(rd);
      });
      if(!classifyRounds.length){classifyRounds=rds;finalRounds=[];}

      // ── Build match list from classify rounds ────────────────────────────
      var allMatches=[];
      classifyRounds.forEach(function(rd){rd.m.forEach(function(m){
        var isPH1=!m.t1||m.t1.indexOf('PH_')===0;
        var isPH2=!m.t2||m.t2.indexOf('PH_')===0;
        if(!(isPH1&&isPH2))allMatches.push({m:m,rdLabel:rd.label||''});
      })});

      var tbl=allMatches.length?h('div',{'class':'card'}):h('div');
      var hdr=h('div',{style:{display:'grid',gridTemplateColumns:'40px 1fr 110px',gap:'8px',padding:'6px 12px',fontSize:'10px',fontWeight:'700',color:'var(--tx3)',textTransform:'uppercase',borderBottom:'1px solid var(--br)'}},
        h('span',{},'#'),h('span',{},'Confronto'),h('span',{style:{textAlign:'right'}},'Resultado'));
      tbl.appendChild(hdr);
      var tbody=h('div',{style:{maxHeight:'460px',overflowY:'auto'}});

      // Group header if multiple classify rounds (Grupo A, Grupo B)
      var lastLabel='';
      allMatches.forEach(function(item,idx){
        var m=item.m;
        if(classifyRounds.length>1&&item.rdLabel&&item.rdLabel!==lastLabel){
          lastLabel=item.rdLabel;
          tbody.appendChild(h('div',{style:{padding:'6px 12px',fontSize:'10px',fontWeight:'700',color:'var(--am)',background:'rgba(251,191,36,.08)',borderBottom:'1px solid var(--br)'}},item.rdLabel));
        }
        var n1=tName(m.t1),n2=tName(m.t2);
        var isPH1=!m.t1||m.t1.indexOf('PH_')===0,isPH2=!m.t2||m.t2.indexOf('PH_')===0;
        if(isPH1&&isPH2)return;
        var hasRes=m.s1!=null&&m.s2!=null;
        var can=(S.role==='admin'||S.role==='judge')&&!isPH1&&!isPH2;
        var row=h('div',{
          style:{display:'grid',gridTemplateColumns:'40px 1fr 110px',gap:'8px',padding:'8px 12px',borderBottom:'1px solid var(--br)',cursor:can?'pointer':'default',background:hasRes?'rgba(52,211,153,.04)':''},
          onclick:can?function(){S.mod={tp:'result',mid:m.id,bk:bkey,ct:S.bc};R()}:null
        });
        row.appendChild(h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},''+( idx+1)));

        // Team names with color dots
        var ECOLS={'ROXO':'#8b5cf6','VERDE':'#22c55e','VERMELHO':'#ef4444','AMARELO':'#eab308','AZUL':'#3b82f6','ROSA':'#ec4899','PRETO':'#374151','CINZA':'#6b7280','LARANJA':'#f97316'};
        function ec(nm){var col='var(--tx3)';var u=(nm||'').toUpperCase();Object.entries(ECOLS).forEach(function(e){if(u.indexOf(e[0])>=0)col=e[1]});return col;}
        function dot(nm){return h('span',{style:{width:'8px',height:'8px',borderRadius:'50%',background:ec(nm),flexShrink:'0',display:'inline-block'}});}
        var teams=h('div',{style:{display:'flex',alignItems:'center',gap:'5px',fontSize:'13px',flexWrap:'wrap'}});
        teams.appendChild(dot(n1));
        teams.appendChild(h('span',{style:{fontWeight:'500',color:'var(--tx)'}},n1));
        teams.appendChild(h('span',{style:{color:'var(--tx3)',fontSize:'11px'}},'x'));
        teams.appendChild(dot(n2));
        teams.appendChild(h('span',{style:{fontWeight:'500',color:'var(--tx)'}},n2));
        if(m._hora||m.lc)teams.appendChild(h('span',{style:{fontSize:'10px',color:'var(--tx3)',marginLeft:'6px'}},([m._hora,m.lc].filter(Boolean).join(' '))));
        row.appendChild(teams);

        var res=h('div',{style:{textAlign:'right',fontSize:'13px',fontWeight:'700',color:hasRes?'var(--gn)':'var(--tx3)'}});
        if(hasRes)res.innerHTML='<span style="font-family:\'Space Mono\',monospace;font-weight:800;font-size:16px;color:var(--gn)">'+m.s1+' x '+m.s2+'</span>';
        else res.innerHTML='<span style="font-size:10px">—</span>';
        row.appendChild(res);
        tbody.appendChild(row);
      });
      tbl.appendChild(tbody);
      main.appendChild(tbl);

      // ── Show final / 3rd place cards below the list ──────────────────────
      // Only show if classify matches are ALL completed OR final already has scores
      var allClassifyDone=classifyRounds.length>0&&classifyRounds.every(function(rd){
        return rd.m.every(function(m){
          var isPH1=!m.t1||m.t1.indexOf('PH_')===0||m.t1.indexOf('W_')===0||m.t1.indexOf('L_')===0||m.t1.indexOf('GW_')===0;
          var isPH2=!m.t2||m.t2.indexOf('PH_')===0||m.t2.indexOf('W_')===0||m.t2.indexOf('L_')===0||m.t2.indexOf('GW_')===0;
          return (isPH1&&isPH2)||(m.s1!=null&&m.s2!=null);
        });
      });
      var anyFinalHasScore=finalRounds.length&&finalRounds.some(function(rd){
        return rd.m.some(function(m){return m.s1!=null||m.s2!=null});
      });
      var showFinals=allClassifyDone||anyFinalHasScore;

      // ── STANDINGS TABLE (always available, even for pure rodizio) ─────────
      function buildStandingsTable(rd,label){
        var stats={};
        rd.m.forEach(function(mm){
          [mm.t1,mm.t2].forEach(function(t){
            if(t&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0){
              if(!stats[t])stats[t]={t:t,w:0,d:0,l:0,pts:0,gd:0,gp:0,ga:0};
            }
          });
          if(mm.s1==null||mm.s2==null)return;
          var t1=mm.t1,t2=mm.t2;
          if(!stats[t1]||!stats[t2])return;
          stats[t1].gp+=mm.s1;stats[t2].gp+=mm.s2;
          stats[t1].ga+=mm.s2;stats[t2].ga+=mm.s1;
          stats[t1].gd+=(mm.s1-mm.s2);stats[t2].gd+=(mm.s2-mm.s1);
          if(mm.isDraw||mm.s1===mm.s2){stats[t1].d++;stats[t2].d++;stats[t1].pts++;stats[t2].pts++;}
          else if(mm.w===t1){stats[t1].w++;stats[t1].pts+=3;stats[t2].l++;}
          else if(mm.w===t2){stats[t2].w++;stats[t2].pts+=3;stats[t1].l++;}
        });
        var tiebreakers=(S.tiebreakers||['gd','headtohead','gp']);
        var sorted=Object.values(stats).sort(function(a,b){
          if(b.pts!==a.pts)return b.pts-a.pts;
          for(var i=0;i<tiebreakers.length;i++){
            var tb=tiebreakers[i];
            if(tb==='gd'&&b.gd!==a.gd)return b.gd-a.gd;
            if(tb==='gp'&&b.gp!==a.gp)return b.gp-a.gp;
            if(tb==='headtohead'){
              var hth=null;
              rd.m.forEach(function(mm){if((mm.t1===a.t&&mm.t2===b.t)||(mm.t1===b.t&&mm.t2===a.t)){if(mm.s1!=null&&mm.s2!=null)hth=mm}});
              if(hth&&hth.w){if(hth.w===a.t)return -1;if(hth.w===b.t)return 1;}
            }
          }
          return 0;
        });
        if(!sorted.length)return{tbl:null,sorted:[]};
        var tbl=h('div',{'class':'card',style:{marginTop:'14px'}});
        tbl.appendChild(h('div',{'class':'card-h'},h('div',{'class':'card-t'},'📊 Classificação'+(label?' — '+label:''))));
        var ECOLS={'ROXO':'#8b5cf6','VERDE':'#22c55e','VERMELHO':'#ef4444','AMARELO':'#eab308','AZUL':'#3b82f6','ROSA':'#ec4899','PRETO':'#374151','CINZA':'#6b7280','LARANJA':'#f97316'};
        function ec(nm){var col='var(--tx3)';var u=(nm||'').toUpperCase();Object.entries(ECOLS).forEach(function(e){if(u.indexOf(e[0])>=0)col=e[1]});return col;}
        var hdr=h('div',{style:{display:'grid',gridTemplateColumns:'30px 1fr 50px 50px 50px 50px 60px 60px',gap:'4px',padding:'6px 12px',fontSize:'10px',fontWeight:'700',color:'var(--tx3)',textTransform:'uppercase',borderBottom:'1px solid var(--br)'}},
          h('span',{},'#'),h('span',{},'Equipe'),
          h('span',{style:{textAlign:'center'}},'V'),
          h('span',{style:{textAlign:'center'}},'E'),
          h('span',{style:{textAlign:'center'}},'D'),
          h('span',{style:{textAlign:'center'}},'GP'),
          h('span',{style:{textAlign:'center'}},'SG'),
          h('span',{style:{textAlign:'right',color:'var(--cy)'}},'PTS'));
        tbl.appendChild(hdr);
        sorted.forEach(function(s,i){
          var nm=tName(s.t);
          var posColor=i===0?'var(--am)':i===1?'#94a3b8':i===2?'#fb923c':'var(--tx3)';
          var row=h('div',{style:{display:'grid',gridTemplateColumns:'30px 1fr 50px 50px 50px 50px 60px 60px',gap:'4px',padding:'8px 12px',borderBottom:'1px solid var(--br)',background:i===0?'rgba(251,191,36,.06)':''}},
            h('span',{style:{fontWeight:'700',color:posColor}},(i+1)+'º'),
            h('span',{style:{display:'flex',alignItems:'center',gap:'6px',fontSize:'12px'}},
              h('span',{style:{width:'8px',height:'8px',borderRadius:'50%',background:ec(nm),flexShrink:'0'}}),
              h('span',{},nm)
            ),
            h('span',{style:{textAlign:'center',fontFamily:"'Space Mono'",fontSize:'12px'}},''+s.w),
            h('span',{style:{textAlign:'center',fontFamily:"'Space Mono'",fontSize:'12px',color:'var(--tx3)'}},''+s.d),
            h('span',{style:{textAlign:'center',fontFamily:"'Space Mono'",fontSize:'12px',color:'var(--tx3)'}},''+s.l),
            h('span',{style:{textAlign:'center',fontFamily:"'Space Mono'",fontSize:'12px'}},''+s.gp),
            h('span',{style:{textAlign:'center',fontFamily:"'Space Mono'",fontSize:'12px',color:s.gd>0?'var(--gn)':s.gd<0?'var(--rd)':'var(--tx3)'}},(s.gd>0?'+':'')+s.gd),
            h('span',{style:{textAlign:'right',fontFamily:"'Space Mono'",fontSize:'14px',fontWeight:'800',color:'var(--cy)'}},''+s.pts)
          );
          tbl.appendChild(row);
        });
        return{tbl:tbl,sorted:sorted};
      }

      // ── FINAL CLASSIFICATION CARD: 1º / 2º / 3º / 4º with position points ─
      // Shows position medals using sport-configured podium (sc.positions or p1..p8).
      // For rodizio: uses standings order. For groups+final: uses final result.
      // For semi+final: uses bracket tree results.
      var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,p5:3,p6:2,p7:1,p8:1,pWin:3,pWO:-2};
      function buildFinalClassificationCard(orderedTeamIds){
        if(!orderedTeamIds||!orderedTeamIds.length)return null;
        function pospts(rank){
          if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;
          return sc['p'+rank]||0;
        }
        var posLbl=['🥇 1º Lugar','🥈 2º Lugar','🥉 3º Lugar','4º Lugar','5º Lugar','6º Lugar','7º Lugar','8º Lugar'];
        var posCol=['#fbbf24','#94a3b8','#fb923c','#22d3ee','#a78bfa','#f472b6','#64748b','#475569'];
        var ECOLS={'ROXO':'#8b5cf6','VERDE':'#22c55e','VERMELHO':'#ef4444','AMARELO':'#eab308','AZUL':'#3b82f6','ROSA':'#ec4899','PRETO':'#374151','CINZA':'#6b7280','LARANJA':'#f97316'};
        function ec(nm){var col='var(--tx3)';var u=(nm||'').toUpperCase();Object.entries(ECOLS).forEach(function(e){if(u.indexOf(e[0])>=0)col=e[1]});return col;}
        var card=h('div',{'class':'card',style:{marginTop:'14px',border:'1px solid rgba(34,211,238,.3)'}});
        card.appendChild(h('div',{'class':'card-h',style:{background:'linear-gradient(135deg,rgba(34,211,238,.08),rgba(139,92,246,.06))'}},
          h('div',{'class':'card-t'},'🏆 Classificação Final')));
        var anyShown=false;
        orderedTeamIds.slice(0,8).forEach(function(tid,i){
          if(!tid)return;
          var nm=tName(tid);
          var pts=pospts(i+1);
          var row=h('div',{style:{display:'grid',gridTemplateColumns:'130px 1fr 80px',gap:'10px',alignItems:'center',padding:'10px 14px',borderBottom:'1px solid var(--br)',background:i===0?'rgba(251,191,36,.06)':i===1?'rgba(148,163,184,.05)':i===2?'rgba(251,146,60,.05)':''}},
            h('span',{style:{fontWeight:'700',fontSize:'12px',color:posCol[i]||'var(--tx3)'}},posLbl[i]||((i+1)+'º Lugar')),
            h('span',{style:{display:'flex',alignItems:'center',gap:'8px',fontSize:'14px',fontWeight:'600'}},
              h('span',{style:{width:'10px',height:'10px',borderRadius:'50%',background:ec(nm),flexShrink:'0'}}),
              h('span',{},nm)
            ),
            h('span',{style:{textAlign:'right',fontFamily:"'Space Mono'",fontSize:'14px',fontWeight:'800',color:pts>0?'var(--gn)':pts<0?'var(--rd)':'var(--tx3)'}},(pts>0?'+':'')+pts+' pts')
          );
          card.appendChild(row);
          anyShown=true;
        });
        return anyShown?card:null;
      }

      // Helper: extract ordered ids from finals (groups+final or semi+final)
      function getFinalOrderedIds(){
        if(!finalRounds.length)return null;
        // Find main final and 3rd place match in the LAST final round
        var lastFR=finalRounds[finalRounds.length-1];
        var finalM=lastFR.m.find(function(m){return!m.is3rd});
        var thirdM=lastFR.m.find(function(m){return m.is3rd});
        if(!finalM||!finalM.w)return null;
        function isReal(t){return t&&t!=='BYE'&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0}
        var first=isReal(finalM.w)?finalM.w:null;
        var second=null;
        if(first){
          var s=finalM.w===finalM.t1?finalM.t2:finalM.t1;
          if(isReal(s))second=s;
        }
        var third=null,fourth=null;
        if(thirdM&&thirdM.w&&isReal(thirdM.w)){
          third=thirdM.w;
          var f=thirdM.w===thirdM.t1?thirdM.t2:thirdM.t1;
          if(isReal(f))fourth=f;
        }
        return[first,second,third,fourth].filter(Boolean);
      }

      if(finalRounds.length&&showFinals){
        finalRounds.forEach(function(rd){
          var finalWrap=h('div',{style:{marginTop:'12px'}});
          var mainFinals=rd.m.filter(function(m){return!m.is3rd});
          var thirdFinals=rd.m.filter(function(m){return m.is3rd});

          // Detect round label for the colored band on each card.
          // The parser sets rd.label = 'Semifinal' / 'Final' / 'Quartas' etc.
          // For backwards compat, default to '🏆 Final' if label is missing/unknown.
          var rdLbl=(rd.label||'').toUpperCase();
          var roundLabel,roundColor;
          if(rdLbl.indexOf('SEMI')>=0){roundLabel='⚔️ Semifinal';roundColor='#a78bfa'}
          else if(rdLbl.indexOf('QUARTA')>=0){roundLabel='🥊 Quartas';roundColor='#34d399'}
          else if(rdLbl.indexOf('OITAVA')>=0){roundLabel='🥊 Oitavas';roundColor='#22d3ee'}
          else {roundLabel='🏆 Final';roundColor='#22d3ee'}

          function renderFinalMatch(m,label,color){
            var n1=tName(m.t1),n2=tName(m.t2);
            var ECOLS2={'ROXO':'#8b5cf6','VERDE':'#22c55e','VERMELHO':'#ef4444','AMARELO':'#eab308','AZUL':'#3b82f6','ROSA':'#ec4899','PRETO':'#374151','CINZA':'#6b7280','LARANJA':'#f97316'};
            function ec2(nm){var col='#64748b';var u=(nm||'').toUpperCase();Object.entries(ECOLS2).forEach(function(e){if(u.indexOf(e[0])>=0)col=e[1]});return col;}
            function dot2(nm){return h('span',{style:{width:'9px',height:'9px',borderRadius:'50%',background:ec2(nm),display:'inline-block',flexShrink:'0',marginRight:'6px'}});}
            var isPH1=!m.t1||m.t1.indexOf('PH_')===0||m.t1.indexOf('GW_')===0||m.t1.indexOf('W_')===0;
            var isPH2=!m.t2||m.t2.indexOf('PH_')===0||m.t2.indexOf('GW_')===0||m.t2.indexOf('W_')===0;
            var canClick=(S.role==='admin'||S.role==='judge')&&!isPH1&&!isPH2;
            var t1win=m.w===m.t1,t2win=m.w===m.t2;
            var card=h('div',{
              style:{border:'2px solid '+color,borderRadius:'10px',overflow:'hidden',cursor:canClick?'pointer':'default',marginBottom:'8px'},
              onclick:canClick?function(){S.mod={tp:'result',mid:m.id,bk:bkey,ct:S.bc};R()}:null
            });
            var hdrDiv=h('div',{style:{background:color+'22',padding:'6px 14px',fontSize:'10px',fontWeight:'700',color:color,textTransform:'uppercase',letterSpacing:'.08em',display:'flex',justifyContent:'space-between',alignItems:'center'}},
              label,
              ([m._hora,m.lc].filter(Boolean).join(' '))?h('span',{style:{fontWeight:'400',opacity:'.8',fontSize:'9px'}},([m._hora,m.lc].filter(Boolean).join(' '))):null
            );
            card.appendChild(hdrDiv);
            function teamRow(nm,isWin,score,isPH){
              return h('div',{style:{display:'flex',alignItems:'center',padding:'10px 14px',background:isWin?'rgba(52,211,153,.1)':'',borderTop:'1px solid rgba(255,255,255,.05)'}},
                dot2(nm),
                h('span',{style:{flex:'1',fontSize:'14px',fontWeight:isWin?'700':'400',color:isPH?'var(--tx3)':'var(--tx)'}},(isPH?'A definir':nm)),
                score!=null?h('span',{style:{fontFamily:"'Space Mono'",fontSize:'17px',fontWeight:'800',color:isWin?'var(--gn)':'var(--tx)',marginLeft:'12px'}},''+score):null
              );
            }
            card.appendChild(teamRow(n1,t1win,m.s1,isPH1));
            card.appendChild(teamRow(n2,t2win,m.s2,isPH2));
            return card;
          }

          mainFinals.forEach(function(m){finalWrap.appendChild(renderFinalMatch(m,roundLabel,roundColor))});
          thirdFinals.forEach(function(m){finalWrap.appendChild(renderFinalMatch(m,'🥉 3º Lugar','#f59e0b'))});
          main.appendChild(finalWrap);
        });

        // Standings tables for groups
        if(classifyRounds.length===1){
          var st=buildStandingsTable(classifyRounds[0],'');
          if(st&&st.tbl)main.appendChild(st.tbl);
        } else if(classifyRounds.length>1){
          classifyRounds.forEach(function(rd){
            var st=buildStandingsTable(rd,rd.label||'');
            if(st&&st.tbl)main.appendChild(st.tbl);
          });
        }

        // Final classification card (1º/2º/3º/4º from the actual final results)
        var orderedIds=getFinalOrderedIds();
        if(orderedIds&&orderedIds.length){
          var fcCard=buildFinalClassificationCard(orderedIds);
          if(fcCard)main.appendChild(fcCard);
        }
      } else if(finalRounds.length&&!showFinals){
        // Notice: final will be generated after classify
        main.appendChild(h('div',{style:{marginTop:'14px',padding:'14px 16px',background:'rgba(251,191,36,.08)',border:'1px dashed rgba(251,191,36,.3)',borderRadius:'10px',textAlign:'center',fontSize:'12px',color:'var(--am)'}},
          '⏳ A grande final será gerada automaticamente após todos os jogos serem registrados.'
        ));
      } else if(classifyRounds.length===1&&!finalRounds.length){
        // PURE RODIZIO (no final round): always show standings;
        // when all matches done, also show Classificação Final card.
        var stR=buildStandingsTable(classifyRounds[0],'');
        if(stR&&stR.tbl)main.appendChild(stR.tbl);
        if(allClassifyDone&&stR&&stR.sorted&&stR.sorted.length){
          var orderedR=stR.sorted.map(function(s){return s.t});
          var fcR=buildFinalClassificationCard(orderedR);
          if(fcR)main.appendChild(fcR);
        }
      } else if(classifyRounds.length>1&&!finalRounds.length){
        // Multiple classify rounds without final (uncommon but supported)
        classifyRounds.forEach(function(rd){

    ));
    c.appendChild(sFilterCard);

      crF=crF.filter(function(r){

      rkF=rkF.filter(function(r){

        return srSet[s];
      });
    }

    // Apply color grouping (after series filter)
    if(S.rkGroupByColor){

        var col=extractColor(r.nm)||'SEM COR';
        if(!byColor[col])byColor[col]={id:'color_'+col,nm:col,yr:'',p:0,_count:0,_classes:[]};
        byColor[col].p+=r.p;

        if(!byColorTeam[col])byColorTeam[col]={id:'color_team_'+col,tn:col,cn:col,sn:'(soma)',yr:'',w:0,p:0,wo:0,draws:0,_count:0};
        byColorTeam[col].p+=r.p;
        byColorTeam[col].w+=r.w;
        byColorTeam[col].wo+=r.wo||0;
        byColorTeam[col]._count++;
      });
      rkF=Object.values(byColorTeam).sort(function(a,b){return b.p-a.p});
    }
  }
  c.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}},
    h('div',{'class':'tabs',style:{marginBottom:'0'}},
      h('button',{'class':'tab'+(S.rt==='class'?' active':''),onclick:function(){S.rt='class';R()}},'Turmas'),
      h('button',{'class':'tab'+(S.rt==='team'?' active':''),onclick:function(){S.rt='team';R()}},'Equipes')
    ),
    S.role==='admin'?h('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap'}},
      h('button',{'class':'btn btn-s',onclick:function(){exportRankingResumido(crF,rkF)}},'📋 Exportar Resumido'),
      S.rkGroupByColor?null:h('button',{'class':'btn btn-p btn-s',onclick:function(){exportRankingDetail(crF)}},'📊 Exportar Detalhado')
    ):null
  ));

  var ls=S.rt==='class'?crF:rkF;
  var body=h('div',{style:{padding:'0'}});
  if(!ls.length)body.appendChild(h('div',{'class':'em'},'Sem resultados'));
  else ls.forEach(function(r,i){
    if(S.rt==='class'){
      // For grouped-by-color rows, skip the expand/detail (no per-class breakdown)
      if(S.rkGroupByColor&&r.id&&r.id.indexOf('color_')===0){
        var classes=(r._classes||[]).join(' · ');
        body.appendChild(h('div',{'class':'rr'},
          h('div',{'class':'rp '+(i<3?'r'+(i+1):'ro')},''+(i+1)),
          h('div',{style:{flex:'1'}},
            h('div',{'class':'rn'},'🎨 '+r.nm),
            h('div',{style:{fontSize:'10px',color:'var(--tx3)',marginTop:'2px'}},(r._count||0)+' turma(s)'+(classes?': '+classes:''))
          ),
          h('div',{'class':'rv'},r.p+' pts')
        ));
        return;
      }
      var detail=calcClassDetail(r.id);
      var isExpanded=S._expandedRk===r.id;
      var row=h('div',{style:{borderBottom:'1px solid var(--bd)'}});
      var mainRow=h('div',{'class':'rr',style:{cursor:'pointer',borderBottom:'none'},onclick:(function(rid){return function(){
        S._expandedRk=S._expandedRk===rid?null:rid;R();
      }})(r.id)},
        h('div',{'class':'rp '+(i<3?'r'+(i+1):'ro')},''+(i+1)),
        h('div',{style:{flex:'1'}},
          h('div',{'class':'rn'},r.nm+(r.yr?' · '+r.yr:'')),
          h('div',{style:{fontSize:'10px',color:'var(--tx3)',marginTop:'2px'}},detail.summary)
        ),
        h('div',{'class':'rv'},r.p+' pts'),
        h('span',{style:{fontSize:'10px',color:'var(--tx3)',marginLeft:'6px',transition:'transform .2s',transform:isExpanded?'rotate(180deg)':''}},'\u25BC')
      );
      row.appendChild(mainRow);
      if(isExpanded){
        var detailDiv=h('div',{style:{padding:'8px 16px 12px 48px',fontSize:'11px',color:'var(--tx2)',lineHeight:'1.8',background:'var(--bg3)',borderRadius:'0 0 var(--r) var(--r)'}});
        detail.lines.forEach(function(line){
          detailDiv.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',padding:'2px 0',borderBottom:'1px solid var(--bd)'}},
            h('span',{html:line.desc}),
            h('span',{style:{fontWeight:'700',color:line.pts>=0?'var(--gn)':'var(--rd)',fontFamily:"'Space Mono'",fontSize:'11px'}},(line.pts>=0?'+':'')+line.pts)
          ));

          'Total: '+r.p+' pts'+(discrepancy&&Math.abs(discrepancy)>0.1?' ('+lineSum+' detalhado + '+discrepancy.toFixed(0)+' outros)':'')

    }

}

// Calculate detailed point breakdown per class
function calcClassDetail(classId){
  var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,p5:3,p6:2,p7:1,p8:1,pWin:3,pWO:-2};
  // Helper: get position pts from new positions array or old p1..p8
  function pospts(rank){
    if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;
    return sc['p'+rank]||0;
  }
  var lines=[];
  var totalWins=0,totalWO=0;

  // Points from bracket: wins per sport
  var sportWins={};
  var sportPositions={};
  Object.entries(S.brk).forEach(function(e1){
    var bk=e1[0],cts=e1[1];
    var parts=bk.split('__');
    var siId=parts.length>1?parts[1]:parts[0];
    var sp=S.spt.find(function(s){return s.id===siId});
    var spName=sp?sp.nm:'?';
    Object.entries(cts).forEach(function(e2){
      var ct=e2[0],rs=e2[1];
      // Count wins, draws, losses, WOs for this class in this sport+category
      var wins=0,draws=0,losses=0,wos=0;
      rs.forEach(function(r){r.m.forEach(function(m){
        // Skip placeholder/structural slots
        function isPH(t){return!t||t==='BYE'||t.indexOf('PH_')===0||t.indexOf('W_')===0||t.indexOf('L_')===0||t.indexOf('GW_')===0}
        var hasResult=m.s1!=null&&m.s2!=null;
        if(hasResult&&!isPH(m.t1)&&!isPH(m.t2)){
          var isDraw=m.isDraw||m.s1===m.s2;
          if(isDraw){
            // Both teams in match get a draw
            [m.t1,m.t2].forEach(function(tid){
              var te=S.enr.find(function(e){return e.id===tid});
              var isOurClass=te?te.ci===classId:tid===classId;
              if(isOurClass)draws++;
            });
          } else if(m.w&&m.w!=='BYE'){
            var we=S.enr.find(function(e){return e.id===m.w});
            var isWinOurClass=we?we.ci===classId:m.w===classId;
            if(isWinOurClass){wins++}
            // Loser
            var loser=m.w===m.t1?m.t2:m.t1;
            if(!isPH(loser)){
              var le=S.enr.find(function(e){return e.id===loser});
              var isLoserOurClass=le?le.ci===classId:loser===classId;
              if(isLoserOurClass)losses++;
            }
          }
        }
        if(m.wo){
          var woe=S.enr.find(function(e){return e.id===m.wo});
          var isWOClass=woe?woe.ci===classId:m.wo===classId;
          if(isWOClass){wos++}
        }
      })});
      if(wins>0){
        var key=spName+' '+ct;
        var pWinV=(sc.pWin!=null?sc.pWin:3);
        var winPts=wins*pWinV;
        lines.push({desc:'⚽ <b>'+key+'</b> — '+wins+' vitória(s) × '+pWinV+' pts',pts:winPts});
        totalWins+=wins;
      }
      if(draws>0){
        var pDrawV=(sc.pDraw!=null?sc.pDraw:1);
        if(pDrawV!==0){
          lines.push({desc:'🤝 <b>'+spName+' '+ct+'</b> — '+draws+' empate(s) × '+pDrawV+' pts',pts:draws*pDrawV});
        }
      }
      if(losses>0){
        var pLossV=(sc.pLoss!=null?sc.pLoss:0);
        if(pLossV!==0){
          lines.push({desc:'❌ <b>'+spName+' '+ct+'</b> — '+losses+' derrota(s) × '+pLossV+' pts',pts:losses*pLossV});
        }
      }
      if(wos>0){
        lines.push({desc:'🔴 <b>'+spName+' '+ct+'</b> — '+wos+' W.O.',pts:wos*(sc.pWO||0)});
        totalWO+=wos;
      }
      // Position points (1st/2nd/3rd/4th from finals OR rodizio standings)
      if(rs.length){
        // RODIZIO mode: pure 1-round bracket with 3+ matches (relaxed threshold)
        var totalRnds=rs.length;
        var isRodizio=totalRnds===1&&rs[0]&&rs[0].m&&rs[0].m.length>=3;
        if(isRodizio){
          // Only count position points when ALL rodizio matches are complete.
          var allDoneRod=rs[0].m.every(function(m){
            var isPH1=!m.t1||m.t1.indexOf('PH_')===0||m.t1.indexOf('W_')===0||m.t1.indexOf('L_')===0||m.t1.indexOf('GW_')===0;
            var isPH2=!m.t2||m.t2.indexOf('PH_')===0||m.t2.indexOf('W_')===0||m.t2.indexOf('L_')===0||m.t2.indexOf('GW_')===0;
            return (isPH1&&isPH2)||(m.s1!=null&&m.s2!=null);
          });
          if(allDoneRod){
            var sortedRod=_rodizioStandings(rs[0]);
            var posLbl=['1º Lugar','2º Lugar','3º Lugar','4º Lugar','5º Lugar','6º Lugar','7º Lugar','8º Lugar'];
            sortedRod.forEach(function(st,pi){
              var tid=st.t;
              // Check if this is our class
              var te=S.enr.find(function(e){return e.id===tid});
              var isOurClass=te?te.ci===classId:tid===classId;
              if(isOurClass){
                var pts=pospts(pi+1);
                if(pts)lines.push({desc:'🏆 <b>'+spName+' '+ct+'</b> — '+posLbl[pi]+' (rodízio)',pts:pts});
              }
            });
          }
        }
        var finalRound=rs[rs.length-1];
        if(!isRodizio&&finalRound&&finalRound.m){
          var finalM=finalRound.m.find(function(m){return!m.is3rd});
          var thirdM=finalRound.m.find(function(m){return m.is3rd});
          if(finalM&&finalM.w){
            var checkPos=function(teamId,pos,label){
              if(!teamId||teamId==='BYE'||teamId.indexOf('W_')===0||teamId.indexOf('L_')===0||teamId.indexOf('PH_')===0||teamId.indexOf('GW_')===0)return;
              var te=S.enr.find(function(e){return e.id===teamId});
              var isOurClass=te?te.ci===classId:teamId===classId;
              if(isOurClass){
                var pts=pospts(pos);
                if(pts)lines.push({desc:'🏆 <b>'+spName+' '+ct+'</b> — '+label,pts:pts});
              }
            };
            checkPos(finalM.w,1,'1º Lugar');
            var second=finalM.w===finalM.t1?finalM.t2:finalM.t1;
            checkPos(second,2,'2º Lugar');
          }
          if(thirdM&&thirdM.w){
            var checkPos3=function(teamId,pos,label){
              if(!teamId||teamId==='BYE'||teamId.indexOf('W_')===0||teamId.indexOf('L_')===0||teamId.indexOf('PH_')===0)return;
              var te=S.enr.find(function(e){return e.id===teamId});
              var isOurClass=te?te.ci===classId:teamId===classId;
              if(isOurClass){
                var pts=pospts(pos);
                if(pts)lines.push({desc:'🥉 <b>'+spName+' '+ct+'</b> — '+label,pts:pts});
              }
            };
            checkPos3(thirdM.w,3,'3º Lugar');
            var fourth=thirdM.w===thirdM.t1?thirdM.t2:thirdM.t1;
            checkPos3(fourth,4,'4º Lugar');
          }
        }
      }
    });
  });

  // Podium points (individual sports) — uses _pospts (supports sc.positions)
  var posLabels=['','1º Lugar','2º Lugar','3º Lugar','4º Lugar','5º Lugar','6º Lugar','7º Lugar','8º Lugar'];
  (S.podiums||[]).forEach(function(pod){
    var sp=S.spt.find(function(s){return s.id===pod.sportId});
    var spName=sp?sp.nm:'Individual';
    for(var i=1;i<=8;i++){
      if(pod['p'+i]===classId){
        var pv=_pospts(i);
        if(pv)lines.push({desc:'🏅 <b>'+spName+(pod.category?' '+pod.category:'')+'</b> — '+posLabels[i],pts:pv});
      }
    }
  });

  // Recurso punishments
  (S.recursos||[]).forEach(function(rec){
    if(rec.punishClassId===classId&&rec.punishPts){
      lines.push({desc:'📝 <b>Recurso</b> — Punição'+(rec.adminResp?' ('+rec.adminResp+')':''),pts:rec.punishPts});
    }
  });

  var summary=totalWins+'V'+(totalWO?' '+totalWO+'WO':'')+(lines.length?' · '+lines.length+' item(ns)':'');
  return{lines:lines,summary:summary};
}

  var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,p5:3,p6:2,p7:1,p8:1,pWin:3,pWO:-2};

    rows+='</tbody></table></div>';
  });
  var T=_exportTheme();
  var out='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>Ranking Detalhado — '+S.ev.name+'</title>'
    +'<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Arial,sans-serif;background:'+T.bg+';color:'+T.tx+';padding:28px;min-height:100vh}'
