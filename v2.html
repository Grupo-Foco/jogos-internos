// DOCX FICHA DE INSCRIÇÃO IMPORT
// ══════════════════════════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════════════════════════
// XLSX FICHA DE INSCRIÇÃO IMPORT (same layout as DOCX, but rows in Excel cells)
// ══════════════════════════════════════════════════════════════════════════
// Read an XLSX ficha file and import its data using `turmaName` as the class.
// Returns a Promise that resolves with the result object {sports,teams,players,wrn}.
// Used both by single-file flow and by impFichasBatch for multi-upload.
function impFichaXlsxAuto(file,turmaName){
  return new Promise(function(resolve,reject){
    if(!XLSXMini){reject(new Error('parser XLSX não carregado'));return}
    var reader=new FileReader();
    reader.onload=function(ev){
      XLSXMini.read(ev.target.result).then(function(wb){
        if(!wb){reject(new Error('Não foi possível ler o XLSX'));return}
        var sN=Object.keys(wb);
        if(!sN.length){reject(new Error('Planilha sem abas'));return}
        var rows=wb[sN[0]];
        if(!rows||!rows.length){reject(new Error('Planilha vazia'));return}
        try{
          var result=parseFichaXlsxRows(rows,turmaName,'');
          resolve(result);
        }catch(e){reject(e)}
      }).catch(reject);
    };
    reader.onerror=function(){reject(new Error('Erro ao ler arquivo'))};
    reader.readAsArrayBuffer(file);
  });
}

// Legacy single-file flow: detect or prompt for turma, then call _Auto.
function impFichaXlsx(file){
  // Try to detect from filename first
  var fromName=detectTurmaFromFilename(file.name);
  // Fallback: detect from cell B1 of the file
  if(fromName){
    impFichaXlsxAuto(file,fromName).then(function(result){
      S._docxResult={
        msg:'✅ <b>Importação concluída!</b><br>📚 Turma: <b>'+fromName+'</b><br>⚽ '+result.sports+' esporte(s) criado(s)<br>📋 '+result.teams+' equipe(s) criada(s)<br>👥 '+result.players+' atleta(s) importado(s)',
        wrn:result.wrn
      };
      R();
    }).catch(function(e){alert('Erro: '+e.message)});
    return;
  }
  // Detection failed — prompt user
  if(!XLSXMini){alert('Erro: parser XLSX não carregado.');return}
  var reader=new FileReader();
  reader.onload=function(ev){
    XLSXMini.read(ev.target.result).then(function(wb){
      if(!wb){alert('Não foi possível ler o XLSX.');return}
      var sN=Object.keys(wb);
      if(!sN.length){alert('Planilha sem abas.');return}
      var rows=wb[sN[0]];
      if(!rows||!rows.length){alert('Planilha vazia.');return}
      var headerRow=rows[0]||[];
      var detectedTurma='';
      for(var i=0;i<headerRow.length;i++){
        var v=(headerRow[i]||'').toString().trim();
        if(/\d+\s*[ºoa]?\s*ANO/i.test(v)||/\d+\s*[ºaª]\s*S[ÉE]RIE/i.test(v)){
          detectedTurma=v;break;
        }
      }
      var turmaName=prompt('Qual o nome da turma?\n\n(Detectado da planilha: '+(detectedTurma||'?')+')',detectedTurma);
      if(!turmaName||!turmaName.trim()){alert('Nome da turma é obrigatório.');return}
      turmaName=turmaName.trim();
      var result=parseFichaXlsxRows(rows,turmaName,'');
      S._docxResult={
        msg:'✅ <b>Importação concluída!</b><br>📚 Turma: <b>'+turmaName+'</b><br>⚽ '+result.sports+' esporte(s) criado(s)<br>📋 '+result.teams+' equipe(s) criada(s)<br>👥 '+result.players+' atleta(s) importado(s)',
        wrn:result.wrn
      };
      R();
    }).catch(function(err){alert('Erro: '+err.message)});
  };
  reader.readAsArrayBuffer(file);
}

function parseFichaXlsxRows(rows,turmaName,turmaYear){
  var result={sports:0,teams:0,players:0,wrn:[]};
  turmaName=nrmYr(turmaName);
  turmaYear=nrmYr(turmaYear);

  // Find or create turma using kex() for robust matching
  var inputKey=kex(turmaName);
  var turma=S.cls.find(function(c){
    if(nrmYr(c.nm)===turmaName)return true;
    var ck=kex(c.nm);
    return ck&&ck.length>=2&&ck===inputKey;
  });
  if(!turma){
    // Brand new turma. yr defaults to the ano-evento (S.bay) so it joins the
    // same scope as bracket-imported turmas. The user-typed year is ignored
    // because mixing "6º Ano" with "JOGAR 2026" would split filters in two.
    var defaultYr=S.bay||uc(turmaYear)||'JOGOS 2026';
    turma={id:uid(),nm:uc(turmaName),yr:defaultYr,pr:'Manhã'};
    S.cls.push(turma);
    result.wrn.push('Turma "'+turmaName+'" criada automaticamente');
  }
  // Note: yr of existing turmas is preserved on purpose. Bracket import sets
  // yr to the event year (e.g. "JOGAR 2026") and that must stay intact —
  // overriding with the user-typed "6º Ano" would split the schedule across
  // two virtual years and create duplicate filter tabs in Chaveamento/Inscrições.

  var sportKeywords=['FUTEBOL','FUTSAL','HANDEBOL','HANDBALL','VÔLEI','VOLEI','VOLEIBOL','QUEIMADA','BASQUETE','BANDEIRINHA','XADREZ','PEBOLIM','FUTMESA','TENIS DE MESA','TÊNIS DE MESA','TENIS','TÊNIS','PING PONG','ATLETISMO','NATAÇÃO','NATACAO','CUBO','SOLETRANDO','MINECRAFT','ARTES','CONHECIMENTOS','DAMAS','REVEZAMENTO','50M','100M','PROVA','CESQUETE','QUEBRA-CABE','QUEBRA CABE','BALEADO','TACO','POLITICOS','POLÍTICOS','SLAM','BEISEBOL','BASEBALL'];

  function isSportHeader(text){
    if(!text)return false;
    var up=text.toString().toUpperCase().trim();
    if(up.length<3||up.length>120)return false;
    return sportKeywords.some(function(k){return up.indexOf(k)>=0});
  }
  // When a single cell holds multiple concatenated headers (common in fichas
  // with merged cells: "BANDEIRINHA (M)        BANDEIRINHA(F)") we need to
  // split it so each becomes its own sport+gender. Returns array of headers
  // found in the cell; ['the full text'] if it looks like a single header.
  function splitMultiHeader(text){
    if(!text)return[];
    var s=text.toString();
    // Heuristic: split on runs of 5+ spaces — an actual sport name doesn't
    // contain that much whitespace, but two side-by-side headers in a merged
    // cell will. After split, we only keep parts that themselves look like
    // sport headers.
    var parts=s.split(/\s{5,}/).map(function(p){return p.trim()}).filter(function(p){return p.length>0});
    if(parts.length<2)return[s.trim()];
    var headers=parts.filter(isSportHeader);
    return headers.length?headers:[s.trim()];
  }
  function parseSportName(text){
    var clean=text.toString().replace(/\*+/g,'').trim();
    var cat='Misto';
    var up=clean.toUpperCase();
    // Detect category by parenthetical or suffix. Includes single-letter forms:
    // (F) and (M) common in concise fichas. Order matters — check more specific
    // forms first.
    if(/\((\s*F(EM(ININO)?)?\.?\s*)\)|\bFEM(ININO)?\b|\bFEM\.?\)?$/i.test(up))cat='Feminino';
    else if(/\((\s*M(ASC(ULINO)?)?\.?\s*)\)|\bMASC(ULINO)?\b|\bMASC\.?\)?$/i.test(up))cat='Masculino';
    else if(/\bMISTO\b|\(MISTO\)|\(\s*X\s*\)/i.test(up))cat='Misto';
    else if(/\bLIVRE\b|\(LIVRE\)/i.test(up))cat='Misto';
    // Strip category words and abbreviated markers from name
    var sportName=clean
      .replace(/\(\s*(FEM\.?|MASC\.?|FEMININO|MASCULINO|MISTO|LIVRE|F|M|X)\s*\)/gi,'')
      .replace(/\s+(FEM\.?|MASC\.?|FEMININO|MASCULINO|MISTO|LIVRE)\b/gi,'')
      .replace(/[\.\s]+$/,'').replace(/\s+/g,' ').trim();
    return{name:sportName,category:cat};
  }
  function isPlayerName(text){
    if(!text)return false;
    var s=text.toString().trim();
    if(s.length<2||s.length>60)return false;
    if(isSportHeader(s))return false;
    if(/^OBSERVA[ÇC][ÕO]ES/i.test(s))return false;
    if(/^INSCRITO|^SORTEADO/i.test(s))return false;
    // Must contain at least one letter
    if(!/[A-Za-zÀ-ÿ]/.test(s))return false;
    return true;
  }

  // Parse vertically: each column may host one sport with players below.
  // We track current sport per column and accumulate players until a new sport
  // header (or empty cell sequence) appears in that column.
  // Skip merged-cell slaves (cells that received a copy of a header that
  // originated in another column) so we don't process the same header twice.
  var mergedMap=rows._merged||[];
  var maxCols=0;
  rows.forEach(function(r){if(r&&r.length>maxCols)maxCols=r.length});
  var colState=[];
  for(var ci=0;ci<maxCols;ci++)colState.push({sport:null,players:[]});

  function flushCol(idx){
    var s=colState[idx];
    if(s.sport&&s.players.length){
      saveSportTeam(s.sport,s.players,turma,result);
    }
    s.sport=null;s.players=[];
  }

  rows.forEach(function(row,rIdx){
    if(!row)return;
    var rowMerged=mergedMap[rIdx]||[];
    for(var ci=0;ci<maxCols;ci++){
      var v=row[ci];
      if(v==null||v==='')continue;
      // Skip cells that are merge-cell slaves (copies, not originals).
      if(rowMerged[ci])continue;
      var s=v.toString().trim();
      if(!s)continue;
      // A single cell may hold multiple sport headers concatenated by wide
      // whitespace gaps (e.g. when the user authored a merged cell containing
      // both "BANDEIRINHA (M)" and "BANDEIRINHA(F)"). We split and process
      // each header in the next available column.
      var multi=isSportHeader(s)?splitMultiHeader(s):null;
      if(multi&&multi.length>1){
        // Distribute headers across this column and the immediately following
        // empty (or merged-slave) columns of the same row, so they each get
        // their own sport state.
        for(var mi=0;mi<multi.length;mi++){
          var targetCol=ci+mi;
          if(targetCol>=maxCols)break;
          flushCol(targetCol);
          colState[targetCol].sport=parseSportName(multi[mi]);
        }
        continue;
      }
      if(isSportHeader(s)){
        // Flush previous sport in this column, start new
        flushCol(ci);
        colState[ci].sport=parseSportName(s);
      } else if(colState[ci].sport&&isPlayerName(s)){
        // Strip parenthetical annotations like (CR/CO)
        var name=s.replace(/\s*\(.*?\)\s*/g,'').trim();
        if(name&&name.length>1&&!colState[ci].players.find(function(p){return p.toLowerCase()===name.toLowerCase()})){
          colState[ci].players.push(name);
        }
      }
    }
  });
  // Flush remaining
  for(var fi=0;fi<maxCols;fi++)flushCol(fi);

  function saveSportTeam(sportInfo,players,turma,result){
    if(!sportInfo||!sportInfo.name)return;
    // Use canonical name to merge synonyms: FUTEBOL→FUT 7, VOLEIBOL→VOLEI, etc.
    // Comparison is also accent-insensitive so "Tênis de mesa" matches
    // "TENIS DE MESA" already in S.spt.
    var canonical=canonicalSportName(sportInfo.name);
    function _norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
    var canonLow=_norm(canonical);
    // Find existing sport by canonical name + gender (preferred)
    var sport=S.spt.find(function(s){
      return _norm(canonicalSportName(s.nm))===canonLow&&(s.gender||'')===sportInfo.category;
    });
    // Fallback: same canonical name + Misto (or no gender)
    if(!sport)sport=S.spt.find(function(s){
      return _norm(canonicalSportName(s.nm))===canonLow&&(!s.gender||s.gender==='Misto');
    });
    // Last fallback: same canonical name regardless of gender
    if(!sport)sport=S.spt.find(function(s){
      return _norm(canonicalSportName(s.nm))===canonLow&&!s.gender;
    });
    if(!sport){
      // No matching sport — create with canonical name (so future imports
      // from other ficha files alias correctly).
      sport={id:uid(),nm:canonical,gender:sportInfo.category,mn:1,mx:30,ct:[sportInfo.category],dur:14,tiebreakers:['goalDiff','yellowCards','redCards']};
      S.spt.push(sport);result.sports++;
    }
    if(sport.ct.indexOf(sportInfo.category)<0)sport.ct.push(sportInfo.category);
    var teamName=buildTeamName(turma.nm,sportInfo.category);
    var existing=S.enr.find(function(e){return e.ci===turma.id&&e.si===sport.id&&e.ct===sportInfo.category});
    if(existing){
      existing.tn=teamName;
      var oldPl=(existing.pl||'').split(',').map(function(p){return p.trim()}).filter(Boolean);
      players.forEach(function(p){
        if(!oldPl.find(function(op){return op.toLowerCase()===p.toLowerCase()}))oldPl.push(p);
      });
      existing.pl=oldPl.join(', ');
      result.wrn.push('Equipe "'+teamName+'" atualizada com '+players.length+' atleta(s)');
    } else {
      S.enr.push({id:uid(),tn:teamName,ci:turma.id,si:sport.id,ct:sportInfo.category,pl:players.join(', '),st:'approved'});
      result.teams++;
    }
    result.players+=players.length;
  }

  // Cleanup any leftover duplicates (defensive)
  dedupeEnrollments();
  logAudit('Importação XLSX (ficha)','Turma "'+turmaName+'": '+result.sports+' esporte(s), '+result.teams+' equipe(s), '+result.players+' jogador(es)');
  // Caller is responsible for setting S._docxResult and re-rendering.
  // (Batch import collects all results before rendering so the UI doesn't
  // flicker per-file.)
  result.turmaName=turmaName;
  return result;
}

// ══════════════════════════════════════════════════════════════════════════
// MULTI-FILE FICHA IMPORT (batch)
// ══════════════════════════════════════════════════════════════════════════
// Workflow:
//   1. User selects multiple .xlsx/.docx files (or drops a folder).
//   2. We detect the turma name from each filename and show a confirmation
//      modal with all detections side-by-side. Cells with failed detection
//      are highlighted; the user can edit any name before confirming.
//   3. On confirm, we process each file in sequence, accumulating results
//      to show a single summary at the end. UI re-renders only once.
function impFichasBatch(files){
  // Build the items list with auto-detected names
  var items=[];
  for(var i=0;i<files.length;i++){
    var f=files[i];
    var detected=detectTurmaFromFilename(f.name);
    items.push({
      file:f,
      filename:f.name,
      ext:(f.name||'').split('.').pop().toLowerCase(),
      turmaName:detected||'',
      detected:!!detected,
      status:'pending', // 'pending' | 'ok' | 'error'
      result:null,
      error:null
    });
  }
  S.mod={tp:'fichasBatch',items:items,running:false};
  R();
}

function mFichasBatch(c){
  var items=S.mod.items;
  var running=S.mod.running;
  var allDone=items.every(function(it){return it.status==='ok'||it.status==='error'});

  var ov=h('div',{'class':'ov'});
  ov.onclick=function(e){if(e.target===ov&&!running){S.mod=null;R()}};
  var close=function(){if(running)return;S.mod=null;R()};

  var md=h('div',{'class':'md',style:{maxWidth:'720px'}});
  md.appendChild(h('div',{'class':'md-h'},
    h('h3',{},'📄 Importar '+items.length+' fichas — confirmação'),
    h('button',{'class':'btn btn-s',onclick:close},'✕')
  ));

  var body=h('div',{style:{padding:'14px 20px',maxHeight:'60vh',overflowY:'auto'}});

  if(!running&&!allDone){
    body.appendChild(h('p',{style:{fontSize:'13px',color:'var(--tx2)',marginBottom:'14px',lineHeight:'1.5'}},
      'Confira o nome da turma detectado para cada arquivo. Você pode editar manualmente antes de importar. Linhas em ',
      h('span',{style:{color:'var(--am)',fontWeight:'700'}},'amarelo'),
      ' não tiveram a turma reconhecida automaticamente.'));
  }

  // Build the items table
  items.forEach(function(it,idx){
    var bg=it.status==='ok'?'rgba(52,211,153,.08)':
           it.status==='error'?'rgba(248,113,113,.08)':
           !it.detected?'rgba(251,191,36,.06)':'var(--c2)';
    var border=it.status==='ok'?'rgba(52,211,153,.3)':
               it.status==='error'?'rgba(248,113,113,.3)':
               !it.detected?'rgba(251,191,36,.3)':'var(--br)';
    var row=h('div',{style:{padding:'10px 12px',background:bg,border:'1px solid '+border,borderRadius:'8px',marginBottom:'6px',display:'grid',gridTemplateColumns:'24px 1fr 200px 80px',gap:'10px',alignItems:'center'}});
    // Status icon
    var icon=it.status==='ok'?'✅':it.status==='error'?'❌':!it.detected?'⚠️':'📄';
    row.appendChild(h('div',{style:{fontSize:'18px',textAlign:'center'}},icon));
    // Filename
    row.appendChild(h('div',{style:{fontSize:'12px',color:'var(--tx2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'},title:it.filename},
      h('div',{style:{fontFamily:'monospace',fontSize:'11px'}},it.filename),
      it.status==='error'?h('div',{style:{fontSize:'10px',color:'var(--rd)',marginTop:'2px'}},it.error||''):
      it.status==='ok'?h('div',{style:{fontSize:'10px',color:'var(--gn)',marginTop:'2px'}},'+'+(it.result?it.result.teams:0)+' equipes · '+(it.result?it.result.players:0)+' atletas'):null
    ));
    // Editable turma name input
    var inp=h('input',{
      'class':'fi',
      style:{fontSize:'12px',padding:'6px 8px',background:it.detected?'var(--bg3)':'rgba(251,191,36,.1)'},
      value:it.turmaName,
      placeholder:'Nome da turma',
      readonly:running||it.status==='ok',
      oninput:(function(idx2){return function(e){items[idx2].turmaName=e.target.value;items[idx2].detected=!!e.target.value.trim()}})(idx)
    });
    row.appendChild(inp);
    // Remove button
    row.appendChild(h('button',{
      'class':'btn btn-s btn-r',
      style:{padding:'4px 8px',fontSize:'11px'},
      disabled:running||it.status==='ok',
      onclick:(function(idx2){return function(){items.splice(idx2,1);if(!items.length){S.mod=null}R()}})(idx)
    },'Remover'));
    body.appendChild(row);
  });

  // Stats / summary footer
  if(running||allDone){
    var nOk=items.filter(function(it){return it.status==='ok'}).length;
    var nErr=items.filter(function(it){return it.status==='error'}).length;
    var totalSports=items.reduce(function(s,it){return s+(it.result?it.result.sports:0)},0);
    var totalTeams=items.reduce(function(s,it){return s+(it.result?it.result.teams:0)},0);
    var totalPlayers=items.reduce(function(s,it){return s+(it.result?it.result.players:0)},0);
    body.appendChild(h('div',{style:{marginTop:'14px',padding:'12px 14px',background:'var(--c2)',border:'1px solid var(--br)',borderRadius:'8px',fontSize:'13px'}},
      h('div',{style:{fontWeight:'700',marginBottom:'6px'}},allDone?'✅ Importação concluída':'⏳ Processando...'),
      h('div',{style:{fontSize:'11px',color:'var(--tx2)',lineHeight:'1.6'}},
        nOk+' arquivo(s) importado(s) com sucesso',
        nErr?h('span',{style:{color:'var(--rd)'}},' · '+nErr+' falharam'):null,
        h('br'),
        '⚽ '+totalSports+' esporte(s) novo(s) · 📋 '+totalTeams+' equipe(s) · 👥 '+totalPlayers+' atleta(s)'
      )

  }

  md.appendChild(body);

  // Footer buttons
  var footer=h('div',{style:{padding:'12px 20px',borderTop:'1px solid var(--br)',display:'flex',gap:'8px',justifyContent:'flex-end'}});
  if(!running&&!allDone){
    var pending=items.filter(function(it){return it.status==='pending'&&it.turmaName.trim()}).length;
    var missing=items.filter(function(it){return!it.turmaName.trim()}).length;
    if(missing){
      footer.appendChild(h('div',{style:{flex:'1',fontSize:'12px',color:'var(--am)',display:'flex',alignItems:'center'}},
        '⚠️ '+missing+' arquivo(s) sem turma — preencha ou remova'));
    } else {
      footer.appendChild(h('div',{style:{flex:'1',fontSize:'12px',color:'var(--tx3)',display:'flex',alignItems:'center'}},
        pending+' arquivo(s) prontos para importar'));
    }
    footer.appendChild(h('button',{'class':'btn btn-s',onclick:close},'Cancelar'));
    footer.appendChild(h('button',{
      'class':'btn btn-p',
      disabled:!pending||missing>0,
      onclick:function(){_runFichasBatch()}
    },'🚀 Importar '+pending+' arquivo(s)'));
  } else if(allDone){
    footer.appendChild(h('button',{'class':'btn btn-p',onclick:function(){
      // Stash a summary in S._docxResult so the Importações page shows it
      var nOk=items.filter(function(it){return it.status==='ok'}).length;
      var totalTeams=items.reduce(function(s,it){return s+(it.result?it.result.teams:0)},0);
      var totalPlayers=items.reduce(function(s,it){return s+(it.result?it.result.players:0)},0);
      var allWrn=[];
      items.forEach(function(it){if(it.result&&it.result.wrn)it.result.wrn.forEach(function(w){allWrn.push(it.turmaName+': '+w)})});
      S._docxResult={
        msg:'✅ <b>Importação em lote concluída!</b><br>'+nOk+' arquivo(s) processado(s) · 📋 '+totalTeams+' equipe(s) · 👥 '+totalPlayers+' atleta(s)',
        wrn:allWrn.slice(0,20)
      };
      S.mod=null;R();
    }},'Fechar'));
  } else {
    footer.appendChild(h('div',{style:{fontSize:'12px',color:'var(--am)'}},'⏳ Processando — não feche esta janela...'));
  }
  md.appendChild(footer);

  ov.appendChild(md);
  c.appendChild(ov);
}

// Sequential processor: walks items, calls the right Auto function for each.
function _runFichasBatch(){
  if(!S.mod||S.mod.tp!=='fichasBatch')return;
  S.mod.running=true;
  R();
  var items=S.mod.items;
  var idx=0;
  function next(){
    while(idx<items.length&&(items[idx].status!=='pending'||!items[idx].turmaName.trim()))idx++;
    if(idx>=items.length){
      S.mod.running=false;
      scheduleSave();
      R();
      return;
    }
    var it=items[idx];
    var fn=it.ext==='docx'?impDocxAuto:impFichaXlsxAuto;
    fn(it.file,it.turmaName).then(function(result){
      it.status='ok';it.result=result;idx++;R();
      // Yield to the browser between files so the UI updates
      setTimeout(next,30);
    }).catch(function(err){
      it.status='error';it.error=(err&&err.message)||String(err);idx++;R();
      setTimeout(next,30);
    });
  }
  next();
}

// Promise-based DOCX import — accepts turmaName directly. Used for batch.
function impDocxAuto(file,turmaName){
  return new Promise(function(resolve,reject){
    if(!file.name.endsWith('.docx')){reject(new Error('Arquivo deve ser .docx'));return}
    var reader=new FileReader();
    reader.onload=function(e){
      var arrayBuffer=e.target.result;
      function _doIt(){
        try{
          mammoth.convertToHtml({arrayBuffer:arrayBuffer}).then(function(mr){
            try{
              var result=parseDocxHtml(mr.value,turmaName,'');
              resolve(result);
            }catch(ex){reject(ex)}
          }).catch(reject);
        }catch(ex){reject(ex)}
      }
      if(typeof mammoth==='undefined'){
        // Lazy-load mammoth from CDN
        var script=document.createElement('script');
        script.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
        script.onload=_doIt;
        script.onerror=function(){reject(new Error('Não foi possível carregar mammoth.js'))};
        document.head.appendChild(script);
      } else {
        _doIt();
      }
    };
    reader.onerror=function(){reject(new Error('Erro ao ler arquivo'))};
    reader.readAsArrayBuffer(file);
  });
}

function impDocx(file){
  if(!file.name.endsWith('.docx')){alert('Arquivo deve ser .docx');return}
  // Try to detect turma name from filename first
  var fromName=detectTurmaFromFilename(file.name);
  if(fromName){
    impDocxAuto(file,fromName).then(function(result){
      S._docxResult={
        msg:'✅ <b>Importação concluída!</b><br>📚 Turma: <b>'+fromName+'</b><br>⚽ '+result.sports+' esporte(s) criado(s)<br>📋 '+result.teams+' equipe(s) criada(s)<br>👥 '+result.players+' atleta(s) importado(s)',
        wrn:result.wrn
      };
      R();
    }).catch(function(e){alert('Erro: '+e.message)});
    return;
  }
  // Detection failed — prompt user
  var turmaName=prompt('Qual o nome da turma?\n\nExemplo: 6º Ano E, 3º Ano A, etc.');
  if(!turmaName||!turmaName.trim()){alert('Nome da turma é obrigatório.');return}
  turmaName=turmaName.trim();
  impDocxAuto(file,turmaName).then(function(result){
    S._docxResult={
      msg:'✅ <b>Importação concluída!</b><br>📚 Turma: <b>'+turmaName+'</b><br>⚽ '+result.sports+' esporte(s) criado(s)<br>📋 '+result.teams+' equipe(s) criada(s)<br>👥 '+result.players+' atleta(s) importado(s)',
      wrn:result.wrn
    };
    R();
  }).catch(function(e){alert('Erro: '+e.message)});
}

// Parse DOCX tables from raw XML (no mammoth dependency)
function parseDocxTables(arrayBuffer,turmaName,turmaYear){
  try{
    var bytes=new Uint8Array(arrayBuffer);
    if(bytes[0]!==0x50||bytes[1]!==0x4B){alert('Não é um arquivo DOCX válido.');return}
    // Load mammoth from CDN dynamically
    var script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    script.onload=function(){
      mammoth.convertToHtml({arrayBuffer:arrayBuffer}).then(function(result){
        parseDocxHtml(result.value,turmaName,turmaYear);
      }).catch(function(err){
        alert('Erro ao processar: '+err.message);
      });
    };
    script.onerror=function(){
      alert('Não foi possível carregar a biblioteca mammoth. Verifique a conexão com a internet.');
    };
    document.head.appendChild(script);
  }catch(err){
    alert('Erro ao processar arquivo: '+err.message);
  }
}

function parseDocxHtml(html,turmaName,turmaYear){
  var div=document.createElement('div');
  div.innerHTML=html;
  var tables=div.querySelectorAll('table');
  if(!tables.length){alert('Nenhuma tabela encontrada no documento.');return}

  var result={sports:0,teams:0,players:0,wrn:[]};

  // Normalize turmaName to avoid duplicates from spacing/degree-char variations
  turmaName=nrmYr(turmaName);
  turmaYear=nrmYr(turmaYear);

  // Find or create turma — uses kex() for robust matching:
  // "6º A" == "6º Ano A" == "6º ANO A" all collapse to key "6A".
  // This prevents creating a duplicate turma when the bracket import
  // already created one with a different name format.
  var inputKey=kex(turmaName);
  var turma=S.cls.find(function(c){
    if(nrmYr(c.nm)===turmaName)return true;
    var ck=kex(c.nm);
    return ck&&ck.length>=2&&ck===inputKey;
  });
  if(!turma){
    // New turma: default yr to event year (S.bay) to keep it in the same
    // scope as bracket-imported turmas. Avoids splitting filters into
    // "JOGAR 2026" vs "6º ANO".
    var defaultYr=S.bay||uc(turmaYear)||'JOGOS 2026';
    turma={id:uid(),nm:uc(turmaName),yr:defaultYr,pr:'Manhã'};
    S.cls.push(turma);
    result.wrn.push('Turma "'+turmaName+'" criada automaticamente');
  }
  // Existing turmas keep their yr (set by bracket import). Overriding it
  // would split the school's data across two virtual years.
  
  // Known sport keywords to detect headers
  var sportKeywords=['FUTEBOL','FUTSAL','HANDEBOL','HANDBALL','VÔLEI','VOLEI','VOLEIBOL','QUEIMADA','BASQUETE','BANDEIRINHA','XADREZ','PEBOLIM','FUTMESA','TENIS DE MESA','TÊNIS DE MESA','TENIS','TÊNIS','PING PONG','ATLETISMO','NATAÇÃO','NATACAO','CUBO','SOLETRANDO','MINECRAFT','ARTES','CONHECIMENTOS','DAMAS','REVEZAMENTO','50M','100M','PROVA','CESQUETE','QUEBRA-CABE','QUEBRA CABE','BALEADO','TACO'];
  
  function isSportHeader(text){
    if(!text)return false;
    var up=text.toUpperCase().trim();
    return sportKeywords.some(function(k){return up.indexOf(k)>=0});
  }
  
  function parseSportName(text){
    var clean=text.replace(/\*+/g,'').trim();
    var cat='Misto';
    var up=clean.toUpperCase();
    // Same detection used in XLSX parser — includes abbreviated (F)/(M) forms
    if(/\((\s*F(EM(ININO)?)?\.?\s*)\)|\bFEM(ININO)?\b|\bFEM\.?\)?$/i.test(up))cat='Feminino';
    else if(/\((\s*M(ASC(ULINO)?)?\.?\s*)\)|\bMASC(ULINO)?\b|\bMASC\.?\)?$/i.test(up))cat='Masculino';
    else if(/\bMISTO\b|\(MISTO\)|\(\s*X\s*\)/i.test(up))cat='Misto';
    else if(/\bLIVRE\b|\(LIVRE\)/i.test(up))cat='Misto';
    // Strip category markers from sport name
    var sportName=clean
      .replace(/\(\s*(FEM\.?|MASC\.?|FEMININO|MASCULINO|MISTO|LIVRE|F|M|X)\s*\)/gi,'')
      .replace(/\s+(FEM\.?|MASC\.?|FEMININO|MASCULINO|MISTO|LIVRE)\b/gi,'')
      .replace(/[\.\s]+$/,'').replace(/\s+/g,' ').trim();
    return{name:sportName,category:cat};
  }
  
  tables.forEach(function(table){
    var rows=table.querySelectorAll('tr');
    if(!rows.length)return;
    
    // Current sport for each column
    var colSports=[];
    var colPlayers=[];
    var numCols=0;
    
    rows.forEach(function(tr){
      var cells=tr.querySelectorAll('td');
      if(!cells.length)return;
      if(cells.length>numCols)numCols=cells.length;
      
      // Initialize arrays if needed
      while(colSports.length<cells.length){colSports.push(null);colPlayers.push([])}
      
      for(var ci=0;ci<cells.length;ci++){
        var text=cells[ci].textContent.trim();
        if(!text)continue;
        
        if(isSportHeader(text)){
          // Save previous sport data before switching
          if(colSports[ci]&&colPlayers[ci].length){
            saveSportTeam(colSports[ci],colPlayers[ci],turma,result);
          }
          colSports[ci]=parseSportName(text);
          colPlayers[ci]=[];
        } else if(colSports[ci]){
          // It's a player name
          var name=text.replace(/\s*\(.*?\)\s*/g,'').trim(); // Remove (CR/CO) etc
          if(name&&name.length>1)colPlayers[ci].push(name);
        }
      }
    });
    
    // Save remaining
    for(var ci=0;ci<colSports.length;ci++){
      if(colSports[ci]&&colPlayers[ci].length){
        saveSportTeam(colSports[ci],colPlayers[ci],turma,result);
      }
    }
  });
  
  function saveSportTeam(sportInfo,players,turma,result){
    // Use canonical name to merge synonyms (FUTEBOL→FUT 7, VOLEIBOL→VOLEI, etc.)
    // and accent-insensitive comparison.
    var canonical=canonicalSportName(sportInfo.name);
    function _norm(s){return(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim()}
    var canonLow=_norm(canonical);
    var sport=S.spt.find(function(s){
      return _norm(canonicalSportName(s.nm))===canonLow&&(s.gender||'')===sportInfo.category;
    });
    if(!sport)sport=S.spt.find(function(s){
      return _norm(canonicalSportName(s.nm))===canonLow&&(!s.gender||s.gender==='Misto');
    });
    if(!sport)sport=S.spt.find(function(s){
      return _norm(canonicalSportName(s.nm))===canonLow&&!s.gender;
    });
    if(!sport){
      sport={id:uid(),nm:canonical,gender:sportInfo.category,mn:2,mx:20,ct:[sportInfo.category],dur:14,tiebreakers:['goalDiff','yellowCards','redCards']};
      S.spt.push(sport);
      result.sports++;
    }
    // Ensure category exists
    if(sport.ct.indexOf(sportInfo.category)<0&&sportInfo.category==='Misto'){
      sport.ct.push('Misto');
    }
    
    // Create team name: "7º Ano A" → "7º A (F)"
    var teamName=buildTeamName(turma.nm,sportInfo.category);
    
    // Check if team already exists for this turma+sport+category
    var existing=S.enr.find(function(e){
      return e.ci===turma.id&&e.si===sport.id&&e.ct===sportInfo.category;
    });
    
    if(existing){
      // Update players AND team name
      existing.tn=teamName; // Always update name to latest format
      var oldPl=(existing.pl||'').split(',').map(function(p){return p.trim()}).filter(function(p){return p});
      players.forEach(function(p){
        if(!oldPl.find(function(op){return op.toLowerCase()===p.toLowerCase()}))oldPl.push(p);
      });
      existing.pl=oldPl.join(', ');
      result.wrn.push('Equipe "'+teamName+'" atualizada com '+players.length+' jogadores');
    } else {
      S.enr.push({
        id:uid(),
        tn:teamName,
        ci:turma.id,
        si:sport.id,
        ct:sportInfo.category,
        pl:players.join(', '),
        st:'approved'
      });
      result.teams++;
    }
    result.players+=players.length;
  }
  
  logAudit('Importação DOCX','Turma "'+turmaName+'": '+result.sports+' esporte(s) criado(s), '+result.teams+' equipe(s), '+result.players+' jogador(es)');
  // Caller is responsible for setting S._docxResult and re-rendering.
  result.turmaName=turmaName;
  return result;
}

// IMPORT BRACKET MODAL — re-import bracket file from Dashboard
// ══════════════════════════════════════════════════════════════════════════
function mImportBrk(root){
  // step: 'choose' (file picker) | 'preview' (show parsed) | 'mode' (preserve/replace)
  if(!S.mod.step)S.mod.step='choose';
  if(!S.mod.parsed)S.mod.parsed=null;
  if(!S.mod.err)S.mod.err='';

  var ov=h('div',{'class':'ov'});
  ov.onclick=function(e){if(e.target===ov){S.mod=null;R()}};
  var md=h('div',{'class':'md',style:{maxWidth:'620px'}});

  function close(){S.mod=null;R()}

  function handleFile(file){
    if(!file)return;
    var ext=(file.name||'').split('.').pop().toLowerCase();
    if(ext==='html'){
      var r=new FileReader();
      r.onload=function(ev){
        try{
          var p=parseJimHtmlForBrackets(ev.target.result);
          if(!p||!Object.keys(p.brackets).length){S.mod.err='HTML sem confrontos detectados.';mImportBrk(root);return}
          S.mod.parsed=p;S.mod.err='';S.mod.step='preview';mImportBrk(root);
        }catch(e){S.mod.err='Erro ao ler HTML: '+e.message;mImportBrk(root)}
      };
      r.readAsText(file);
    } else if(ext==='xlsx'||ext==='xls'){
      var r2=new FileReader();
      r2.onload=function(ev){
        try{
          XLSXMini.read(ev.target.result).then(function(wb){
            if(!wb){S.mod.err='Não foi possível ler o XLSX.';mImportBrk(root);return}
            var p=parseJimXlsx(wb);
            if(!p||!Object.keys(p.brackets).length){S.mod.err='Planilha sem confrontos. Verifique colunas EQUIPE 1, EQUIPE 2, MODALIDADE, FASE.';mImportBrk(root);return}
            S.mod.parsed=p;S.mod.err='';S.mod.step='preview';mImportBrk(root);
          }).catch(function(e){S.mod.err='Erro: '+e.message;mImportBrk(root)});
        }catch(e){S.mod.err='Erro ao ler XLSX: '+e.message;mImportBrk(root)}
      };
      r2.readAsArrayBuffer(file);
    } else if(ext==='docx'){
      // Word — Arena format. Ask for ambient label first (COLÉGIO / GOIÁS / custom).
      // Reuses the file: we save the bytes so we can re-process after the prompt.
      var r3=new FileReader();
      r3.onload=function(ev){
        S.mod._docxBuffer=ev.target.result;
        S.mod._docxFilename=file.name;
        // Default ambient guess based on filename
        var lower=(file.name||'').toLowerCase();
        var guess='COL\u00c9GIO';
        if(lower.indexOf('goias')>=0||lower.indexOf('goi\u00e1s')>=0||lower.indexOf('goi%c3%a1s')>=0)guess='GOI\u00c1S';
        S.mod._docxAmbiente=guess;
        S.mod.step='docx-ambiente';
        mImportBrk(root);
      };
      r3.readAsArrayBuffer(file);
    } else if(ext==='pdf'){
      // PDF — Arena format. Same flow as DOCX: ask ambient, then parse.
      var r4=new FileReader();
      r4.onload=function(ev){
        S.mod._pdfBuffer=ev.target.result;
        S.mod._pdfFilename=file.name;
        var lower=(file.name||'').toLowerCase();
        var guess='COL\u00c9GIO';
        if(lower.indexOf('goias')>=0||lower.indexOf('goi\u00e1s')>=0||lower.indexOf('goi%c3%a1s')>=0)guess='GOI\u00c1S';
        S.mod._pdfAmbiente=guess;
        S.mod.step='pdf-ambiente';
        mImportBrk(root);
      };
      r4.readAsArrayBuffer(file);
    } else {
      S.mod.err='Use arquivo .html, .xlsx, .docx ou .pdf';mImportBrk(root);
    }
  }

  // Load mammoth.js dynamically and parse docx with the chosen ambient label.
  function processDocxWithAmbiente(ambiente){
    var buf=S.mod._docxBuffer;if(!buf)return;
    function doParse(){
      try{
        window.mammoth.convertToHtml({arrayBuffer:buf}).then(function(result){
          try{
            var p=parseArenaDocxHtml(result.value,ambiente);
            if(!p||!Object.keys(p.brackets).length){
              S.mod.err='DOCX sem confrontos detectados. Verifique se o arquivo segue o formato JOGAR (tabela com HORÁRIO/JOGO/ETAPA/GÊNERO/TURMA).';
              S.mod.step='choose';mImportBrk(root);return;
            }
            if(p._parseErrors&&p._parseErrors.length){
              console.warn('Arena parser warnings:',p._parseErrors);
            }
            S.mod.parsed=p;S.mod.err='';S.mod.step='preview';mImportBrk(root);
          }catch(e){S.mod.err='Erro ao processar DOCX: '+e.message;S.mod.step='choose';mImportBrk(root)}
        }).catch(function(e){
          S.mod.err='Erro ao ler DOCX: '+e.message;S.mod.step='choose';mImportBrk(root);
        });
      }catch(e){S.mod.err='Erro: '+e.message;S.mod.step='choose';mImportBrk(root)}
    }
    if(typeof window.mammoth==='undefined'){
      // Lazy-load mammoth from CDN
      var sc=document.createElement('script');
      sc.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
      sc.onload=doParse;
      sc.onerror=function(){
        S.mod.err='N\u00e3o foi poss\u00edvel carregar a biblioteca para ler DOCX. Verifique sua conex\u00e3o com a internet.';
        S.mod.step='choose';mImportBrk(root);
      };
      document.head.appendChild(sc);
    } else {
      doParse();
    }
  }

  // Load PDF.js dynamically and parse PDF with the chosen ambient label.
  function processPdfWithAmbiente(ambiente){
    var buf=S.mod._pdfBuffer;if(!buf)return;
    _loadPdfJsAndExtract(buf,function(err,pages){
      if(err){
        S.mod.err='Erro ao ler PDF: '+(err.message||err);
        S.mod.step='choose';mImportBrk(root);return;
      }
      try{
        var p=parseArenaPdfPages(pages,ambiente);
        if(!p||!Object.keys(p.brackets).length){
          // Maybe the PDF only has activity-without-confronto pages
          // (Conhecimentos Gerais, etc). In that case, sports may have been
          // registered but no brackets. Still useful, so accept it.
          if(p&&p.spt&&p.spt.length){
            S.mod.parsed=p;S.mod.err='';S.mod.step='preview';mImportBrk(root);return;
          }
          S.mod.err='PDF sem confrontos detectados. Verifique se o arquivo segue o formato JOGAR (tabela com HORÁRIO/JOGO/ETAPA/GÊNERO/TURMA).';
          S.mod.step='choose';mImportBrk(root);return;
        }
        if(p._parseErrors&&p._parseErrors.length){
          console.warn('Arena PDF parser warnings:',p._parseErrors);
        }
        S.mod.parsed=p;S.mod.err='';S.mod.step='preview';mImportBrk(root);
      }catch(e){
        S.mod.err='Erro ao processar PDF: '+e.message;
        S.mod.step='choose';mImportBrk(root);
      }
    });
  }

  // Apply imported brackets. mode = 'replace' (zero scores) | 'preserve' (keep matching results)
  function applyImport(mode){
    var parsed=S.mod.parsed;if(!parsed)return;
    var year=S.bay||(getAnos()[0])||'JOGOS 2026';
    // Convert via existing helper, but extract only the cls/spt/enr/brk we need (we don't reset other state)
    var newState=jimBracketDataToSchoolState(parsed,'',year);

    // ── Build score lookup from CURRENT state, by (turma1+turma2+sport+gender+serie) key ─
    // Used in 'preserve' mode to carry forward results.
    function matchKey(t1,t2,sp,gen,serie){
      var pair=[t1||'',t2||''].sort().join('|');
      return pair+'|'+(sp||'')+'|'+(gen||'')+'|'+(serie||'');
    }
    var scoreCache={};
    if(mode==='preserve'){
      Object.entries(S.brk).forEach(function(bke){
        var bk=bke[0],cts=bke[1];
        var parts=bk.split('__');
        var spId=parts[1]||'';
        var serie=parts[2]||'GERAL';
        Object.entries(cts).forEach(function(e2){
          var gen=e2[0],rds=e2[1];
          rds.forEach(function(rd){rd.m.forEach(function(m){
            if(m.s1==null||m.s2==null)return;
            // Only cache real-team matches
            function isReal(t){return t&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0&&t!=='BYE'}
            if(!isReal(m.t1)||!isReal(m.t2))return;
            var t1nm=tName(m.t1),t2nm=tName(m.t2);
            scoreCache[matchKey(t1nm,t2nm,spId,gen,serie)]={s1:m.s1,s2:m.s2,w:m.w,isDraw:m.isDraw,cards:m.cards,wo:m.wo};
          })});
        });
      });
    }

    // ── REPLACE MODE: wipe competition state up-front for a clean slate ────
    // Preserves configurations: pontuação, tiebreakers, logins, recursos, audit, app info.
    if(mode==='replace'){
      S.cls=[];
      S.spt=[];
      S.locs=[];
      S.enr=[];
      S.brk={};
      S.podiums=[];
    }

    // ── Merge classes (don't replace — add only NEW turmas) ─────────────────
    var existingClsByName={};
    S.cls.forEach(function(c){existingClsByName[(c.nm||'').toUpperCase().trim()]=c});
    // Build mapping from imported turma id -> existing turma id (when names match)
    var idMap={};
    newState.cls.forEach(function(nc){
      var key=(nc.nm||'').toUpperCase().trim();
      if(existingClsByName[key])idMap[nc.id]=existingClsByName[key].id;
      else {S.cls.push(nc);idMap[nc.id]=nc.id;existingClsByName[key]=nc;}
    });

    // ── Merge sports (add only NEW) ────────────────────────────────────────
    // Key includes gender: "FUTEBOL|Masculino" and "FUTEBOL|Feminino" are
    // different sport entries that the parser produces, and merging them
    // collapses bracket keys catastrophically.
    var existingSptByName={};
    S.spt.forEach(function(sp){
      var k=(sp.nm||'').toUpperCase().trim()+'|'+(sp.gender||'Misto');
      existingSptByName[k]=sp;
    });
    var spIdMap={};
    newState.spt.forEach(function(nsp){
      var key=(nsp.nm||'').toUpperCase().trim()+'|'+(nsp.gender||'Misto');
      if(existingSptByName[key]){
        spIdMap[nsp.id]=existingSptByName[key].id;
        // Merge categories (defensive — usually identical)
        var existing=existingSptByName[key];
        nsp.ct.forEach(function(c){if(existing.ct.indexOf(c)<0)existing.ct.push(c)});
      } else {
        S.spt.push(nsp);spIdMap[nsp.id]=nsp.id;existingSptByName[key]=nsp;
      }
    });

    // ── Merge venues (add only NEW) ────────────────────────────────────────
    if(newState.locs&&newState.locs.length){
      var existingLocsByName={};
      (S.locs||[]).forEach(function(l){existingLocsByName[(l.nm||'').toUpperCase().trim()]=l});
      newState.locs.forEach(function(nl){
        var key=(nl.nm||'').toUpperCase().trim();
        if(!existingLocsByName[key]){
          if(!S.locs)S.locs=[];
          S.locs.push(nl);existingLocsByName[key]=nl;
        }
      });
    }

    // ── Merge enrollments (add only NEW for the imported brackets) ─────────
    var existingEnrKey={};
    S.enr.forEach(function(e){existingEnrKey[e.ci+'|'+e.si+'|'+e.ct]=e});
    newState.enr.forEach(function(ne){
      var ci=idMap[ne.ci]||ne.ci;
      var si=spIdMap[ne.si]||ne.si;
      var k=ci+'|'+si+'|'+ne.ct;
      if(!existingEnrKey[k]){
        ne.ci=ci;ne.si=si;
        S.enr.push(ne);existingEnrKey[k]=ne;
      }
    });

    // ── Build new brackets with id-mapped turmas ────────────────────────────
    Object.entries(newState.brk).forEach(function(bke){
      var bk=bke[0],cts=bke[1];
      // Remap bracket key to use existing sport id
      var parts=bk.split('__');
      var bkYear=parts[0],spId=parts[1],serie=parts[2]||'GERAL';
      var newSpId=spIdMap[spId]||spId;
      var newBk=bkYear+'__'+newSpId+(serie&&serie!=='GERAL'?'__'+serie:'__GERAL');

      // Remap turma ids in matches
      var newCts={};
      Object.entries(cts).forEach(function(e2){
        var gen=e2[0],rds=e2[1];
        var newRds=rds.map(function(rd){
          return Object.assign({},rd,{m:rd.m.map(function(m){
            var nm=Object.assign({},m);
            if(nm.t1&&idMap[nm.t1])nm.t1=idMap[nm.t1];
            if(nm.t2&&idMap[nm.t2])nm.t2=idMap[nm.t2];
            // In preserve mode, restore score from cache if confronto matches
            if(mode==='preserve'){
              function isReal(t){return t&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0&&t!=='BYE'}
              if(isReal(nm.t1)&&isReal(nm.t2)){
                var t1nm=tName(nm.t1),t2nm=tName(nm.t2);
                var ck=matchKey(t1nm,t2nm,newSpId,gen,serie);
                var cached=scoreCache[ck];
                if(cached){
                  nm.s1=cached.s1;nm.s2=cached.s2;nm.w=cached.w;
                  nm.isDraw=cached.isDraw;
                  if(cached.cards)nm.cards=cached.cards;
                  if(cached.wo)nm.wo=cached.wo;
                }
              }
            }
            return nm;
          })});
        });
        newCts[gen]=newRds;
      });
      S.brk[newBk]=newCts;
    });

    // Recompute group winners for all new brackets (resolves GW_ slots)
    Object.keys(S.brk).forEach(function(bk){
      Object.keys(S.brk[bk]).forEach(function(ct){
        try{recomputeGroupWinners(bk,ct)}catch(e){}
      });
    });

    var summary=Object.keys(newState.brk).length+' chaveamento(s) importado(s).';
    if(mode==='preserve'){
      var preservedCount=Object.values(scoreCache).length;
      summary+=' '+preservedCount+' resultado(s) anteriores foram mantidos onde houve coincidência de confrontos.';
    }
    logAudit('Import. chaveamento','via Dashboard ('+(mode==='preserve'?'preservar':'substituir')+')');
    S.mod=null;
    R();
    scheduleSave();
    setTimeout(function(){alert('✅ '+summary)},100);
  }

    h('div',{'class':'md-h'},h('div',{'class':'md-t'},'🕐 Agendamento Automático'),h('button',{'class':'btn btn-s',onclick:close},'✕')),
    h('div',{'class':'md-b'},
      h('div',{style:{fontSize:'12px',color:'var(--tx2)',marginBottom:'14px'}},
        'Distribui horários automaticamente respeitando conflitos entre esportes.'
      ),
      h('div',{'class':'fr'},
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Data'),h('input',{'class':'fi',type:'date',value:f.date,oninput:function(e){f.date=e.target.value;buildPreview()}})),
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Início'),h('input',{'class':'fi',type:'time',value:f.startTime,oninput:function(e){f.startTime=e.target.value;buildPreview()}}))
      ),
      h('div',{'class':'fr'},
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Duração (min)'),durInp),

        (function(){

            // No venues registered: free text
            return h('input',{'class':'fi',value:f.location,placeholder:'Ex: Campo Society',oninput:function(e){f.location=e.target.value;buildPreview()}});

          S.locs.forEach(function(l){

            opt.value=l.nm;opt.textContent=l.nm+(l.tp?' ('+l.tp+')':'');

// Check if a match's teams have a conflicting match in the same time window (other sports)
// ══════════════════════════════════════════════════════════════════════════
// BRACKET CLASSIFICATION: 1st-8th with tiebreakers
// ══════════════════════════════════════════════════════════════════════════
function calcBracketClassification(rds,bkey,category){
  if(!rds||!rds.length)return[];
  // Get sport's tiebreaker config
  var parts=bkey.split('__');
  var siId=parts.length>1?parts[1]:parts[0];
  var sport=S.spt.find(function(s){return s.id===siId});
  var tiebreakers=sport&&sport.tiebreakers?sport.tiebreakers:['goalDiff','yellowCards','redCards'];

  var allMatches=[];
  rds.forEach(function(rd){rd.m.forEach(function(m){allMatches.push(m)})});

  var stats={};
  function ensureTeam(tid){
    if(!tid||tid==='BYE'||tid.indexOf('W_')===0||tid.indexOf('L_')===0)return;
    if(!stats[tid])stats[tid]={id:tid,name:tName(tid),goalsFor:0,goalsConceded:0,goalDiff:0,yellowCards:0,redCards:0,wins:0};
  }
  allMatches.forEach(function(m){
    if(m.t1==='BYE'||m.t2==='BYE')return;
    ensureTeam(m.t1);ensureTeam(m.t2);
    if(m.s1!=null&&m.s2!=null){
      if(stats[m.t1]){stats[m.t1].goalsFor+=m.s1;stats[m.t1].goalsConceded+=m.s2}
      if(stats[m.t2]){stats[m.t2].goalsFor+=m.s2;stats[m.t2].goalsConceded+=m.s1}
    }
    if(m.cards){
      if(m.cards[m.t1]&&stats[m.t1]){stats[m.t1].yellowCards+=(m.cards[m.t1].y||0);stats[m.t1].redCards+=(m.cards[m.t1].r||0)}
      if(m.cards[m.t2]&&stats[m.t2]){stats[m.t2].yellowCards+=(m.cards[m.t2].y||0);stats[m.t2].redCards+=(m.cards[m.t2].r||0)}
    }
    if(m.w&&stats[m.w])stats[m.w].wins++;
  });
  Object.values(stats).forEach(function(s){s.goalDiff=s.goalsFor-s.goalsConceded});

  var result=[];
  var lastRound=rds[rds.length-1];
  var finalMatch=lastRound?lastRound.m.find(function(m){return!m.is3rd}):null;
  var thirdMatch=lastRound?lastRound.m.find(function(m){return m.is3rd}):null;

  if(finalMatch&&finalMatch.w){
    var first=finalMatch.w;
    var second=finalMatch.w===finalMatch.t1?finalMatch.t2:finalMatch.t1;
    if(stats[first])result.push(stats[first]);
    if(stats[second]&&second!=='BYE')result.push(stats[second]);
  }
  if(thirdMatch&&thirdMatch.w){
    var thr=thirdMatch.w;
    var fou=thirdMatch.w===thirdMatch.t1?thirdMatch.t2:thirdMatch.t1;
    if(stats[thr]&&result.indexOf(stats[thr])<0)result.push(stats[thr]);
    if(stats[fou]&&fou!=='BYE'&&fou.indexOf('L_')!==0&&result.indexOf(stats[fou])<0)result.push(stats[fou]);
  }

  var alreadyPlaced={};
  result.forEach(function(s){alreadyPlaced[s.id]=true});
  var remaining=Object.values(stats).filter(function(s){return!alreadyPlaced[s.id]});

  // Sort by sport-specific tiebreaker order
  remaining.sort(function(a,b){
    for(var i=0;i<tiebreakers.length;i++){
      var k=tiebreakers[i];
      if(k==='goalDiff'){if(b.goalDiff!==a.goalDiff)return b.goalDiff-a.goalDiff}
      else if(k==='yellowCards'){if(a.yellowCards!==b.yellowCards)return a.yellowCards-b.yellowCards}
      else if(k==='redCards'){if(a.redCards!==b.redCards)return a.redCards-b.redCards}
      else if(k==='wins'){if(b.wins!==a.wins)return b.wins-a.wins}
    }
    return 0;
  });
  result=result.concat(remaining);
  return result.slice(0,8);
}

function checkConflict(match,startDt,endDt,skipBkey,skipCt){
  // Get class IDs and categories for t1 and t2
  var ci1=resolveCi(match.t1);
  var ci2=resolveCi(match.t2);
  // Category of the current match — derive from the bracket key (skipBkey/skipCt)
  // since match objects don't always carry it.
  var cat1=skipCt, cat2=skipCt;
  if(!ci1&&!ci2)return false;
  var conflict=false;
  Object.entries(S.brk).forEach(function(bkEntry){
    var bk=bkEntry[0],cts=bkEntry[1];
    Object.entries(cts).forEach(function(ctEntry){
      var ct=ctEntry[0],rds=ctEntry[1];
      if(bk===skipBkey&&ct===skipCt)return;
      rds.forEach(function(rd){rd.m.forEach(function(m){
        if(!m.dt)return;
        var ms=new Date(m.dt);
        var sp2=S.spt.find(function(s){
          var parts=bk.split('__');return s.id===(parts.length>1?parts[1]:parts[0]);
        });
        var d2=(sp2&&sp2.dur)||14;
        var me=new Date(ms.getTime()+d2*60000);
        if(ms<endDt&&me>startDt){
          var cm1=resolveCi(m.t1), cm2=resolveCi(m.t2);
          var ccat=ctEntry[0]; // category of the other match
          // Conflict: same turma AND same category (masc vs masc = conflict, masc vs fem = ok)
          if(ci1&&(ci1===cm1||ci1===cm2)){
            if(cat1===ccat||cat1==='Misto'||ccat==='Misto')conflict=true;
          }
          if(ci2&&(ci2===cm1||ci2===cm2)){
            if(cat2===ccat||cat2==='Misto'||ccat==='Misto')conflict=true;
          }
        }
      })});
    });
  });
  return conflict;
}

// Check if a venue is busy at a given time (returns array of matches using that venue)
function checkVenueBusy(location,startDt,endDt,skipMatchId){
  if(!location)return[];
  var busy=[];
  Object.entries(S.brk).forEach(function(bkEntry){
    Object.entries(bkEntry[1]).forEach(function(ctEntry){
      ctEntry[1].forEach(function(rd){rd.m.forEach(function(m){
        if(!m.dt||!m.lc||m.id===skipMatchId)return;
        if(m.lc.toLowerCase()!==location.toLowerCase())return;
        var sp2=S.spt.find(function(s){var p=bkEntry[0].split('__');return s.id===(p.length>1?p[1]:p[0])});
        var d2=(sp2&&sp2.dur)||14;
        var ms=new Date(m.dt);
        var me=new Date(ms.getTime()+d2*60000);
        if(ms<endDt&&me>startDt)busy.push({match:m,sport:sp2,cat:ctEntry[0]});
      })});
    });
  });
  return busy;
}

function applyAutoSchedule(bkey,ct,date,startTime,dur,interval,location){
  var rds=S.brk[bkey]&&S.brk[bkey][ct]?S.brk[bkey][ct]:[];
  var slot=dur+interval;
  var base=new Date(date+'T'+startTime);
  var i=0;
  rds.forEach(function(rd){
    rd.m.forEach(function(m){
      if(m.t1==='BYE'||m.t2==='BYE')return;
      var start=new Date(base.getTime()+i*slot*60000);
      var pad=function(n){return n<10?'0'+n:''+n};
      m.dt=date+'T'+pad(start.getHours())+':'+pad(start.getMinutes());
      m.lc=location;
      i++;
    });
  });
}

// W.O. (WALK-OVER) SYSTEM
// ══════════════════════════════════════════════════════════════════════════
function applyWO(m,absentTeam,winnerTeam){
  if(!confirm('Confirmar W.O.?\n\nAusente: '+tName(absentTeam)+'\nVencedor: '+tName(winnerTeam)+'\nPlacar: 3 × 0'))return;
  var s1=winnerTeam===m.t1?3:0, s2=winnerTeam===m.t2?3:0;
  S.brk[S.mod.si][S.mod.ct]=S.brk[S.mod.si][S.mod.ct].map(function(r){return Object.assign({},r,{m:r.m.map(function(x){
    if(x.id===m.id)return Object.assign({},x,{s1:s1,s2:s2,w:winnerTeam,wo:absentTeam});
    if(x.t1==='W_'+m.id)return Object.assign({},x,{t1:winnerTeam});
    if(x.t2==='W_'+m.id)return Object.assign({},x,{t2:winnerTeam});
    return x;
  })})});
  if(!S.woLog)S.woLog=[];
  S.woLog.push({matchId:m.id,teamId:absentTeam,winnerId:winnerTeam,date:new Date().toLocaleString('pt-BR')});
  logAudit('W.O.','Time "'+tName(absentTeam)+'" não compareceu. Vencedor: "'+tName(winnerTeam)+'"');
  notifyNextGame(S.mod.si,S.mod.ct,m.id);
  S.mod=null;R();
}

function applyWOBoth(m){
  if(!confirm('W.O. para AMBOS os times?\n\n'+tName(m.t1)+' e '+tName(m.t2)+'\n\nNenhum avança. Ambos recebem penalidade.'))return;
  // No winner advances - mark match as completed with no winner advancing
  S.brk[S.mod.si][S.mod.ct]=S.brk[S.mod.si][S.mod.ct].map(function(r){return Object.assign({},r,{m:r.m.map(function(x){
    if(x.id===m.id)return Object.assign({},x,{s1:0,s2:0,w:'WO_BOTH',wo:'both'});
    return x;
  })})});
  if(!S.woLog)S.woLog=[];
  S.woLog.push({matchId:m.id,teamId:m.t1,winnerId:null,type:'both',date:new Date().toLocaleString('pt-BR')});
  S.woLog.push({matchId:m.id,teamId:m.t2,winnerId:null,type:'both',date:new Date().toLocaleString('pt-BR')});
  logAudit('W.O. Duplo','Ambos os times "'+tName(m.t1)+'" e "'+tName(m.t2)+'" não compareceram');
  S.mod=null;R();
}

// STUDENT NEXT-GAME ALERT
// ══════════════════════════════════════════════════════════════════════════
function notifyNextGame(bkeyResult,ct,completedMatchId){
  // After a result is set, find the NEXT upcoming match across all brackets
  // and check if the logged-in student's turma is involved
  if(!S.auth||S.auth.role!=='student')return;
  var ci=S.auth.ci;
  var now=new Date();

  // Collect all upcoming unfinished matches with scheduled times
  var upcoming=[];
  Object.entries(S.brk).forEach(function(bkE){
    var bk=bkE[0],cts=bkE[1];
    var parts=bk.split('__');
    var si=parts.length>1?parts[1]:parts[0];
    Object.entries(cts).forEach(function(ctE){
      var ct2=ctE[0],rds=ctE[1];
      rds.forEach(function(r){r.m.forEach(function(m){
        if(m.w||m.t1==='BYE'||m.t2==='BYE'||!m.dt)return;
        var c1=resolveCi(m.t1), c2=resolveCi(m.t2);
        if(c1===ci||c2===ci){
          upcoming.push({m:m,si:si,ct:ct2,dt:new Date(m.dt)});
        }
      })});
    });
  });

  upcoming.sort(function(a,b){return a.dt-b.dt});
  if(!upcoming.length)return;
  var next=upcoming[0];
  var sp=S.spt.find(function(s){return s.id===next.si});
  var dtStr=next.dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  S.nextGameAlert={
    msg:'📣 Próximo jogo: '+tName(next.m.t1)+' × '+tName(next.m.t2)+'\n'+(sp?sp.nm:'')+' — '+next.ct+'\n🕐 '+dtStr+(next.m.lc?' @ '+next.m.lc:''),
    matchId:next.m.id
  };
}

// Check alert on student dashboard
function getStudentAlert(){
  if(!S.auth||S.auth.role!=='student'||!S.nextGameAlert)return null;
  // Check if there's an upcoming match for this student's class within 30 min
  var ci=S.auth.ci;
  var now=new Date();
  var alert=null;
  Object.entries(S.brk).forEach(function(bkE){
    var bk=bkE[0],cts=bkE[1];
    var parts=bk.split('__');var si=parts.length>1?parts[1]:parts[0];
    Object.entries(cts).forEach(function(ctE){
      var ct2=ctE[0],rds=ctE[1];
      rds.forEach(function(r){r.m.forEach(function(m){
        if(m.w||!m.dt)return;
        var c1=resolveCi(m.t1), c2=resolveCi(m.t2);
        if(c1!==ci&&c2!==ci)return;
        var dt=new Date(m.dt);
        var diff=(dt-now)/60000; // minutes until match
        if(diff>=0&&diff<=60){ // alert if within 60 min
          var sp=S.spt.find(function(s){return s.id===si});
          var dtStr=dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
          var opp=(c1===ci)?tName(m.t2):tName(m.t1);
          alert={msg:'Seu próximo jogo é contra '+opp,detail:(sp?sp.nm:'')+' · '+ct2+' · '+dtStr+(m.lc?' @ '+m.lc:''),diff:Math.round(diff)};
        }
      })});
    });
  });
  return alert;
}

function nrm(s){return s.trim().replace(/[°°]/g,'º').replace(/\s+/g,' ').toUpperCase()}

// Normalize a class identifier to a comparable key.
// Two key normalizations:
//   1. Feminine color forms become masculine — ROXA→ROXO, AMARELA→AMARELO,
//      VERMELHA→VERMELHO, PRETA→PRETO, BRANCA→BRANCO. So "3º ROXO" and "3º ROXA"
//      both become "3ROXO" and match each other.
//   2. The "X°ANO" / "Xª SÉRIE" decoration is dropped, leaving just the
//      digit + identifier suffix.
function _normColors(s){
  // Word-boundary replace, only at word edges so we don't touch "carROXAria" or similar
  return s
    .replace(/\bROXA\b/g,'ROXO')
    .replace(/\bAMARELA\b/g,'AMARELO')
    .replace(/\bVERMELHA\b/g,'VERMELHO')
    .replace(/\bPRETA\b/g,'PRETO')
    .replace(/\bBRANCA\b/g,'BRANCO');
}
function kex(s){
  var n=_normColors(nrm(s));
  // Last-letter shorthand (e.g. "3º A", "6º Ano B")
  var m=n.match(/(\d+)\s*[º\xba\xaa]?\s*(?:ANO|SERIE|S[EÉ]RIE)?\s*([A-Z])$/);
  if(m)return m[1]+m[2];
  // General fallback: strip "ANO"/"SERIE" so "3 ANO ROXO" and "3º ROXO"
  // both reduce to "3ROXO".
  n=n.replace(/\bANO\b/g,'').replace(/\bSERIES?\b/g,'').replace(/\bS[EÉ]RIE\b/g,'');
  return n.replace(/[^A-Z0-9]/g,'');
}

function findCls(nm){
  var byExact=S.cls.find(function(x){return nrm(x.nm)===nrm(nm)});
  if(byExact)return byExact;
  var byKey=S.cls.find(function(x){var k=kex(nm);return k&&k.length>=2&&kex(x.nm)===k});
  if(byKey)return byKey;
  var n=nrm(nm);
  return S.cls.find(function(x){return nrm(x.nm).indexOf(n)>=0||n.indexOf(nrm(x.nm))>=0})||null;
}

function findSpt(nm){var n=nm.trim().toUpperCase();return S.spt.find(function(s){return s.nm.toUpperCase()===n})||S.spt.find(function(s){return s.nm.toUpperCase().indexOf(n)>=0||n.indexOf(s.nm.toUpperCase())>=0})||null}

function exportBracketByKey(bkey,bcat){
  var parts=bkey.split('__');
  var spId=parts[1]||parts[0];
  var serie=parts.slice(2).join('__')||'';
  var rds=S.brk[bkey]&&S.brk[bkey][bcat]?S.brk[bkey][bcat]:[];
  if(!rds.length){alert('Nenhum confronto encontrado para exportar.\nVerifique se o chaveamento foi importado corretamente.');return;}
  var sp=S.spt.find(function(s){return s.id===spId});
  var serieLabel=serie&&serie!=='GERAL'?' - '+serie:'';
  var title=S.ev.name+' — '+(sp?sp.nm:'')+' '+bcat+serieLabel;
  _runExport(rds,sp,bcat,title,serie);
}
function _runExport(rds,sp,bcat,title,serie){
  // Detect rodízio/groups: match list mode if any classify round has 3+ matches or label contains Grupo/Rodizio
  var hasGroupsExp=rds.some(function(rd){return rd.label&&(rd.label.indexOf('Grupo')>=0||rd.label==='Rodizio')});
  var hasSemiExp=rds.some(function(rd){return rd.label==='Semifinal'});
  var isMatchList=!hasSemiExp&&(rds.length===1||hasGroupsExp||(rds[0]&&rds[0].m&&rds[0].m.length>=3));
  var ECOLS={'ROXO':'#8b5cf6','VERDE':'#22c55e','VERMELHO':'#ef4444','AMARELO':'#eab308','AZUL':'#3b82f6','ROSA':'#ec4899','PRETO':'#334155','CINZA':'#6b7280','LARANJA':'#f97316'};
  function ec(nm){var col='#64748b';var u=(nm||'').toUpperCase();Object.entries(ECOLS).forEach(function(e){if(u.indexOf(e[0])>=0)col=e[1]});return col;}
  var rounds='';
  rds.forEach(function(rd){
    var rdLabel=rd.label||rName(rd.r,rds.length);rounds+='<div class="round"><div class="rtitle">'+rdLabel+'</div>';
    rd.m.forEach(function(m){
      var n1=tName(m.t1),n2=tName(m.t2);
      var w1=m.w===m.t1?' winner':'',w2=m.w===m.t2?' winner':'';
      var wo1=m.wo===m.t1?' wo':'',wo2=m.wo===m.t2?' wo':'';
      var hora=m._hora?'<div class="mhora">'+m._hora+(m.lc?' · '+m.lc:'')+'</div>':'';
      var dot1='<span class="tdot" style="background:'+ec(n1)+'"></span>';
      var dot2='<span class="tdot" style="background:'+ec(n2)+'"></span>';
      // Distinguish 3rd-place match with a special label band on top
      var matchLabel=m.is3rd
        ?'<div class="mlabel third">🥉 Disputa de 3º Lugar</div>'
        :(rdLabel==='Final'||rdLabel==='FINAL')?'<div class="mlabel final">🏆 Final</div>':'';
      rounds+='<div class="match'+(m.is3rd?' is-third':'')+'">'+matchLabel+hora
        +'<div class="team'+w1+wo1+'"><span>'+dot1+n1+'</span>'+(m.s1!=null?'<b>'+m.s1+'</b>':'')+'</div>'
        +'<div class="team'+w2+wo2+'"><span>'+dot2+n2+'</span>'+(m.s2!=null?'<b>'+m.s2+'</b>':'')+'</div>'
        +'</div>';
    });
    rounds+='</div>';
  });
  // Match list (rodizio)
  var matchListHtml='';
  if(isMatchList){
    var allM=[];rds.forEach(function(rd){rd.m.forEach(function(m){allM.push(m)})});
    // Separate classify from final/3rd (use _slot1 metadata for resolved finals)
    var classM=[],finalM=[];
    allM.forEach(function(m){
      var slot1=m._slot1||m.t1||'';
      var slot2=m._slot2||m.t2||'';
      var isFinal=slot1.indexOf('GW_')===0||slot1.indexOf('W_')===0||slot2.indexOf('GW_')===0||slot2.indexOf('W_')===0||m.is3rd;
      if(isFinal)finalM.push(m);else classM.push(m);
    });
    var displayM=classM.length?classM:allM;
    matchListHtml='<table><thead><tr><th>#</th><th>Confronto</th><th>Resultado</th></tr></thead><tbody>';
    displayM.forEach(function(m,i){
      var n1=tName(m.t1),n2=tName(m.t2);
      var hasRes=m.s1!=null&&m.s2!=null;
      var meta=[m._hora,m.lc].filter(Boolean).join(' ');
      matchListHtml+='<tr><td class="num">'+(i+1)+'</td>'
        +'<td><span class="dot" style="background:'+ec(n1)+'"></span><b>'+n1+'</b>'
        +' <span class="vs">x</span> '
        +'<span class="dot" style="background:'+ec(n2)+'"></span><b>'+n2+'</b>'
        +(meta?'<span class="meta"> '+meta+'</span>':'')
        +'</td>'
        +'<td class="score">'+(hasRes?'<b class="res">'+m.s1+' x '+m.s2+'</b>':'—')+'</td></tr>';
    });
    matchListHtml+='</tbody></table>';
    // Show final section
    if(finalM.length){
      matchListHtml+='<div style="margin-top:20px">';
      finalM.forEach(function(m){
        var n1=tName(m.t1),n2=tName(m.t2);
        var label=m.is3rd?'🥉 Disputa de 3º Lugar':'🏆 Final';

    // ── STANDINGS TABLE for export (rodizio/groups) ──────────────────────

    var classifyRds=rds.filter(function(rd){
      return!rd.m.some(function(m){
        return(m.t1&&(m.t1.indexOf('GW_')===0||m.t1.indexOf('W_')===0||m.t1.indexOf('L_')===0))
          ||(m.t2&&(m.t2.indexOf('GW_')===0||m.t2.indexOf('W_')===0||m.t2.indexOf('L_')===0))

    var allOrdered=[];  // for final classification card

          +'<td style="text-align:center;font-family:monospace">'+s.gp+'</td>'
          +'<td style="text-align:center;font-family:monospace;color:'+(s.gd>0?'#34d399':s.gd<0?'#f87171':'#64748b')+'">'+(s.gd>0?'+':'')+s.gd+'</td>'
          +'<td style="text-align:right;font-family:monospace;font-size:15px;font-weight:800;color:#22d3ee">'+s.pts+'</td>'
          +'</tr>';
      });
      html+='</tbody></table></div>';
      return html;
    }
    if(classifyRds.length===1){
      matchListHtml+=buildStandingsHtml(classifyRds[0],'');
      // For pure rodizio: collect ordered ids for final card
      var stOnly=_rodizioStandings(classifyRds[0]);
      stOnly.forEach(function(s){allOrdered.push(s.t)});
    } else if(classifyRds.length>1){
      classifyRds.forEach(function(rd){
        matchListHtml+=buildStandingsHtml(rd,rd.label||'');
      });
    }

    // ── FINAL CLASSIFICATION CARD for export ──────────────────────────────
    // For groups+final or semi+final: extract winners from final match
    if(classifyRds.length<=1||finalM.length){
      var orderedExp=[];
      if(finalM.length){
        // Use final/3rd results
        var mainFm=finalM.find(function(m){return!m.is3rd});
        var thirdFm=finalM.find(function(m){return m.is3rd});
        function isReal2(t){return t&&t!=='BYE'&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0}
        if(mainFm&&mainFm.w&&isReal2(mainFm.w)){

function exportBracket(ano,bsid,bcat){
  var bkey=ano+'__'+bsid;
  var rds=S.brk[bkey]&&S.brk[bkey][bcat]?S.brk[bkey][bcat]:[];
  if(!rds.length){alert('Gere o chaveamento antes de exportar.');return;}
  var sp=S.spt.find(function(s){return s.id===bsid});

}

function exportAgenda(ano){
  var all=[];
  Object.entries(S.brk).forEach(function(e1){
    var bk=e1[0],cts=e1[1];
    var parts=bk.split('__');
    var a=parts.length>1?parts[0]:'';
    var si=parts.length>1?parts[1]:parts[0];
    Object.entries(cts).forEach(function(e2){
      var ct=e2[0],rs=e2[1];
      rs.forEach(function(r){
        r.m.forEach(function(m){
          if(m.t1!=='BYE'&&m.t2!=='BYE')
            all.push(Object.assign({},m,{si:si,ct:ct,tR:rs.length,ano:a}));
        });
      });
    });
  });
  var filtered=ano?all.filter(function(m){return m.ano===ano}):all;
  filtered.sort(function(a,b){return a.dt&&b.dt?new Date(a.dt)-new Date(b.dt):a.dt?-1:b.dt?1:0});
  var title=S.ev.name+(ano?' \u2014 '+ano:'');
  var rows='';
  filtered.forEach(function(m){
    var sp=S.spt.find(function(s){return s.id===m.si});
    var dtStr=m.dt?new Date(m.dt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'A definir';
    var stCls=m.w?'fin':m.dt?'age':'pnd';
    var stLbl=m.w?'Encerrado':m.dt?'Agendado':'\u2014';
    rows+='<tr>'
      +'<td><b>'+(sp?sp.nm:'')+'</b><div class="sub">'+m.ct+(m.ano?' &middot; '+m.ano:'')+'</div></td>'
      +'<td><span class="fase">'+rName(m.r,m.tR)+'</span></td>'
      +'<td class="vs">'+tName(m.t1)+' <span>\u00d7</span> '+tName(m.t2)+'</td>'
      +'<td class="dt">'+dtStr+'</td>'
      +'<td>'+(m.lc||'\u2014')+'</td>'
      +'<td><span class="st '+stCls+'">'+stLbl+'</span></td>'
      +'</tr>';
  });
  var T=_exportTheme();
  var out='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>'+title+'</title>'
    +'<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Arial,sans-serif;background:'+T.bg+';color:'+T.tx+';padding:28px}'
    +'h1{font-size:22px;font-weight:800;margin-bottom:4px;color:'+T.accent+'}'
    +'.sub2{font-size:12px;color:'+T.tx3+';margin-bottom:24px}'
    +'table{width:100%;border-collapse:collapse;background:'+T.card+';border:1px solid '+T.borderStrong+';border-radius:10px;overflow:hidden}'
    +'th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:'+T.tx2+';border-bottom:2px solid '+T.border+';background:'+T.headerBg+'}'
    +'td{padding:10px 14px;font-size:13px;border-bottom:1px solid '+T.border+';vertical-align:middle;color:'+T.tx+'}'
    +'tr:hover td{background:'+T.headerBg+'}'
    +'.sub{font-size:10px;color:'+T.tx3+';margin-top:2px}'
    +'.vs{font-weight:700;white-space:nowrap}.vs span{color:'+T.tx3+';margin:0 4px}'
    +'.dt{font-family:monospace;font-size:11px;white-space:nowrap;color:'+T.tx2+'}'
    +'.fase{background:rgba(167,139,250,.18);color:'+T.pu+';padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}'
    +'.st{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}'
    +'.fin{background:rgba(52,211,153,.18);color:'+T.gn+'}'
    +'.age{background:rgba(251,191,36,.15);color:'+T.am+'}'
    +'.pnd{background:rgba(100,116,139,.15);color:'+T.tx3+'}'
    +'footer{margin-top:32px;font-size:11px;color:'+T.tx3+';text-align:center}'
    +'</style></head><body>'
    +'<h1>'+title+'</h1>'
    +'<p class="sub2">Gerado em '+new Date().toLocaleString('pt-BR')+'</p>'
    +(filtered.length
      ?'<table><thead><tr><th>Esporte</th><th>Fase</th><th>Confronto</th><th>Data / Hora</th><th>Local</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'
      :'<p style="color:'+T.tx3+';text-align:center;padding:48px">Nenhum jogo agendado</p>')
    +'<footer>'+S.ev.name+'</footer>'
    +'</body></html>';
  var blob=new Blob([out],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='agenda_'+(ano||'geral')+'.html';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

function renderLogin(root){
  root.style.display='flex';
  var wrap=h('div',{style:{
    minHeight:'100vh',width:'100%',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',
    background:'linear-gradient(135deg,#0a0e1a 0%,#111827 60%,#0f172a 100%)',

    h('div',{style:{fontSize:'48px',marginBottom:'12px'}},'🏆'),
    h('h1',{style:{
      fontSize:'28px',fontWeight:'800',letterSpacing:'-0.5px',
      background:'linear-gradient(135deg,#22d3ee,#a78bfa)',
      webkitBackgroundClip:'text',webkitTextFillColor:'transparent',
      backgroundClip:'text',marginBottom:'6px'
    }},S.ev&&S.ev.name?S.ev.name:'Jogos Internos'),
    h('p',{style:{fontSize:'13px',color:'#64748b'}},
      'Faça login para continuar')
  ));

  // Card
  var card=h('div',{style:{
    background:'#111827',border:'1px solid #2d3a52',borderRadius:'20px',
    padding:'32px',width:'100%',maxWidth:'380px',
    boxShadow:'0 24px 64px rgba(0,0,0,.5)'
  }});

  var errDiv=h('div',{style:{
    display:S.loginErr?'block':'none',
    background:'rgba(248,113,113,.12)',color:'#f87171',
    border:'1px solid rgba(248,113,113,.3)',
    borderRadius:'8px',padding:'10px 14px',fontSize:'13px',marginBottom:'16px'
  }},S.loginErr||'');

  var loginInput=h('input',{
    'class':'fi',type:'text',placeholder:'Login',
    style:{marginBottom:'12px',fontSize:'15px'},
    onkeydown:function(e){if(e.key==='Enter')senhaInput.focus()}
  });
  var senhaInput=h('input',{
    'class':'fi',type:'password',placeholder:'Senha',
    style:{marginBottom:'20px',fontSize:'15px'},
    onkeydown:function(e){if(e.key==='Enter')doLogin()}
  });

  function doLogin(){
    var lg=loginInput.value.trim();
    var pw=senhaInput.value.trim();
    if(!lg||!pw){S.loginErr='Preencha login e senha.';R();return}
    // Admin check (default 'admin' user)
    if(lg.toLowerCase()==='admin'&&pw===S.adminPass){
      S.auth={role:'admin',name:'Administrador',login:'admin'};S.role='admin';S.page='dashboard';S.loginErr='';
      logAudit('Login','Login do administrador principal');R();return;
    }
    // Additional admins check
    var foundA=(S.adminLogins||[]).find(function(l){
      return l.login.toLowerCase()===lg.toLowerCase()&&l.senha===pw;
    });
    if(foundA){
      S.auth={role:'admin',name:foundA.name,login:foundA.login};
      S.role='admin';S.page='dashboard';S.loginErr='';
      logAudit('Login','Admin '+foundA.name+' fez login');R();return;
    }
    // Student check
    var found=S.logins.find(function(l){
      return l.login.toLowerCase()===lg.toLowerCase()&&l.senha===pw;
    });
    if(found){
      var cl=S.cls.find(function(c){return c.id===found.ci});
      S.auth={role:'student',ci:found.ci,cn:found.cn,login:found.login};
      S.role='student';S.page='dashboard';S.loginErr='';R();return;
    }
    // Judge check
    var foundJ=S.judgeLogins.find(function(l){
      return l.login.toLowerCase()===lg.toLowerCase()&&l.senha===pw;
    });
    if(foundJ){
      S.auth={role:'judge',name:foundJ.name,login:foundJ.login};
      S.role='judge';S.page='dashboard';S.loginErr='';R();return;
    }
    S.loginErr='Login ou senha incorretos.';
    senhaInput.value='';
    R();
  }

  var btnLogin=h('button',{
    'class':'btn-d',
    style:{width:'100%',justifyContent:'center',fontSize:'15px',padding:'12px'},
    onclick:doLogin
  },'Entrar');

  card.appendChild(errDiv);
  card.appendChild(h('div',{'class':'fg'},h('label',{'class':'fl'},'Login'),loginInput));
  card.appendChild(h('div',{'class':'fg'},h('label',{'class':'fl'},'Senha'),senhaInput));
  card.appendChild(btnLogin);

  // Hint for admin
  card.appendChild(h('div',{style:{
    marginTop:'20px',padding:'12px',background:'rgba(34,211,238,.06)',
    border:'1px solid rgba(34,211,238,.12)',borderRadius:'10px',
    fontSize:'11px',color:'#64748b',textAlign:'center',lineHeight:'1.7'
  }},
    h('b',{style:{color:'#22d3ee',display:'block',marginBottom:'2px'}},'Administrador'),
    'Login: admin  ·  Senha definida nas configurações'
  ));

  wrap.appendChild(card);

  // Footer
  wrap.appendChild(h('p',{style:{marginTop:'24px',fontSize:'11px',color:'#334155'}},
    S.ev&&S.ev.name?S.ev.name:'Jogos Internos'));
  root.appendChild(wrap);

  // Auto-focus
  setTimeout(function(){loginInput.focus()},50);
}

  // Students always log in normally. Only the Ranking page is gated.
  var rkSection=h('div',{'class':'card',style:{marginBottom:'20px'}});

  var rkMsg=h('div',{style:{fontSize:'12px',marginTop:'14px',minHeight:'18px'}});

  // Three radio buttons + window inputs that get enabled/disabled

  var rNever=h('input',{type:'radio',name:'rkMode',value:'never',checked:ra.mode==='never',style:{marginRight:'8px',transform:'scale(1.2)'}});
  var rWindow=h('input',{type:'radio',name:'rkMode',value:'window',checked:ra.mode==='window',style:{marginRight:'8px',transform:'scale(1.2)'}});
  var rkFromInp=h('input',{'class':'fi',type:'time',value:ra.from||'07:00',style:{maxWidth:'130px'}});
  var rkToInp=h('input',{'class':'fi',type:'time',value:ra.to||'20:00',style:{maxWidth:'130px'}});

    var inWin=rWindow.checked;
    rkFromInp.disabled=!inWin;

    return h('label',{style:{display:'flex',alignItems:'flex-start',cursor:'pointer',padding:'10px 0',borderBottom:'1px solid var(--br)'}},
      input,
      h('div',{style:{flex:'1'}},
        h('div',{style:{fontSize:'13px',fontWeight:'600'}},title),
        h('div',{style:{fontSize:'11px',color:'var(--tx3)',marginTop:'2px'}},desc)

          }})(l.id)},'🗑'))

function mAddLogin(c){
  var f={ci:'',cn:'',login:'',senha:''};
  var ov=h('div',{'class':'ov'});
  ov.onclick=function(e){if(e.target===ov){S.mod=null;R()}};
  var close=function(){S.mod=null;R()};
  var errDiv=h('div',{style:{display:'none',color:'#f87171',fontSize:'12px',marginBottom:'8px'}});

  // Auto-generate login/senha when turma changes
  var loginInp=h('input',{'class':'fi',placeholder:'Ex: 3A-FUT',oninput:function(e){f.login=e.target.value}});
  var senhaInp=h('input',{'class':'fi',placeholder:'Ex: nome do capitão',oninput:function(e){f.senha=e.target.value}});
  var cnInp=h('input',{'class':'fi',placeholder:'Ex: João Silva',oninput:function(e){
    f.cn=e.target.value;
    // Auto-fill senha with captain name if empty
    if(!senhaInp.value){senhaInp.value=f.cn.split(' ')[0].toLowerCase();f.senha=senhaInp.value;}
  }});

  // Class select grouped by year
  var cs=h('select',{'class':'fs',onchange:function(e){
    f.ci=e.target.value;
    var cl=S.cls.find(function(x){return x.id===f.ci});
    if(cl&&!loginInp.value){
      // Auto-generate login suggestion: e.g. "3A" + random 3 digits
      var k=cl.nm.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,4);
      var suggestion=k+'-'+Math.floor(100+Math.random()*900);
      loginInp.value=suggestion;f.login=suggestion;
    }
  }},h('option',{value:''},'Selecione a turma...'));
  var anos=getAnos();
  if(anos.length){
    anos.forEach(function(a){
      var grp=document.createElement('optgroup');grp.label=a;
      getClsByAno(a).forEach(function(x){
        grp.appendChild(h('option',{value:x.id},x.nm));
      });
      cs.appendChild(grp);
    });
  } else {
    S.cls.forEach(function(x){cs.appendChild(h('option',{value:x.id},x.nm))});
  }

  ov.appendChild(h('div',{'class':'md'},
    h('div',{'class':'md-h'},h('div',{'class':'md-t'},'Novo Login de Aluno'),h('button',{'class':'btn btn-s',onclick:close},'✕')),
    h('div',{'class':'md-b'},
      errDiv,
      h('div',{'class':'fg'},h('label',{'class':'fl'},'Turma'),cs),
      h('div',{'class':'fg'},h('label',{'class':'fl'},'Nome do Capitão'),cnInp),
      h('div',{'class':'fr'},
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Login'),loginInp),
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Senha'),senhaInp)
      ),
      h('div',{style:{fontSize:'11px',color:'var(--tx3)',marginTop:'4px',lineHeight:'1.6'}},
        '💡 O login e senha são gerados automaticamente ao escolher a turma. Você pode editar livremente.'
      )
    ),
    h('div',{'class':'md-f'},
      h('button',{'class':'btn',onclick:close},'Cancelar'),
      h('button',{'class':'btn btn-p',onclick:function(){
        f.login=(f.login||loginInp.value).trim();
        f.senha=(f.senha||senhaInp.value).trim();
        f.cn=(f.cn||cnInp.value).trim();
        if(!f.ci){errDiv.style.display='block';errDiv.textContent='Selecione a turma.';return}
        if(!f.login){errDiv.style.display='block';errDiv.textContent='Digite um login.';return}
        if(!f.senha){errDiv.style.display='block';errDiv.textContent='Digite uma senha.';return}
        if(S.logins.find(function(l){return l.login.toLowerCase()===f.login.toLowerCase()})){
          errDiv.style.display='block';errDiv.textContent='Este login já existe.';return;
        }
        S.logins.push({id:uid(),ci:f.ci,cn:f.cn,login:f.login,senha:f.senha});
        S.mod=null;R();
      }},'Criar Login')
    )
  ));
  c.appendChild(ov);
}
