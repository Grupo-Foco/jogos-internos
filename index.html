// SUPABASE SYNC
// ═══════════════════════════════════════════════════════════════════════════
var _syncTimer=null;
function scheduleSave(){
  if(!S.sb.enabled||!S.sb.url||!S.sb.key)return;
  // SAFETY: Don't save if data hasn't been loaded from Supabase yet
  if(!MT.dataLoaded){console.log('scheduleSave blocked: data not loaded yet');return}
  // SAFETY: Don't save if state appears empty (protection against overwrite with blank)
  if(!S.cls.length&&!S.spt.length&&!S.enr.length&&!S.logins.length&&!S.judgeLogins.length&&S.adminPass==='admin123'){
    // State looks like fresh/default — check if this school has existing data
    // Only allow save if data was confirmed loaded (MT.dataLoaded=true)
    console.log('scheduleSave: state appears empty, saving anyway (dataLoaded='+MT.dataLoaded+')');
  }
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(function(){syncToSupabase(false)},2000);
}

function getDbPayload(){
  return {
    id:getSchoolDbId(),
    data:JSON.stringify({
      cls:S.cls,spt:S.spt,enr:S.enr,brk:S.brk,locs:S.locs,
      ev:S.ev,logins:S.logins,judgeLogins:S.judgeLogins,adminLogins:S.adminLogins||[],auditLog:S.auditLog||[],
      recursos:S.recursos,adminPass:S.adminPass,
      thirdPlace:S.thirdPlace,appInfo:S.appInfo,
      scoring:S.scoring,podiums:S.podiums,woLog:S.woLog
    }),
    updated_at:new Date().toISOString()
  };
}

function syncToSupabase(manual){
  if(!S.sb.url||!S.sb.key){
    if(manual)alert('Configure a URL e a chave do Supabase primeiro (⚙️ Configurações).');
    return;
  }
  // SAFETY: Don't save before data is loaded
  if(!MT.dataLoaded&&!manual){console.log('syncToSupabase blocked: waiting for load');return}
  S.sb.syncing=true;
  var hasFocus=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
  if(!S.mod&&!hasFocus)R();
  var payload=getDbPayload();
  // BACKUP: Save a backup copy before overwriting (only every 5 minutes max)
  var now=Date.now();
  var lastBackup=MT._lastBackup||0;
  if(now-lastBackup>300000){// 5 minutes
    MT._lastBackup=now;
    var backupId=getSchoolDbId()+'_backup';
    fetch(S.sb.url+'/rest/v1/jogos_data',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:backupId,data:payload.data,updated_at:new Date().toISOString()})
    }).catch(function(e){console.error('Backup failed:',e)});
  }
  // Main save
  fetch(S.sb.url+'/rest/v1/jogos_data',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':S.sb.key,
      'Authorization':'Bearer '+S.sb.key,
      'Prefer':'resolution=merge-duplicates'
    },
    body:JSON.stringify(payload)
  }).then(function(res){
    S.sb.syncing=false;
    if(res.ok||res.status===201||res.status===200){
      S.sb.status='ok';S.sb.lastSync=new Date().toISOString();
    } else {
      S.sb.status='error';
      res.text().then(function(t){console.error('Supabase error:',t)});
    }
    var hf2=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
    if(!S.mod&&!hf2)R();
  }).catch(function(err){
    S.sb.syncing=false;S.sb.status='error';
    console.error('Supabase sync failed:',err);
    if(!S.mod)R();
  });
}

function loadFromSupabase(onDone){
  if(!S.sb.url||!S.sb.key){if(onDone)onDone(false);return;}
  S.sb.syncing=true;R();
  var dbId=getSchoolDbId();
  fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.'+dbId+'&select=data',{
    headers:{
      'apikey':S.sb.key,
      'Authorization':'Bearer '+S.sb.key
    }
  }).then(function(res){return res.json()})
  .then(function(rows){
    S.sb.syncing=false;
    if(rows&&rows.length&&rows[0].data){
      var d=JSON.parse(rows[0].data);
      ['cls','spt','enr','brk','locs','ev','logins','judgeLogins','adminLogins','auditLog','recursos','adminPass','thirdPlace','appInfo','scoring','podiums','woLog'].forEach(function(k){
        if(d[k]!==undefined)S[k]=d[k];
      });
      // If school has a specific admin pass from master, use it
      if(MT.schoolCode&&d.adminPass)S.adminPass=d.adminPass;
      S.sb.status='ok';R();
      if(onDone)onDone(true);
    } else {
      S.sb.status='ok';
      if(onDone)onDone(false);
      R();
    }
  }).catch(function(err){
    S.sb.syncing=false;S.sb.status='error';
    console.error('Supabase load failed:',err);R();
    if(onDone)onDone(false);
  });
}

      h('div',{style:{fontWeight:'700',fontSize:'11px',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'6px'}},'☁️ Supabase (persistência online)'),
      h('div',{style:{fontSize:'11px',color:'var(--tx2)',marginBottom:'12px',lineHeight:'1.7'},
        html:'Conecte ao Supabase para salvar automaticamente.<br>'+
        '1. Crie uma conta em <b>supabase.com</b><br>'+
        '2. Crie um projeto e uma tabela <code style="background:var(--bg3);padding:1px 4px;border-radius:4px">jogos_data</code> com colunas: <code style="background:var(--bg3);padding:1px 4px;border-radius:4px">id text, data jsonb, updated_at timestamptz</code><br>'+
        '3. Cole a URL e a Anon Key abaixo'
      }),
      h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'10px'}},
        h('label',{style:{display:'flex',alignItems:'center',gap:'6px',cursor:'pointer',fontSize:'13px',fontWeight:'600'}},
          (function(){
            var chk=document.createElement('input');chk.type='checkbox';chk.checked=f.sbEnabled;
            chk.onchange=function(){f.sbEnabled=chk.checked};
            chk.style.width='16px';chk.style.height='16px';chk.style.cursor='pointer';
            return chk;
          })(),
          'Habilitar sincronização Supabase'
        )
      ),
      h('div',{'class':'fg'},h('label',{'class':'fl'},'URL do Projeto (https://xxxx.supabase.co)'),
        h('input',{'class':'fi',value:f.sbUrl,placeholder:'https://abcdefg.supabase.co',oninput:function(e){f.sbUrl=e.target.value}})
      ),
      h('div',{'class':'fg'},h('label',{'class':'fl'},'Anon Key (chave pública)'),
        h('input',{'class':'fi',type:'password',value:f.sbKey,placeholder:'eyJhbGci...',oninput:function(e){f.sbKey=e.target.value}})
      ),
      h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap',marginBottom:'6px'}},
        h('button',{'class':'btn btn-s',onclick:function(){
          S.sb.url=f.sbUrl.replace(/\/$/,'');S.sb.key=f.sbKey;S.sb.enabled=f.sbEnabled;
          if(S.sb.enabled){setStatus('Testando conexão...','var(--am)');syncToSupabase(true);}
          else setStatus('Supabase desabilitado','var(--tx3)');
        }},'🔌 Testar conexão'),
        h('button',{'class':'btn btn-s',onclick:function(){
          S.sb.url=f.sbUrl.replace(/\/$/,'');S.sb.key=f.sbKey;S.sb.enabled=f.sbEnabled;
          loadFromSupabase(function(ok){setStatus(ok?'✅ Dados carregados!':'⚠️ Nenhum dado encontrado',ok?'#34d399':'#fbbf24')});
        }},'⬇️ Carregar dados')
      ),
      statusDiv,

      h('div',{style:{borderTop:'1px solid var(--bd)',margin:'16px 0'}}),

      // ── Backup ───────────────────────────────────────────────────
      h('div',{style:{fontWeight:'700',fontSize:'11px',color:'var(--tx3)',textTransform:'uppercase',letterSpacing:'.5px',marginBottom:'10px'}},'💾 Backup Local'),
      h('div',{style:{display:'flex',gap:'8px',flexWrap:'wrap'}},
        h('button',{'class':'btn btn-s',onclick:function(){
          var d=JSON.stringify({cls:S.cls,spt:S.spt,enr:S.enr,brk:S.brk,locs:S.locs,ev:S.ev,logins:S.logins,judgeLogins:S.judgeLogins,recursos:S.recursos,adminPass:S.adminPass,thirdPlace:S.thirdPlace,appInfo:S.appInfo},null,2);
          var blob=new Blob([d],{type:'application/json'});
          var a=document.createElement('a');a.href=URL.createObjectURL(blob);
          a.download='backup_jogos_'+new Date().toISOString().slice(0,10)+'.json';
          document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
        }},'📥 Exportar JSON'),
        h('button',{'class':'btn btn-s',onclick:function(){
          var inp=document.createElement('input');inp.type='file';inp.accept='.json';
          inp.onchange=function(e){
            if(!e.target.files[0])return;
            var r=new FileReader();r.onload=function(ev){
              try{
                var d=JSON.parse(ev.target.result);
                if(confirm('Isso substituirá TODOS os dados atuais. Confirmar?')){
                  ['cls','spt','enr','brk','locs','ev','logins','adminPass','thirdPlace','appInfo'].forEach(function(k){if(d[k]!==undefined)S[k]=d[k]});
                  S.mod=null;R();alert('✅ Backup restaurado!');
                }
              }catch(err){alert('Erro ao ler JSON: '+err.message)}
            };r.readAsText(e.target.files[0]);
          };
          document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
        }},'📤 Importar JSON'),
        h('button',{'class':'btn btn-s',style:{color:'var(--pr)',borderColor:'var(--pr)'},onclick:function(){
          // GitHub Pages instructions
          alert('📦 Como hospedar no GitHub Pages:\n\n1. Acesse github.com e crie um repositório\n2. Faça upload deste arquivo HTML\n3. Vá em Settings → Pages → selecione a branch\n4. Seu app estará online em: https://[usuário].github.io/[repositório]/\n\n💡 Com Supabase configurado, os dados ficam sincronizados entre todos os dispositivos!');
        }},'🌐 GitHub Pages')
      ),

      h('div',{style:{borderTop:'1px solid var(--bd)',margin:'16px 0'}}),
      // ── Version info ─────────────────────────────────────────────
      h('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--tx3)',lineHeight:'1.8'}},
        h('div',{style:{fontWeight:'700',color:'var(--tx2)',marginBottom:'2px'}},'Jogos Internos Escolares'),
        h('div',{},'Versão '+S.appInfo.version+' · Desenvolvido por '+(S.appInfo.author||'—')),
        h('div',{style:{marginTop:'4px',color:'var(--pr)'}},'🏆')
      )
    ),
    h('div',{'class':'md-f'},
      h('button',{'class':'btn',onclick:close},'Cancelar'),
      h('button',{'class':'btn btn-p',onclick:function(){
        S.appInfo.author=f.author;
        S.appInfo.contact=f.contact;
        S.appInfo.version=f.version;
        S.sb.url=f.sbUrl.replace(/\/$/,'');
        S.sb.key=f.sbKey;
        S.sb.enabled=f.sbEnabled;
        S.mod=null;R();
        if(S.sb.enabled&&S.sb.url&&S.sb.key)scheduleSave();
      }},'Salvar')
    )
  );
  ov.appendChild(md);
  root.appendChild(ov);
}


// ── Touch swipe to close sidebar ────────────────────────────────────────
(function(){
  var tx=0,ty=0;
  document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',function(e){
    if(!S.auth)return;
    var dx=e.changedTouches[0].clientX-tx;
    var dy=Math.abs(e.changedTouches[0].clientY-ty);
    // Swipe right from left edge: open sidebar
    if(dx>60&&dy<60&&tx<30&&!S.sbo){S.sbo=true;R()}
    // Swipe left: close sidebar
    if(dx<-60&&dy<60&&S.sbo){S.sbo=false;R()}
  },{passive:true});
})();

// *** Show loading screen first ***
MT.loading=!MT.isMaster&&!!SB_DEFAULT_KEY;
R();

// *** AUTO-CONNECT: Apply default Supabase credentials if not set ***
if(SB_DEFAULT_KEY){
  if(!S.sb.url)S.sb.url=SB_DEFAULT_URL;
  if(!S.sb.key)S.sb.key=SB_DEFAULT_KEY;
  S.sb.enabled=true;
}

// *** AUTO-LOAD: Load data BEFORE allowing interaction ***
if(S.sb.url&&S.sb.key&&!MT.isMaster){
  loadFromSupabase(function(ok){
    MT.loading=false;
    MT.dataLoaded=true; // Flag: data has been loaded, safe to save
    // Auto-fix team names to standardized format
    if(ok){
      // Normalize all data to uppercase
      S.cls.forEach(function(c){c.nm=uc(c.nm);c.yr=uc(c.yr)});
      S.spt.forEach(function(s){s.nm=uc(s.nm)});
      S.enr.forEach(function(e){e.tn=uc(e.tn)});
      var nFixed=autoFixTeamNames();
      if(nFixed>0)console.log('autoFixTeamNames: corrected '+nFixed+' team name(s)');
    }
    if(ok){R()}else{R()} // Render either way after load attempt
    // Check if school is active
    if(MT.schoolCode){
      fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.master_schools&select=data',{
        headers:{'apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key}
      }).then(function(r){return r.json()}).then(function(rows){
        if(rows&&rows.length&&rows[0].data){
          try{
            var schools=JSON.parse(rows[0].data);
            var mine=schools.find(function(s){return s.code===MT.schoolCode});
            if(mine&&mine.status==='inactive'){MT.schoolBlocked=true;R()}
          }catch(e){}
        }
      }).catch(function(){});
    }
  });
} else {
  MT.loading=false;
  MT.dataLoaded=true;
}
</script>
</body>
</html>
