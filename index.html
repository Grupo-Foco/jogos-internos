// ── EXPORT: Chaveamento como HTML para divulgação ───────────────────────────

function exportBracketByKey(bkey,bcat){
  var parts=bkey.split('__');
  var spId=parts[1]||parts[0];
  var serie=parts.slice(2).join('__')||'';
  var rds=S.brk[bkey]&&S.brk[bkey][bcat]?S.brk[bkey][bcat]:[];
  if(!rds.length){alert('Nenhum confronto encontrado para exportar.\nVerifique se o chaveamento foi importado corretamente.');return;}
  var sp=S.spt.find(function(s){return s.id===spId});
  var serieLabel=serie&&serie!=='GERAL'?' - '+serie:'';
  var title=S.ev.name+' — '+(sp?sp.nm:'')+' '+bcat+serieLabel;
  _runExport(rds,sp,bcat,title,serie);
}
function _runExport(rds,sp,bcat,title,serie){
  // Detect rodízio/groups: match list mode if any classify round has 3+ matches or label contains Grupo/Rodizio
  var hasGroupsExp=rds.some(function(rd){return rd.label&&(rd.label.indexOf('Grupo')>=0||rd.label==='Rodizio')});
  var hasSemiExp=rds.some(function(rd){return rd.label==='Semifinal'});
  var isMatchList=!hasSemiExp&&(rds.length===1||hasGroupsExp||(rds[0]&&rds[0].m&&rds[0].m.length>=3));
  var ECOLS={'ROXO':'#8b5cf6','VERDE':'#22c55e','VERMELHO':'#ef4444','AMARELO':'#eab308','AZUL':'#3b82f6','ROSA':'#ec4899','PRETO':'#334155','CINZA':'#6b7280','LARANJA':'#f97316'};
  function ec(nm){var col='#64748b';var u=(nm||'').toUpperCase();Object.entries(ECOLS).forEach(function(e){if(u.indexOf(e[0])>=0)col=e[1]});return col;}
  var rounds='';
  rds.forEach(function(rd){
    var rdLabel=rd.label||rName(rd.r,rds.length);rounds+='<div class="round"><div class="rtitle">'+rdLabel+'</div>';
    rd.m.forEach(function(m){
      var n1=tName(m.t1),n2=tName(m.t2);
      var w1=m.w===m.t1?' winner':'',w2=m.w===m.t2?' winner':'';
      var wo1=m.wo===m.t1?' wo':'',wo2=m.wo===m.t2?' wo':'';
      var hora=m._hora?'<div class="mhora">'+m._hora+(m.lc?' · '+m.lc:'')+'</div>':'';
      var dot1='<span class="tdot" style="background:'+ec(n1)+'"></span>';
      var dot2='<span class="tdot" style="background:'+ec(n2)+'"></span>';
      rounds+='<div class="match">'+hora
        +'<div class="team'+w1+wo1+'"><span>'+dot1+n1+'</span>'+(m.s1!=null?'<b>'+m.s1+'</b>':'')+'</div>'
        +'<div class="team'+w2+wo2+'"><span>'+dot2+n2+'</span>'+(m.s2!=null?'<b>'+m.s2+'</b>':'')+'</div>'
        +'</div>';
    });
    rounds+='</div>';
  });
  // Match list (rodizio)
  var matchListHtml='';
  if(isMatchList){
    var allM=[];rds.forEach(function(rd){rd.m.forEach(function(m){allM.push(m)})});
    // Separate classify from final/3rd (use _slot1 metadata for resolved finals)
    var classM=[],finalM=[];
    allM.forEach(function(m){
      var slot1=m._slot1||m.t1||'';
      var slot2=m._slot2||m.t2||'';
      var isFinal=slot1.indexOf('GW_')===0||slot1.indexOf('W_')===0||slot2.indexOf('GW_')===0||slot2.indexOf('W_')===0||m.is3rd;
      if(isFinal)finalM.push(m);else classM.push(m);
    });
    var displayM=classM.length?classM:allM;
    matchListHtml='<table><thead><tr><th>#</th><th>Confronto</th><th>Resultado</th></tr></thead><tbody>';
    displayM.forEach(function(m,i){
      var n1=tName(m.t1),n2=tName(m.t2);
      var hasRes=m.s1!=null&&m.s2!=null;
      var meta=[m._hora,m.lc].filter(Boolean).join(' ');
      matchListHtml+='<tr><td class="num">'+(i+1)+'</td>'
        +'<td><span class="dot" style="background:'+ec(n1)+'"></span><b>'+n1+'</b>'
        +' <span class="vs">x</span> '
        +'<span class="dot" style="background:'+ec(n2)+'"></span><b>'+n2+'</b>'
        +(meta?'<span class="meta"> '+meta+'</span>':'')
        +'</td>'
        +'<td class="score">'+(hasRes?'<b class="res">'+m.s1+' x '+m.s2+'</b>':'—')+'</td></tr>';
    });
    matchListHtml+='</tbody></table>';
    // Show final section
    if(finalM.length){
      matchListHtml+='<div style="margin-top:20px">';
      finalM.forEach(function(m){
        var n1=tName(m.t1),n2=tName(m.t2);
        var label=m.is3rd?'🥉 Disputa de 3º Lugar':'🏆 Final';
        var color=m.is3rd?'#f59e0b':'#22d3ee';
        var hasRes=m.s1!=null&&m.s2!=null;
        var hora=[m._hora,m.lc].filter(Boolean).join(' ');
        matchListHtml+='<div style="border:2px solid '+color+';border-radius:10px;overflow:hidden;margin-bottom:10px">'
          +'<div style="background:'+color+'22;padding:6px 14px;font-size:11px;font-weight:700;color:'+color+';display:flex;justify-content:space-between">'
          +label+(hora?'<span style="font-weight:400">'+hora+'</span>':'')+' </div>'
          +'<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;font-size:15px;border-top:1px solid rgba(255,255,255,.06)">'
          +'<span><span class="dot" style="background:'+ec(n1)+'"></span><b>'+n1+'</b></span>'
          +(hasRes?'<b style="font-family:monospace;font-size:18px;font-weight:800;color:#34d399">'+m.s1+' x '+m.s2+'</b>':'<span style="color:#475569">A definir</span>')
          +'<span><span class="dot" style="background:'+ec(n2)+'"></span><b>'+n2+'</b></span>'
          +'</div></div>';
      });
      matchListHtml+='</div>';
    }
  }
  var out='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>'+title+'</title>'
    +'<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:-apple-system,system-ui,Arial,sans-serif;background:#0a0e1a;color:#f1f5f9;padding:24px 32px;min-height:100vh}'

function exportBracket(ano,bsid,bcat){

}

function exportAgenda(ano){
  var all=[];
  Object.entries(S.brk).forEach(function(e1){
    var bk=e1[0],cts=e1[1];
    var parts=bk.split('__');
    var a=parts.length>1?parts[0]:'';
    var si=parts.length>1?parts[1]:parts[0];
    Object.entries(cts).forEach(function(e2){
      var ct=e2[0],rs=e2[1];
      rs.forEach(function(r){
        r.m.forEach(function(m){
          if(m.t1!=='BYE'&&m.t2!=='BYE')
            all.push(Object.assign({},m,{si:si,ct:ct,tR:rs.length,ano:a}));
        });
      });
    });
  });
  var filtered=ano?all.filter(function(m){return m.ano===ano}):all;
  filtered.sort(function(a,b){return a.dt&&b.dt?new Date(a.dt)-new Date(b.dt):a.dt?-1:b.dt?1:0});
  var title=S.ev.name+(ano?' \u2014 '+ano:'');
  var rows='';
  filtered.forEach(function(m){
    var sp=S.spt.find(function(s){return s.id===m.si});
    var dtStr=m.dt?new Date(m.dt).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'A definir';
    var stCls=m.w?'fin':m.dt?'age':'pnd';
    var stLbl=m.w?'Encerrado':m.dt?'Agendado':'\u2014';
    rows+='<tr>'
      +'<td><b>'+(sp?sp.nm:'')+'</b><div class="sub">'+m.ct+(m.ano?' &middot; '+m.ano:'')+'</div></td>'
      +'<td><span class="fase">'+rName(m.r,m.tR)+'</span></td>'
      +'<td class="vs">'+tName(m.t1)+' <span>\u00d7</span> '+tName(m.t2)+'</td>'
      +'<td class="dt">'+dtStr+'</td>'
      +'<td>'+(m.lc||'\u2014')+'</td>'
      +'<td><span class="st '+stCls+'">'+stLbl+'</span></td>'
      +'</tr>';
  });
  var out='<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8">'
    +'<meta name="viewport" content="width=device-width,initial-scale=1">'
    +'<title>'+title+'</title>'
    +'<style>'
    +'*{margin:0;padding:0;box-sizing:border-box}'
    +'body{font-family:Arial,sans-serif;background:#0a0e1a;color:#f1f5f9;padding:28px}'
    +'h1{font-size:22px;font-weight:800;margin-bottom:4px;color:#22d3ee}'
    +'.sub2{font-size:12px;color:#64748b;margin-bottom:24px}'
    +'table{width:100%;border-collapse:collapse}'
    +'th{text-align:left;padding:9px 14px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#64748b;border-bottom:2px solid #1e293b}'
    +'td{padding:10px 14px;font-size:13px;border-bottom:1px solid #1a2236;vertical-align:middle}'
    +'tr:hover td{background:#111827}'
    +'.sub{font-size:10px;color:#64748b;margin-top:2px}'
    +'.vs{font-weight:700;white-space:nowrap}.vs span{color:#475569;margin:0 4px}'
    +'.dt{font-family:monospace;font-size:11px;white-space:nowrap;color:#94a3b8}'
    +'.fase{background:rgba(167,139,250,.18);color:#a78bfa;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}'
    +'.st{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;white-space:nowrap}'
    +'.fin{background:rgba(52,211,153,.18);color:#34d399}'
    +'.age{background:rgba(251,191,36,.15);color:#fbbf24}'
    +'.pnd{background:rgba(100,116,139,.15);color:#64748b}'
    +'footer{margin-top:32px;font-size:11px;color:#334155;text-align:center}'
    +'</style></head><body>'
    +'<h1>'+title+'</h1>'
    +'<p class="sub2">Gerado em '+new Date().toLocaleString('pt-BR')+'</p>'
    +(filtered.length
      ?'<table><thead><tr><th>Esporte</th><th>Fase</th><th>Confronto</th><th>Data / Hora</th><th>Local</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table>'
      :'<p style="color:#64748b;text-align:center;padding:48px">Nenhum jogo agendado</p>')
    +'<footer>'+S.ev.name+'</footer>'
    +'</body></html>';
  var blob=new Blob([out],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='agenda_'+(ano||'geral')+'.html';
  document.body.appendChild(a);
  a.click();

  URL.revokeObjectURL(a.href);
}

function renderLogin(root){
  root.style.display='flex';

    h('h1',{style:{
      fontSize:'28px',fontWeight:'800',letterSpacing:'-0.5px',
      background:'linear-gradient(135deg,#22d3ee,#a78bfa)',
      webkitBackgroundClip:'text',webkitTextFillColor:'transparent',
      backgroundClip:'text',marginBottom:'6px'
    }},S.ev&&S.ev.name?S.ev.name:'Jogos Internos'),
    h('p',{style:{fontSize:'13px',color:'#64748b'}},
      'Faça login para continuar')
  ));

  // Card
  var card=h('div',{style:{
    background:'#111827',border:'1px solid #2d3a52',borderRadius:'20px',
    padding:'32px',width:'100%',maxWidth:'380px',
    boxShadow:'0 24px 64px rgba(0,0,0,.5)'
  }});

  var errDiv=h('div',{style:{
    display:S.loginErr?'block':'none',
    background:'rgba(248,113,113,.12)',color:'#f87171',
    border:'1px solid rgba(248,113,113,.3)',
    borderRadius:'8px',padding:'10px 14px',fontSize:'13px',marginBottom:'16px'
  }},S.loginErr||'');

  var loginInput=h('input',{
    'class':'fi',type:'text',placeholder:'Login',
    style:{marginBottom:'12px',fontSize:'15px'},
    onkeydown:function(e){if(e.key==='Enter')senhaInput.focus()}
  });
  var senhaInput=h('input',{
    'class':'fi',type:'password',placeholder:'Senha',
    style:{marginBottom:'20px',fontSize:'15px'},
    onkeydown:function(e){if(e.key==='Enter')doLogin()}
  });

  function doLogin(){
    var lg=loginInput.value.trim();
    var pw=senhaInput.value.trim();
    if(!lg||!pw){S.loginErr='Preencha login e senha.';R();return}
    // Admin check (default 'admin' user)
    if(lg.toLowerCase()==='admin'&&pw===S.adminPass){
      S.auth={role:'admin',name:'Administrador',login:'admin'};S.role='admin';S.page='dashboard';S.loginErr='';
      logAudit('Login','Login do administrador principal');R();return;
    }
    // Additional admins check
    var foundA=(S.adminLogins||[]).find(function(l){
      return l.login.toLowerCase()===lg.toLowerCase()&&l.senha===pw;
    });
    if(foundA){
      S.auth={role:'admin',name:foundA.name,login:foundA.login};
      S.role='admin';S.page='dashboard';S.loginErr='';
      logAudit('Login','Admin '+foundA.name+' fez login');R();return;
    }
    // Student check
    var found=S.logins.find(function(l){
      return l.login.toLowerCase()===lg.toLowerCase()&&l.senha===pw;
    });
    if(found){
      var cl=S.cls.find(function(c){return c.id===found.ci});
      S.auth={role:'student',ci:found.ci,cn:found.cn,login:found.login};
      S.role='student';S.page='dashboard';S.loginErr='';R();return;
    }
    // Judge check
    var foundJ=S.judgeLogins.find(function(l){
      return l.login.toLowerCase()===lg.toLowerCase()&&l.senha===pw;
    });
    if(foundJ){
      S.auth={role:'judge',name:foundJ.name,login:foundJ.login};
      S.role='judge';S.page='dashboard';S.loginErr='';R();return;
    }
    S.loginErr='Login ou senha incorretos.';
    senhaInput.value='';
    R();
  }

  var btnLogin=h('button',{
    'class':'btn-d',
    style:{width:'100%',justifyContent:'center',fontSize:'15px',padding:'12px'},
    onclick:doLogin
  },'Entrar');

  card.appendChild(errDiv);
  card.appendChild(h('div',{'class':'fg'},h('label',{'class':'fl'},'Login'),loginInput));
  card.appendChild(h('div',{'class':'fg'},h('label',{'class':'fl'},'Senha'),senhaInput));
  card.appendChild(btnLogin);

  // Hint for admin
  card.appendChild(h('div',{style:{
    marginTop:'20px',padding:'12px',background:'rgba(34,211,238,.06)',
    border:'1px solid rgba(34,211,238,.12)',borderRadius:'10px',
    fontSize:'11px',color:'#64748b',textAlign:'center',lineHeight:'1.7'
  }},
    h('b',{style:{color:'#22d3ee',display:'block',marginBottom:'2px'}},'Administrador'),
    'Login: admin  ·  Senha definida nas configurações'
  ));

  wrap.appendChild(card);

  // Footer
  wrap.appendChild(h('p',{style:{marginTop:'24px',fontSize:'11px',color:'#334155'}},
    S.ev&&S.ev.name?S.ev.name:'Jogos Internos'));
  root.appendChild(wrap);

  // Auto-focus
  setTimeout(function(){loginInput.focus()},50);
}

function mAddLogin(c){

  var ov=h('div',{'class':'ov'});
  ov.onclick=function(e){if(e.target===ov){S.mod=null;R()}};
  var close=function(){S.mod=null;R()};
  var errDiv=h('div',{style:{display:'none',color:'#f87171',fontSize:'12px',marginBottom:'8px'}});

  // Auto-generate login/senha when turma changes
  var loginInp=h('input',{'class':'fi',placeholder:'Ex: 3A-FUT',oninput:function(e){f.login=e.target.value}});
  var senhaInp=h('input',{'class':'fi',placeholder:'Ex: nome do capitão',oninput:function(e){f.senha=e.target.value}});
  var cnInp=h('input',{'class':'fi',placeholder:'Ex: João Silva',oninput:function(e){

    // Auto-fill senha with captain name if empty
    if(!senhaInp.value){senhaInp.value=f.cn.split(' ')[0].toLowerCase();f.senha=senhaInp.value;}
  }});

  // Class select grouped by year
  var cs=h('select',{'class':'fs',onchange:function(e){
    f.ci=e.target.value;
    var cl=S.cls.find(function(x){return x.id===f.ci});
    if(cl&&!loginInp.value){
      // Auto-generate login suggestion: e.g. "3A" + random 3 digits
      var k=cl.nm.replace(/[^A-Za-z0-9]/g,'').toUpperCase().slice(0,4);
      var suggestion=k+'-'+Math.floor(100+Math.random()*900);
      loginInp.value=suggestion;f.login=suggestion;
    }
  }},h('option',{value:''},'Selecione a turma...'));
  var anos=getAnos();
  if(anos.length){
    anos.forEach(function(a){
      var grp=document.createElement('optgroup');grp.label=a;
      getClsByAno(a).forEach(function(x){
        grp.appendChild(h('option',{value:x.id},x.nm));
      });
      cs.appendChild(grp);
    });
  } else {
    S.cls.forEach(function(x){cs.appendChild(h('option',{value:x.id},x.nm))});
  }

  ov.appendChild(h('div',{'class':'md'},
    h('div',{'class':'md-h'},h('div',{'class':'md-t'},'Novo Login de Aluno'),h('button',{'class':'btn btn-s',onclick:close},'✕')),
    h('div',{'class':'md-b'},
      errDiv,
      h('div',{'class':'fg'},h('label',{'class':'fl'},'Turma'),cs),
      h('div',{'class':'fg'},h('label',{'class':'fl'},'Nome do Capitão'),cnInp),
      h('div',{'class':'fr'},
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Login'),loginInp),
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Senha'),senhaInp)
      ),
      h('div',{style:{fontSize:'11px',color:'var(--tx3)',marginTop:'4px',lineHeight:'1.6'}},
        '💡 O login e senha são gerados automaticamente ao escolher a turma. Você pode editar livremente.'
      )
    ),
    h('div',{'class':'md-f'},
      h('button',{'class':'btn',onclick:close},'Cancelar'),
      h('button',{'class':'btn btn-p',onclick:function(){
        f.login=(f.login||loginInp.value).trim();
        f.senha=(f.senha||senhaInp.value).trim();
        f.cn=(f.cn||cnInp.value).trim();
        if(!f.ci){errDiv.style.display='block';errDiv.textContent='Selecione a turma.';return}
        if(!f.login){errDiv.style.display='block';errDiv.textContent='Digite um login.';return}
        if(!f.senha){errDiv.style.display='block';errDiv.textContent='Digite uma senha.';return}
        if(S.logins.find(function(l){return l.login.toLowerCase()===f.login.toLowerCase()})){
          errDiv.style.display='block';errDiv.textContent='Este login já existe.';return;
        }
        S.logins.push({id:uid(),ci:f.ci,cn:f.cn,login:f.login,senha:f.senha});
        S.mod=null;R();
      }},'Criar Login')
    )
  ));
  c.appendChild(ov);
}

function pAudit(c){
  if(!S.auditLog)S.auditLog=[];
  var roleColors={admin:'#22d3ee',judge:'#a78bfa',student:'#34d399',Sistema:'#64748b'};
  var roleLabels={admin:'ADMIN',judge:'JUIZ',student:'ALUNO'};
  c.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'12px',flexWrap:'wrap',gap:'8px'}},
    h('div',{style:{fontSize:'13px',color:'var(--tx2)'}},S.auditLog.length+' registro(s) de auditoria'),
    h('div',{style:{display:'flex',gap:'6px'}},
      h('button',{'class':'btn btn-s',onclick:function(){
        var rows='Data/Hora,Usuário,Perfil,Ação,Detalhes\n';
        S.auditLog.forEach(function(a){
          var d=new Date(a.timestamp).toLocaleString('pt-BR');
          rows+='"'+d+'","'+a.user+'","'+(roleLabels[a.role]||a.role)+'","'+a.action+'","'+(a.details||'').replace(/"/g,'""')+'"\n';
        });
        var blob=new Blob(['\ufeff'+rows],{type:'text/csv;charset=utf-8'});
        var a=document.createElement('a');a.href=URL.createObjectURL(blob);
        a.download='auditoria_'+new Date().toISOString().slice(0,10)+'.csv';
        document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
      }},'📊 Exportar CSV'),
      h('button',{'class':'btn btn-s btn-r',onclick:function(){
        if(confirm('Limpar TODO o histórico de auditoria? Esta ação é irreversível.')){
          S.auditLog=[];logAudit('Limpeza de auditoria','Histórico zerado');R();
        }
      }},'🗑 Limpar')
    )
  ));
  if(!S.auditLog.length){
    c.appendChild(h('div',{'class':'card'},h('div',{'class':'card-b'},h('div',{'class':'em'},'Nenhum registro de auditoria ainda.'))));
    return;
  }
  var rows=S.auditLog.map(function(a){
    var d=new Date(a.timestamp);
    var dStr=d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    var rc=roleColors[a.role]||'#64748b';
    return h('tr',{},
      h('td',{'data-label':'Data',style:{fontFamily:'monospace',fontSize:'11px',color:'var(--tx3)',whiteSpace:'nowrap'}},dStr),
      h('td',{'data-label':'Usuário',style:{fontWeight:'600'}},a.user),
      h('td',{'data-label':'Perfil'},h('span',{style:{display:'inline-block',padding:'2px 8px',borderRadius:'12px',background:rc+'22',color:rc,fontSize:'10px',fontWeight:'700',letterSpacing:'.5px'}},roleLabels[a.role]||a.role.toUpperCase())),
      h('td',{'data-label':'Ação',style:{fontWeight:'600',color:'var(--pr)',fontSize:'12px'}},a.action),
      h('td',{'data-label':'Detalhes',style:{fontSize:'11px',color:'var(--tx2)'}},a.details||'—')
    );
  });
  c.appendChild(h('div',{'class':'card'},h('div',{'class':'tw'},h('table',{'class':'mob-cards'},
    h('thead',{},h('tr',{},h('th',{},'Data/Hora'),h('th',{},'Usuário'),h('th',{},'Perfil'),h('th',{},'Ação'),h('th',{},'Detalhes'))),
    h('tbody',{},rows)
  ))));
}

function pRecursos(c){
  var stColors={pending:'var(--am)',approved:'var(--gn)',rejected:'var(--rd)'};
  var stLabels={pending:'Pendente',approved:'Deferido',rejected:'Indeferido'};

  // New resource button
  c.appendChild(h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},
    h('div',{style:{color:'var(--tx2)',fontSize:'13px'}},S.recursos.length+' recurso(s)'),
    h('button',{'class':'btn btn-p',onclick:function(){S.mod={tp:'addRecurso'};R()}},'+ Novo Recurso')
  ));

  // Filter by role: admin sees all, others see their own
  var filtered=S.recursos;
  if(S.role==='student'){
    filtered=S.recursos.filter(function(r){return r.authorRole==='student'&&r.authorId===(S.auth&&S.auth.login)});
  } else if(S.role==='judge'){
    filtered=S.recursos.filter(function(r){return r.authorRole==='judge'&&r.authorId===(S.auth&&S.auth.login)});
  }
  // Sort newest first
  filtered=filtered.slice().sort(function(a,b){return(b.ts||0)-(a.ts||0)});

  if(!filtered.length){
    c.appendChild(h('div',{'class':'card'},h('div',{'class':'card-b'},h('div',{'class':'em'},'Nenhum recurso registrado.'))));
  } else {
    filtered.forEach(function(rec){
      var sp=rec.sportId?S.spt.find(function(s){return s.id===rec.sportId}):null;
      var card=h('div',{'class':'card',style:{marginBottom:'12px'}});
      var header=h('div',{'class':'card-h'},
        h('div',{style:{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}},
          h('span',{'class':'badge '+(rec.authorRole==='judge'?'bp':rec.authorRole==='student'?'bc':'bg')},
            rec.authorRole==='judge'?'⚖️ Juiz':rec.authorRole==='student'?'🎓 Aluno':'👑 Admin'),
          h('span',{style:{fontWeight:'700',fontSize:'13px'}},rec.authorName||'—'),
          h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},rec.date||'')
        ),
        h('span',{'class':'badge',style:{background:stColors[rec.status||'pending']+'22',color:stColors[rec.status||'pending']}},stLabels[rec.status||'pending'])
      );
      var body=h('div',{'class':'card-b'},
        h('div',{style:{display:'flex',gap:'12px',flexWrap:'wrap',marginBottom:'10px',fontSize:'12px',color:'var(--tx2)'}},
          sp?h('span',null,'⚽ '+sp.nm):null,
          rec.category?h('span',null,'📌 '+rec.category):null,
          rec.time?h('span',null,'🕐 '+rec.time):null,
          rec.matchTeams?h('span',null,'🏟️ '+rec.matchTeams):null
        ),
        h('div',{style:{fontSize:'13px',lineHeight:'1.6',color:'var(--tx)',whiteSpace:'pre-wrap'}},rec.description||''),
        rec.involved?h('div',{style:{marginTop:'8px',fontSize:'12px',color:'var(--tx2)'}},
          h('b',null,'Envolvidos: '),rec.involved):null,
        rec.turma?h('div',{style:{marginTop:'4px',fontSize:'12px',color:'var(--tx2)'}},
          h('b',null,'Turma: '),rec.turma):null
      );
      // Admin actions
      if(S.role==='admin'&&(rec.status==='pending'||!rec.status)){
        var adminResp=h('input',{'class':'fi',placeholder:'Resposta do admin (opcional)',style:{marginTop:'10px',marginBottom:'6px'}});
        // Punishment: select turma + points
        var punishCls=h('select',{'class':'fs',style:{maxWidth:'180px'}},h('option',{value:''},'Nenhuma punição'));
        S.cls.forEach(function(cl){punishCls.appendChild(h('option',{value:cl.id},cl.nm))});
        var punishPts=h('input',{'class':'fi',type:'number',inputmode:'numeric',placeholder:'-5',style:{maxWidth:'80px'},value:rec.punishPts||''});
        body.appendChild(adminResp);
        body.appendChild(h('div',{style:{display:'flex',gap:'6px',alignItems:'center',marginBottom:'8px',flexWrap:'wrap'}},
          h('span',{style:{fontSize:'11px',color:'var(--tx3)',fontWeight:'600'}},'Punição:'),
          punishCls,
          h('span',{style:{fontSize:'11px',color:'var(--tx3)'}},'Pontos:'),
          punishPts
        ));
        body.appendChild(h('div',{style:{display:'flex',gap:'6px',justifyContent:'flex-end'}},
          h('button',{'class':'btn btn-g btn-s',onclick:(function(rid,respInp,pCls,pPts){return function(){
            var r2=S.recursos.find(function(x){return x.id===rid});
            if(r2){r2.status='approved';r2.adminResp=respInp.value.trim();r2.resolvedAt=new Date().toLocaleString('pt-BR');
              var pTxt='';
              if(pCls.value){r2.punishClassId=pCls.value;r2.punishPts=parseInt(pPts.value)||0;
                var cn=S.cls.find(function(c){return c.id===pCls.value});
                pTxt=' · Punição: '+(cn?cn.nm:'?')+' '+(parseInt(pPts.value)||0)+' pts';
              }
              logAudit('Deferimento de recurso','Recurso de "'+(r2.author||'?')+'" deferido'+pTxt);
            }R();
          }})(rec.id,adminResp,punishCls,punishPts)},'✅ Deferir'),
          h('button',{'class':'btn btn-r btn-s',onclick:(function(rid,respInp,pCls,pPts){return function(){
            var r2=S.recursos.find(function(x){return x.id===rid});
            if(r2){r2.status='rejected';r2.adminResp=respInp.value.trim();r2.resolvedAt=new Date().toLocaleString('pt-BR');
              if(pCls.value){r2.punishClassId=pCls.value;r2.punishPts=parseInt(pPts.value)||0}
              logAudit('Indeferimento de recurso','Recurso de "'+(r2.author||'?')+'" indeferido');
            }R();
          }})(rec.id,adminResp,punishCls,punishPts)},'❌ Indeferir')
        ));
      }
      // Edit button for admin on resolved recursos
      if(S.role==='admin'&&rec.status&&rec.status!=='pending'){
        body.appendChild(h('div',{style:{marginTop:'6px',display:'flex',justifyContent:'flex-end'}},
          h('button',{'class':'btn btn-s',onclick:(function(rid){return function(){
            var r2=S.recursos.find(function(x){return x.id===rid});
            if(r2){r2.status='pending';r2.adminResp='';r2.resolvedAt='';r2.punishClassId='';r2.punishPts=0;
              logAudit('Reabertura de recurso','Recurso de "'+(r2.author||'?')+'" reaberto');
            }R();
          }})(rec.id)},'✏️ Editar / Reabrir')
        ));
      }
      // Show admin response if resolved
      if(rec.adminResp||rec.punishClassId){
        var punishCl=rec.punishClassId?S.cls.find(function(x){return x.id===rec.punishClassId}):null;
        body.appendChild(h('div',{style:{marginTop:'10px',padding:'10px 14px',borderRadius:'8px',
          background:rec.status==='approved'?'var(--gnG)':'var(--rdG)',
          border:'1px solid '+(rec.status==='approved'?'var(--gn)':'var(--rd)'),
          fontSize:'12px',lineHeight:'1.6'}},
          h('b',{style:{color:rec.status==='approved'?'var(--gn)':'var(--rd)'}},rec.status==='approved'?'✅ Deferido':'❌ Indeferido'),
          rec.resolvedAt?h('span',{style:{color:'var(--tx3)',marginLeft:'8px',fontSize:'11px'}},rec.resolvedAt):null,
          rec.adminResp?h('div',{style:{marginTop:'4px',color:'var(--tx2)'}},rec.adminResp):null,
          punishCl?h('div',{style:{marginTop:'6px',padding:'6px 10px',background:'var(--rdG)',borderRadius:'6px',color:'var(--rd)',fontWeight:'700'}},
            '⚠️ Punição: '+punishCl.nm+' → '+(rec.punishPts||0)+' pontos'):null
        ));
      }
      card.appendChild(header);
      card.appendChild(body);
      c.appendChild(card);
    });
  }

  // Modal
  if(S.mod&&S.mod.tp==='addRecurso')mAddRecurso(c);
}

function getAllConflicts(){
  // Build flat list of all scheduled matches with resolved class IDs
  var scheduled=[];
  Object.entries(S.brk).forEach(function(bkE){
    var bk=bkE[0],cts=bkE[1];
    var parts=bk.split('__');
    var ano=parts.length>1?parts[0]:'';
    var siId=parts.length>1?parts[1]:parts[0];
    var sp=S.spt.find(function(s){return s.id===siId});
    var dur=(sp&&sp.dur)||14;
    Object.entries(cts).forEach(function(ctE){
      var ct=ctE[0],rds=ctE[1];
      rds.forEach(function(rd){rd.m.forEach(function(m){
        if(!m.dt||m.t1==='BYE'||m.t2==='BYE')return;
        var e1=S.enr.find(function(e){return e.id===m.t1});
        var e2=S.enr.find(function(e){return e.id===m.t2});
        var start=new Date(m.dt);
        var end=new Date(start.getTime()+dur*60000);
        scheduled.push({
          id:m.id,bk:bk,ct:ct,ano:ano,siId:siId,spNm:sp?sp.nm:'?',
          t1:m.t1,t2:m.t2,ci1:e1&&e1.ci,ci2:e2&&e2.ci,
          start:start,end:end,dur:dur,dt:m.dt,lc:m.lc,
          tn1:e1?e1.tn:'?',tn2:e2?e2.tn:'?',
          rnd:m.r,tR:rds.length,is3rd:m.is3rd
        });
      })});
    });
  });

  // Find conflicts: pairs of matches that overlap AND share a turma (class)
  var conflicts=[];
  for(var i=0;i<scheduled.length;i++){
    for(var j=i+1;j<scheduled.length;j++){
      var a=scheduled[i], b=scheduled[j];
      // Time overlap?
      if(a.end<=b.start||b.end<=a.start)continue;
      // Share a turma?
      var shared=[];
      if(a.ci1&&(a.ci1===b.ci1||a.ci1===b.ci2))shared.push(a.ci1);
      if(a.ci2&&(a.ci2===b.ci1||a.ci2===b.ci2))shared.push(a.ci2);
      if(!shared.length)continue;
      var cl=S.cls.find(function(x){return x.id===shared[0]});
      conflicts.push({a:a,b:b,cls:cl?cl.nm:'?'});
    }
  }
  return {conflicts:conflicts,total:scheduled.length};
}

// Apply a new datetime to a specific match across all brackets
function applyMatchTime(bk,ct,matchId,newdt){
  if(!S.brk[bk]||!S.brk[bk][ct])return;
  S.brk[bk][ct]=S.brk[bk][ct].map(function(rd){
    return Object.assign({},rd,{m:rd.m.map(function(m){
      return m.id===matchId?Object.assign({},m,{dt:newdt}):m;
    })});
  });
}

var _syncTimer=null;
function scheduleSave(){
  if(!S.sb.enabled||!S.sb.url||!S.sb.key)return;
  // SAFETY: Don't save if data hasn't been loaded from Supabase yet
  if(!MT.dataLoaded){console.log('scheduleSave blocked: data not loaded yet');return}
  // SAFETY: Don't save if state appears empty (protection against overwrite with blank)
  if(!S.cls.length&&!S.spt.length&&!S.enr.length&&!S.logins.length&&!S.judgeLogins.length&&S.adminPass==='admin123'){
    // State looks like fresh/default — check if this school has existing data
    // Only allow save if data was confirmed loaded (MT.dataLoaded=true)
    console.log('scheduleSave: state appears empty, saving anyway (dataLoaded='+MT.dataLoaded+')');
  }
  if(_syncTimer)clearTimeout(_syncTimer);
  _syncTimer=setTimeout(function(){syncToSupabase(false)},2000);
}

function getDbPayload(){
  return {
    id:getSchoolDbId(),
    data:JSON.stringify({
      cls:S.cls,spt:S.spt,enr:S.enr,brk:S.brk,locs:S.locs,
      ev:S.ev,logins:S.logins,judgeLogins:S.judgeLogins,adminLogins:S.adminLogins||[],auditLog:S.auditLog||[],
      recursos:S.recursos,adminPass:S.adminPass,
      thirdPlace:S.thirdPlace,appInfo:S.appInfo,
      scoring:S.scoring,podiums:S.podiums,woLog:S.woLog
    }),
    updated_at:new Date().toISOString()
  };
}

function syncToSupabase(manual){
  if(!S.sb.url||!S.sb.key){
    if(manual)alert('Configure a URL e a chave do Supabase primeiro (⚙️ Configurações).');
    return;
  }
  // SAFETY: Don't save before data is loaded
  if(!MT.dataLoaded&&!manual){console.log('syncToSupabase blocked: waiting for load');return}
  S.sb.syncing=true;
  var hasFocus=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
  if(!S.mod&&!hasFocus)R();
  var payload=getDbPayload();
  // BACKUP: Save a backup copy before overwriting (only every 5 minutes max)
  var now=Date.now();
  var lastBackup=MT._lastBackup||0;
  if(now-lastBackup>300000){// 5 minutes
    MT._lastBackup=now;
    var backupId=getSchoolDbId()+'_backup';
    fetch(S.sb.url+'/rest/v1/jogos_data',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify({id:backupId,data:payload.data,updated_at:new Date().toISOString()})
    }).catch(function(e){console.error('Backup failed:',e)});
  }
  // Main save
  fetch(S.sb.url+'/rest/v1/jogos_data',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'apikey':S.sb.key,
      'Authorization':'Bearer '+S.sb.key,
      'Prefer':'resolution=merge-duplicates'
    },
    body:JSON.stringify(payload)
  }).then(function(res){
    S.sb.syncing=false;
    if(res.ok||res.status===201||res.status===200){
      S.sb.status='ok';S.sb.lastSync=new Date().toISOString();
    } else {
      S.sb.status='error';
      res.text().then(function(t){console.error('Supabase error:',t)});
    }
    var hf2=document.activeElement&&(document.activeElement.tagName==='INPUT'||document.activeElement.tagName==='SELECT'||document.activeElement.tagName==='TEXTAREA');
    if(!S.mod&&!hf2)R();
  }).catch(function(err){
    S.sb.syncing=false;S.sb.status='error';
    console.error('Supabase sync failed:',err);
    if(!S.mod)R();
  });
}

function loadFromSupabase(onDone){
  if(!S.sb.url||!S.sb.key){if(onDone)onDone(false);return;}
  S.sb.syncing=true;R();
  var dbId=getSchoolDbId();
  fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.'+dbId+'&select=data',{
    headers:{
      'apikey':S.sb.key,
      'Authorization':'Bearer '+S.sb.key
    }
  }).then(function(res){return res.json()})
  .then(function(rows){
    S.sb.syncing=false;
    if(rows&&rows.length&&rows[0].data){
      var d=JSON.parse(rows[0].data);
      ['cls','spt','enr','brk','locs','ev','logins','judgeLogins','adminLogins','auditLog','recursos','adminPass','thirdPlace','appInfo','scoring','podiums','woLog'].forEach(function(k){
        if(d[k]!==undefined)S[k]=d[k];
      });
      // If school has a specific admin pass from master, use it
      if(MT.schoolCode&&d.adminPass)S.adminPass=d.adminPass;
      S.sb.status='ok';R();
      if(onDone)onDone(true);
    } else {
      S.sb.status='ok';
      if(onDone)onDone(false);
      R();
    }
  }).catch(function(err){
    S.sb.syncing=false;S.sb.status='error';
    console.error('Supabase load failed:',err);R();
    if(onDone)onDone(false);
  });
}

          var a=document.createElement('a');a.href=URL.createObjectURL(blob);
          a.download='backup_jogos_'+new Date().toISOString().slice(0,10)+'.json';
          document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);
        }},'📥 Exportar JSON'),
        h('button',{'class':'btn btn-s',onclick:function(){
          var inp=document.createElement('input');inp.type='file';inp.accept='.json';
          inp.onchange=function(e){
            if(!e.target.files[0])return;
            var r=new FileReader();r.onload=function(ev){
              try{
                var d=JSON.parse(ev.target.result);
                if(confirm('Isso substituirá TODOS os dados atuais. Confirmar?')){
                  ['cls','spt','enr','brk','locs','ev','logins','adminPass','thirdPlace','appInfo'].forEach(function(k){if(d[k]!==undefined)S[k]=d[k]});
                  S.mod=null;R();alert('✅ Backup restaurado!');
                }
              }catch(err){alert('Erro ao ler JSON: '+err.message)}
            };r.readAsText(e.target.files[0]);
          };
          document.body.appendChild(inp);inp.click();document.body.removeChild(inp);
        }},'📤 Importar JSON'),
        h('button',{'class':'btn btn-s',style:{color:'var(--pr)',borderColor:'var(--pr)'},onclick:function(){
          // GitHub Pages instructions
          alert('📦 Como hospedar no GitHub Pages:\n\n1. Acesse github.com e crie um repositório\n2. Faça upload deste arquivo HTML\n3. Vá em Settings → Pages → selecione a branch\n4. Seu app estará online em: https://[usuário].github.io/[repositório]/\n\n💡 Com Supabase configurado, os dados ficam sincronizados entre todos os dispositivos!');
        }},'🌐 GitHub Pages')
      ),

      h('div',{style:{borderTop:'1px solid var(--bd)',margin:'16px 0'}}),
      // ── Version info ─────────────────────────────────────────────
      h('div',{style:{textAlign:'center',fontSize:'11px',color:'var(--tx3)',lineHeight:'1.8'}},
        h('div',{style:{fontWeight:'700',color:'var(--tx2)',marginBottom:'2px'}},'Jogos Internos Escolares'),
        h('div',{},'Versão '+S.appInfo.version+' · Desenvolvido por '+(S.appInfo.author||'—')),
        h('div',{style:{marginTop:'4px',color:'var(--pr)'}},'🏆')
      )
    ),
    h('div',{'class':'md-f'},
      h('button',{'class':'btn',onclick:close},'Cancelar'),
      h('button',{'class':'btn btn-p',onclick:function(){
        S.appInfo.author=f.author;
        S.appInfo.contact=f.contact;
        S.appInfo.version=f.version;
        S.sb.url=f.sbUrl.replace(/\/$/,'');
        S.sb.key=f.sbKey;
        S.sb.enabled=f.sbEnabled;
        S.mod=null;R();
        if(S.sb.enabled&&S.sb.url&&S.sb.key)scheduleSave();
      }},'Salvar')
    )
  );
  ov.appendChild(md);
  root.appendChild(ov);
}


// ── Touch swipe to close sidebar ────────────────────────────────────────
(function(){
  var tx=0,ty=0;
  document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY},{passive:true});
  document.addEventListener('touchend',function(e){
    if(!S.auth)return;
    var dx=e.changedTouches[0].clientX-tx;
    var dy=Math.abs(e.changedTouches[0].clientY-ty);
    // Swipe right from left edge: open sidebar
    if(dx>60&&dy<60&&tx<30&&!S.sbo){S.sbo=true;R()}
    // Swipe left: close sidebar
    if(dx<-60&&dy<60&&S.sbo){S.sbo=false;R()}
  },{passive:true});
})();

// *** Show loading screen first ***
MT.loading=!MT.isMaster&&!!SB_DEFAULT_KEY;
R();

// *** AUTO-CONNECT: Apply default Supabase credentials if not set ***
if(SB_DEFAULT_KEY){
  if(!S.sb.url)S.sb.url=SB_DEFAULT_URL;
  if(!S.sb.key)S.sb.key=SB_DEFAULT_KEY;
  S.sb.enabled=true;
}

// *** AUTO-LOAD: Load data BEFORE allowing interaction ***
if(S.sb.url&&S.sb.key&&!MT.isMaster){
  loadFromSupabase(function(ok){
    MT.loading=false;
    MT.dataLoaded=true; // Flag: data has been loaded, safe to save
    // Auto-fix team names to standardized format
    if(ok){
      // Normalize all data to uppercase
      S.cls.forEach(function(c){c.nm=uc(c.nm);c.yr=uc(c.yr)});
      S.spt.forEach(function(s){s.nm=uc(s.nm)});
      S.enr.forEach(function(e){e.tn=uc(e.tn)});
      var nFixed=autoFixTeamNames();
      if(nFixed>0)console.log('autoFixTeamNames: corrected '+nFixed+' team name(s)');
      // Recompute group winners for all imported brackets (propagate GW_ slots)
      try{
        Object.entries(S.brk).forEach(function(bke){
          var bk=bke[0],cts=bke[1];
          Object.keys(cts).forEach(function(ct){
            try{recomputeGroupWinners(bk,ct)}catch(e){}
          });
        });
      }catch(e){console.warn('recomputeGroupWinners on load:',e)}
    }
    if(ok){R()}else{R()} // Render either way after load attempt
    // Check if school is active
    if(MT.schoolCode){
      fetch(S.sb.url+'/rest/v1/jogos_data?id=eq.master_schools&select=data',{
        headers:{'apikey':S.sb.key,'Authorization':'Bearer '+S.sb.key}
      }).then(function(r){return r.json()}).then(function(rows){
        if(rows&&rows.length&&rows[0].data){
          try{
            var schools=JSON.parse(rows[0].data);
            var mine=schools.find(function(s){return s.code===MT.schoolCode});
            if(!mine||mine.status==='inactive'){MT.schoolBlocked=true;R()}
          }catch(e){}
        }
      }).catch(function(){});
    }
  });
} else {
  MT.loading=false;
  MT.dataLoaded=true;
}
</script>
</body>
