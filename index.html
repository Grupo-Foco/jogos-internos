<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<title>Jogos Internos Escolares</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
:root {
  --bg:#0a0e1a;--bg2:#111827;--bg3:#1a2236;--bg4:#243049;--bd:#2d3a52;
  --tx:#f1f5f9;--tx2:#94a3b8;--tx3:#64748b;
  --pr:#22d3ee;--pr2:#06b6d4;--prG:rgba(34,211,238,.15);
  --gn:#34d399;--gnG:rgba(52,211,153,.15);
  --am:#fbbf24;--amG:rgba(251,191,36,.12);
  --rd:#f87171;--rdG:rgba(248,113,113,.12);
  --pu:#a78bfa;--puG:rgba(167,139,250,.12);
  --r:8px;--rL:16px;--t:.2s ease;
  --g1:#fbbf24;--g2:#f59e0b;--s1:#94a3b8;--s2:#64748b;
  --b1:#fb923c;--b2:#ea580c;--rt:#000;--ov:rgba(0,0,0,.6);
}
.light {
  --bg:#f0f2f5;--bg2:#fff;--bg3:#f5f6f8;--bg4:#e8ecf1;--bd:#d8dde6;
  --tx:#1a1f2e;--tx2:#4a5568;--tx3:#7a8599;
  --pr:#0891b2;--pr2:#0e7490;--prG:rgba(8,145,178,.1);
  --gn:#059669;--gnG:rgba(5,150,105,.1);
  --am:#d97706;--amG:rgba(217,119,6,.08);
  --rd:#dc2626;--rdG:rgba(220,38,38,.08);
  --pu:#7c3aed;--puG:rgba(124,58,237,.08);
  --g1:#f59e0b;--g2:#d97706;--s1:#6b7280;--s2:#4b5563;
  --b1:#ea580c;--b2:#c2410c;--rt:#fff;--ov:rgba(0,0,0,.35);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s;-webkit-tap-highlight-color:transparent;-webkit-text-size-adjust:100%}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.app{display:flex;min-height:100vh}
.sidebar{width:250px;background:var(--bg2);border-right:1px solid var(--bd);position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;transition:transform .25s,background .3s}
.main{margin-left:250px;flex:1;min-height:100vh}
.sb-head{padding:18px 14px;border-bottom:1px solid var(--bd)}
.sb-logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:16px;background:linear-gradient(135deg,var(--pr),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sb-roles{display:flex;margin-top:12px;background:var(--bg3);border-radius:var(--r);overflow:hidden;border:1px solid var(--bd)}
.sb-role{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:none;background:transparent;color:var(--tx3);cursor:pointer;transition:all var(--t)}
.sb-role.active{background:var(--pr);color:var(--bg)}
.sb-nav{padding:12px 8px;flex:1;overflow-y:auto}
.sb-section{margin-bottom:14px}
.sb-stitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--tx3);padding:0 8px;margin-bottom:5px}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r);border:none;background:transparent;color:var(--tx2);font-size:13px;font-weight:500;width:100%;text-align:left;cursor:pointer;transition:all var(--t)}
.sb-item:hover{background:var(--bg3);color:var(--tx)}
.sb-item.active{background:var(--prG);color:var(--pr)}
.sb-footer{padding:10px;border-top:1px solid var(--bd);font-size:9px;color:var(--tx3);text-align:center;font-family:'Space Mono',monospace}
.topbar{padding:12px 24px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);position:sticky;top:0;z-index:50;transition:background .3s}
.topbar-l{display:flex;align-items:center;gap:10px}
.page-title{font-size:17px;font-weight:700}
.topbar-r{display:flex;gap:5px;align-items:center;flex-wrap:wrap}
.icon-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--bd);background:var(--bg3);color:var(--tx);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all var(--t)}
.icon-btn:hover{border-color:var(--pr);transform:scale(1.1)}
.menu-btn{display:none;width:34px;height:34px;border:1px solid var(--bd);border-radius:var(--r);background:var(--bg3);color:var(--tx);align-items:center;justify-content:center;font-size:18px;cursor:pointer}
.content{padding:20px 24px}
.badge{display:inline-flex;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.bc{background:var(--prG);color:var(--pr)}.bg{background:var(--gnG);color:var(--gn)}.ba{background:var(--amG);color:var(--am)}.br{background:var(--rdG);color:var(--rd)}.bp{background:var(--puG);color:var(--pu)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.btn{padding:6px 12px;min-height:36px;border-radius:var(--r);border:1px solid var(--bd);background:var(--bg3);color:var(--tx);font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px;cursor:pointer;transition:all var(--t);white-space:nowrap;-webkit-tap-highlight-color:transparent}
.btn:hover{background:var(--bg4)}
.btn-p{background:var(--pr);color:var(--bg);border-color:var(--pr)}.btn-p:hover{background:var(--pr2)}
.btn-g{background:var(--gn);color:var(--bg);border-color:var(--gn)}
.btn-r{background:var(--rd);color:var(--bg);border-color:var(--rd)}
.btn-s{padding:3px 7px;font-size:11px}
.btn-d{background:linear-gradient(135deg,var(--pr),var(--pu));color:#fff;border:none;font-size:13px;padding:9px 18px;font-weight:700;border-radius:var(--r);box-shadow:0 3px 16px rgba(34,211,238,.25);cursor:pointer}
.btn-d:hover{transform:translateY(-1px)}
.card{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rL);overflow:hidden;transition:background .3s}
.card-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.card-t{font-size:14px;font-weight:700}
.card-b{padding:16px}
.sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;margin-bottom:20px}
.sc{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rL);padding:16px;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.sc.cy::before{background:var(--pr)}.sc.gn::before{background:var(--gn)}.sc.am::before{background:var(--am)}.sc.pu::before{background:var(--pu)}
.sc-l{font-size:10px;color:var(--tx3);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.sc-v{font-size:26px;font-weight:800;margin-top:2px;font-family:'Space Mono',monospace}
.sc.cy .sc-v{color:var(--pr)}.sc.gn .sc-v{color:var(--gn)}.sc.am .sc-v{color:var(--am)}.sc.pu .sc-v{color:var(--pu)}
.fg{margin-bottom:12px}.fl{display:block;font-size:10px;font-weight:600;color:var(--tx2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.fi,.fs{width:100%;padding:8px 10px;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);color:var(--tx);font-size:16px;outline:none;transition:border-color var(--t);text-transform:uppercase}
.fi:focus,.fs:focus{border-color:var(--pr)}.fs option{background:var(--bg2);color:var(--tx)}@media(min-width:769px){.fi,.fs{font-size:13px}}
.fr{display:flex;gap:8px}.fr>*{flex:1}
.tw{overflow-x:auto}table{width:100%;border-collapse:collapse}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--tx3);border-bottom:1px solid var(--bd)}
td{padding:8px 10px;font-size:13px;border-bottom:1px solid var(--bd)}
tr:last-child td{border-bottom:0}
.tabs{display:flex;gap:2px;margin-bottom:16px;background:var(--bg3);border-radius:var(--r);padding:3px;flex-wrap:wrap}
.tab{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;border:none;background:transparent;color:var(--tx3);cursor:pointer;transition:all var(--t)}
.tab.active{background:var(--pr);color:var(--bg)}
.bw{overflow-x:auto;padding:12px 0}.brs{display:flex;gap:18px;align-items:stretch}
.brd{display:inline-flex;flex-direction:column;justify-content:center;gap:12px;min-width:220px}
.brt{text-align:center;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--tx3);margin-bottom:8px;font-family:'Space Mono',monospace}
.brm{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden}
.bte{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;font-size:12px;font-weight:500}
.bte+.bte{border-top:1px solid var(--bd)}.bte.win{background:var(--gnG);color:var(--gn);font-weight:700}.bte.bye{color:var(--tx3);font-style:italic}.bte.wo{background:var(--rdG);color:var(--rd);font-weight:700;text-decoration:line-through}
.bsc{font-family:'Space Mono',monospace;font-weight:700;font-size:13px}
.rr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--bd)}.rr:last-child{border-bottom:0}
.rp{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:12px;font-family:'Space Mono',monospace;flex-shrink:0}
.r1{background:linear-gradient(135deg,var(--g1),var(--g2));color:var(--rt)}.r2{background:linear-gradient(135deg,var(--s1),var(--s2));color:var(--rt)}.r3{background:linear-gradient(135deg,var(--b1),var(--b2));color:var(--rt)}.ro{background:var(--bg4);color:var(--tx2)}
.rn{flex:1;font-weight:600;font-size:13px}.rs{font-size:10px;color:var(--tx3)}.rv{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--pr)}
.ov{position:fixed;inset:0;background:var(--ov);backdrop-filter:blur(3px);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:16px;padding-top:5vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.md{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--rL);width:100%;max-width:460px;max-height:none;overflow-y:visible;margin-bottom:40vh}
.md-h{padding:12px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.md-t{font-size:15px;font-weight:700}.md-b{padding:16px}
.md-f{padding:8px 16px;border-top:1px solid var(--bd);display:flex;gap:6px;justify-content:flex-end}
.em{text-align:center;padding:36px 14px;color:var(--tx3);font-size:13px}
.banner{background:linear-gradient(135deg,var(--prG),var(--puG));border:1px solid rgba(128,128,128,.12);border-radius:var(--rL);padding:18px 20px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap}
.banner h3{font-size:14px;font-weight:700;margin-bottom:3px;background:linear-gradient(135deg,var(--pr),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.banner p{font-size:12px;color:var(--tx2)}
.dz{border:2px dashed var(--bd);border-radius:var(--rL);padding:28px 20px;text-align:center;cursor:pointer;position:relative;transition:all var(--t)}
.dz:hover,.dz.drag{border-color:var(--pr);background:var(--prG)}
.dz input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.iok{margin-top:14px;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.6;background:var(--gnG);color:var(--gn);border:1px solid var(--gn)}
.ier{margin-top:10px;padding:12px 16px;border-radius:var(--r);font-size:13px;line-height:1.6;background:var(--rdG);color:var(--rd);border:1px solid var(--rd)}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.g3{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.fb{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.fw{display:flex;gap:6px;flex-wrap:wrap}

/* ── MOBILE BOTTOM NAV ──────────────────────────────────────────── */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:var(--bg2);border-top:1px solid var(--bd);
  padding:0 0 env(safe-area-inset-bottom,0);
  box-shadow:0 -4px 24px rgba(0,0,0,.25)}
.bnav-inner{display:flex;align-items:stretch;justify-content:space-around;
  scrollbar-width:none;gap:0}
.bnav-inner::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:rgba(0,0,0,.1);border-radius:8px}
::-webkit-scrollbar-thumb{background:rgba(100,116,139,.5);border-radius:8px}
::-webkit-scrollbar-thumb:hover{background:rgba(100,116,139,.75)}
/* Hide scrollbar on bottom nav */
.bnav ::-webkit-scrollbar{display:none}
/* Thin scrollbar for filter panels */
.sb-filter-box::-webkit-scrollbar{width:3px}
.sb-filter-box::-webkit-scrollbar-thumb{background:rgba(100,116,139,.2)}
.bnav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;padding:6px 4px 8px;flex:1;min-width:0;
  border:none;background:transparent;color:var(--tx3);cursor:pointer;
  font-family:inherit;transition:color .15s;-webkit-tap-highlight-color:transparent}
.bnav-item.active{color:var(--pr)}
.bnav-item .bi{font-size:18px;line-height:1}
.bnav-item .bl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
/* ── OVERLAY for sidebar on mobile ─────────────────────────────── */
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:99;
  backdrop-filter:blur(2px)}

/* ── TABLET (481-768px) ────────────────────────────────────────── */
@media(min-width:481px) and (max-width:768px){
  .sidebar{transform:translateX(-100%);width:280px}
  .sidebar.open{transform:translateX(0)}
  .main{margin-left:0;padding-bottom:64px}
  .md{max-width:520px;border-radius:20px 20px 0 0;max-height:88vh}
  .g3{grid-template-columns:1fr 1fr}
  .sgrid{grid-template-columns:repeat(2,1fr)}
  .g2{grid-template-columns:1fr 1fr}
  .content{padding:16px 18px}
}
/* ── MOBILE (≤480px) ───────────────────────────────────────────── */
@media(max-width:480px){
  .md{max-width:100%;max-height:92vh;border-radius:20px 20px 0 0;border-bottom:none;align-self:flex-end}
  .g2,.g3{grid-template-columns:1fr}
  .sgrid{grid-template-columns:1fr 1fr}
  .content{padding:10px 10px}
  .fr{flex-direction:column;gap:0}
  .brd{min-width:155px}
  .bte{padding:5px 7px;font-size:11px}
  .sc-v{font-size:20px}
  .sc-l{font-size:9px}
  .sc{padding:10px}
  .rr{padding:7px 10px}
  .card-h{padding:9px 12px}
  .card-b{padding:10px}
  .card-t{font-size:13px}
  .banner{padding:12px}
  .banner h3{font-size:13px}
  .banner .btn-d{font-size:10px;padding:7px 10px}
  .topbar{padding:8px 10px;padding-top:max(8px,env(safe-area-inset-top,8px))}
  .tp-l .page-title{font-size:13px}
  .menu-btn{width:30px;height:30px;font-size:16px}
}
/* ── ALL MOBILE (≤768px) ───────────────────────────────────────── */
@media(max-width:768px){
  .sidebar{transform:translateX(-100%);z-index:100;box-shadow:8px 0 32px rgba(0,0,0,.4)}
  .sidebar.open{transform:translateX(0)}
  .sb-overlay.show{display:block}
  .main{margin-left:0;width:100%;padding-bottom:68px}
  .topbar{padding:10px 12px;padding-top:max(10px,env(safe-area-inset-top,10px));gap:6px}
  .tp-l .page-title{font-size:14px}
  .topbar-r .badge{display:none}
  .topbar-r .sync-indicator{font-size:9px!important;padding:3px 6px!important}
  .topbar-r .btn{padding:4px 8px;font-size:10px}
  .menu-btn{display:flex!important}
  .bnav{display:block}
  .banner{flex-direction:column;align-items:flex-start;gap:10px;padding:14px}
  .banner .btn-d{font-size:11px;padding:8px 12px}
  .tabs{flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;padding-bottom:2px}
  .tabs::-webkit-scrollbar{display:none}
  .tw{overflow-x:auto;-webkit-overflow-scrolling:touch}
  td,th{padding:7px 8px;font-size:12px}
  .btn-d{font-size:12px;padding:9px 14px}
  .rr{padding:8px 10px}
  .topbar-r .icon-btn{width:30px;height:30px;font-size:13px}
  .content{padding:14px 12px}
  .sgrid{gap:8px}
  .sc{padding:12px}
  .sc-v{font-size:22px}
  /* Bracket scroll indicator */
  .bw{position:relative}
  .bw::after{content:'→';position:absolute;right:0;top:50%;transform:translateY(-50%);
    background:linear-gradient(to right,transparent,var(--bg2));
    padding:4px 8px;color:var(--tx3);font-size:12px;pointer-events:none}
  /* Conflict page: stack columns */
  .conflict-grid{grid-template-columns:1fr!important}
  /* Podium: scroll horizontal */
  .podium-row{overflow-x:auto;-webkit-overflow-scrolling:touch;flex-wrap:nowrap!important}
  .podium-card{min-width:120px}
  /* Touch score inputs: bigger */
  .score-input{font-size:32px!important;height:64px!important}
  /* FAB */
  .fab{display:flex!important}
  /* Supabase status in topbar */
  .sb-sync-dot{display:inline-block!important}
  /* Modal bottom sheet for all */
  .ov{align-items:flex-end;padding:0}
  .md-b{padding:14px}
}
@media(max-width:400px){
  .g3{grid-template-columns:1fr}
  .bnav-item{min-width:48px;padding:8px 8px 10px}
  .bnav-item .bl{font-size:8px}
}
@media(min-width:769px){
  /* Desktop: hide bottom nav */
  .bnav{display:none!important}
  .sb-overlay{display:none!important}
}
/* Mobile card-style tables for enrollment */
@media(max-width:600px){
  .mob-cards thead{display:none}
  .mob-cards tr{display:block;background:var(--bg2);border:1px solid var(--bd);
    border-radius:var(--r);margin-bottom:8px;padding:10px 12px}
  .mob-cards td{display:flex;justify-content:space-between;align-items:center;
    padding:4px 0;border:none;font-size:12px}
  .mob-cards td::before{content:attr(data-label);font-size:10px;font-weight:700;
    text-transform:uppercase;letter-spacing:.5px;color:var(--tx3);flex-shrink:0;margin-right:8px}
  .mob-cards td:last-child{margin-top:6px;padding-top:8px;border-top:1px solid var(--bd);justify-content:flex-end}
  .mob-cards td:empty{display:none}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
try {
  window.onerror = function(msg, src, line) {
    var d = document.getElementById('app') || document.body;
    var div = document.createElement('div');
    div.style.cssText = 'padding:24px;font-family:sans-serif;min-height:100vh;background:#0a0e1a;color:#f1f5f9';
    var h = document.createElement('h2');
    h.style.color = '#22d3ee';
    h.textContent = 'Erro ao carregar';
    var p = document.createElement('p');
    p.style.cssText = 'color:#94a3b8;margin-top:8px';
    p.textContent = msg + ' (linha ' + line + ')';
    var p2 = document.createElement('p');
    p2.style.cssText = 'color:#94a3b8;margin-top:12px';
    p2.textContent = 'Abra no Safari ou Chrome atualizado.';
    div.appendChild(h); div.appendChild(p); div.appendChild(p2);
    d.innerHTML = ''; d.appendChild(div);
    return true;
  };
} catch(e) {}
// Minimal async XLSX reader using browser's DecompressionStream (no external deps)
var XLSXMini = null;
try {
var XLSXMini = {
  read: async function(arrayBuffer) {
    var files = await this._unzip(arrayBuffer);
    if (!files) return null;
    return this._parseXlsx(files);
  },

  _unzip: async function(buf) {
    var u8 = new Uint8Array(buf);
    var files = {};
    // Find end of central directory
    var eocd = -1;
    for (var i = u8.length - 22; i >= Math.max(0, u8.length - 65558); i--) {
      if (u8[i]===0x50&&u8[i+1]===0x4B&&u8[i+2]===0x05&&u8[i+3]===0x06) { eocd = i; break; }
    }
    if (eocd < 0) return null;
    var cdOff = this._u32(u8, eocd+16);
    var cdSize = this._u32(u8, eocd+12);
    var pos = cdOff;

      var ra = relM[1];

      var tgt = (ra.match(/Target="([^"]*)"/) || [])[1] || '';

      Object.keys(files).forEach(function(k) {

    }

    var self = this;

      var rid = sheetRids[name];

      while ((cellM = cellRe.exec(rowM[2])) !== null) {

        var ref = (attrs.match(/\br="([A-Z]+\d+)"/) || [])[1]; if (!ref) continue;
        var type = (attrs.match(/\bt="([^"]*)"/) || [])[1] || '';
        var vM = /<v>([^<]*)<\/v>/.exec(content);
        var val = vM ? vM[1] : '';
        if (type === 's') { val = shared[+val] != null ? shared[+val] : ''; }
        else if (type === 'inlineStr') { var isM = /<t[^>]*>([^<]*)<\/t>/.exec(content); val = isM ? this._xmlText(isM[1]) : ''; }

    }

    for (var ri = 1; ri <= maxR; ri++) {
      if (!rows[ri]) continue;
      var row = [];
      for (var ci = 1; ci <= rows[ri].maxC; ci++) row.push(rows[ri].cells[ci] != null ? rows[ri].cells[ci] : '');
      arr.push(row);
    }
    return arr;
  }

// -- XLSX Bracket Parser
function parseJimXlsx(wb){
  // The app's XLSX parser reads raw XML. This function now handles both
  // sharedStrings and inlineStr cell formats.
  if(!wb)return null;
  // wb is the SheetJS workbook object  
  var sN=Object.keys(wb.Sheets||{});
  var ts=wb.Sheets['TABELA COMPLETA']||wb.Sheets['TABELA']||wb.Sheets[sN[0]];
  if(!ts)return null;
  // Helper: read cell value by column letter + row number
  function cv(col,row){
    var cell=ts[col+row];
    if(!cell)return'';
    // inlineStr format (xlsx with inline strings, no sharedStrings)
    if(cell.v!=null)return(''+cell.v).trim();
    if(cell.w)return cell.w.trim();
    // SheetJS may not parse inlineStr — try raw value
    if(cell.r){var m=cell.r.match(/<t[^>]*>([^<]*)<\/t>/);if(m)return m[1].trim();}
    return'';
  }
  // For column-header reading (pass cell directly)
  function cvCell(cell){
    if(!cell)return'';
    if(cell.v!=null)return(''+cell.v).trim();
    if(cell.w)return cell.w.trim();
    if(cell.r){var m=cell.r.match(/<t[^>]*>([^<]*)<\/t>/);if(m)return m[1].trim();}
    return'';
  }
  var range=ts['!ref'];if(!range)return null;
  var parts=range.split(':');var endRow=600;
  if(parts[1]){var m2=parts[1].match(/(\d+)/);if(m2)endRow=parseInt(m2[1])}
  var headers={};
  'ABCDEFGHIJK'.split('').forEach(function(col){var cell=ts[col+'1'];if(cell){headers[col]=cvCell(cell).toUpperCase().replace(/[^A-Z0-9 ]/g,'').trim()}});
  var cm={hora:'D',local:'E',serie:'F',modal:'G',fase:'H',e1:'I',e2:'K'};
  Object.entries(headers).forEach(function(e){var c=e[0],h2=e[1];
    if(h2.indexOf('HOR')>=0)cm.hora=c;
    if(h2.indexOf('LOCAL')>=0)cm.local=c;
    if(h2.indexOf('MODAL')>=0)cm.modal=c;
    if(h2.indexOf('SERIE')>=0||h2.indexOf('TURMA')>=0)cm.serie=c;
    if(h2.indexOf('FASE')>=0)cm.fase=c;
    if(h2.indexOf('EQUIPE')>=0&&!cm._e1s){cm.e1=c;cm._e1s=true}
    else if(h2.indexOf('EQUIPE')>=0){cm.e2=c}
  });
  function cv(col,row){var c=ts[col+row];return c?(c.v||'').toString().trim():''}
  var rows=[];
  for(var r=2;r<=endRow;r++){var modal=cv(cm.modal,r);if(!modal)continue;var e1=cv(cm.e1,r),e2=cv(cm.e2,r);rows.push({hora:cv(cm.hora,r),local:cv(cm.local,r),modal:modal,fase:cv(cm.fase,r),e1:e1,e2:e2,serie:cv(cm.serie,r)})}
  if(!rows.length)return null;
  return _buildJimRows(rows);
}
function parseJimHtmlForBrackets(htmlText){
  var rawMatch=htmlText.match(/const RAW\s*=\s*(\[[\s\S]*?\]);/);
  if(!rawMatch)return null;var raw;try{raw=JSON.parse(rawMatch[1])}catch(e){return null}
  if(!Array.isArray(raw)||!raw.length)return null;
  return _buildJimRows(raw.map(function(r){return{hora:r[2],local:r[3],modal:r[4],fase:r[5],e1:r[7],e2:r[8],serie:r[10]||''}}));
}
function _buildJimRows(rows){
  function u(){return Math.random().toString(36).slice(2,9)}
  function nrm(s){return(s||'').replace(/[\u00b0\u00ba]/g,'\u00ba').trim().toUpperCase()}
  function isPH(e){
    if(!e)return true;
    var up=nrm(e);
    if(['VENC.','PERD.','A DEFINIR','BYE','LUGAR','W_','L_'].some(function(p){return up.indexOf(p)>=0}))return true;
    if(/^\d+[\u00ba\u00b0o]?\s*ANO\s*$/.test(up))return true;
    if(/^\d+[\u00ba\u00b0o]?\s*SERIE?\s*$/.test(up))return true;
    return false;
  }
  function normModal(m){
    var s=nrm(m);
    var g='Misto';
    if(/\bMASC\b/.test(s))g='Masculino';
    else if(/\bFEM\b/.test(s))g='Feminino';
    var base=s.replace(/\s*(MASC|FEM|MISTO|MASCULINO|FEMININO)\b/gi,'').trim();
    return{base:base,gender:g};
  }

  var sptSet={},locsSet={},turmasSet={};
  rows.forEach(function(r){
    if(r.local)locsSet[r.local.trim()]=true;
    var nm=normModal(r.modal);
    var spKey=nm.base+'|'+nm.gender;
    if(!sptSet[spKey])sptSet[spKey]={base:nm.base,gender:nm.gender,id:u()};
    [r.e1,r.e2].forEach(function(e){
      if(e&&!isPH(e)){
        var ek=nrm(e);
        if(!turmasSet[ek])turmasSet[ek]={nm:e.trim(),id:u()};
      }
    });
  });

  // ── Group matches by bracket key AND sub-group ───────────────────────
  // fase strings: '', 'RODIZIO', 'GRUPO A', 'GRUPO B', 'SEMIFINAL', 'FINAL Xº ANO',
  //               '3º LUGAR Xº ANO', 'FINAL ENS. MEDIO'
  var brkGroups={};
  rows.forEach(function(r){
    var nm=normModal(r.modal);
    var spKey=nm.base+'|'+nm.gender;
    var sp=sptSet[spKey]; if(!sp)return;
    var serie=nrm(r.serie||'')||'GERAL';
    var bKey=sp.id+'|'+serie+'|'+nm.gender;
    if(!brkGroups[bKey])brkGroups[bKey]={sp:sp,gender:nm.gender,serie:serie,
      classify:[],semiMatches:[],finalMatches:[],thirdMatches:[],groupMatches:{}};
    var grp=brkGroups[bKey];
    var fase=nrm(r.fase||'');
    var is3rd=(fase.indexOf('3')>=0&&(fase.indexOf('LUGAR')>=0||fase.indexOf('DISPUTA')>=0));
    // SEMIFINAL detection MUST come before FINAL because 'FINAL' is substring of 'SEMIFINAL'
    var isSemi=(fase.indexOf('SEMI')>=0);
    var isFinal=(fase.indexOf('FINAL')>=0)&&!is3rd&&!isSemi;
    var isGroupA=(fase==='GRUPO A');
    var isGroupB=(fase==='GRUPO B');

    var match={hora:r.hora,local:r.local,e1:(r.e1||'').trim(),e2:(r.e2||'').trim(),fase:fase};

    if(is3rd){grp.thirdMatches.push(match);}
    else if(isSemi){grp.semiMatches.push(match);}
    else if(isFinal){grp.finalMatches.push(match);}
    else if(isGroupA){
      if(!grp.groupMatches['A'])grp.groupMatches['A']=[];
      grp.groupMatches['A'].push(match);
    } else if(isGroupB){
      if(!grp.groupMatches['B'])grp.groupMatches['B']=[];
      grp.groupMatches['B'].push(match);
    } else {
      grp.classify.push(match);
    }
  });

  // ── Build brackets with proper W_ links ─────────────────────────────
  var brackets={};
  Object.entries(brkGroups).forEach(function(e){
    var bKey=e[0],grp=e[1];
    var rounds=[];

    var hasGroups=Object.keys(grp.groupMatches).length>0;
    var hasSemis=grp.semiMatches.length>0;
    var hasFinal=grp.finalMatches.length>0;
    var hasThird=grp.thirdMatches.length>0;
    var hasClassify=grp.classify.length>0;

    function buildMatch(m,t1id,t2id,is3rd){
      var match={id:u(),r:0,t1:t1id,t2:t2id,s1:null,s2:null,w:null,dt:'',
        lc:m.local||'',is3rd:is3rd||false,_hora:m.hora||''};
      // Store original slot codes for GW_/W_/L_ for re-computation
      if(t1id&&(t1id.indexOf('GW_')===0||t1id.indexOf('W_')===0||t1id.indexOf('L_')===0))match._slot1=t1id;
      if(t2id&&(t2id.indexOf('GW_')===0||t2id.indexOf('W_')===0||t2id.indexOf('L_')===0))match._slot2=t2id;
      return match;
    }
    function tId(e){
      if(isPH(e))return null;
      var t=turmasSet[nrm(e)];
      return t?t.id:null;
    }

    if(hasGroups){
      // ENS. MEDIO: Grupo A round + Grupo B round + ONE final round
      var groupKeys=Object.keys(grp.groupMatches).sort();
      groupKeys.forEach(function(gk){
        var gMatches=grp.groupMatches[gk];
        var rnd={r:rounds.length+1,label:'Grupo '+gk,m:[]};
        gMatches.forEach(function(m){
          var t1=tId(m.e1)||('PH_'+u());
          var t2=tId(m.e2)||('PH_'+u());
          rnd.m.push(buildMatch(m,t1,t2,false));
        });
        rounds.push(rnd);
      });
      // Single final round containing all final + 3rd matches
      if(hasFinal||hasThird){
        var finalRnd={r:rounds.length+1,label:'Final',m:[]};
        grp.finalMatches.forEach(function(fm){
          finalRnd.m.push(buildMatch(fm,'GW_A_'+bKey,'GW_B_'+bKey,false));
        });
        grp.thirdMatches.forEach(function(tm){
          finalRnd.m.push(buildMatch(tm,'GW_A2_'+bKey,'GW_B2_'+bKey,true));
        });
        rounds.push(finalRnd);
      }
    } else if(hasSemis){
      // Classic semi → final (→ 3rd)
      var semiRnd={r:1,label:'Semifinal',m:[]};
      grp.semiMatches.forEach(function(m){
        var t1=tId(m.e1)||('PH_'+u());
        var t2=tId(m.e2)||('PH_'+u());
        semiRnd.m.push(buildMatch(m,t1,t2,false));
      });
      rounds.push(semiRnd);

      if(hasFinal){
        var finalRnd={r:2,label:'Final',m:[]};
        grp.finalMatches.forEach(function(fm,fi){
          var is3=false;
          // Link W_ from semis
          var src1=semiRnd.m[fi*2]||semiRnd.m[0];
          var src2=semiRnd.m[fi*2+1]||semiRnd.m[1]||semiRnd.m[0];
          finalRnd.m.push(buildMatch(fm,
            'W_'+src1.id,
            src2&&src2!==src1?'W_'+src2.id:('PH_'+u()),
            false));
        });
        if(hasThird){
          grp.thirdMatches.forEach(function(tm){
            var src1=semiRnd.m[0];
            var src2=semiRnd.m[1]||semiRnd.m[0];
            finalRnd.m.push(buildMatch(tm,'L_'+src1.id,'L_'+src2.id,true));
          });
        }
        rounds.push(finalRnd);
      }
    } else if(hasClassify){
      // Rodizio / all-play-all + optional final
      var classRnd={r:1,label:'Rodizio',m:[]};
      grp.classify.forEach(function(m){
        var t1=tId(m.e1)||('PH_'+u());
        var t2=tId(m.e2)||('PH_'+u());
        classRnd.m.push(buildMatch(m,t1,t2,false));
      });
      rounds.push(classRnd);

      if(hasFinal){
        // Final after rodizio: winners are determined by standings
        // Use special slot GW_ (group winner from rodizio)
        var finalRnd={r:2,label:'Final',m:[]};
        grp.finalMatches.forEach(function(fm){
          finalRnd.m.push(buildMatch(fm,'GW_1_'+bKey,'GW_2_'+bKey,false));
        });
        if(hasThird){
          grp.thirdMatches.forEach(function(tm){
            finalRnd.m.push(buildMatch(tm,'GW_3_'+bKey,'GW_4_'+bKey,true));
          });
        }
        rounds.push(finalRnd);
      }
    }

    // Assign round numbers
    rounds.forEach(function(rd,i){rd.r=i+1});

    brackets[bKey]={sp:grp.sp,gender:grp.gender,serie:grp.serie,rounds:rounds,
      hasGroups:hasGroups,hasFinal:hasFinal};
  });

  return{turmas:Object.values(turmasSet),spt:Object.values(sptSet),
    locs:Object.keys(locsSet).map(function(l){return{id:u(),nm:l}}),
    brackets:brackets,totalJogos:rows.length};
}


function jimBracketDataToSchoolState(parsed,adminPass,year){
  year=year||'Jogos 2026';function u(){return Math.random().toString(36).slice(2,9)}
  var normYear=(year||'').replace(/[\u00b0\u00ba]/g,'\u00ba').replace(/\s+/g,' ').trim().toUpperCase();
  var cls=parsed.turmas.map(function(t){return{id:t.id,nm:t.nm,yr:normYear,clr:''}}).sort(function(a,b){return a.nm.localeCompare(b.nm,'pt')});
  var spt=parsed.spt.map(function(sp){var cat=sp.gender&&sp.gender!=='Misto'?sp.gender:'Masculino';return{id:sp.id,nm:sp.base,gender:sp.gender,ct:[cat],mn:5,mx:15,dur:14,pts:{w:3,d:1,l:0,wo:0},tiebreaker:['gd','yc','rc','w'],tiebreakers:['goalDiff','yellowCards','redCards'],scoring:{}}});
  // turma id -> turma name lookup
  var tidToNm={};parsed.turmas.forEach(function(t){tidToNm[t.id]=t.nm});
  // Build enrollments: one per (turma, sport, gender) pair that appears in a bracket match
  var es={};
  Object.values(parsed.brackets).forEach(function(b){
    var spId=b.sp.id,g=b.gender;
    b.rounds.forEach(function(rd){rd.m.forEach(function(m){
      [m.t1,m.t2].forEach(function(tid){
        if(tid&&tid.indexOf('PH_')!==0){
          var k=tid+'|'+spId+'|'+g;
          if(!es[k])es[k]={id:u(),ci:tid,si:spId,ct:g,st:'approved',tn:tidToNm[tid]||''};
        }
      });
    })});
  });
  // Normalize year to uppercase for bracket key (must match S.bay = nrmYr(yr))
  var normYear=(year||'').replace(/[\u00b0\u00ba]/g,'\u00ba').replace(/\s+/g,' ').trim().toUpperCase();
  var brk={};
  Object.values(parsed.brackets).forEach(function(b){
    var bk=normYear+'__'+b.sp.id+'__'+(b.serie||'GERAL');
    if(!brk[bk])brk[bk]={};
    brk[bk][b.gender]=b.rounds;
  });
  return{cls:cls,spt:spt,enr:Object.values(es),brk:brk,locs:parsed.locs,ev:{name:'Jogos Internos 2026'},logins:[],judgeLogins:[],recursos:[],adminPass:adminPass||'admin123',thirdPlace:{},appInfo:{author:'',contact:'',version:'3.0'}};
}

// Build standardized team name from turma name + category
function buildTeamName(turmaNm,category){
  var nm=(turmaNm||'').trim();
  var numMatch=nm.match(/(\d+)/);
  var seriesNum=numMatch?numMatch[1]:'';
  // Remove "Ano" and numbers to find the class letter
  var cleaned=nm.replace(/[°º]/g,'').replace(/\d+/g,'').replace(/\bano\b/gi,'').trim();
  var words=cleaned.split(/\s+/).filter(function(w){return w.length>0});
  var classLetter='';
  // Look for a single letter word (the class identifier: A, B, C, etc.)
  for(var i=words.length-1;i>=0;i--){
    var w=words[i].replace(/[^A-Za-z]/g,'');
    if(w.length===1){classLetter=w.toUpperCase();break}
  }
  var catAbbr=category==='Masculino'?'(M)':category==='Feminino'?'(F)':'(X)';
  if(seriesNum&&classLetter)return seriesNum+'º '+classLetter+' '+catAbbr;
  if(seriesNum)return seriesNum+'º '+catAbbr;
  return nm.replace(/\s+/g,'').slice(0,4).toUpperCase()+' '+catAbbr;
}

function autoFixTeamNames(){

    var cl=S.cls.find(function(c){return c.id===e.ci});
    if(!cl)return;
    var correctName=buildTeamName(cl.nm,e.ct);
    if(e.tn!==correctName){
      e.tn=correctName;
      fixed++;
    }
  });
  return fixed;
}

function genBracket(ids,has3rd){
  if(ids.length<2)return[];
  var s=[].concat(ids).sort(function(){return Math.random()-.5});
  var p=Math.pow(2,Math.ceil(Math.log2(s.length)));
  while(s.length<p)s.push('BYE');
  var rounds=[],cur=[].concat(s),rn=1;
  while(cur.length>1){
    var ms=[];
    for(var i=0;i<cur.length;i+=2)ms.push({id:uid(),r:rn,t1:cur[i],t2:cur[i+1],s1:null,s2:null,w:cur[i+1]==='BYE'?cur[i]:null,dt:'',lc:'',is3rd:false});
    rounds.push({r:rn,m:ms});
    cur=ms.map(function(x){return x.w?x.w:'W_'+x.id});
    rn++;
  }
  // Optional 3rd place: losers of semifinal
  if(has3rd&&rounds.length>=2){
    var semiRound=rounds[rounds.length-2];
    var losers=semiRound.m.map(function(m){return 'L_'+m.id});
    var m3={id:uid(),r:rounds.length,t1:losers[0],t2:losers[1]||'BYE',s1:null,s2:null,w:null,dt:'',lc:'',is3rd:true};
    rounds[rounds.length-1].m.push(m3);
  }
  return rounds;
}

function rName(r,t){var d=t-r;return d===0?'Final':d===1?'Semi':d===2?'Quartas':'Rodada '+r}

function tName(id){
  if(!id||id==='BYE')return'BYE';
  if(!id||id.indexOf('PH_')===0)return'A definir';
  if(id.indexOf('GW_')===0)return'A definir';  // group winner — TBD from standings
  if(id.indexOf('W_')===0)return'A definir';
  if(id.indexOf('L_')===0){
    var mid=id.slice(2);var found=null;
    Object.values(S.brk).forEach(function(sb){Object.values(sb).forEach(function(rs){rs.forEach(function(r){r.m.forEach(function(m){if(m.id===mid)found=m})})})});
    if(!found)return'A definir';
    if(found.w===null)return'Perd. Semi';
    return found.w===found.t1?tName(found.t2):tName(found.t1);
  }
  // Try enrollment id first (normal flow)
  var e=S.enr.find(function(x){return x.id===id});
  if(e&&e.tn)return e.tn;
  // Try turma id directly (imported brackets)
  var cl=S.cls.find(function(x){return x.id===id});
  if(cl)return cl.nm;
  return'—';
}

function recomputeGroupWinners(bk,ct){
  // For each bracket key, compute group/rodizio standings and update GW_ slots
  var rds=S.brk[bk]&&S.brk[bk][ct]?S.brk[bk][ct]:[];
  if(!rds.length)return;

  // Identify rounds that are classify (no GW_/W_/L_ slots) vs final rounds
  var classifyRounds=[],finalRounds=[];
  rds.forEach(function(rd){
    var hasFinalSlot=rd.m.some(function(m){
      return (m.t1&&(m.t1.indexOf('GW_')===0||m.t1.indexOf('W_')===0||m.t1.indexOf('L_')===0))||m.is3rd;
    });
    if(hasFinalSlot)finalRounds.push(rd);
    else classifyRounds.push(rd);
  });

  // Compute standings per classify round (group/rodizio)
  // Each classify round = one group. Standings = win count then point diff
  var groupStandings=[];
  classifyRounds.forEach(function(rd,gi){
    var stats={};
    rd.m.forEach(function(m){
      [m.t1,m.t2].forEach(function(t){
        if(t&&t.indexOf('PH_')!==0&&t.indexOf('W_')!==0&&t.indexOf('L_')!==0&&t.indexOf('GW_')!==0){
          if(!stats[t])stats[t]={t:t,w:0,d:0,l:0,pts:0,gd:0,gp:0};
        }
      });
      if(m.s1==null||m.s2==null)return;
      var t1=m.t1,t2=m.t2;
      if(!stats[t1]||!stats[t2])return;
      stats[t1].gp+=m.s1;stats[t2].gp+=m.s2;
      stats[t1].gd+=(m.s1-m.s2);stats[t2].gd+=(m.s2-m.s1);
      if(m.isDraw||m.s1===m.s2){stats[t1].d++;stats[t2].d++;stats[t1].pts++;stats[t2].pts++;}
      else if(m.w===t1){stats[t1].w++;stats[t1].pts+=3;stats[t2].l++;}
      else if(m.w===t2){stats[t2].w++;stats[t2].pts+=3;stats[t1].l++;}
    });
    // Apply configurable tiebreakers
    var tiebreakers=(S.tiebreakers||['pts','gd','headtohead','gp']);
    var sorted=Object.values(stats).sort(function(a,b){
      // Always start with points (wins)
      if(b.pts!==a.pts)return b.pts-a.pts;
      // Apply tiebreakers in order
      for(var i=0;i<tiebreakers.length;i++){
        var tb=tiebreakers[i];
        if(tb==='gd'&&b.gd!==a.gd)return b.gd-a.gd;
        if(tb==='gp'&&b.gp!==a.gp)return b.gp-a.gp;
        if(tb==='headtohead'){
          // Find the match between these two teams
          var hth=null;
          rd.m.forEach(function(m){
            if((m.t1===a.t&&m.t2===b.t)||(m.t1===b.t&&m.t2===a.t)){
              if(m.s1!=null&&m.s2!=null)hth=m;
            }
          });
          if(hth&&hth.w){
            if(hth.w===a.t)return -1;
            if(hth.w===b.t)return 1;
          }
        }
      }
      return 0;
    });
    groupStandings.push({groupIdx:gi,standings:sorted});
  });

  // Now propagate to GW_ slots. We support these slot patterns:
  //   GW_A_<bk> = leader of group A (classifyRounds[0])
  //   GW_B_<bk> = leader of group B (classifyRounds[1])
  //   GW_1_<bk> = leader of single rodizio (classifyRounds[0]) - 1st place
  //   GW_2_<bk> = 2nd place of single rodizio
  //   GW_3_<bk>, GW_4_<bk> = 3rd, 4th places (for 3rd place match)
  function findStandingByPos(groupIdx,pos){
    var g=groupStandings[groupIdx];
    if(!g||!g.standings[pos-1])return null;
    return g.standings[pos-1].t;
  }

  // Check if all classify games are completed (have scores)
  function isGroupComplete(groupIdx){
    var rd=classifyRounds[groupIdx];
    if(!rd)return false;
    return rd.m.every(function(mm){
      var bothPH=(!mm.t1||mm.t1.indexOf('PH_')===0)&&(!mm.t2||mm.t2.indexOf('PH_')===0);
      if(bothPH)return true; // skip placeholder matches
      return mm.s1!=null&&mm.s2!=null;
    });
  }

  finalRounds.forEach(function(rd){
    rd.m.forEach(function(m){
      ['t1','t2'].forEach(function(slot){
        var slotKey='_slot'+(slot==='t1'?'1':'2');
        var origCode=m[slotKey];
        var s=origCode||m[slot];
        if(!s||s.indexOf('GW_')!==0)return;
        var match=s.match(/^GW_([A-Z0-9]+)_/);
        if(!match)return;
        var code=match[1];
        // Determine which group this code refers to
        var groupIdx=0;
        if(code==='B'||code==='B2')groupIdx=1;
        // Only resolve if the group is complete (all games scored)
        if(!m[slotKey])m[slotKey]=s;
        if(!isGroupComplete(groupIdx)){
          // Reset to placeholder so user knows it's pending
          m[slot]=origCode||s;
          return;
        }
        var newId=null;
        if(code==='A')newId=findStandingByPos(0,1);
        else if(code==='B')newId=findStandingByPos(1,1);
        else if(code==='A2')newId=findStandingByPos(0,2);
        else if(code==='B2')newId=findStandingByPos(1,2);
        else if(code==='1')newId=findStandingByPos(0,1);
        else if(code==='2')newId=findStandingByPos(0,2);
        else if(code==='3')newId=findStandingByPos(0,3);
        else if(code==='4')newId=findStandingByPos(0,4);
        if(newId)m[slot]=newId;
        else m[slot]=origCode||s;
      });
    });
  });

  scheduleSave();
}

function calcRk(){
  var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,pWin:3,pWO:-2};
  var pts={};
  // Points from bracket wins
  Object.entries(S.brk).forEach(function(e1){
    Object.values(e1[1]).forEach(function(rs){rs.forEach(function(r){r.m.forEach(function(m){
      // Skip matches with placeholder teams
      var t1ok=m.t1&&m.t1.indexOf('PH_')!==0&&m.t1.indexOf('W_')!==0&&m.t1.indexOf('L_')!==0;
      var t2ok=m.t2&&m.t2.indexOf('PH_')!==0&&m.t2.indexOf('W_')!==0&&m.t2.indexOf('L_')!==0;
      if(!t1ok&&!t2ok)return;
      // Score recorded (has result)
      var hasResult=m.s1!=null&&m.s2!=null;
      if(hasResult){
        var isDraw=m.isDraw||m.s1===m.s2;
        if(isDraw){
          // Both teams get draw points
          if(t1ok){if(!pts[m.t1])pts[m.t1]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[m.t1].d++;pts[m.t1].draws++;pts[m.t1].p+=(sc.pDraw!=null?sc.pDraw:1);}
          if(t2ok){if(!pts[m.t2])pts[m.t2]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[m.t2].d++;pts[m.t2].draws++;pts[m.t2].p+=(sc.pDraw!=null?sc.pDraw:1);}
        } else if(m.w&&m.w!=='BYE'){
          // Winner gets win points, loser gets loss points
          var loserT=m.w===m.t1?m.t2:m.t1;
          if(!pts[m.w])pts[m.w]={w:0,d:0,l:0,p:0,wo:0,draws:0};
          pts[m.w].w++;pts[m.w].p+=(sc.pWin!=null?sc.pWin:3);
          if(loserT&&loserT.indexOf('PH_')!==0&&loserT.indexOf('W_')!==0){
            if(!pts[loserT])pts[loserT]={w:0,d:0,l:0,p:0,wo:0,draws:0};
            pts[loserT].l++;pts[loserT].p+=(sc.pLoss!=null?sc.pLoss:0);
          }
        }
      }
      // WO penalty
      if(m.wo){
        var woPenalty=m.wo;
        if(!pts[woPenalty])pts[woPenalty]={w:0,d:0,l:0,p:0,wo:0,draws:0};
        pts[woPenalty].wo++;pts[woPenalty].p+=(sc.pWO!=null?sc.pWO:-2);
      }
    })})});
  });
  // Position points: find finals and assign 1st/2nd/3rd/4th
  Object.entries(S.brk).forEach(function(e1){
    Object.entries(e1[1]).forEach(function(e2){
      var rs=e2[1];if(!rs||!rs.length)return;
      var finalRound=rs[rs.length-1];if(!finalRound||!finalRound.m)return;
      // Find the main final (not 3rd place)
      var finalMatch=finalRound.m.find(function(m){return!m.is3rd});
      var thirdMatch=finalRound.m.find(function(m){return m.is3rd});
      // For rodizio: final round = all matches, assign by wins
      var totalRnds=rs.length;
      var isRodizio=totalRnds===1&&rs[0]&&rs[0].m&&rs[0].m.length>3;
      if(isRodizio){
        // Count wins per team in rodizio
        var rodPts={};
        rs[0].m.forEach(function(m){
          if(!m.s1==null||m.s2==null)return;
          if(m.isDraw||m.s1===m.s2){
            [m.t1,m.t2].forEach(function(t){if(t&&t.indexOf('PH_')!==0){if(!rodPts[t])rodPts[t]=0;rodPts[t]+=0.5}});
          } else if(m.w){
            if(!rodPts[m.w])rodPts[m.w]=0;rodPts[m.w]++;
          }
        });
        var sorted=Object.entries(rodPts).sort(function(a,b){return b[1]-a[1]});
        var posKeys=['p1','p2','p3','p4','p5','p6','p7','p8'];
        sorted.forEach(function(entry,pi){
          var tid=entry[0],pk=posKeys[pi];
          var pval=sc.positions&&sc.positions[pi]?sc.positions[pi].pts:(sc[pk]||0);
          if(!pts[tid])pts[tid]={w:0,d:0,l:0,p:0,wo:0,draws:0};
          pts[tid].p+=pval;
        });
        return;
      }
      if(finalMatch&&finalMatch.w){
        var first=finalMatch.w;
        var second=finalMatch.w===finalMatch.t1?finalMatch.t2:finalMatch.t1;
        // Use pospts helper to get position points (supports both old p1..p8 and new positions[])
        function pp(rank){if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;return sc['p'+rank]||0;}
        if(first&&first!=='BYE'&&first.indexOf('W_')!==0&&first.indexOf('L_')!==0&&first.indexOf('GW_')!==0&&first.indexOf('PH_')!==0){
          if(!pts[first])pts[first]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[first].p+=pp(1);
        }
        if(second&&second!=='BYE'&&second.indexOf('W_')!==0&&second.indexOf('L_')!==0&&second.indexOf('GW_')!==0&&second.indexOf('PH_')!==0){
          if(!pts[second])pts[second]={w:0,d:0,l:0,p:0,wo:0,draws:0};pts[second].p+=pp(2);
        }
      }
      if(thirdMatch&&thirdMatch.w){
        function pp3(rank){if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;return sc['p'+rank]||0;}
        var third=thirdMatch.w;
        var fourth=thirdMatch.w===thirdMatch.t1?thirdMatch.t2:thirdMatch.t1;
        if(third&&third!=='BYE'&&third.indexOf('L_')!==0){if(!pts[third])pts[third]={w:0,p:0,wo:0};pts[third].p+=(sc.p3||0)}
        if(fourth&&fourth!=='BYE'&&fourth.indexOf('L_')!==0){if(!pts[fourth])pts[fourth]={w:0,p:0,wo:0};pts[fourth].p+=(sc.p4||0)}
      }
    });
  });
  // Resolve id -> name: try enrollment first, then turma direct (imported brackets)
  return Object.entries(pts).map(function(entry){
    var id=entry[0],d=entry[1];
    // Skip placeholder ids
    if(!id||id.indexOf('PH_')===0||id.indexOf('W_')===0||id.indexOf('L_')===0)return null;
    var e=S.enr.find(function(x){return x.id===id});
    // For imported brackets: id is turma id directly
    var cl=e?S.cls.find(function(x){return x.id===e.ci}):S.cls.find(function(x){return x.id===id});
    var tn=e?e.tn:(cl?cl.nm:'—');
    var ci=e?e.ci:(cl?cl.id:'');
    // Find sport: search bracket for this id
    var spId='';
    Object.entries(S.brk).forEach(function(bke){
      var bk=bke[0],cts=bke[1];
      var parts=bk.split('__');
      var si=parts[1]||parts[0];
      Object.values(cts).forEach(function(rs){rs.forEach(function(rd){rd.m.forEach(function(m){
        if(m.t1===id||m.t2===id||m.w===id)spId=si;
      })})});
    });
    var sp=S.spt.find(function(x){return x.id===spId});
    return{id:id,tn:tn,cn:cl?cl.nm:'—',ci:ci,sn:sp?sp.nm:'—',yr:cl?cl.yr:'',w:d.w,p:d.p,wo:d.wo||0,draws:d.draws||0};
  }).filter(Boolean).sort(function(a,b){return b.p-a.p||b.w-a.w})
}
function calcCR(){
  var rk=calcRk(),pts={};
  rk.forEach(function(x){
    if(x.ci){
      if(!pts[x.ci])pts[x.ci]=0;
      pts[x.ci]+=x.p;
    }
  });
  // Add podium points (individual sports) p1-p8
  var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,p5:3,p6:2,p7:1,p8:1};
  (S.podiums||[]).forEach(function(pod){
    for(var i=1;i<=8;i++){
      var k='p'+i;
      if(pod[k]){pts[pod[k]]=(pts[pod[k]]||0)+(sc[k]||0)}
    }
  });
  // Add recurso punishment points
  (S.recursos||[]).forEach(function(rec){
    if(rec.punishClassId&&rec.punishPts){pts[rec.punishClassId]=(pts[rec.punishClassId]||0)+rec.punishPts}
  });
  return Object.entries(pts).map(function(entry){var id=entry[0],p=entry[1];var cl=S.cls.find(function(x){return x.id===id});return{id:id,nm:cl?cl.nm:'—',yr:cl?cl.yr:'',p:p}}).sort(function(a,b){return b.p-a.p})
}

function h(tag,attrs){
  var e=document.createElement(tag);
  var children=Array.prototype.slice.call(arguments,2);
  if(attrs){
    Object.keys(attrs).forEach(function(k){
      var v=attrs[k];
      if(v===false||v===null||v===undefined)return; // skip falsy boolean attributes like disabled:false
      if(k==='class')e.className=v;
      else if(k==='html')e.innerHTML=v;
      else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);
      else if(k.indexOf('on')===0&&typeof v==='function')e[k]=v;
      else if(v===true)e.setAttribute(k,''); // boolean true → attribute without value
      else e.setAttribute(k,v);
    });
  }
  function addChild(ch){
    if(ch==null||ch===false||ch===undefined)return;
    if(Array.isArray(ch)){ch.forEach(addChild);return}
    if(typeof ch==='string'||typeof ch==='number')e.appendChild(document.createTextNode(String(ch)));
    else e.appendChild(ch);
  }
  children.forEach(addChild);
  return e;
}

function pB(c){
  var ap=S.enr.filter(function(e){return e.st==='approved'});

  // Year selection
  var anos=getAnos();
  if(!S.bay||anos.indexOf(S.bay)<0)S.bay=anos[0]||'';
  if(anos.length>1){
    var ytabs=h('div',{'class':'tabs'});
    anos.forEach(function(a){ytabs.appendChild(h('button',{'class':'tab'+(S.bay===a?' active':''),onclick:(function(y){return function(){S.bay=y;S.bs='';S.bserie='';S.bc='';R()}})(a)},a))});
    c.appendChild(ytabs);
  }

  // Build metadata from brk (imported) + enrollments (normal)
  var brkAllKeys=Object.keys(S.brk).filter(function(bk){
    // bk = YEAR__spId__SERIE or YEAR__spId
    return bk.indexOf(S.bay+'__')===0;
  });

  var apYear=getEnrByAno(S.bay,ap);

  // brkMeta: one entry per (sport, serie, gender)
  var brkMeta=[];
  brkAllKeys.forEach(function(bk){
    var parts=bk.split('__');
    var spId=parts[1]||'';
    var serie=parts.slice(2).join('__')||'GERAL';
    var sp=S.spt.find(function(s){return s.id===spId});
    if(!sp)return;
    var genders=Object.keys(S.brk[bk]);
    genders.forEach(function(g){
      brkMeta.push({bk:bk,spId:spId,spNm:sp.nm,serie:serie,gender:g});
    });
  });
  // Also add from enrollments (schools without import)
  apYear.forEach(function(e){
    var sp=S.spt.find(function(s){return s.id===e.si});
    if(!sp)return;
    var bk=S.bay+'__'+e.si+'__GERAL';
    if(!brkMeta.find(function(m){return m.bk===bk&&m.gender===e.ct}))
      brkMeta.push({bk:bk,spId:e.si,spNm:sp.nm,serie:'GERAL',gender:e.ct});
  });

  if(!brkMeta.length){
    c.appendChild(h('div',{'class':'card'},h('div',{'class':'card-b'},
      h('div',{'class':'em'},'Nenhum chaveamento para '+S.bay+'. Importe dados ou aprove inscricoes.'))));
    return;
  }

  // Build sport BASE NAME map (FUTEBOL, QUEIMADA, etc.) -> list of {spId, gender}

    var sp=S.spt.find(function(s){return s.id===m.spId});
    var base=(sp&&sp.nm)||m.spNm||m.spId;
    if(!spBaseMap[base])spBaseMap[base]=[];
    if(!spBaseMap[base].find(function(x){return x.spId===m.spId&&x.gender===m.gender}))
      spBaseMap[base].push({spId:m.spId,gender:m.gender});
  });
  var uniqueSpBases=Object.keys(spBaseMap).sort();

  // S.bsb = selected sport BASE name
  if(!S.bsb||uniqueSpBases.indexOf(S.bsb)<0)S.bsb=uniqueSpBases[0]||'';

  seriesForFilter.sort(function(a,b){

      if(/ENS/.test(s.toUpperCase()))return 100;

    return a.localeCompare(b,'pt');

  if(!S.bserie||seriesForFilter.indexOf(S.bserie)<0)S.bserie=seriesForFilter[0]||'GERAL';

  var bkey=S.bay+'__'+currentSpId+'__'+S.bserie;

        onclick:(function(gv){return function(){S.bc=gv;S.bserie='';R()}})(g)
      },gLabel));
    });

// Calculate detailed point breakdown per class
function calcClassDetail(classId){
  var sc=S.scoring||{p1:10,p2:8,p3:6,p4:4,p5:3,p6:2,p7:1,p8:1,pWin:3,pWO:-2};
  // Helper: get position pts from new positions array or old p1..p8
  function pospts(rank){
    if(sc.positions&&sc.positions[rank-1])return sc.positions[rank-1].pts||0;
    return sc['p'+rank]||0;
  }
  var lines=[];
  var totalWins=0,totalWO=0;

  // Points from bracket: wins per sport
  var sportWins={};
  var sportPositions={};
  Object.entries(S.brk).forEach(function(e1){
    var bk=e1[0],cts=e1[1];
    var parts=bk.split('__');
    var siId=parts.length>1?parts[1]:parts[0];
    var sp=S.spt.find(function(s){return s.id===siId});
    var spName=sp?sp.nm:'?';
    Object.entries(cts).forEach(function(e2){
      var ct=e2[0],rs=e2[1];
      // Count wins for this class in this sport+category
      var wins=0,wos=0;
      rs.forEach(function(r){r.m.forEach(function(m){
        if(m.w&&m.w!=='BYE'){
          // Try enrollment id first, then turma id directly
          var we=S.enr.find(function(e){return e.id===m.w});
          var isOurClass=we?we.ci===classId:m.w===classId;
          if(isOurClass){wins++}
        }
        if(m.wo){
          var woe=S.enr.find(function(e){return e.id===m.wo});
          var isWOClass=woe?woe.ci===classId:m.wo===classId;
          if(isWOClass){wos++}
        }
        // Also count losses for detail
        if((m.s1!=null||m.s2!=null)&&m.w){
          var loser=m.w===m.t1?m.t2:m.t1;
          var le=S.enr.find(function(e){return e.id===loser});
          var isLoserClass=le?le.ci===classId:loser===classId;
          if(isLoserClass){/* tracked below */}
        }
      })});
      if(wins>0){
        var key=spName+' '+ct;
        var winPts=wins*(sc.pWin!=null?sc.pWin:3);if(winPts!==0||wins>0)lines.push({desc:'⚽ <b>'+key+'</b> — '+wins+' vitória(s) × '+(sc.pWin!=null?sc.pWin:3)+' pts',pts:winPts});
        totalWins+=wins;
      }
      if(wos>0){
        lines.push({desc:'🔴 <b>'+spName+' '+ct+'</b> — '+wos+' W.O.',pts:wos*(sc.pWO||0)});
        totalWO+=wos;
      }
      // Position points (1st/2nd/3rd/4th from finals)
      if(rs.length){
        var finalRound=rs[rs.length-1];
        if(finalRound&&finalRound.m){
          var finalM=finalRound.m.find(function(m){return!m.is3rd});
          var thirdM=finalRound.m.find(function(m){return m.is3rd});
          if(finalM&&finalM.w){
            var checkPos=function(teamId,pos,label){
              if(!teamId||teamId==='BYE'||teamId.indexOf('W_')===0||teamId.indexOf('L_')===0||teamId.indexOf('PH_')===0)return;
              // Try enr id, then direct turma id (imported brackets)
              var te=S.enr.find(function(e){return e.id===teamId});
              var isOurClass=te?te.ci===classId:teamId===classId;
              if(isOurClass){
                var pts=pospts(pos);
                if(pts)lines.push({desc:'🏆 <b>'+spName+' '+ct+'</b> — '+label,pts:pts});
              }
            };
            checkPos(finalM.w,1,'1º Lugar');
            var second=finalM.w===finalM.t1?finalM.t2:finalM.t1;
            checkPos(second,2,'2º Lugar');
          }
          if(thirdM&&thirdM.w){
            var checkPos3=function(teamId,pos,label){
              if(!teamId||teamId==='BYE'||teamId.indexOf('W_')===0||teamId.indexOf('L_')===0||teamId.indexOf('PH_')===0)return;
              var te=S.enr.find(function(e){return e.id===teamId});
              var isOurClass=te?te.ci===classId:teamId===classId;
              if(isOurClass){
                var pts=pospts(pos);
                if(pts)lines.push({desc:'🥉 <b>'+spName+' '+ct+'</b> — '+label,pts:pts});
              }
            };
            checkPos3(thirdM.w,3,'3º Lugar');
            var fourth=thirdM.w===thirdM.t1?thirdM.t2:thirdM.t1;
            checkPos3(fourth,4,'4º Lugar');
          }
        }
      }
    });
  });

  // Podium points (individual sports)
  var posLabels=['','1º Lugar','2º Lugar','3º Lugar','4º Lugar','5º Lugar','6º Lugar','7º Lugar','8º Lugar'];
  (S.podiums||[]).forEach(function(pod){
    var sp=S.spt.find(function(s){return s.id===pod.sportId});
    var spName=sp?sp.nm:'Individual';
    for(var i=1;i<=8;i++){
      if(pod['p'+i]===classId&&sc['p'+i]){
        lines.push({desc:'🏅 <b>'+spName+(pod.category?' '+pod.category:'')+'</b> — '+posLabels[i],pts:sc['p'+i]});
      }
    }
  });

  // Recurso punishments
  (S.recursos||[]).forEach(function(rec){
    if(rec.punishClassId===classId&&rec.punishPts){
      lines.push({desc:'📝 <b>Recurso</b> — Punição'+(rec.adminResp?' ('+rec.adminResp+')':''),pts:rec.punishPts});
    }
  });

  var summary=totalWins+'V'+(totalWO?' '+totalWO+'WO':'')+(lines.length?' · '+lines.length+' item(ns)':'');
  return{lines:lines,summary:summary};
}

// DOCX FICHA DE INSCRIÇÃO IMPORT
// ══════════════════════════════════════════════════════════════════════════
function impDocx(file){
  if(!file.name.endsWith('.docx')){alert('Arquivo deve ser .docx');return}
  // Ask turma name
  var turmaName=prompt('Qual o nome da turma?\n\nExemplo: 6º Ano E, 3º Ano A, etc.');
  if(!turmaName||!turmaName.trim()){alert('Nome da turma é obrigatório.');return}
  turmaName=turmaName.trim();
  var turmaYear=prompt('Qual o ano/série? (opcional)\n\nExemplo: 6º Ano, 3º Ano, etc.')||'';

  var reader=new FileReader();
  reader.onload=function(e){
    var arrayBuffer=e.target.result;
    // Use mammoth to convert to HTML, then parse tables
    if(typeof mammoth==='undefined'){
      // Fallback: parse the DOCX ZIP manually to find tables
      parseDocxTables(arrayBuffer,turmaName,turmaYear.trim());
    } else {
      mammoth.convertToHtml({arrayBuffer:arrayBuffer}).then(function(result){
        parseDocxHtml(result.value,turmaName,turmaYear.trim());
      }).catch(function(err){
        alert('Erro ao ler arquivo: '+err.message);
      });
    }
  };
  reader.readAsArrayBuffer(file);
}

// Parse DOCX tables from raw XML (no mammoth dependency)
function parseDocxTables(arrayBuffer,turmaName,turmaYear){
  try{
    var bytes=new Uint8Array(arrayBuffer);
    if(bytes[0]!==0x50||bytes[1]!==0x4B){alert('Não é um arquivo DOCX válido.');return}
    // Load mammoth from CDN dynamically
    var script=document.createElement('script');
    script.src='https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js';
    script.onload=function(){
      mammoth.convertToHtml({arrayBuffer:arrayBuffer}).then(function(result){
        parseDocxHtml(result.value,turmaName,turmaYear);
      }).catch(function(err){
        alert('Erro ao processar: '+err.message);
      });
    };
    script.onerror=function(){
      alert('Não foi possível carregar a biblioteca mammoth. Verifique a conexão com a internet.');
    };
    document.head.appendChild(script);
  }catch(err){
    alert('Erro ao processar arquivo: '+err.message);
  }
}

function parseDocxHtml(html,turmaName,turmaYear){
  var div=document.createElement('div');
  div.innerHTML=html;
  var tables=div.querySelectorAll('table');
  if(!tables.length){alert('Nenhuma tabela encontrada no documento.');return}
  
  var result={sports:0,teams:0,players:0,wrn:[]};
  
  // Normalize turmaName to avoid duplicates from spacing/degree-char variations
  turmaName=nrmYr(turmaName);
  turmaYear=nrmYr(turmaYear);
  
  // Find or create turma
  var turma=S.cls.find(function(c){return nrmYr(c.nm)===turmaName});
  if(!turma){
    turma={id:uid(),nm:uc(turmaName),yr:uc(turmaYear),pr:'Manhã'};
    S.cls.push(turma);
    result.wrn.push('Turma "'+turmaName+'" criada automaticamente');
  }
  
  // Known sport keywords to detect headers
  var sportKeywords=['FUTEBOL','FUTSAL','HANDEBOL','HANDBALL','VÔLEI','VOLEI','VOLEIBOL','QUEIMADA','BASQUETE','BANDEIRINHA','XADREZ','PEBOLIM','FUTMESA','ATLETISMO','NATAÇÃO','NATACAO','TÊNIS','TENIS','CUBO','SOLETRANDO','MINECRAFT','ARTES','CONHECIMENTOS'];
  
  function isSportHeader(text){
    if(!text)return false;
    var up=text.toUpperCase().trim();
    return sportKeywords.some(function(k){return up.indexOf(k)>=0});
  }
  
  function parseSportName(text){
    var clean=text.replace(/\*+/g,'').trim();
    // Detect category from name
    var cat='Misto';
    var up=clean.toUpperCase();
    if(up.indexOf('FEM')>=0)cat='Feminino';
    else if(up.indexOf('MASC')>=0)cat='Masculino';
    else if(up.indexOf('MISTO')>=0)cat='Misto';
    // Clean sport name (remove FEM/MASC/MISTO suffix)
    var sportName=clean.replace(/\s*(FEM\.?|MASC\.?|FEMININO|MASCULINO|MISTO)\s*/gi,'').trim();
    // Remove trailing dots and spaces
    sportName=sportName.replace(/[\.\s]+$/,'').trim();
    return{name:sportName,category:cat};
  }
  
  tables.forEach(function(table){
    var rows=table.querySelectorAll('tr');
    if(!rows.length)return;
    
    // Current sport for each column
    var colSports=[];
    var colPlayers=[];
    var numCols=0;
    
    rows.forEach(function(tr){
      var cells=tr.querySelectorAll('td');
      if(!cells.length)return;
      if(cells.length>numCols)numCols=cells.length;
      
      // Initialize arrays if needed
      while(colSports.length<cells.length){colSports.push(null);colPlayers.push([])}
      
      for(var ci=0;ci<cells.length;ci++){
        var text=cells[ci].textContent.trim();
        if(!text)continue;
        
        if(isSportHeader(text)){
          // Save previous sport data before switching
          if(colSports[ci]&&colPlayers[ci].length){
            saveSportTeam(colSports[ci],colPlayers[ci],turma,result);
          }
          colSports[ci]=parseSportName(text);
          colPlayers[ci]=[];
        } else if(colSports[ci]){
          // It's a player name
          var name=text.replace(/\s*\(.*?\)\s*/g,'').trim(); // Remove (CR/CO) etc
          if(name&&name.length>1)colPlayers[ci].push(name);
        }
      }
    });
    
    // Save remaining
    for(var ci=0;ci<colSports.length;ci++){
      if(colSports[ci]&&colPlayers[ci].length){
        saveSportTeam(colSports[ci],colPlayers[ci],turma,result);
      }
    }
  });
  
  function saveSportTeam(sportInfo,players,turma,result){
    // Find or create sport
    var sport=S.spt.find(function(s){return s.nm.toLowerCase()===sportInfo.name.toLowerCase()});
    if(!sport){
      sport={id:uid(),nm:uc(sportInfo.name),mn:2,mx:20,ct:['Masculino','Feminino'],dur:14,tiebreakers:['goalDiff','yellowCards','redCards']};
      S.spt.push(sport);
      result.sports++;
    }
    // Ensure category exists
    if(sport.ct.indexOf(sportInfo.category)<0&&sportInfo.category==='Misto'){
      sport.ct.push('Misto');
    }
    
    // Create team name: "7º Ano A" → "7º A (F)"
    var teamName=buildTeamName(turma.nm,sportInfo.category);
    
    // Check if team already exists for this turma+sport+category
    var existing=S.enr.find(function(e){
      return e.ci===turma.id&&e.si===sport.id&&e.ct===sportInfo.category;
    });
    
    if(existing){
      // Update players AND team name
      existing.tn=teamName; // Always update name to latest format
      var oldPl=(existing.pl||'').split(',').map(function(p){return p.trim()}).filter(function(p){return p});
      players.forEach(function(p){
        if(!oldPl.find(function(op){return op.toLowerCase()===p.toLowerCase()}))oldPl.push(p);
      });
      existing.pl=oldPl.join(', ');
      result.wrn.push('Equipe "'+teamName+'" atualizada com '+players.length+' jogadores');
    } else {
      S.enr.push({
        id:uid(),
        tn:teamName,
        ci:turma.id,
        si:sport.id,
        ct:sportInfo.category,
        pl:players.join(', '),
        st:'approved'
      });
      result.teams++;
    }
    result.players+=players.length;
  }
  
  logAudit('Importação DOCX','Turma "'+turmaName+'": '+result.sports+' esporte(s) criado(s), '+result.teams+' equipe(s), '+result.players+' jogador(es)');
  
  S._docxResult={
    msg:'✅ <b>Importação concluída!</b><br>📚 Turma: <b>'+turmaName+'</b><br>⚽ '+result.sports+' esporte(s) criado(s)<br>📋 '+result.teams+' equipe(s) criada(s)<br>👥 '+result.players+' jogador(es) importado(s)',
    wrn:result.wrn
  };
  R();
}

function mAutoSch(c){
  var bkey=S.mod.bkey, ct=S.mod.ct;
  var bkParts=bkey.split('__');
  var ano=bkParts[0], siId=bkParts[1];
  var sp=S.spt.find(function(s){return s.id===siId});
  var dur=(sp&&sp.dur)||14; // minutes per game
  var interval=5; // minutes between games

  var close=function(){S.mod=null;R()};
  var previewDiv=h('div',{style:{marginTop:'14px',maxHeight:'220px',overflowY:'auto',fontSize:'12px',color:'var(--tx2)',lineHeight:'1.8'}});

    previewDiv.innerHTML='';

    var base=new Date(f.date+'T'+f.startTime);
    var slot=dur+(+f.interval||5);
    var conflict=false;
    allMatches.forEach(function(m,i){
      var start=new Date(base.getTime()+i*slot*60000);
      var end=new Date(start.getTime()+dur*60000);
      var startStr=start.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      var endStr=end.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      var hasConflict=checkConflict(m,start,end,bkey,ct);
      var venueBusy=f.location?checkVenueBusy(f.location,start,end,m.id):[];
      if(hasConflict)conflict=true;
      var warnings=[];
      if(hasConflict)warnings.push('⚠️ CONFLITO DE TURMA');
      if(venueBusy.length)warnings.push('🏟️ LOCAL OCUPADO ('+venueBusy.map(function(b){return(b.sport?b.sport.nm:'')+' '+b.cat}).join(', ')+')');

        ' '+tName(m.t1)+' × '+tName(m.t2)+(m.is3rd?' (3º lugar)':''),
        warnings.length?h('div',{style:{fontSize:'10px',color:hasConflict?'#f87171':'#fbbf24',marginLeft:'4px'}},warnings.join(' | ')):null

    return !conflict;
  }

  var durInp=h('input',{'class':'fi',type:'number',value:''+dur,min:'5',style:{maxWidth:'80px'},oninput:function(e){dur=+e.target.value||14;buildPreview()}});

    h('div',{'class':'md-h'},h('div',{'class':'md-t'},'🕐 Agendamento Automático'),h('button',{'class':'btn btn-s',onclick:close},'✕')),
    h('div',{'class':'md-b'},
      h('div',{style:{fontSize:'12px',color:'var(--tx2)',marginBottom:'14px'}},
        'Distribui horários automaticamente respeitando conflitos entre esportes.'
      ),
      h('div',{'class':'fr'},
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Data'),h('input',{'class':'fi',type:'date',value:f.date,oninput:function(e){f.date=e.target.value;buildPreview()}})),
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Início'),h('input',{'class':'fi',type:'time',value:f.startTime,oninput:function(e){f.startTime=e.target.value;buildPreview()}}))
      ),
      h('div',{'class':'fr'},
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Duração (min)'),durInp),
        h('div',{'class':'fg'},h('label',{'class':'fl'},'Intervalo (min)'),intInp)
      ),
      h('div',{'class':'fg'},h('label',{'class':'fl'},'Local'),
        (function(){
          if(!S.locs.length){
            // No venues registered: free text
            return h('input',{'class':'fi',value:f.location,placeholder:'Ex: Campo Society',oninput:function(e){f.location=e.target.value;buildPreview()}});
          }

            buildPreview();

          S.locs.forEach(function(l){
            var opt=document.createElement('option');
            opt.value=l.nm;opt.textContent=l.nm+(l.tp?' ('+l.tp+')':'');

      }},'✅ Aplicar')

  setTimeout(function(){buildPreview()},10);
  c.appendChild(ov);
}

// Check if a match's teams have a conflicting match in the same time window (other sports)
// ══════════════════════════════════════════════════════════════════════════
// BRACKET CLASSIFICATION: 1st-8th with tiebreakers
// ══════════════════════════════════════════════════════════════════════════
function calcBracketClassification(rds,bkey,category){
  if(!rds||!rds.length)return[];
  // Get sport's tiebreaker config
  var parts=bkey.split('__');
  var siId=parts.length>1?parts[1]:parts[0];
  var sport=S.spt.find(function(s){return s.id===siId});
  var tiebreakers=sport&&sport.tiebreakers?sport.tiebreakers:['goalDiff','yellowCards','redCards'];

  var allMatches=[];
  rds.forEach(function(rd){rd.m.forEach(function(m){allMatches.push(m)})});

  var stats={};
  function ensureTeam(tid){
    if(!tid||tid==='BYE'||tid.indexOf('W_')===0||tid.indexOf('L_')===0)return;
    if(!stats[tid])stats[tid]={id:tid,name:tName(tid),goalsFor:0,goalsConceded:0,goalDiff:0,yellowCards:0,redCards:0,wins:0};
  }
  allMatches.forEach(function(m){
    if(m.t1==='BYE'||m.t2==='BYE')return;
    ensureTeam(m.t1);ensureTeam(m.t2);
    if(m.s1!=null&&m.s2!=null){
      if(stats[m.t1]){stats[m.t1].goalsFor+=m.s1;stats[m.t1].goalsConceded+=m.s2}
      if(stats[m.t2]){stats[m.t2].goalsFor+=m.s2;stats[m.t2].goalsConceded+=m.s1}
    }
    if(m.cards){
      if(m.cards[m.t1]&&stats[m.t1]){stats[m.t1].yellowCards+=(m.cards[m.t1].y||0);stats[m.t1].redCards+=(m.cards[m.t1].r||0)}
      if(m.cards[m.t2]&&stats[m.t2]){stats[m.t2].yellowCards+=(m.cards[m.t2].y||0);stats[m.t2].redCards+=(m.cards[m.t2].r||0)}
    }
    if(m.w&&stats[m.w])stats[m.w].wins++;
  });
  Object.values(stats).forEach(function(s){s.goalDiff=s.goalsFor-s.goalsConceded});

  var result=[];
  var lastRound=rds[rds.length-1];
  var finalMatch=lastRound?lastRound.m.find(function(m){return!m.is3rd}):null;
  var thirdMatch=lastRound?lastRound.m.find(function(m){return m.is3rd}):null;

  if(finalMatch&&finalMatch.w){
    var first=finalMatch.w;
    var second=finalMatch.w===finalMatch.t1?finalMatch.t2:finalMatch.t1;
    if(stats[first])result.push(stats[first]);
    if(stats[second]&&second!=='BYE')result.push(stats[second]);
  }
  if(thirdMatch&&thirdMatch.w){
    var thr=thirdMatch.w;
    var fou=thirdMatch.w===thirdMatch.t1?thirdMatch.t2:thirdMatch.t1;
    if(stats[thr]&&result.indexOf(stats[thr])<0)result.push(stats[thr]);
    if(stats[fou]&&fou!=='BYE'&&fou.indexOf('L_')!==0&&result.indexOf(stats[fou])<0)result.push(stats[fou]);
  }

  var alreadyPlaced={};
  result.forEach(function(s){alreadyPlaced[s.id]=true});
  var remaining=Object.values(stats).filter(function(s){return!alreadyPlaced[s.id]});

  // Sort by sport-specific tiebreaker order
  remaining.sort(function(a,b){
    for(var i=0;i<tiebreakers.length;i++){
      var k=tiebreakers[i];
      if(k==='goalDiff'){if(b.goalDiff!==a.goalDiff)return b.goalDiff-a.goalDiff}
      else if(k==='yellowCards'){if(a.yellowCards!==b.yellowCards)return a.yellowCards-b.yellowCards}
      else if(k==='redCards'){if(a.redCards!==b.redCards)return a.redCards-b.redCards}
      else if(k==='wins'){if(b.wins!==a.wins)return b.wins-a.wins}
    }
    return 0;
  });
  result=result.concat(remaining);
  return result.slice(0,8);
}

function checkConflict(match,startDt,endDt,skipBkey,skipCt){
  // Get class IDs and categories for t1 and t2
  var e1=S.enr.find(function(e){return e.id===match.t1});
  var e2=S.enr.find(function(e){return e.id===match.t2});
  var ci1=e1&&e1.ci, ci2=e2&&e2.ci;
  var cat1=e1&&e1.ct, cat2=e2&&e2.ct; // Masculino/Feminino/Misto
  if(!ci1&&!ci2)return false;
  var conflict=false;
  Object.entries(S.brk).forEach(function(bkEntry){
    var bk=bkEntry[0],cts=bkEntry[1];
    Object.entries(cts).forEach(function(ctEntry){
      var ct=ctEntry[0],rds=ctEntry[1];
      if(bk===skipBkey&&ct===skipCt)return;
      rds.forEach(function(rd){rd.m.forEach(function(m){
        if(!m.dt)return;
        var ms=new Date(m.dt);
        var sp2=S.spt.find(function(s){
          var parts=bk.split('__');return s.id===(parts.length>1?parts[1]:parts[0]);
        });
        var d2=(sp2&&sp2.dur)||14;
        var me=new Date(ms.getTime()+d2*60000);
        if(ms<endDt&&me>startDt){
          var em1=S.enr.find(function(e){return e.id===m.t1});
          var em2=S.enr.find(function(e){return e.id===m.t2});
          var cm1=em1&&em1.ci, cm2=em2&&em2.ci;
          var ccat=ctEntry[0]; // category of the other match
          // Conflict: same turma AND same category (masc vs masc = conflict, masc vs fem = ok)
          if(ci1&&(ci1===cm1||ci1===cm2)){
            // Check if categories overlap (same gender = students overlap)
            if(cat1===ccat||cat1==='Misto'||ccat==='Misto')conflict=true;
          }
          if(ci2&&(ci2===cm1||ci2===cm2)){
            if(cat2===ccat||cat2==='Misto'||ccat==='Misto')conflict=true;
          }
        }
      })});
    });
  });
  return conflict;
}

// Check if a venue is busy at a given time (returns array of matches using that venue)
function checkVenueBusy(location,startDt,endDt,skipMatchId){
  if(!location)return[];
  var busy=[];
  Object.entries(S.brk).forEach(function(bkEntry){
    Object.entries(bkEntry[1]).forEach(function(ctEntry){
      ctEntry[1].forEach(function(rd){rd.m.forEach(function(m){
        if(!m.dt||!m.lc||m.id===skipMatchId)return;
        if(m.lc.toLowerCase()!==location.toLowerCase())return;
        var sp2=S.spt.find(function(s){var p=bkEntry[0].split('__');return s.id===(p.length>1?p[1]:p[0])});
        var d2=(sp2&&sp2.dur)||14;
        var ms=new Date(m.dt);
        var me=new Date(ms.getTime()+d2*60000);
        if(ms<endDt&&me>startDt)busy.push({match:m,sport:sp2,cat:ctEntry[0]});
      })});
    });
  });
  return busy;
}

function applyAutoSchedule(bkey,ct,date,startTime,dur,interval,location){
  var rds=S.brk[bkey]&&S.brk[bkey][ct]?S.brk[bkey][ct]:[];
  var slot=dur+interval;
  var base=new Date(date+'T'+startTime);
  var i=0;
  rds.forEach(function(rd){
    rd.m.forEach(function(m){
      if(m.t1==='BYE'||m.t2==='BYE')return;
      var start=new Date(base.getTime()+i*slot*60000);
      var pad=function(n){return n<10?'0'+n:''+n};
      m.dt=date+'T'+pad(start.getHours())+':'+pad(start.getMinutes());
      m.lc=location;
      i++;
    });
  });
}

// W.O. (WALK-OVER) SYSTEM
// ══════════════════════════════════════════════════════════════════════════
function applyWO(m,absentTeam,winnerTeam){
  if(!confirm('Confirmar W.O.?\n\nAusente: '+tName(absentTeam)+'\nVencedor: '+tName(winnerTeam)+'\nPlacar: 3 × 0'))return;
  var s1=winnerTeam===m.t1?3:0, s2=winnerTeam===m.t2?3:0;
  S.brk[S.mod.si][S.mod.ct]=S.brk[S.mod.si][S.mod.ct].map(function(r){return Object.assign({},r,{m:r.m.map(function(x){
    if(x.id===m.id)return Object.assign({},x,{s1:s1,s2:s2,w:winnerTeam,wo:absentTeam});
    if(x.t1==='W_'+m.id)return Object.assign({},x,{t1:winnerTeam});
    if(x.t2==='W_'+m.id)return Object.assign({},x,{t2:winnerTeam});
    return x;
  })})});
  if(!S.woLog)S.woLog=[];
  S.woLog.push({matchId:m.id,teamId:absentTeam,winnerId:winnerTeam,date:new Date().toLocaleString('pt-BR')});
  logAudit('W.O.','Time "'+tName(absentTeam)+'" não compareceu. Vencedor: "'+tName(winnerTeam)+'"');
  notifyNextGame(S.mod.si,S.mod.ct,m.id);
  S.mod=null;R();
}

function applyWOBoth(m){
  if(!confirm('W.O. para AMBOS os times?\n\n'+tName(m.t1)+' e '+tName(m.t2)+'\n\nNenhum avança. Ambos recebem penalidade.'))return;
  // No winner advances - mark match as completed with no winner advancing
  S.brk[S.mod.si][S.mod.ct]=S.brk[S.mod.si][S.mod.ct].map(function(r){return Object.assign({},r,{m:r.m.map(function(x){
    if(x.id===m.id)return Object.assign({},x,{s1:0,s2:0,w:'WO_BOTH',wo:'both'});
    return x;
  })})});
  if(!S.woLog)S.woLog=[];
  S.woLog.push({matchId:m.id,teamId:m.t1,winnerId:null,type:'both',date:new Date().toLocaleString('pt-BR')});
  S.woLog.push({matchId:m.id,teamId:m.t2,winnerId:null,type:'both',date:new Date().toLocaleString('pt-BR')});
  logAudit('W.O. Duplo','Ambos os times "'+tName(m.t1)+'" e "'+tName(m.t2)+'" não compareceram');
  S.mod=null;R();
}

// STUDENT NEXT-GAME ALERT
// ══════════════════════════════════════════════════════════════════════════
function notifyNextGame(bkeyResult,ct,completedMatchId){
  // After a result is set, find the NEXT upcoming match across all brackets
  // and check if the logged-in student's turma is involved
  if(!S.auth||S.auth.role!=='student')return;
  var ci=S.auth.ci;
  var now=new Date();

  // Collect all upcoming unfinished matches with scheduled times
  var upcoming=[];
  Object.entries(S.brk).forEach(function(bkE){
    var bk=bkE[0],cts=bkE[1];
    var parts=bk.split('__');
    var si=parts.length>1?parts[1]:parts[0];
    Object.entries(cts).forEach(function(ctE){
      var ct2=ctE[0],rds=ctE[1];
      rds.forEach(function(r){r.m.forEach(function(m){
        if(m.w||m.t1==='BYE'||m.t2==='BYE'||!m.dt)return;
        var e1=S.enr.find(function(e){return e.id===m.t1});
        var e2=S.enr.find(function(e){return e.id===m.t2});
        if((e1&&e1.ci===ci)||(e2&&e2.ci===ci)){
          upcoming.push({m:m,si:si,ct:ct2,dt:new Date(m.dt)});
        }
      })});
    });
  });

  upcoming.sort(function(a,b){return a.dt-b.dt});
  if(!upcoming.length)return;
  var next=upcoming[0];
  var sp=S.spt.find(function(s){return s.id===next.si});
  var dtStr=next.dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  S.nextGameAlert={
    msg:'📣 Próximo jogo: '+tName(next.m.t1)+' × '+tName(next.m.t2)+'\n'+(sp?sp.nm:'')+' — '+next.ct+'\n🕐 '+dtStr+(next.m.lc?' @ '+next.m.lc:''),
    matchId:next.m.id
  };
}

// Check alert on student dashboard
function getStudentAlert(){
  if(!S.auth||S.auth.role!=='student'||!S.nextGameAlert)return null;
  // Check if there's an upcoming match for this student's class within 30 min
  var ci=S.auth.ci;
  var now=new Date();
  var alert=null;
  Object.entries(S.brk).forEach(function(bkE){
    var bk=bkE[0],cts=bkE[1];
    var parts=bk.split('__');var si=parts.length>1?parts[1]:parts[0];
    Object.entries(cts).forEach(function(ctE){
      var ct2=ctE[0],rds=ctE[1];
      rds.forEach(function(r){r.m.forEach(function(m){
        if(m.w||!m.dt)return;
        var e1=S.enr.find(function(e){return e.id===m.t1});
        var e2=S.enr.find(function(e){return e.id===m.t2});
        if(!((e1&&e1.ci===ci)||(e2&&e2.ci===ci)))return;
        var dt=new Date(m.dt);
        var diff=(dt-now)/60000; // minutes until match
        if(diff>=0&&diff<=60){ // alert if within 60 min
          var sp=S.spt.find(function(s){return s.id===si});
          var dtStr=dt.toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
          var opp=(e1&&e1.ci===ci)?tName(m.t2):tName(m.t1);
          alert={msg:'Seu próximo jogo é contra '+opp,detail:(sp?sp.nm:'')+' · '+ct2+' · '+dtStr+(m.lc?' @ '+m.lc:''),diff:Math.round(diff)};
        }
      })});
    });
  });
  return alert;
}

function nrm(s){return s.trim().replace(/[°°]/g,'º').replace(/\s+/g,' ').toUpperCase()}

function kex(s){var n=nrm(s);var m=n.match(/(\d+)\s*[º\xba\xaa]?\s*(?:ANO|SERIE|S[EÉ]RIE)?\s*([A-Z])$/);if(m)return m[1]+m[2];return n.replace(/[^A-Z0-9]/g,'')}

function findCls(nm){
  var byExact=S.cls.find(function(x){return nrm(x.nm)===nrm(nm)});
  if(byExact)return byExact;
  var byKey=S.cls.find(function(x){var k=kex(nm);return k&&k.length>=2&&kex(x.nm)===k});
  if(byKey)return byKey;
  var n=nrm(nm);
  return S.cls.find(function(x){return nrm(x.nm).indexOf(n)>=0||n.indexOf(nrm(x.nm))>=0})||null;
}

function findSpt(nm){var n=nm.trim().toUpperCase();return S.spt.find(function(s){return s.nm.toUpperCase()===n})||S.spt.find(function(s){return s.nm.toUpperCase().indexOf(n)>=0||n.indexOf(s.nm.toUpperCase())>=0})||null}
